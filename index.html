<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--bg); color: white; display: flex; flex-direction: column; min-height: 100vh; padding: 10px; gap: 10px; }

        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); margin-bottom: 5px; }
        .logo { font-weight: 800; font-size: 18px; color: white; }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; }

        /* ТОРГОВЛЯ И СТАКАН (Верхний блок) */
        .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-items: stretch; }
        @media (max-width: 400px) { .top-grid { grid-template-columns: 1fr; } } /* На совсем мелких экранах в столбик */

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 12px; display: flex; flex-direction: column; }
        
        /* Стакан */
        .orderbook { font-family: monospace; font-size: 11px; min-height: 180px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; }
        .mid-price { text-align: center; padding: 8px 0; font-size: 14px; font-weight: bold; color: var(--green); }

        /* Поля ввода */
        .input-group { background: var(--input); padding: 6px 10px; border-radius: 4px; margin-bottom: 8px; }
        .input-group label { display: block; font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 2px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }
        
        .btn { border: none; padding: 12px; border-radius: 4px; font-weight: bold; color: white; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-buy { background: var(--green); margin-bottom: 5px; }
        .btn-sell { background: var(--red); }

        /* ГРАФИК (Простой холст, который не тупит) */
        .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; flex: 1; min-height: 250px; position: relative; overflow: hidden; }
        .chart-header { padding: 8px; font-size: 10px; color: var(--text); border-bottom: 1px solid var(--border); }
        #simple-chart { width: 100%; height: 200px; display: block; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">STRATEX</div>
    <div class="price-top">1.3145</div>
</div>

<div class="top-grid">
    <div class="card orderbook">
        <div style="color:var(--text); font-size:9px; margin-bottom:5px;">ORDER BOOK</div>
        <div id="asks" style="color:var(--red)"></div>
        <div class="mid-price">1.3145</div>
        <div id="bids" style="color:var(--green)"></div>
    </div>

    <div class="card">
        <div class="input-group">
            <label>Price (USDT)</label>
            <input type="number" value="1.3145">
        </div>
        <div class="input-group">
            <label>Amount (TON)</label>
            <input type="number" placeholder="0.0">
        </div>
        <button class="btn btn-buy">BUY</button>
        <button class="btn btn-sell">SELL</button>
    </div>
</div>

<div class="chart-card">
    <div class="chart-header">TRADING VIEW (SIMULATED)</div>
    <canvas id="simple-chart"></canvas>
</div>

<script>
    // Простой скрипт для отрисовки графиков без тяжелых библиотек
    const canvas = document.getElementById('simple-chart');
    const ctx = canvas.getContext('2d');

    function drawChart() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 1;
        
        // Рисуем сетку
        for(let i=0; i<canvas.height; i+=30) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // Рисуем имитацию свечей
        for(let i=0; i<20; i++) {
            const x = 10 + (i * 15);
            const h = 40 + Math.random() * 60;
            const up = Math.random() > 0.5;
            ctx.fillStyle = up ? '#0ecb81' : '#f6465d';
            ctx.fillRect(x, 100 - (up ? h : h/2), 8, h);
        }
    }

    function updateOB() {
        const row = (p, a) => `<div class="ob-row"><span>${p.toFixed(4)}</span><span>${a.toFixed(1)}</span></div>`;
        let ah = '', bh = '';
        for(let i=0; i<5; i++) {
            ah = row(1.315 + i*0.001, Math.random()*10) + ah;
            bh += row(1.314 - i*0.001, Math.random()*10);
        }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }

    window.onresize = () => {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight - 30;
        drawChart();
    };
    
    window.onresize();
    updateOB();
    setInterval(updateOB, 2000);
</script>
</body>
</html>
