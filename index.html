<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AutoTrade - STON.fi Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0d0e12; --card: #18191f; --primary: #007aff; --text: #ffffff; --green: #00ffa3; --input: #212229; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        header { width: 100%; max-width: 1200px; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .logo { font-size: 22px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        /* Стили для контейнера кнопки TonConnect */
        #ton-connect-button { margin-left: auto; }

        .swap-container { background: var(--card); border: 1px solid #2e2f36; padding: 24px; border-radius: 24px; width: 90%; max-width: 420px; margin-top: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { background: var(--input); padding: 16px; border-radius: 16px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.2s; }
        .input-group:hover { border-color: #3e3f4a; }
        .label { font-size: 14px; color: #8e8e93; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        input { background: transparent; border: none; color: white; font-size: 24px; font-weight: 600; width: 60%; outline: none; }
        .token { background: #2e2f36; padding: 6px 14px; border-radius: 20px; font-weight: 600; font-size: 14px; }

        .swap-arrow { background: #2e2f36; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -18px auto; position: relative; z-index: 2; border: 4px solid var(--card); }
        .swap-btn { width: 100%; background: #2e2f36; color: #666; border: none; padding: 18px; border-radius: 16px; font-size: 18px; font-weight: 700; margin-top: 20px; cursor: not-allowed; transition: 0.3s; }
        .swap-btn.active { background: var(--primary); color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,122,255,0.3); }
        
        .info-row { margin-top: 15px; font-size: 13px; color: #8e8e93; display: flex; justify-content: space-between; padding: 0 4px; }
        .green-text { color: var(--green); }

        /* Таблица сделок внизу */
        .history-table { width: 90%; max-width: 420px; margin-top: 30px; background: var(--card); border-radius: 16px; padding: 16px; border: 1px solid #2e2f36; font-size: 14px; }
        .history-title { font-weight: 700; margin-bottom: 12px; display: block; color: #8e8e93; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #212229; }
    </style>
</head>
<body>

    <header>
        <div class="logo">💎 STON.fi <span style="color:white; font-size: 12px; opacity: 0.4; font-weight: 400; margin-left: 5px;">GROK TERMINAL</span></div>
        <div id="ton-connect-button"></div>
    </header>

    <div class="swap-container">
        <div class="input-group">
            <div class="label">Вы отдаете</div>
            <div class="input-row">
                <input type="number" id="sendAmount" placeholder="0.0" oninput="doMath()">
                <div class="token">TON</div>
            </div>
        </div>

        <div class="swap-arrow">↓</div>

        <div class="input-group">
            <div class="label">Вы получаете</div>
            <div class="input-row">
                <input type="number" id="getAmount" placeholder="0.0" readonly>
                <div class="token">USDT</div>
            </div>
        </div>

        <div class="info-row">
            <span>Курс</span>
            <span id="live-price">Загрузка курса...</span>
        </div>

        <button class="swap-btn" id="swap-action">Connect Wallet</button>
    </div>

    <div class="history-table">
        <span class="history-title">Последние рыночные данные</span>
        <div id="market-list">
            <div class="history-item"><span>TON/USDT</span><span id="price-tick">---</span></div>
            <div class="history-item"><span>Liquidity</span><span class="green-text">High</span></div>
        </div>
    </div>

    <script>
        // Инициализация TonConnect с твоим манифестом
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        let currentPrice = 0;

        // Получение цены через API STON.fi
        async function updateMarketData() {
            try {
                const response = await fetch('https://api.ston.fi/v1/assets');
                const data = await response.json();
                const tonAsset = data.assets.find(a => a.symbol === 'TON');
                
                if (tonAsset) {
                    currentPrice = parseFloat(tonAsset.dex_usd_price);
                    document.getElementById('live-price').innerHTML = `1 TON ≈ <span class="green-text">$${currentPrice.toFixed(2)}</span>`;
                    document.getElementById('price-tick').innerText = `$${currentPrice.toFixed(2)}`;
                }
            } catch (err) {
                console.log("Ошибка API, ставим демо-курс");
                currentPrice = 5.35; // Запасной вариант
                document.getElementById('live-price').innerText = "1 TON ≈ $5.35 (Demo)";
            }
        }

        // Расчет обмена
        function doMath() {
            const send = document.getElementById('sendAmount').value;
            const get = document.getElementById('getAmount');
            if (send > 0 && currentPrice > 0) {
                get.value = (send * currentPrice * 0.997).toFixed(2); // Минус комиссия 0.3%
            } else {
                get.value = '';
            }
        }

        // Следим за состоянием кошелька
        tonConnectUI.onStatusChange(wallet => {
            const btn = document.getElementById('swap-action');
            if (wallet) {
                btn.innerText = 'Обменять';
                btn.classList.add('active');
                btn.onclick = () => alert('Логика транзакции будет добавлена в следующем модуле SDK!');
            } else {
                btn.innerText = 'Connect Wallet';
                btn.classList.remove('active');
                btn.onclick = null;
            }
        });

        // Запуск
        updateMarketData();
        setInterval(updateMarketData, 20000); // Обновлять каждые 20 сек
    </script>
</body>
</html>
