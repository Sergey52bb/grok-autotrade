<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Grok Avto Trade</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); }
        #main_content { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .screen { display: none; padding: 15px; }
        .screen.active { display: block; }

        /* Wallet Card */
        .balance-card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
        .btn-group { display: flex; gap: 10px; }
        .sub-btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-dep { background: #fff; color: #000; }
        .btn-send { background: var(--green); color: #000; }

        /* Market Items */
        .coin-row { display: flex; align-items: center; justify-content: space-between; padding: 15px; background: var(--panel); border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 30px; height: 30px; border-radius: 50%; background: #333; }

        /* Footer Nav */
        nav { height: 75px; background: var(--panel); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; width: 100%; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 12px; }
        .nav-item.active { color: var(--green); }

        /* Fix for Connect Button */
        #ton-connect-btn { min-height: 40px; margin: 20px auto; display: flex; justify-content: center; }
    </style>
</head>
<body>

<header>
    <h2 id="app_title">💎 Grok Avto Trade</h2>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <p style="font-size: 12px; color: var(--text);">TOTAL BALANCE</p>
            <h1 style="font-size: 36px; margin: 10px 0;">0.00 TON</h1>
            <p style="color: var(--green);">$0.00</p>
        </div>
        <div class="btn-group">
            <button class="sub-btn btn-dep" onclick="copyAddr()">⬇ DEPOSIT</button>
            <button class="sub-btn btn-send" onclick="alert('Connect Wallet first')">⬆ SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h3 style="margin-bottom: 15px;">Market Analysis</h3>
        <div id="coin_list">
            </div>
    </div>

    <div id="scr_profile" class="screen">
        <h3>System Profile</h3>
        <div style="background: var(--panel); padding: 20px; border-radius: 15px; margin-top: 15px;">
            <p>Status: <span style="color: var(--green);">Online</span></p>
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet')">💼 Wallet</div>
    <div class="nav-item" onclick="showTab('market')">🔄 Market</div>
    <div class="nav-item" onclick="showTab('profile')">👤 Profile</div>
</nav>

<script>
    // 1. Инициализация TonConnect UI
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/Grok-Avto-Trade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    // 2. Функция переключения вкладок
    function showTab(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + name).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(name === 'market') updateMarket();
    }

    // 3. Исправленный Депозит
    function copyAddr() {
        const wallet = tonConnectUI.account;
        if (wallet) {
            const addr = wallet.address;
            prompt("UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb", addr);
        } else {
            alert("Пожалуйста, подключите кошелек во вкладке Profile");
            showTab('profile');
        }
    }

    // 4. Исправленный Маркет (рисует сразу)
    const COINS = [
        { name: 'TON', sym: 'ton', price: '5.42' },
        { name: 'BNB', sym: 'bnb', price: '580.1' },
        { name: 'ASTER', sym: 'aster', price: '0.72' },
        { name: 'BTC', sym: 'btc', price: '65200' }
    ];

    function updateMarket() {
        const list = document.getElementById('coin_list');
        list.innerHTML = ''; 
        COINS.forEach(coin => {
            const div = document.createElement('div');
            div.className = 'coin-row';
            div.innerHTML = `
                <div class="coin-info">
                    <img src="https://raw.githubusercontent.com/t1m9m/cryptocurrency-icons/master/32/color/${coin.sym}.png" class="coin-icon" onerror="this.style.display='none'">
                    <span>${coin.name} / TON</span>
                </div>
                <div style="color: var(--green); font-weight: bold;">$${coin.price}</div>
            `;
            list.appendChild(div);
        });
    }

    // Запуск при старте
    updateMarket();
</script>
</body>
</html>
