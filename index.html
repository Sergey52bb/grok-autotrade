<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
            display: grid;
            /* Сетка: Шапка (40px) | Форма/Стакан (220px) | График (остаток) | Навбар (65px) */
            grid-template-rows: 40px 220px 1fr 65px;
        }

        .header { background: #121518; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; font-size: 13px; border-bottom: 1px solid #222; }

        /* Блок торговли и стакана */
        .trade-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; border-bottom: 1px solid #222; }
        
        .form-col { display: flex; flex-direction: column; gap: 6px; }
        .inp { background: var(--input); border-radius: 4px; padding: 5px 8px; }
        .inp label { font-size: 9px; color: var(--text); display: block; }
        .inp input { background: transparent; border: none; color: white; width: 100%; font-size: 15px; outline: none; font-weight: bold; }
        
        .btn-buy { background: var(--green); border: none; color: white; padding: 12px; border-radius: 4px; font-weight: bold; margin-top: auto; font-size: 14px; }

        .book-col { border: 1px solid #222; border-radius: 4px; display: grid; grid-template-rows: 15px 1fr 25px 1fr; font-family: monospace; font-size: 10px; overflow: hidden; }
        .row { display: flex; justify-content: space-between; padding: 1px 5px; }

        /* График */
        #chart { width: 100%; height: 100%; overflow: hidden; }

        /* Навигация */
        .navbar { background: var(--panel); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-link { text-align: center; color: var(--text); font-size: 10px; text-decoration: none; }
        .nav-link.active { color: white; }
    </style>
</head>
<body>

<div class="header">
    <b>STRATEX</b>
    <span style="color:var(--green)" id="price-top">1.3145 TON/USDT</span>
</div>

<div class="trade-area">
    <div class="form-col">
        <div class="inp"><label>Price</label><input type="number" value="1.3145"></div>
        <div class="inp"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <button class="btn-buy">Buy TON</button>
    </div>
    <div class="book-col">
        <div style="color:var(--text); padding: 2px 5px; border-bottom: 1px solid #222;">Price / Size</div>
        <div id="asks" style="color:var(--red); display: flex; flex-direction: column-reverse;"></div>
        <div id="price-mid" style="text-align:center; line-height:25px; background: #121518; font-weight:bold;">1.3145</div>
        <div id="bids" style="color:var(--green)"></div>
    </div>
</div>

<div id="chart"></div>

<nav class="navbar">
    <a href="#" class="nav-link active">📊<br>Рынок</a>
    <a href="#" class="nav-item">💼<br>Активы</a>
    <a href="#" class="nav-item">📜<br>Сделки</a>
    <a href="#" class="nav-item">⚙️<br>Настройки</a>
</nav>

<script>
    var options = {
        series: [{ data: [] }],
        chart: { type: 'candlestick', height: '100%', toolbar: { show: false }, animations: { enabled: false } },
        xaxis: { type: 'datetime', labels: { show: false } },
        yaxis: { opposite: true, labels: { formatter: (v) => v.toFixed(4), style: { colors: '#848e9c' } } },
        grid: { borderColor: '#1f2226' },
        plotOptions: { candlestick: { colors: { upward: '#0ecb81', downward: '#f6465d' }, wick: { useFillColor: true } } }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    function mockData() {
        let data = [];
        let t = Date.now() - 3600000;
        for(let i=0; i<30; i++) {
            let o = 1.314 + Math.random()*0.005;
            data.push({ x: t + i*120000, y: [o, o+0.002, o-0.001, o+0.001] });
        }
        chart.updateSeries([{ data: data }]);
    }
    mockData();

    function mockBook() {
        let a = '', b = '';
        for(let i=0; i<4; i++) {
            a += `<div class="row"><span>${(1.315+i*0.001).toFixed(4)}</span><span>${(Math.random()*5).toFixed(1)}</span></div>`;
            b += `<div class="row"><span>${(1.314-i*0.001).toFixed(4)}</span><span>${(Math.random()*5).toFixed(1)}</span></div>`;
        }
        document.getElementById('asks').innerHTML = a;
        document.getElementById('bids').innerHTML = b;
    }
    mockBook();
</script>
</body>
</html>
