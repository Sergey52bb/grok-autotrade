<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX PRO TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Шапка */
        .header { background: #1c2127; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .brand { color: #f0b90b; font-size: 18px; font-weight: bold; }

        /* Зона графика (Верхняя половина) */
        .chart-zone { flex: 1.2; border-bottom: 4px solid #0b0e11; }
        
        /* Торговая зона (Нижняя половина) */
        .trade-zone { flex: 1; display: flex; background: #1c2127; padding: 10px; gap: 10px; }

        /* Стакан (Order Book) */
        .order-book { flex: 0.8; font-size: 11px; display: flex; flex-direction: column; }
        .ob-header { display: flex; justify-content: space-between; color: #848e9c; margin-bottom: 5px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; position: relative; }
        .ob-ask { color: #f6465d; } /* Продажа */
        .ob-bid { color: #0ecb81; } /* Покупка */
        .ob-price-main { font-size: 16px; font-weight: bold; margin: 10px 0; text-align: center; color: #0ecb81; }

        /* Форма сделки */
        .trade-form { flex: 1.2; display: flex; flex-direction: column; gap: 8px; }
        .tabs { display: flex; background: #2b3139; border-radius: 4px; padding: 2px; }
        .tab { flex: 1; text-align: center; padding: 5px; font-size: 12px; border-radius: 4px; cursor: pointer; }
        .tab.active-buy { background: #0ecb81; color: white; }
        
        .input-box { background: #2b3139; border-radius: 4px; padding: 8px; border: 1px solid #444; }
        .input-label { font-size: 10px; color: #848e9c; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-val { font-weight: bold; font-size: 14px; }

        .btn-main { background: #0ecb81; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; margin-top: auto; cursor: pointer; }
        
        .footer-info { font-size: 10px; color: #848e9c; margin-top: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">STRATEX</div>
        <div id="ton-connect-button"></div>
    </div>

    <div class="chart-zone">
        <div id="tradingview_widget" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            new TradingView.widget({
                "autosize": true, "symbol": "OKX:TONUSDT", "interval": "60", "timezone": "Etc/UTC",
                "theme": "dark", "style": "1", "locale": "ru", "hide_top_toolbar": true, "container_id": "tradingview_widget"
            });
        </script>
    </div>

    <div class="trade-zone">
        <div class="order-book">
            <div class="ob-header"><span>Цена</span><span>Кол-во</span></div>
            <div class="ob-row ob-ask"><span>7.245</span><span>142</span></div>
            <div class="ob-row ob-ask"><span>7.241</span><span>85</span></div>
            <div class="ob-row ob-ask"><span>7.238</span><span>1.2K</span></div>
            
            <div class="ob-price-main">7.235 ↑</div>
            
            <div class="ob-row ob-bid"><span>7.232</span><span>410</span></div>
            <div class="ob-row ob-bid"><span>7.229</span><span>95</span></div>
            <div class="ob-row ob-bid"><span>7.225</span><span>2.4K</span></div>
        </div>

        <div class="trade-form">
            <div class="tabs">
                <div class="tab active-buy">Купить</div>
                <div class="tab">Продать</div>
            </div>
            
            <div class="input-box">
                <div class="input-label">Цена</div>
                <div class="input-row"><span class="input-val">7.235</span><span style="color:#848e9c">USDT</span></div>
            </div>

            <div class="input-box">
                <div class="input-label">Количество</div>
                <div class="input-row"><span class="input-val">0</span><span style="color:#848e9c">TON</span></div>
            </div>

            <div class="footer-info">
                <span>Доступно:</span>
                <span id="balance" style="color:white">0.0033 TON</span>
            </div>

            <button class="btn-main" id="actionBtn">Купить TON</button>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });

        async function updateBalance(address) {
            try {
                const response = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${address}`);
                const data = await response.json();
                if (data.ok) {
                    const res = (parseFloat(data.result) / 1e9).toFixed(4);
                    document.getElementById('balance').innerText = res + " TON";
                }
            } catch (e) {}
        }

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                updateBalance(wallet.account.address);
                setInterval(() => updateBalance(wallet.account.address), 20000);
            }
        });
    </script>
</body>
</html>
