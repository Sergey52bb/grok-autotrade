<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AutoTrade • TON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root {
            --bg: #0a0a0a;
            --card: #1a1a1a;
            --text: #ffffff;
            --accent: #00ff88;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            line-height: 1.5;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }
        
        h1 { font-size: 28px; font-weight: 600; }
        
        .prices-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .prices-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }
        
        .price-card {
            background: var(--card);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .price-card:hover {
            transform: translateY(-4px);
        }
        
        .price-card strong {
            font-size: 1.1rem;
            display: block;
            margin-bottom: 4px;
        }
        
        .price-card .price {
            font-size: 2rem;
            font-weight: 600;
            color: var(--accent);
            margin: 8px 0;
        }
        
        .price-card small {
            color: #888;
            font-size: 0.9rem;
        }
        
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #00cc6a;
        }
        
        .status {
            font-size: 0.9rem;
            color: #0f0;
            margin-top: 10px;
        }
        
        pre {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>🚀 Grok AutoTrade</h1>
            <p>Автотрейдинг на TON • Реальные цены с GeckoTerminal</p>
        </div>
        <div style="text-align: right;">
            <span id="last-update" class="status">Обновлено: только что</span>
        </div>
    </header>

    <h2 style="margin-bottom: 15px;">📊 Реальные цены on-chain (TON DEX)</h2>
    
    <div class="prices-header">
        <p>Цены обновляются автоматически каждые 30 секунд • Данные с GeckoTerminal API</p>
        <button onclick="updateAllPrices()">🔄 Обновить сейчас</button>
    </div>

    <!-- СЮДА ВСТАВЛЯЮТСЯ КАРТОЧКИ С ЦЕНАМИ -->
    <div id="prices-container" class="prices-container">
        <!-- JS автоматически заполнит карточки -->
    </div>

    <div class="status" style="text-align: center; font-size: 0.85rem; margin-top: 10px;">
        Лимит API: 30 запросов/мин • Всё работает в браузере
    </div>

    <!-- Если у тебя были другие блоки (кнопки торговли, логи и т.д.) — вставь их сюда ниже -->

    <script>
        // ==================== РЕАЛЬНЫЕ ЦЕНЫ С GECKOTERMINAL (TON) ====================
        
        const tokens = [
            { symbol: "TON",   name: "Toncoin",      address: null },
            { symbol: "USDT",  name: "Tether USD₮",  address: "EQCxE6mUtQJKFnGfaROTKOt1lZbDiiX1kCixRv7Nw2Id_sDs" },
            { symbol: "BTC",   name: "Bitcoin (cbBTC)", address: null },
            { symbol: "ETH",   name: "Ethereum (wETH)", address: null },
            { symbol: "SOL",   name: "Solana",       address: null },
            { symbol: "NEAR",  name: "NEAR Protocol", address: null },
            { symbol: "USDC",  name: "USD Coin",     address: null },
            { symbol: "DOGE",  name: "Dogecoin",     address: null },
            { symbol: "BNB",   name: "BNB",          address: null },
            { symbol: "LTC",   name: "Litecoin",     address: null },
            { symbol: "SUI",   name: "Sui",          address: null },
            { symbol: "POL",   name: "Polygon (POL)", address: null }
        ];

        let addressCache = {}; // кэш адресов jetton, чтобы не делать лишних поисков

        async function getPrice(symbol, jettonAddress = null) {
            let url;

            if (jettonAddress) {
                url = `https://api.geckoterminal.com/api/v2/simple/networks/ton/token_price/${jettonAddress}`;
            } else {
                // Ищем самый ликвидный пул по символу (работает для native и wrapped)
                const cacheKey = `ton_${symbol.toLowerCase()}`;
                if (addressCache[cacheKey]) {
                    url = `https://api.geckoterminal.com/api/v2/simple/networks/ton/token_price/${addressCache[cacheKey]}`;
                } else {
                    const searchUrl = `https://api.geckoterminal.com/api/v2/search/pools?query=${symbol}&network=ton`;
                    try {
                        const res = await fetch(searchUrl);
                        const data = await res.json();
                        const pools = data.data || [];
                        if (pools.length === 0) return "—";
                        
                        const best = pools.reduce((a, b) => 
                            (a.attributes?.volume_usd_24h || 0) > (b.attributes?.volume_usd_24h || 0) ? a : b
                        );
                        
                        const tokenAddr = best.attributes?.base_token?.address || 
                                        best.attributes?.quote_token?.address;
                        
                        if (tokenAddr) addressCache[cacheKey] = tokenAddr;
                        url = `https://api.geckoterminal.com/api/v2/simple/networks/ton/token_price/${tokenAddr}`;
                    } catch (e) {
                        console.error(e);
                        return "—";
                    }
                }
            }

            try {
                const response = await fetch(url, { cache: 'no-cache' });
                if (!response.ok) return "—";
                const data = await response.json();
                const price = parseFloat(data.data?.attributes?.price_usd || 0);
                return price > 0 ? price.toFixed(price < 10 ? 6 : 2) : "—";
            } catch (e) {
                console.error(`Ошибка цены ${symbol}:`, e);
                return "—";
            }
        }

        async function updateAllPrices() {
            const container = document.getElementById("prices-container");
            container.innerHTML = `<div style="grid-column: 1 / -1; text-align:center; padding:30px; color:#666;">
                <strong>Загрузка реальных цен с GeckoTerminal...</strong><br>
                <small>Это занимает 1–2 секунды</small>
            </div>`;

            let html = "";
            for (const token of tokens) {
                const price = await getPrice(token.symbol, token.address);
                html += `
                    <div class="price-card">
                        <strong>${token.symbol}</strong>
                        <div class="price">$${price}</div>
                        <small>${token.name}</small>
                    </div>
                `;
            }
            container.innerHTML = html;

            // Обновляем время
            const now = new Date();
            document.getElementById("last-update").textContent = 
                `Обновлено: \( {now.getHours()}: \){now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        }

        // Автозапуск + обновление каждые 30 секунд (чтобы не превышать лимит 30 запросов/мин)
        window.addEventListener("load", () => {
            updateAllPrices();
            setInterval(updateAllPrices, 30000);
        });
    </script>
</body>
</html>
