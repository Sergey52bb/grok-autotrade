<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TON CONNECT -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0f1a2e;
    }

    h1 { margin: 0; }
    .subtitle { color: #aaa; font-size: 14px; }

    .wallet {
      text-align: center;
      padding: 10px;
    }

    .address {
      font-size: 12px;
      color: #aaa;
      word-break: break-all;
    }

    #chart {
      height: 350px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 15px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      border: none;
      color: white;
      font-size: 18px;
    }

    .buy { background: green; }
    .sell { background: red; }
  </style>
</head>

<body>

<header>
  <h1>💎 SYN TERMINAL</h1>
  <div class="subtitle">AI Trading System</div>
</header>

<div class="wallet">
  <div id="ton-connect"></div>
  <div id="wallet-address" class="address"></div>
  <div id="wallet-balance"></div>
</div>

<div id="chart"></div>

<div class="buttons">
  <button class="btn buy">BUY</button>
  <button class="btn sell">SELL</button>
</div>

<script>
  const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
    buttonRootId: 'ton-connect'
  });

  async function updateWallet() {
    const wallet = tonConnectUI.wallet;

    if (wallet) {
      document.getElementById('wallet-address').innerText =
        "Address: " + wallet.account.address;

      // Фейковый баланс пока (потом подключим реальный API)
      document.getElementById('wallet-balance').innerText =
        "Balance: ~ loading...";
    }
  }

  tonConnectUI.onStatusChange(() => {
    updateWallet();
  });

  updateWallet();
