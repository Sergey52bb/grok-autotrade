<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade Pro</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --gold: #f0b90b; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--panel); border-bottom: 1px solid #222; flex-shrink: 0; }
        .pair-title { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }

        /* Основной торговый блок */
        .main-container { display: flex; padding: 8px; gap: 8px; flex-shrink: 0; }
        .order-panel { flex: 1.2; }
        .order-book { flex: 0.8; font-size: 11px; }

        /* Кнопки Buy/Sell */
        .tabs { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .tab-btn { flex: 1; border: none; padding: 10px; font-weight: bold; color: white; cursor: pointer; opacity: 0.4; }
        .tab-btn.active { opacity: 1; }
        .tab-btn.buy { background: var(--green); }
        .tab-btn.sell { background: var(--red); }

        /* Поля ввода */
        .input-field { background: var(--input); border-radius: 4px; padding: 6px 10px; margin-bottom: 6px; }
        .input-field label { font-size: 10px; color: var(--text); display: block; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input { background: transparent; border: none; color: white; font-size: 16px; width: 75%; outline: none; }

        /* Выбор процентов */
        .percent-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .pct-chip { font-size: 11px; color: var(--text); cursor: pointer; border-bottom: 1px solid #333; padding: 2px 4px; }
        .pct-chip:active { color: var(--gold); border-color: var(--gold); }

        .confirm-btn { width: 100%; border: none; padding: 14px; border-radius: 6px; color: white; font-weight: bold; font-size: 15px; cursor: pointer; }
        .confirm-btn.buy { background: var(--green); }
        .confirm-btn.sell { background: var(--red); }

        /* Стакан */
        .ob-line { display: flex; justify-content: space-between; position: relative; height: 18px; align-items: center; padding: 0 4px; overflow: hidden; }
        .ob-volume { position: absolute; right: 0; height: 100%; opacity: 0.15; z-index: 0; }
        .ob-line span { z-index: 1; }
        .current-price { font-size: 18px; font-weight: bold; margin: 8px 0; color: var(--green); }

        /* Секция ГРАФИКА */
        .chart-box { flex-grow: 1; background: #131722; border-top: 2px solid #000; position: relative; width: 100%; }
        #tv_widget_container { width: 100%; height: 100%; }

        /* Навигация */
        .nav-footer { display: flex; background: var(--panel); padding: 12px 0; border-top: 1px solid #222; flex-shrink: 0; }
        .nav-link { flex: 1; text-align: center; font-size: 11px; color: var(--text); }
        .nav-link.active { color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="pair-title">TON/USDT <span id="ticker-change" style="font-size:11px; color:var(--green);">+0.00%</span></div>
    <div id="ton-connect-root"></div>
</div>

<div class="main-container">
    <div class="order-panel">
        <div class="tabs">
            <button id="mode-buy" class="tab-btn buy active" onclick="switchSide('buy')">Buy</button>
            <button id="mode-sell" class="tab-btn sell" onclick="switchSide('sell')">Sell</button>
        </div>
        <div class="input-field">
            <label>Price</label>
            <div class="input-row"><input type="number" id="price-input" step="0.001"> <span style="font-size:10px; color:var(--text)">USDT</span></div>
        </div>
        <div class="input-field">
            <label>Amount</label>
            <div class="input-row"><input type="number" id="amount-input" placeholder="0"> <span style="font-size:10px; color:var(--text)">TON</span></div>
        </div>
        <div class="percent-row">
            <span class="pct-chip" onclick="applyPct(25)">25%</span>
            <span class="pct-chip" onclick="applyPct(50)">50%</span>
            <span class="pct-chip" onclick="applyPct(75)">75%</span>
            <span class="pct-chip" onclick="applyPct(100)">100%</span>
        </div>
        <button id="main-action-btn" class="confirm-btn buy">Buy TON</button>
    </div>

    <div class="order-book">
        <div id="asks-list"></div>
        <div class="current-price" id="price-display">---</div>
        <div id="bids-list"></div>
    </div>
</div>

<div class="chart-box">
    <div id="tv_widget_container"></div>
</div>

<div class="nav-footer">
    <div class="nav-link active">📊 Trade</div>
    <div class="nav-link">🏦 Assets</div>
    <div class="nav-link">🕒 Orders</div>
</div>

<script>
    // 1. Инициализация кошелька
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-root'
    });

    // 2. Функция запуска графика
    function startTradingView() {
        if (typeof TradingView !== 'undefined' && document.getElementById('tv_widget_container')) {
            new TradingView.widget({
                "autosize": true,
                "symbol": "OKX:TONUSDT",
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "container_id": "tv_widget_container",
                "hide_top_toolbar": true,
                "backgroundColor": "#131722",
                "save_image": false
            });
        } else {
            setTimeout(startTradingView, 500); // Повтор если не загрузилось
        }
    }

    // 3. Получение реальной цены
    async function fetchPrice() {
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd&include_24hr_change=true');
            const data = await response.json();
            const val = data['the-open-network'].usd;
            const change = data['the-open-network'].usd_24h_change;

            document.getElementById('price-display').innerText = val.toFixed(3);
            if(document.activeElement.id !== 'price-input') {
                document.getElementById('price-input').value = val.toFixed(3);
            }
            
            const ticker = document.getElementById('ticker-change');
            ticker.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            ticker.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';

            renderOB(val);
        } catch(e) { console.log("Price fetch error"); }
    }

    // 4. Отрисовка стакана (Order Book)
    function renderOB(p) {
        const asks = document.getElementById('asks-list');
        const bids = document.getElementById('bids-list');
        asks.innerHTML = ''; bids.innerHTML = '';
        for(let i=0; i<5; i++) {
            let v1 = (Math.random()*80 + 10).toFixed(1);
            asks.insertAdjacentHTML('afterbegin', `<div class="ob-line" style="color:var(--red)"><div class="ob-volume" style="width:${v1}%; background:var(--red)"></div><span>${(p + (i*0.003)).toFixed(3)}</span><span>${v1}</span></div>`);
            let v2 = (Math.random()*80 + 10).toFixed(1);
            bids.innerHTML += `<div class="ob-line" style="color:var(--green)"><div class="ob-volume" style="width:${v2}%; background:var(--green)"></div><span>${(p - (i*0.003)).toFixed(3)}</span><span>${v2}</span></div>`;
        }
    }

    function switchSide(s) {
        document.getElementById('mode-buy').classList.toggle('active', s === 'buy');
        document.getElementById('mode-sell').classList.toggle('active', s === 'sell');
        const btn = document.getElementById('main-action-btn');
        btn.className = 'confirm-btn ' + s;
        btn.innerText = (s === 'buy' ? 'Buy' : 'Sell') + ' TON';
    }

    function applyPct(p) {
        // Пока заглушка
        document.getElementById('amount-input').value = (p * 0.5).toFixed(1);
    }

    window.onload = () => {
        startTradingView();
        fetchPrice();
        setInterval(fetchPrice, 5000);
    };
</script>
</body>
</html>
