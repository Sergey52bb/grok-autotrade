<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        
        body { background: var(--bg); color: white; display: flex; flex-direction: column; min-height: 100vh; }

        /* Шапка */
        header { height: 50px; background: #121518; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; }
        
        /* Главный контейнер */
        .content { display: flex; flex-direction: column; flex: 1; padding: 10px; gap: 10px; }

        /* Блок графика - теперь он главный и тянется */
        .card-chart { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; flex: 1; min-height: 350px; display: flex; flex-direction: column; }
        #chart { flex: 1; width: 100%; }

        /* Сетка для Стакана и Формы */
        .bottom-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }

        /* Адаптив для ПК: если экран широкий, ставим стакан и форму в ряд */
        @media (min-width: 900px) {
            .bottom-grid { grid-template-columns: 1fr 350px; }
            .content { flex-direction: row; }
            .card-chart { flex: 2; }
        }

        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        
        /* Стакан */
        .orderbook { font-family: monospace; font-size: 13px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; }
        
        /* Поля ввода */
        .input-group { background: var(--input); padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; }
        .input-group label { display: block; font-size: 10px; color: var(--text); margin-bottom: 4px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 18px; outline: none; }

        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; border: none; padding: 15px; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 18px;">STRATEX <span style="color: var(--green)">PRO</span></div>
</header>

<div class="content">
    <div class="card-chart">
        <div id="chart"></div>
    </div>

    <div class="bottom-grid">
        <div class="card orderbook">
            <div style="color: var(--text); font-size: 11px; margin-bottom: 10px;">ORDER BOOK (TON/USDT)</div>
            <div id="asks" style="color: var(--red); display: flex; flex-direction: column-reverse;"></div>
            <div id="price-now" style="text-align: center; font-size: 18px; font-weight: bold; padding: 10px 0; color: var(--green);">1.3145</div>
            <div id="bids" style="color: var(--green);"></div>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Price</label>
                <input type="number" value="1.3145" step="0.0001">
            </div>
            <div class="input-group">
                <label>Amount (TON)</label>
                <input type="number" placeholder="0.0">
            </div>
            <div class="btn-row">
                <button class="btn" style="background: var(--green)">BUY</button>
                <button class="btn" style="background: var(--red)">SELL</button>
            </div>
        </div>
    </div>
</div>

<script>
    var options = {
        series: [{ data: [] }],
        chart: { type: 'candlestick', height: '100%', toolbar: { show: false }, background: 'transparent' },
        xaxis: { type: 'datetime', labels: { style: { colors: '#848e9c' } } },
        yaxis: { opposite: true, labels: { style: { colors: '#848e9c' }, formatter: v => v.toFixed(3) } },
        grid: { borderColor: '#222' }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    function refresh() {
        let d = []; let b = 1.314; let t = Date.now();
        for(let i=0; i<30; i++) {
            let o = b + Math.random()*0.01;
            d.push({ x: t - i*60000, y: [o, o+0.002, o-0.002, o+0.001] });
        }
        chart.updateSeries([{ data: d.reverse() }]);
        
        let ah = '', bh = '';
        for(let i=0; i<5; i++) {
            ah += `<div class="ob-row"><span>${(b+0.005-i*0.001).toFixed(4)}</span><span>${(Math.random()*20).toFixed(1)}</span></div>`;
            bh += `<div class="ob-row"><span>${(b-0.001-i*0.001).toFixed(4)}</span><span>${(Math.random()*20).toFixed(1)}</span></div>`;
        }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }
    refresh();
</script>
</body>
</html>
