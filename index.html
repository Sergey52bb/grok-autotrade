<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b121e;
    --card: #1a2230;
    --text: #ffffff;
    --dim: #8e96a3;
    --green: #00ff9c;
    --red: #ff4d4d;
}

/* ОСНОВА */
body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
}

.sub {
    font-size: 12px;
    color: var(--dim);
}

/* MAIN */
.main {
    display: flex;
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 120px);
}

/* MOBILE */
@media (max-width: 768px) {
    .main {
        flex-direction: column;
        height: auto;
    }
}

/* TRADE */
.trade {
    flex: 1;
    background: var(--card);
    padding: 10px;
    border-radius: 12px;
}

.input {
    background: #121926;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
}

.btn-buy {
    width: 100%;
    padding: 12px;
    background: var(--green);
    border: none;
    border-radius: 10px;
    font-weight: bold;
    margin-top: 5px;
}

/* ORDERBOOK */
.orderbook {
    flex: 1;
    background: #161d2a;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.ob-header {
    font-size: 11px;
    color: var(--dim);
    padding: 8px;
}

/* LIST */
.ob-list {
    flex: 1;
    overflow-y: auto;
}

/* ROW */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 2px 8px;
    font-size: 11px;
}

.row span {
    z-index: 2;
}

/* DEPTH */
.fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    opacity: 0.2;
    z-index: 1;
}

/* COLORS */
.sell span:first-child { color: var(--red); }
.buy span:first-child { color: var(--green); }

/* PRICE */
.price {
    text-align: center;
    padding: 6px;
    font-weight: bold;
    background: #121926;
}

/* BOTTOM */
.bottom {
    height: 60px;
    background: #121926;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span class="sub">AI Trading System</span>
</div>

<div class="main">

<!-- ФОРМА -->
<div class="trade">
    <div class="input">Amount: 25 TON</div>
    <div class="input">Receive: 133 USDT</div>
    <div class="input">Fee: 0.25%</div>
    <button class="btn-buy">BUY TON</button>
</div>

<!-- СТАКАН -->
<div class="orderbook">
    <div class="ob-header">Swap Depth</div>
    <div class="ob-list" id="orderbook"></div>
</div>

</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
const ob = document.getElementById('orderbook');

function generateOB() {
    ob.innerHTML = '';

    let base = 5.30;

    // SELL
    for (let i = 0; i < 20; i++) {
        let price = base + i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row sell';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = 'red';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }

    // PRICE
    let mid = document.createElement('div');
    mid.className = 'price';
    mid.innerText = base.toFixed(2);
    ob.appendChild(mid);

    // BUY
    for (let i = 0; i < 20; i++) {
        let price = base - i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row buy';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = '#00ff9c';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }
}

generateOB();
setInterval(generateOB, 2000);
</script>

</body>
</html>
