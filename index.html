<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; padding: 50px 20px; }
        .card { background: #1c2127; padding: 30px; border-radius: 15px; border: 1px solid #30363d; }
        #status { margin: 20px 0; font-weight: bold; color: #f0b90b; }
    </style>
</head>
<body>

<div class="card">
    <h2>STRATEX PRO</h2>
    <div id="status">СТАТУС: ПРОВЕРКА САЙТА...</div>
    <div id="ton-connect-button"></div>
</div>

<script>
    // Автоматически подставляем текущий адрес сайта для манифеста
    const currentUrl = window.location.origin;
    const manifestUrl = `${currentUrl}/tonconnect-manifest.json`;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifestUrl,
        buttonRootId: 'ton-connect-button'
    });

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            document.getElementById('status').innerText = "ПОДКЛЮЧЕНО";
            document.getElementById('status').style.color = "#0ecb81";
        } else {
            document.getElementById('status').innerText = "КОШЕЛЕК НЕ ПОДКЛЮЧЕН";
        }
    });

    // Проверка доступности манифеста для отладки
    fetch(manifestUrl).then(r => {
        if(r.ok) console.log("Манифест доступен");
        else document.getElementById('status').innerText = "ОШИБКА 404: МАНИФЕСТ НЕ НАЙДЕН";
    });
</script>

</body>
</html>
