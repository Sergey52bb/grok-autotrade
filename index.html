<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade Pro</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --gold: #f0b90b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--panel); border-bottom: 1px solid #222; }
        
        /* Верхняя торговая панель (как на твоих фото) */
        .trade-container { display: flex; padding: 10px; gap: 10px; flex-shrink: 0; }
        .side-left { flex: 1.2; }
        .side-right { flex: 0.8; font-size: 11px; }

        /* Кнопки Buy/Sell */
        .mode-selector { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .m-btn { flex: 1; border: none; padding: 10px; color: white; font-weight: bold; cursor: pointer; opacity: 0.4; }
        .m-btn.active { opacity: 1; }
        .m-btn.buy { background: var(--green); }
        .m-btn.sell { background: var(--red); }

        /* Инпуты */
        .field { background: var(--input); border-radius: 4px; padding: 8px; margin-bottom: 8px; }
        .field label { font-size: 10px; color: var(--text); display: block; }
        .field-row { display: flex; justify-content: space-between; align-items: center; }
        .field-row input { background: transparent; border: none; color: white; font-size: 16px; width: 70%; outline: none; }

        /* Проценты */
        .pct-bar { display: flex; justify-content: space-between; margin: 12px 0; }
        .pct-item { color: var(--text); font-size: 11px; cursor: pointer; border-bottom: 1px solid #333; }

        .main-btn { width: 100%; border: none; padding: 14px; border-radius: 6px; color: white; font-weight: bold; font-size: 15px; cursor: pointer; }
        .main-btn.buy { background: var(--green); }
        .main-btn.sell { background: var(--red); }

        /* Стакан с полосками объема */
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 18px; margin-bottom: 1px; align-items: center; padding: 0 4px; }
        .ob-fill { position: absolute; right: 0; height: 100%; opacity: 0.2; z-index: 0; }
        .ob-row span { z-index: 1; }
        .price-large { font-size: 18px; font-weight: bold; margin: 10px 0; color: var(--green); }

        /* ГРАФИК — теперь он точно будет виден */
        #chart-section { width: 100%; height: 400px; margin-top: 10px; background: #131722; border-top: 2px solid #000; }
        
        .footer { display: flex; background: var(--panel); padding: 12px 0; margin-top: auto; border-top: 1px solid #222; }
        .f-item { flex: 1; text-align: center; font-size: 11px; color: var(--text); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight:bold;">TON/USDT <span style="color:var(--red); font-size:11px;">-2.4%</span></div>
    <div id="ton-connect"></div>
</div>

<div class="trade-container">
    <div class="side-left">
        <div class="mode-selector">
            <button class="m-btn buy active" onclick="setSide('buy')">Buy</button>
            <button class="m-btn sell" onclick="setSide('sell')">Sell</button>
        </div>
        
        <div class="field">
            <label>Price</label>
            <div class="field-row"><input type="number" id="price-in" value="1.34"> <span>USDT</span></div>
        </div>
        
        <div class="field">
            <label>Amount</label>
            <div class="field-row"><input type="number" placeholder="0"> <span>TON</span></div>
        </div>

        <div class="pct-bar">
            <span class="pct-item">25%</span><span class="pct-item">50%</span>
            <span class="pct-item">75%</span><span class="pct-item">100%</span>
        </div>

        <button id="action-btn" class="main-btn buy">Buy TON</button>
    </div>

    <div class="side-right">
        <div id="asks-box"></div>
        <div class="price-large">1.340</div>
        <div id="bids-box"></div>
    </div>
</div>

<div id="chart-section">
    <div id="tradingview_widget" style="width:100%; height:100%;"></div>
</div>

<div class="footer">
    <div class="f-item" style="color:white;">📊 Рынок</div>
    <div class="f-item">🏦 Активы</div>
    <div class="f-item">🕒 Сделки</div>
</div>

<script>
    // 1. Подключаем кошелек
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    // 2. Инициализируем график
    function loadChart() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:TONUSDT",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tradingview_widget",
            "hide_top_toolbar": true,
            "backgroundColor": "#131722",
            "save_image": false
        });
    }

    // 3. Переключатель Купить/Продать
    function setSide(s) {
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        const btn = document.getElementById('action-btn');
        btn.className = 'main-btn ' + s;
        btn.innerText = (s === 'buy' ? 'Buy' : 'Sell') + ' TON';
    }

    // 4. Отрисовка стакана
    function drawOB() {
        const a = document.getElementById('asks-box');
        const b = document.getElementById('bids-box');
        a.innerHTML = ''; b.innerHTML = '';
        for(let i=0; i<5; i++) {
            let vol = (Math.random()*100).toFixed(1);
            a.innerHTML += `<div class="ob-row" style="color:var(--red)"><div class="ob-fill" style="width:${vol}%; background:var(--red)"></div><span>1.34${i+1}</span><span>${vol}</span></div>`;
            let vol2 = (Math.random()*100).toFixed(1);
            b.innerHTML += `<div class="ob-row" style="color:var(--green)"><div class="ob-fill" style="width:${vol2}%; background:var(--green)"></div><span>1.33${i}</span><span>${vol2}</span></div>`;
        }
    }

    window.onload = () => {
        loadChart();
        drawOB();
        setInterval(drawOB, 2000);
    };
</script>

</body>
</html>
