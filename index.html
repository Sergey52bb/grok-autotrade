<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0f1a2e;
      border-bottom: 1px solid #1f2a44;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-top: 4px;
    }

    .balance {
      text-align: center;
      padding: 10px;
      font-size: 14px;
      color: #ccc;
    }

    #chart {
      height: 400px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 15px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .buy {
      background: #16a34a;
    }

    .sell {
      background: #dc2626;
    }

    .nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #0f1a2e;
      border-top: 1px solid #1f2a44;
    }

    .nav div {
      flex: 1;
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <header>
    <h1>💎 SYN TERMINAL</h1>
    <div class="subtitle">AI Trading System</div>
  </header>

  <div class="balance">
    Loading balance...
  </div>

  <div id="chart"></div>

  <div class="buttons">
    <button class="btn buy">BUY</button>
    <button class="btn sell">SELL</button>
  </div>

  <div class="nav">
    <div>Home</div>
    <div>Trade</div>
    <div>Wallet</div>
    <div>Settings</div>
  </div>

  <script>
    new TradingView.widget({
      "container_id": "chart",
      "width": "100%",
      "height": 400,
      "symbol": "BINANCE:TONUSDT",
      "interval": "5",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#0f1a2e",
      "enable_publishing": false,
      "hide_side_toolbar": false,
      "allow_symbol_change": true
    });
  </script>

</body>
</html>
