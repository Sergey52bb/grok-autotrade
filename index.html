<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade Pro</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --gold: #f0b90b; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding-bottom: 60px; }
        
        /* Шапка */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 5px 10px; background: var(--panel); border-bottom: 1px solid #222; flex-shrink: 0; height: 45px; }
        .pair-title { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* Торговый блок */
        .main-container { display: flex; padding: 5px; gap: 5px; flex-shrink: 0; height: 210px; }
        .order-panel { flex: 1.1; display: flex; flex-direction: column; gap: 4px; }
        .order-book { flex: 0.9; font-size: 10px; display: flex; flex-direction: column; justify-content: space-between; }

        /* Кнопки */
        .tabs { display: flex; border-radius: 4px; overflow: hidden; }
        .tab-btn { flex: 1; border: none; padding: 6px; font-weight: bold; color: white; cursor: pointer; opacity: 0.4; font-size: 12px; }
        .tab-btn.active { opacity: 1; }
        .tab-btn.buy { background: var(--green); }
        .tab-btn.sell { background: var(--red); }

        /* Поля */
        .input-field { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .input-field label { font-size: 9px; color: var(--text); display: block; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input { background: transparent; border: none; color: white; font-size: 14px; width: 70%; outline: none; }

        .pct-chip { font-size: 10px; color: var(--text); cursor: pointer; padding: 2px; border-bottom: 1px solid transparent; }
        .confirm-btn { width: 100%; border: none; padding: 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 14px; margin-top: auto; }

        /* Стакан */
        .ob-line { display: flex; justify-content: space-between; position: relative; height: 14px; align-items: center; padding: 0 4px; }
        .ob-volume { position: absolute; right: 0; height: 100%; opacity: 0.15; z-index: 0; }
        .current-price { font-size: 16px; font-weight: bold; text-align: center; color: var(--green); margin: 2px 0; }

        /* График */
        .chart-box { flex-grow: 1; background: #131722; border-top: 1px solid #000; width: 100%; min-height: 0; }
        #tv_widget_container { width: 100%; height: 100%; }

        /* Навигация (Fixed Bottom) */
        .nav-footer { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: var(--panel); padding: 8px 0; border-top: 1px solid #222; z-index: 100; height: 55px; }
        .nav-link { flex: 1; text-align: center; font-size: 10px; color: var(--text); display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .nav-link.active { color: white; }
        .nav-icon { font-size: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div class="pair-title">TON/USDT <span id="ticker-change" style="font-size:10px;">+0.0%</span></div>
    <div id="ton-connect-root"></div>
</div>

<div class="main-container">
    <div class="order-panel">
        <div class="tabs">
            <button id="mode-buy" class="tab-btn buy active" onclick="switchSide('buy')">Buy</button>
            <button id="mode-sell" class="tab-btn sell" onclick="switchSide('sell')">Sell</button>
        </div>
        <div class="input-field">
            <label>Price</label>
            <div class="input-row"><input type="number" id="price-input" step="0.001"> <span style="font-size:9px;">USDT</span></div>
        </div>
        <div class="input-field">
            <label>Amount</label>
            <div class="input-row"><input type="number" id="amount-input" placeholder="0"> <span style="font-size:9px;">TON</span></div>
        </div>
        <div style="display:flex; justify-content: space-between;">
            <span class="pct-chip" onclick="applyPct(25)">25%</span>
            <span class="pct-chip" onclick="applyPct(50)">50%</span>
            <span class="pct-chip" onclick="applyPct(75)">75%</span>
            <span class="pct-chip" onclick="applyPct(100)">100%</span>
        </div>
        <button id="main-action-btn" class="confirm-btn buy">Buy TON</button>
    </div>

    <div class="order-book">
        <div id="asks-list"></div>
        <div class="current-price" id="price-display">---</div>
        <div id="bids-list"></div>
    </div>
</div>

<div class="chart-box">
    <div id="tv_widget_container"></div>
</div>

<div class="nav-footer">
    <div class="nav-link active">
        <span class="nav-icon">📊</span><span>Рынок</span>
    </div>
    <div class="nav-link" onclick="alert('Скоро здесь будет баланс!')">
        <span class="nav-icon">🏦</span><span>Активы</span>
    </div>
    <div class="nav-link">
        <span class="nav-icon">🕒</span><span>Сделки</span>
    </div>
</div>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-root'
    });

    function startTradingView() {
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "autosize": true,
                "symbol": "OKX:TONUSDT",
                "interval": "15",
                "theme": "dark",
                "container_id": "tv_widget_container",
                "hide_top_toolbar": true,
                "backgroundColor": "#131722",
                "hide_legend": true
            });
        } else { setTimeout(startTradingView, 500); }
    }

    async function fetchPrice() {
        try {
            const r = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd&include_24hr_change=true');
            const d = await r.json();
            const val = d['the-open-network'].usd;
            const change = d['the-open-network'].usd_24h_change;
            document.getElementById('price-display').innerText = val.toFixed(3);
            if(document.activeElement.id !== 'price-input') document.getElementById('price-input').value = val.toFixed(3);
            const ticker = document.getElementById('ticker-change');
            ticker.innerText = (change >= 0 ? '+' : '') + change.toFixed(1) + '%';
            ticker.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
            renderOB(val);
        } catch(e) {}
    }

    function renderOB(p) {
        const asks = document.getElementById('asks-list');
        const bids = document.getElementById('bids-list');
        asks.innerHTML = ''; bids.innerHTML = '';
        for(let i=0; i<6; i++) {
            let v1 = (Math.random()*50).toFixed(1);
            asks.insertAdjacentHTML('afterbegin', `<div class="ob-line" style="color:var(--red)"><div class="ob-volume" style="width:${v1*2}%; background:var(--red)"></div><span>${(p + (i*0.002)).toFixed(3)}</span><span>${v1}</span></div>`);
            let v2 = (Math.random()*50).toFixed(1);
            bids.innerHTML += `<div class="ob-line" style="color:var(--green)"><div class="ob-volume" style="width:${v2*2}%; background:var(--green)"></div><span>${(p - (i*0.002)).toFixed(3)}</span><span>${v2}</span></div>`;
        }
    }

    function switchSide(s) {
        document.getElementById('mode-buy').classList.toggle('active', s === 'buy');
        document.getElementById('mode-sell').classList.toggle('active', s === 'sell');
        const btn = document.getElementById('main-action-btn');
        btn.className = 'confirm-btn ' + s;
        btn.innerText = (s === 'buy' ? 'Buy' : 'Sell') + ' TON';
    }

    window.onload = () => { startTradingView(); fetchPrice(); setInterval(fetchPrice, 5000); };
</script>
</body>
</html>
