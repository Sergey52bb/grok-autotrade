<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v6.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --red: #ff4a4a; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px 15px 15px 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); opacity: 0.5; cursor: pointer; }
        .nav-item.active { color: var(--green); opacity: 1; }
        
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .asset-card { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        .sparkline { width: 100px; height: 20px; stroke: var(--green); stroke-width: 2; fill: none; }
        
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer; width: 100%; }
        .btn-trade { padding: 8px 15px; font-size: 10px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
        
        select, input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<header><div class="title">💎 SYN TERMINAL</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; opacity: 0.4; font-family: monospace;">Disconnected</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <div id="market_list">Loading real-time data...</div>
    </div>

    <div id="scr_swap" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <p style="font-size:12px; opacity:0.6;">Sell</p>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
                <select id="sw_from" onchange="calculateSwap()"></select>
            </div>
            <p style="font-size:12px; opacity:0.6;">Buy</p>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
                <select id="sw_to" onchange="calculateSwap()"></select>
            </div>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="tg.showAlert('Swap Initiated')">CONFIRM SWAP</button>
        </div>
    </div>

    <div id="scr_profile" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; text-align:center;"><div id="ton-connect-btn"></div></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Deposit Address</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:white; padding:10px; border-radius:10px;"></div>
        <p id="full_addr" style="font-size:10px; word-break:break-all; opacity:0.5;"></p>
        <button class="btn-general" style="background:var(--green); color:#000;" onclick="copyAddr()">COPY</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send TON</h3>
        <input type="text" placeholder="Address" style="margin-bottom:10px;">
        <input type="text" placeholder="Memo" style="margin-bottom:10px;">
        <input type="number" placeholder="Amount">
        <button class="btn-general" style="background:var(--green); color:#000; margin-top:15px;">SEND</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let prices = { 'TON': 7.20, 'BTC': 69000, 'ETH': 3400, 'DOGE': 0.16, 'USDT': 1 };
    const assets = [
        {s:'TON', i:'https://cryptologos.cc/logos/toncoin-ton-logo.png', g:'M0,10 L20,5 L40,8 L60,2 L80,6 L100,3'},
        {s:'BTC', i:'https://cryptologos.cc/logos/bitcoin-btc-logo.png', g:'M0,5 L20,8 L40,3 L60,7 L80,2 L100,5'},
        {s:'ETH', i:'https://cryptologos.cc/logos/ethereum-eth-logo.png', g:'M0,8 L20,3 L40,6 L60,1 L80,4 L100,2'},
        {s:'DOGE', i:'https://cryptologos.cc/logos/dogecoin-doge-logo.png', g:'M0,10 L20,12 L40,9 L60,11 L80,8 L100,10'}
    ];
    let currentAddr = "";

    async function updatePrices() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price');
            const data = await res.json();
            const map = { 'BTCUSDT': 'BTC', 'ETHUSDT': 'ETH', 'DOGEUSDT': 'DOGE' };
            data.forEach(item => { if(map[item.symbol]) prices[map[item.symbol]] = parseFloat(item.price); });
            renderMarket();
        } catch(e) { renderMarket(); }
    }

    function init() {
        const f = document.getElementById('sw_from');
        const t = document.getElementById('sw_to');
        Object.keys(prices).forEach(s => {
            f.innerHTML += `<option value="${s}">${s}</option>`;
            t.innerHTML += `<option value="${s}">${s}</option>`;
        });
        t.value = "USDT";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                currentAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8) + "...";
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 140, height: 140 });
                fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${currentAddr}`)
                    .then(r => r.json()).then(d => { if(d.ok) document.getElementById('main_balance').innerText = (d.result/1e9).toFixed(2) + " TON"; });
            }
        });
        updatePrices();
        setInterval(updatePrices, 30000);
    }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value;
        const t = document.getElementById('sw_to').value;
        const v = document.getElementById('sw_val').value;
        if(v) document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
    }

    function renderMarket() {
        document.getElementById('market_list').innerHTML = assets.map(a => `
            <div class="asset-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${a.i}" width="28">
                        <div><b>${a.s}</b><br><span style="font-size:12px; opacity:0.6;">$${prices[a.s].toLocaleString()}</span></div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-trade" style="color:var(--green)">BUY</button>
                        <button class="btn-trade" style="color:var(--red)">SELL</button>
                    </div>
                </div>
                <div style="margin-top:10px;"><svg class="sparkline" viewBox="0 0 100 15"><path d="${a.g}" /></svg></div>
            </div>
        `).join('');
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    function copyAddr() { navigator.clipboard.writeText(currentAddr); tg.showAlert("Copied!"); }

    window.onload = init;
</script>
</body>
</html>
