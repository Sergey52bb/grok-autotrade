<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* 1. ВЕРХ (40%): Название, монета, форма и стакан */
        .header-section { height: 40%; display: flex; flex-direction: column; border-bottom: 1px solid #222; flex-shrink: 0; }
        .coin-bar { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; height: 40px; }
        .top-main { display: flex; flex: 1; padding: 0 8px 8px 8px; gap: 8px; overflow: hidden; }
        
        .trade-form { flex: 1.1; display: flex; flex-direction: column; gap: 4px; }
        .order-book { flex: 0.9; background: #121518; border-radius: 4px; padding: 4px; display: flex; flex-direction: column; overflow: hidden; font-family: monospace; font-size: 10px; }
        
        .tabs { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .tab { flex: 1; border: none; padding: 6px; border-radius: 3px; color: var(--text); background: transparent; font-size: 11px; font-weight: bold; }
        .tab.active { background: var(--green); color: white; }
        .field { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .field label { font-size: 8px; color: var(--text); display: block; }
        .field input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; outline: none; }
        .exec-btn { width: 100%; border: none; padding: 12px; border-radius: 4px; background: var(--green); color: white; font-weight: bold; margin-top: auto; }

        .ob-row { display: flex; justify-content: space-between; height: 12px; position: relative; }
        .ob-price { z-index: 1; }
        .ob-amt { z-index: 1; color: var(--text); }

        /* 2. ГРАФИК (30%) */
        #main-chart { height: 30%; width: 100%; border-bottom: 1px solid #222; background: var(--bg); }

        /* 3. RSI (10%) */
        #rsi-chart { height: 10%; width: 100%; border-bottom: 1px solid #222; background: var(--bg); }

        /* 4. НАВИГАЦИЯ (20%) */
        .nav-section { height: 20%; display: flex; flex-direction: column; background: var(--panel); padding-bottom: env(safe-area-inset-bottom); }
        .nav-grid { flex: 1; display: flex; align-items: center; }
        .nav-link { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text); text-decoration: none; font-size: 11px; }
        .nav-link.active { color: white; }
        .nav-link i { font-style: normal; font-size: 20px; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="coin-bar">
        <div style="font-weight:bold; font-size:14px;">STRATEX <span style="color:var(--green); font-size:11px; margin-left:4px;">TON/USDT</span></div>
        <div style="font-size:11px; background:#2b3139; padding:2px 8px; border-radius:10px;">UQC...1bBJ</div>
    </div>
    <div class="top-main">
        <div class="trade-form">
            <div class="tabs"><button class="tab active">Buy</button><button class="tab">Sell</button></div>
            <div class="field"><label>Price</label><input type="number" value="1.314"></div>
            <div class="field"><label>Amount</label><input type="number" placeholder="0.0"></div>
            <button class="exec-btn">Buy TON</button>
        </div>
        <div class="order-book" id="book">
            <div id="asks" style="display:flex; flex-direction:column-reverse; flex:1"></div>
            <div style="text-align:center; color:var(--green); font-weight:bold; padding:2px; font-size:12px;">1.314</div>
            <div id="bids" style="flex:1"></div>
        </div>
    </div>
</div>

<div id="main-chart"></div>
<div id="rsi-chart"></div>

<div class="nav-section">
    <div class="nav-grid">
        <a href="#" class="nav-link active"><i>📊</i><span>Рынок</span></a>
        <a href="#" class="nav-link"><i>💼</i><span>Активы</span></a>
        <a href="#" class="nav-item"><i>📜</i><span>Сделки</span></a>
        <a href="#" class="nav-link"><i>⚙️</i><span>Настройки</span></a>
    </div>
</div>

<script>
    window.addEventListener('load', () => {
        if (typeof LightweightCharts === 'undefined') {
            document.body.innerHTML = '<div style="padding:20px; text-align:center;">Ошибка: библиотека графиков не загрузилась. Проверь интернет.</div>';
            return;
        }

        const chartOptions = {
            layout: { backgroundColor: '#0b0e11', textColor: '#848e9c', fontSize: 10 },
            grid: { vertLines: { visible: false }, horzLines: { color: '#1f2226' } },
            crosshair: { mode: 0 },
            timeScale: { visible: false },
            handleScroll: true,
            handleScale: true
        };

        // Инициализация основного графика
        const mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), chartOptions);
        const candleSeries = mainChart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false });

        // Инициализация RSI
        const rsiChart = LightweightCharts.createChart(document.getElementById('rsi-chart'), {
            ...chartOptions,
            timeScale: { visible: true, borderColor: '#333' }
        });
        const rsiSeries = rsiChart.addLineSeries({ color: '#9043ff', lineWidth: 2 });

        // Генерация данных
        const data = [];
        const rsiData = [];
        let t = Math.floor(Date.now() / 1000) - 50 * 60;
        for(let i=0; i<50; i++) {
            const val = 1.310 + Math.random() * 0.01;
            data.push({ time: t + i*60, open: val, high: val+0.002, low: val-0.001, close: val+0.001 });
            rsiData.push({ time: t + i*60, value: 20 + Math.random() * 60 });
        }
        candleSeries.setData(data);
        rsiSeries.setData(rsiData);

        // Синхронизация масштаба
        mainChart.timeScale().subscribeVisibleTimeRangeChange(range => {
            rsiChart.timeScale().setVisibleRange(range);
        });

        // Стакан (8 строк)
        function updateBook() {
            const a = document.getElementById('asks'), b = document.getElementById('bids');
            let ah = '', bh = '';
            for(let i=0; i<8; i++) {
                ah += `<div class="ob-row" style="color:var(--red)"><span>1.31${8-i}</span><span>${(Math.random()*20).toFixed(1)}</span></div>`;
                bh += `<div class="ob-row" style="color:var(--green)"><span>1.31${i}</span><span>${(Math.random()*20).toFixed(1)}</span></div>`;
            }
            a.innerHTML = ah; b.innerHTML = bh;
        }
        updateBook();
        setInterval(updateBook, 3000);
    });
</script>
</body>
</html>
