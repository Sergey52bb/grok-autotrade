<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Stable</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 18px; }

        #main_content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chart_wrap { height: 300px; width: 100%; background: #000; position: relative; }
        
        .trade-area { display: flex; flex: 1; border-top: 1px solid var(--border); overflow: hidden; }
        .book { width: 45%; border-right: 1px solid var(--border); padding: 5px; font-family: monospace; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; height: 18px; position: relative; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.15; }

        .trade-form { width: 55%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 8px; border-radius: 3px; color: var(--text); background: none; font-weight: bold; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }

        .fld { background: var(--input); border-radius: 4px; padding: 6px; }
        .fld label { display: block; font-size: 10px; color: var(--text); }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 15px; outline: none; }

        .action-btn { background: var(--green); border: none; color: black; padding: 14px; border-radius: 6px; font-weight: bold; margin-top: auto; }

        /* Экраны */
        .screen { display: none; flex: 1; padding: 20px; overflow-y: auto; }
        #screen_trade { display: flex; }

        /* Навигация */
        nav { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: white; }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

<div id="main_content">
    <div id="screen_trade" class="screen" style="padding:0; flex-direction:column;">
        <header>
            <b id="pair_name">TON/USDT</b>
            <div class="price-top" id="topPrice">0.0000</div>
        </header>
        <div id="chart_wrap">
            <div id="tv_container" style="width:100%; height:100%;"></div>
        </div>
        <div class="trade-area">
            <div class="book">
                <div id="asks" style="color:var(--red); display:flex; flex-direction:column-reverse;"></div>
                <div id="midPrice" style="text-align:center; padding:10px 0; font-size:16px; color:var(--green); font-weight:bold; border-y:1px solid #222;">0.0000</div>
                <div id="bids" style="color:var(--green);"></div>
            </div>
            <div class="trade-form">
                <div class="side-btns">
                    <button class="side-btn active buy" onclick="setSide('buy', this)">BUY</button>
                    <button class="side-btn" onclick="setSide('sell', this)">SELL</button>
                </div>
                <div class="fld"><label>Price</label><input type="number" id="iPrice" step="any"></div>
                <div class="fld"><label>Amount</label><input type="number" placeholder="0.0"></div>
                <button class="action-btn" id="mainBtn">BUY TON</button>
            </div>
        </div>
    </div>

    <div id="screen_wallet" class="screen">
        <h2 style="margin-bottom:20px;">Wallet</h2>
        <div style="background:var(--panel); padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border);">
            <div style="color:var(--text); font-size:12px;">Estimated Balance</div>
            <div style="font-size:28px; font-weight:bold; margin-top:5px;">$ <span id="total_val">0.00</span></div>
        </div>
        <div style="background:var(--panel); padding:15px; border-radius:12px; display:flex; justify-content:space-between; align-items:center;">
            <div><b>TON</b><br><small style="color:var(--text);">150.00</small></div>
            <div id="wallet_ton_usd">$0.00</div>
        </div>
    </div>

    <div id="screen_market" class="screen"><h2>Markets</h2><p style="color:var(--text); margin-top:10px;">Coming soon...</p></div>
    <div id="screen_profile" class="screen"><h2>Profile</h2><p style="color:var(--text); margin-top:10px;">User Settings</p></div>
</div>

<nav>
    <div class="nav-item active" onclick="showScreen('trade', this)"><span>📊</span>Trade</div>
    <div class="nav-item" onclick="showScreen('market', this)"><span>📈</span>Market</div>
    <div class="nav-item" onclick="showScreen('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showScreen('profile', this)"><span>👤</span>Profile</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let prices = { TON: 0, ASTER: 0.7000 };
    let currentSide = 'buy';

    function loadChart() {
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:TONUSDT", "interval": "15",
            "theme": "dark", "container_id": "tv_container", "hide_top_toolbar": true, "locale": "ru"
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@ticker');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        prices.TON = parseFloat(data.c);
        updateUI();
    };

    function updateUI() {
        const p = prices.TON;
        if(!p) return;

        document.getElementById('topPrice').innerText = p.toFixed(4);
        document.getElementById('midPrice').innerText = p.toFixed(4);
        document.getElementById('iPrice').value = p.toFixed(4);

        // Обновление кошелька
        const tonInUsd = 150 * p;
        const asterInUsd = 1200 * prices.ASTER; // ASTER по 0.7$
        document.getElementById('wallet_ton_usd').innerText = '$' + tonInUsd.toFixed(2);
        document.getElementById('total_val').innerText = (tonInUsd + asterInUsd).toLocaleString();

        const getRows = (clr) => {
            let h = '';
            for(let i=0; i<6; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.004)).toFixed(4);
                h += `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*80}%; background:${clr}"></div><span>${rP}</span><span>${(Math.random()*10).toFixed(1)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = getRows('var(--red)');
        document.getElementById('bids').innerHTML = getRows('var(--green)');
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('screen_' + id).style.display = id === 'trade' ? 'flex' : 'block';
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function setSide(side, btn) {
        currentSide = side;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active', 'buy', 'sell'));
        btn.classList.add('active', side);
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.style.background = side === 'buy' ? 'var(--green)' : 'var(--red)';
        mainBtn.style.color = side === 'buy' ? 'black' : 'white';
        mainBtn.innerText = side.toUpperCase() + ' TON';
    }

    window.onload = loadChart;
</script>
</body>
</html>
