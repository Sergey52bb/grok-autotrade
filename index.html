<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { background: #1c2127; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .brand { color: #f0b90b; font-size: 18px; font-weight: bold; }

        .chart-section { height: 300px; width: 100%; border-bottom: 4px solid #0b0e11; }

        .trading-container { background: #1c2127; padding: 12px; display: flex; flex-direction: column; }
        .main-row { display: flex; gap: 12px; margin-bottom: 15px; }

        /* Левая колонка - Стакан */
        .order-book { flex: 1; font-size: 11px; }
        .ob-label { display: flex; justify-content: space-between; color: #848e9c; margin-bottom: 4px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; }
        .red { color: #f6465d; }
        .green { color: #0ecb81; }
        .current-price { font-size: 16px; font-weight: bold; text-align: center; margin: 10px 0; }

        /* Правая колонка - Форма */
        .trade-form { flex: 1.2; display: flex; flex-direction: column; gap: 8px; }
        .tabs { display: flex; background: #2b3139; border-radius: 4px; overflow: hidden; }
        .tab { flex: 1; padding: 6px; text-align: center; font-size: 12px; cursor: pointer; color: #848e9c; }
        .tab.active { background: #0ecb81; color: white; }

        .input-field { background: #2b3139; border: 1px solid #444; border-radius: 4px; padding: 8px; }
        .input-label { font-size: 10px; color: #848e9c; }
        .input-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; margin-top: 2px; }

        .btn-buy-ton { background: #0ecb81; color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 5px; }

        /* Нижняя часть - Ордера */
        .orders-section { background: #1c2127; border-top: 4px solid #0b0e11; padding: 15px; min-height: 150px; }
        .orders-nav { display: flex; gap: 20px; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; }
        .nav-item { font-size: 13px; color: #848e9c; cursor: pointer; }
        .nav-item.active { color: white; border-bottom: 2px solid #f0b90b; padding-bottom: 8px; }
        .empty-msg { text-align: center; color: #848e9c; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">STRATEX TERMINAL</div>
    <div id="ton-connect-button"></div>
</div>

<div class="chart-section">
    <div id="tradingview_chart" style="height:100%;"></div>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15", "theme": "dark",
            "style": "1", "locale": "ru", "hide_top_toolbar": true, "container_id": "tradingview_chart"
        });
    </script>
</div>

<div class="trading-container">
    <div class="main-row">
        <div class="order-book">
            <div class="ob-label"><span>Цена</span><span>Кол-во</span></div>
            <div class="ob-row red"><span>7.245</span><span>142</span></div>
            <div class="ob-row red"><span>7.241</span><span>85</span></div>
            <div class="ob-row red"><span>7.238</span><span>1.2K</span></div>
            <div class="current-price green">7.235 ↑</div>
            <div class="ob-row green"><span>7.232</span><span>410</span></div>
            <div class="ob-row green"><span>7.229</span><span>95</span></div>
            <div class="ob-row green"><span>7.225</span><span>2.4K</span></div>
        </div>

        <div class="trade-form">
            <div class="tabs">
                <div class="tab active">Купить</div>
                <div class="tab">Продать</div>
            </div>
            <div class="input-field">
                <div class="input-label">Цена</div>
                <div class="input-row"><span>7.235</span><span style="color:#848e9c">USDT</span></div>
            </div>
            <div class="input-field">
                <div class="input-label">Количество</div>
                <div class="input-row"><span>0</span><span style="color:#848e9c">TON</span></div>
            </div>
            <div style="display:flex; justify-content:space-between; font-size:10px; color:#848e9c; margin-top:2px;">
                <span>Доступно:</span>
                <span id="user-bal" style="color:white">0.0033 TON</span>
            </div>
            <button class="btn-buy-ton">Купить TON</button>
        </div>
    </div>
</div>

<div class="orders-section">
    <div class="orders-nav">
        <div class="nav-item active">Открытые ордера (0)</div>
        <div class="nav-item">История</div>
    </div>
    <div class="empty-msg">Подключите кошелек, чтобы просмотреть ордера.</div>
</div>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    async function updateBal(addr) {
        try {
            const r = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${addr}`);
            const d = await r.json();
            if(d.ok) document.getElementById('user-bal').innerText = (d.result/1e9).toFixed(4) + " TON";
        } catch(e){}
    }

    tonConnectUI.onStatusChange(w => { 
        if(w) { 
            updateBal(w.account.address); 
            setInterval(() => updateBal(w.account.address), 20000); 
        }
    });
</script>
</body>
</html>
