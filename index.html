<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade Pro</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --text: #848e9c; --green: #0ecb81; --red: #f6465d; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* Навигация сверху */
        header { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .price-up { color: var(--green); font-weight: bold; font-family: monospace; }

        /* Контент вкладок */
        .tab-content { display: none; height: calc(100vh - 110px); overflow-y: auto; }
        .tab-content.active { display: block; }

        /* График */
        #tv_chart { height: 280px; width: 100%; background: #000; }

        /* Секция торговли (Стакан + Форма) */
        .trade-section { display: flex; padding: 10px; gap: 15px; border-top: 1px solid var(--border); background: var(--bg); }
        .order-book { flex: 1.2; font-family: monospace; font-size: 12px; }
        .trade-form { flex: 1; }

        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; }
        .ob-val { color: var(--text); }

        input { width: 100%; background: #2b3139; border: 1px solid #444; color: white; padding: 12px; margin: 8px 0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .buy-btn { width: 100%; background: var(--green); color: black; border: none; padding: 15px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        /* Маркет */
        .market-row { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); align-items: center; }
        .coin-name { font-weight: bold; font-size: 16px; }

        /* Нижнее меню */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #181a20; display: flex; height: 65px; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; text-align: center; padding: 10px 0; color: var(--text); font-size: 11px; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <span><b>TON/USDT</b></span>
    <span class="price-up" id="live-price">0.0000</span>
</header>

<div class="app-body">
    <div id="trade" class="tab-content active">
        <div id="tv_chart"></div>
        <div class="trade-section">
            <div class="order-book" id="order-book">
                <div style="color:var(--red)" class="ob-row"><span>1.3368</span><span>1.5K</span></div>
                <div style="color:var(--red)" class="ob-row"><span>1.3365</span><span>0.8K</span></div>
                <div style="color:var(--red)" class="ob-row"><span>1.3360</span><span>2.1K</span></div>
                <div style="text-align:center; padding: 5px 0; font-weight:bold; font-size:16px;" id="mid-price">1.3350</div>
                <div style="color:var(--green)" class="ob-row"><span>1.3345</span><span>1.2K</span></div>
                <div style="color:var(--green)" class="ob-row"><span>1.3340</span><span>3.4K</span></div>
                <div style="color:var(--green)" class="ob-row"><span>1.3335</span><span>0.9K</span></div>
            </div>
            <div class="trade-form">
                <input type="number" id="price-input" placeholder="Цена">
                <input type="number" placeholder="Количество">
                <button class="buy-btn">BUY TON</button>
            </div>
        </div>
    </div>

    <div id="market" class="tab-content">
        <div id="market-list">
            <p style="padding:20px; color:var(--text)">Обновление цен...</p>
        </div>
    </div>

    <div id="wallet" class="tab-content">
        <div style="padding: 20px;">
            <div style="background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
                <div style="color: var(--text); margin-bottom: 10px;">Total Balance</div>
                <div style="font-size: 32px; font-weight: bold;">$ 1,040.25</div>
            </div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showTab('trade')"><span class="nav-icon">📊</span>Trade</div>
    <div class="nav-item" onclick="showTab('market')"><span class="nav-icon">📈</span>Market</div>
    <div class="nav-item" onclick="showTab('wallet')"><span class="nav-icon">💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('profile')"><span class="nav-icon">👤</span>Profile</div>
</nav>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Инициализация нормального графика
    new TradingView.widget({
        "autosize": true, "symbol": "BINANCE:TONUSDT", "interval": "15", "theme": "dark",
        "style": "1", "locale": "ru", "container_id": "tv_chart", "hide_top_toolbar": true
    });

    // Переключение вкладок
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'market') fetchMarket();
    }

    // Реальный маркет с Binance
    async function fetchMarket() {
        const list = document.getElementById('market-list');
        try {
            const r = await fetch('https://api.binance.com/api/3/ticker/price');
            const data = await r.json();
            const pairs = ['TONUSDT', 'BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT'];
            const filtered = data.filter(i => pairs.includes(i.symbol));
            
            list.innerHTML = filtered.map(c => `
                <div class="market-row">
                    <div><span class="coin-name">${c.symbol.replace('USDT','')}</span><span style="color:var(--text); font-size:12px"> / USDT</span></div>
                    <div style="color:var(--green); font-weight:bold">${parseFloat(c.price).toFixed(c.symbol==='TONUSDT'?4:2)}</div>
                </div>
            `).join('');
        } catch(e) { list.innerHTML = '<p style="padding:20px; color:red">Ошибка данных</p>'; }
    }

    // WebSocket для цены
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@ticker');
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        const p = parseFloat(d.c).toFixed(4);
        document.getElementById('live-price').innerText = p;
        document.getElementById('mid-price').innerText = p;
        if(!document.getElementById('price-input').value) document.getElementById('price-input').value = p;
    };

    setInterval(() => { if(document.getElementById('market').classList.contains('active')) fetchMarket(); }, 5000);
</script>
</body>
</html>
