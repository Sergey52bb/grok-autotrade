<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v8.1 [STON Edition]</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0a0e14; --panel: rgba(23, 28, 38, 0.8); --green: #00ffd0; --blue: #3897ff; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 20px 15px; text-align: center; background: var(--bg); }
        header .title { font-weight: 800; font-size: 18px; letter-spacing: 0.5px; background: linear-gradient(90deg, #3897ff, #00ffd0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 120px 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* НАВИГАЦИЯ В СТИЛЕ DEX */
        nav { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            height: 75px;
            background: var(--panel); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex; 
            border-radius: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000; 
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item img { 
            width: 32px; height: 32px; 
            filter: grayscale(1) opacity(0.4); 
            transition: all 0.3s ease;
        }
        
        /* Индикатор под активной кнопкой */
        .nav-item::after {
            content: ''; position: absolute; bottom: 12px; width: 5px; height: 5px;
            background: transparent; border-radius: 50%; transition: all 0.3s ease;
        }

        .nav-item.active img { 
            filter: grayscale(0) opacity(1) drop-shadow(0 0 8px rgba(56,151,255,0.5));
            transform: translateY(-3px);
        }
        .nav-item.active::after { background: var(--blue); box-shadow: 0 0 10px var(--blue); }

        /* Контентные блоки */
        .card { background: #171c26; border-radius: 24px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .balance-card { text-align: center; padding: 40px 20px; background: radial-gradient(circle at top right, #1e293b, #0a0e14); }
        .btn-main { background: var(--blue); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; font-size: 15px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); opacity: 0.9; }

        input, select { width: 100%; padding: 16px; background: #0f141a; border: 1px solid var(--border); border-radius: 16px; color: white; font-size: 16px; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

<header><div class="title">GROK AVTO TRADE</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="card balance-card">
            <div style="font-size: 12px; color: var(--text); margin-bottom: 8px; opacity: 0.6;">Wallet Balance</div>
            <h1 id="main_balance" style="font-size: 36px; margin: 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 11px; opacity: 0.3; margin-top: 10px; letter-spacing: 1px;">NOT CONNECTED</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-main" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border);" onclick="openModal('deposit')">Deposit</button>
            <button class="btn-main" onclick="openModal('send')">Send</button>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:12px; opacity:0.6;"><span>Sell</span><span>Balance: 0</span></div>
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from" onchange="calculateSwap()"></select>
            
            <div style="text-align:center; margin: -15px 0; position:relative; z-index:2;">
                <button onclick="swapReverse()" style="background:#171c26; border:1px solid var(--border); color:var(--blue); width:40px; height:40px; border-radius:12px; font-size:18px;">↓</button>
            </div>

            <div style="display:flex; justify-content:space-between; margin: 15px 0 10px 0; font-size:12px; opacity:0.6;"><span>Buy</span><span>~ $0.00</span></div>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <select id="sw_to" onchange="calculateSwap()"></select>
            
            <button class="btn-main" style="margin-top:10px; background: linear-gradient(90deg, var(--blue), #007bff);" onclick="tg.showAlert('Confirming via TON...')">Swap Tokens</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="card" style="text-align:center; padding: 50px 20px;">
            <div style="width:60px; height:60px; background: rgba(56,151,255,0.1); border-radius:20px; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px auto;">
                <span style="font-size:30px;">💎</span>
            </div>
            <h2 style="margin:0 0 10px 0;">Connect Wallet</h2>
            <p style="font-size:14px; opacity:0.5; margin-bottom:30px;">Securely connect your TON wallet to start trading assets.</p>
            <div id="ton-connect-btn" style="display:flex; justify-content:center;"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)">
        <img src="https://i.ibb.co/vzYp5zM/wallet-logo.png">
    </div>
    <div class="nav-item" onclick="showTab('swap', this)">
        <img src="https://i.ibb.co/fHwQ3mG/swap-logo.png">
    </div>
    <div class="nav-item" onclick="showTab('connect', this)">
        <img src="https://i.ibb.co/hR0p5R1/connect-logo.png">
    </div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let prices = { 'TON': 7.2, 'BTC': 69000, 'ETH': 3450, 'USDT': 1 };
    
    function init() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
        });
        t.value = "USDT";

        const tc = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tc.onStatusChange(w => {
            const addr = document.getElementById('addr_display');
            if (w) {
                const a = w.account.address;
                addr.innerText = a.substring(0,6) + "..." + a.substring(a.length-6);
                addr.style.opacity = "1";
                addr.style.color = "var(--blue)";
            } else {
                addr.innerText = "NOT CONNECTED";
            }
        });
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value, t = document.getElementById('sw_to').value, v = document.getElementById('sw_val').value;
        if(v > 0) document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
    }

    function swapReverse() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        calculateSwap();
        tg.HapticFeedback.selectionChanged();
    }

    window.onload = init;
</script>
</body>
</html>
