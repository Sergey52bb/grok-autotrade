<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STRATEX V2.0</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #161a1e; --gold: #f0b90b; --green: #0ecb81; --red: #f6465d; }
        body { background: var(--bg); color: #e6e8ea; font-family: sans-serif; margin: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #2b2f36; }
        .log-panel { background: #000; color: #0ecb81; font-family: monospace; font-size: 11px; padding: 10px; height: 70px; overflow-y: auto; border-bottom: 1px solid #333; }
        .main-btn { background: var(--gold); color: black; border: none; padding: 16px; width: 90%; margin: 20px 5%; border-radius: 4px; font-weight: bold; font-size: 16px; }
        .status-tag { color: #848e9c; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="log-panel" id="debug-log">/ System check: Waiting...</div>

<div class="header">
    <div style="font-weight: 800; color: var(--gold); letter-spacing: 1px;">STRATEX PRO</div>
    <div id="ton-connect-btn"></div>
</div>

<div style="text-align: center; padding-top: 40px;">
    <div id="connection-status" style="font-size: 24px; font-weight: bold;">ОЖИДАНИЕ</div>
    <div class="status-tag">Проверка манифеста...</div>
    
    <button class="main-btn" onclick="connectWallet()">ПОДКЛЮЧИТЬ TONKEEPER</button>
</div>

<script>
    const log = document.getElementById('debug-log');
    function print(text) { log.innerHTML += `<br>> ${text}`; log.scrollTop = log.scrollHeight; }

    // Используем raw-ссылку напрямую из GitHub (замени на свою, если не сработает)
    const manifestPath = 'https://rgey52bb.github.io/tonconnect-manifest.json';

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifestPath,
        buttonRootId: 'ton-connect-btn'
    });

    async function checkManifest() {
        try {
            const res = await fetch(manifestPath);
            if(res.ok) {
                print("МАНИФЕСТ ДОСТУПЕН ✅");
                document.querySelector('.status-tag').innerText = "Конфигурация загружена успешно";
            } else {
                print("ОШИБКА 404: Манифест не найден на сервере ❌");
                document.querySelector('.status-tag').innerText = "Ошибка: Загрузите файл на GitHub!";
                document.querySelector('.status-tag').style.color = "var(--red)";
            }
        } catch(e) {
            print("ОШИБКА СЕТИ: " + e.message);
        }
    }

    async function connectWallet() {
        print("Запуск окна выбора...");
        try {
            await tonConnectUI.openModal();
        } catch(e) {
            print("Ошибка: " + e.message);
        }
    }

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            print("УСПЕШНО ПОДКЛЮЧЕНО!");
            document.getElementById('connection-status').innerText = "АКТИВЕН";
            document.getElementById('connection-status').style.color = "var(--green)";
        }
    });

    window.onload = checkManifest;
</script>
</body>
</html>
