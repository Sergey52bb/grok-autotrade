<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Pro Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #06090f; --card: #11151c; --border: #1e222d;
            --primary: #00ff95; /* Насыщенный салатный */
            --secondary: #ff3b57; /* Бордово-красный */
            --gold: #f0b90b; --text-dim: #848e9c;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Шапка */
        header {
            padding: 8px 15px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; color: var(--gold); font-size: 14px; letter-spacing: 1px; }

        /* ВЕРХНЯЯ ЧАСТЬ: ГРАФИК (1/3 Экрана) */
        .chart-section { height: 33vh; position: relative; background: #000; border-bottom: 2px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }
        
        .expand-btn {
            position: absolute; right: 10px; bottom: 10px; z-index: 10;
            background: rgba(30, 34, 45, 0.8); border: 1px solid var(--border);
            color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }

        /* СРЕДНЯЯ ЧАСТЬ: ТОРГОВЛЯ И ПЛОТНЫЙ СТАКАН */
        .main-content {
            display: grid; grid-template-columns: 1.1fr 0.9fr; 
            flex-grow: 1; background: var(--border); gap: 1px; overflow: hidden;
        }

        .panel { background: var(--card); padding: 12px; display: flex; flex-direction: column; }

        /* СТИЛЬ СТАКАНА (ORDER BOOK) */
        .ob-container { font-family: 'Roboto Mono', monospace; font-size: 11px; }
        .ob-header { display: flex; justify-content: space-between; color: var(--text-dim); margin-bottom: 5px; font-size: 9px; }
        .ob-row { 
            display: flex; justify-content: space-between; position: relative; 
            height: 19px; align-items: center; margin-bottom: 1px;
        }
        .depth-bar {
            position: absolute; right: 0; top: 0; height: 100%; 
            z-index: 0; opacity: 0.65; /* Прозрачность 65% */
        }
        .ob-val { z-index: 1; position: relative; }
        .price-up { color: var(--primary); font-weight: 700; }
        .price-down { color: var(--secondary); font-weight: 700; }

        /* ТОРГОВАЯ ПАНЕЛЬ */
        .input-group { background: #1e222d; border-radius: 4px; padding: 8px; margin-bottom: 10px; border: 1px solid #2b3139; }
        .input-group label { display: block; font-size: 9px; color: var(--text-dim); margin-bottom: 2px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 15px; outline: none; font-weight: 600; }

        .trade-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-bottom: 10px; }
        .btn { 
            padding: 12px; border: none; border-radius: 4px; color: white; 
            font-weight: 800; font-size: 14px; cursor: pointer; 
        }
        .btn-buy { background: var(--primary); color: #000; }
        .btn-sell { background: var(--secondary); }

        /* НИЖНЯЯ НАВИГАЦИЯ */
        nav { 
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; justify-content: space-around; padding: 10px 0;
        }
        .nav-item { font-size: 10px; color: var(--text-dim); text-align: center; opacity: 0.6; text-decoration: none; }
        .nav-item.active { color: var(--gold); opacity: 1; }
    </style>
</head>
<body>

<header>
    <div class="logo">STRATEX <span>AUTO</span></div>
    <div id="ton-connect-button"></div>
</header>

<div class="chart-section" id="chart-area">
    <button class="expand-btn" onclick="toggleFullScreen()">FULL SCREEN ⤢</button>
    <div id="tv_container"></div>
</div>

<div class="main-content" id="main-ui">
    <div class="panel">
        <div class="input-group">
            <label>Price (USDT)</label>
            <input type="number" value="5.3502">
        </div>
        <div class="input-group">
            <label>Amount (TON)</label>
            <input type="number" placeholder="Min 1.0">
        </div>
        <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 15px;">
            Fee: <span style="color:var(--gold)">0.35%</span><br>
            Est. Total: <span style="color:white">-- USDT</span>
        </div>
        <div class="trade-btns">
            <button class="btn btn-buy">BUY</button>
            <button class="btn btn-sell">SELL</button>
        </div>
    </div>

    <div class="panel">
        <div class="ob-container">
            <div class="ob-header"><span>Price</span><span>Amount</span></div>
            <div id="asks-box"></div>
            <div style="text-align:center; padding: 6px 0; font-size:15px; font-weight:800; color:var(--primary); border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin:4px 0;">
                5.3502
            </div>
            <div id="bids-box"></div>
        </div>
    </div>
</div>

<nav>
    <a href="#" class="nav-item active">📈<br>Market</a>
    <a href="#" class="nav-item">🤖<br>Auto</a>
    <a href="#" class="nav-item">👛<br>Assets</a>
    <a href="#" class="nav-item">⚙️<br>Settings</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function initChart(h = "100%") {
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15",
            "theme": "dark", "style": "1", "container_id": "tv_container",
            "hide_top_toolbar": true, "backgroundColor": "#06090f",
            "gridColor": "rgba(30, 34, 45, 0.5)"
        });
    }

    let isFull = false;
    function toggleFullScreen() {
        const chart = document.getElementById('chart-area');
        const ui = document.getElementById('main-ui');
        if(!isFull) {
            chart.style.height = "80vh";
            ui.style.display = "none";
        } else {
            chart.style.height = "33vh";
            ui.style.display = "grid";
        }
        isFull = !isFull;
        initChart();
    }

    function drawOB() {
        const asks = document.getElementById('asks-box');
        const bids = document.getElementById('bids-box');
        asks.innerHTML = ''; bids.innerHTML = '';

        for(let i=0; i<7; i++) {
            let aVol = Math.random() * 100;
            asks.innerHTML = `<div class="ob-row">
                <span class="price-down ob-val">5.3${51+i}</span><span class="ob-val">${aVol.toFixed(1)}</span>
                <div class="depth-bar" style="width:${aVol}%; background:var(--secondary);"></div>
            </div>` + asks.innerHTML;

            let bVol = Math.random() * 100;
            bids.innerHTML += `<div class="ob-row">
                <span class="price-up ob-val">5.3${49-i}</span><span class="ob-val">${bVol.toFixed(1)}</span>
                <div class="depth-bar" style="width:${bVol}%; background:var(--primary);"></div>
            </div>`;
        }
    }

    window.onload = () => { initChart(); drawOB(); setInterval(drawOB, 2000); };
</script>
</body>
</html>
