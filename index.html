<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v7.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --red: #ff4a4a; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 25px 15px 15px 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); opacity: 0.5; cursor: pointer; }
        .nav-item.active { color: var(--green); opacity: 1; }

        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer; width: 100%; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
        
        select, input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        #swap_reverse_btn { background: var(--panel); border: 1px solid var(--border); color: var(--green); width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: -20px auto; z-index: 10; position: relative; }
        
        /* Стили для кнопки коннекта в меню */
        #ton-connect-stub { width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

<header><div class="title">💎 Grok Avto Trade</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; opacity: 0.4; font-family: monospace;">Not Connected</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <p style="font-size:11px; opacity:0.5;">PAY</p>
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from" onchange="validateSwap(); calculateSwap()"></select>
            
            <button id="swap_reverse_btn" onclick="swapReverse()">🔄</button>
            
            <p style="font-size:11px; opacity:0.5; margin-top:10px;">RECEIVE</p>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <select id="sw_to" onchange="validateSwap(); calculateSwap()"></select>
            
            <div id="sw_usd_info" style="text-align:right; font-size:10px; color:var(--text); margin-bottom:10px;">Value: $0.00</div>
            <button id="sw_btn" class="btn-general" style="background:var(--green); color:#000;" onclick="tg.showAlert('Swap Initiated')">CONFIRM SWAP</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div style="background:var(--panel); padding:40px 20px; border-radius:25px; text-align:center; border:1px solid var(--border);">
            <h3 style="margin-top:0;">Wallet Connection</h3>
            <p style="font-size:13px; opacity:0.6; margin-bottom:30px;">Connect your TON wallet to start trading and manage your balance.</p>
            <div id="ton-connect-btn" style="display:flex; justify-content:center;"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('connect', this)"><span>🔗</span>Connect</div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Deposit TON</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:white; padding:10px; border-radius:10px; min-height:140px;"></div>
        <p id="full_addr" style="font-size:10px; word-break:break-all; opacity:0.5; font-family:monospace;">Please connect wallet</p>
        <button class="btn-general" style="background:var(--green); color:#000;" onclick="copyAddr()">COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send Assets</h3>
        <select id="send_asset_select"></select>
        <input type="text" placeholder="Recipient Address">
        <input type="text" placeholder="Memo (Optional)">
        <input type="number" placeholder="Amount">
        <button class="btn-general" style="background:var(--green); color:#000;">SEND NOW</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    
    let prices = { 'TON': 7.2, 'BTC': 69000, 'ETH': 3450, 'USDT': 1 };
    let currentAddr = "";

    // WebSocket для обновления цен (в фоне для работы Свопа)
    function connectMarket() {
        const ws = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker/tonusdt@ticker");
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const s = d.s.replace('USDT','');
            prices[s] = parseFloat(d.c);
        };
        ws.onclose = () => setTimeout(connectMarket, 3000);
    }

    function init() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to'), s = document.getElementById('send_asset_select');
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
            s.innerHTML += `<option value="${c}">${c}</option>`;
        });
        t.value = "USDT";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                currentAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"..."+currentAddr.substring(currentAddr.length-4);
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 140, height: 140 });
                
                // Запрос баланса
                fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${currentAddr}`)
                    .then(r => r.json()).then(d => {
                        if(d.ok) document.getElementById('main_balance').innerText = (d.result/1e9).toFixed(2) + " TON";
                    });
            } else {
                currentAddr = "";
                document.getElementById('addr_display').innerText = "Not Connected";
                document.getElementById('main_balance').innerText = "0.00 TON";
            }
        });

        connectMarket();
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    function copyAddr() { if(currentAddr) { navigator.clipboard.writeText(currentAddr); tg.showAlert("Copied!"); } }

    function swapReverse() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        calculateSwap(); validateSwap();
        tg.HapticFeedback.impactOccurred('medium');
    }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value, t = document.getElementById('sw_to').value, v = document.getElementById('sw_val').value;
        if(v > 0) {
            document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
            document.getElementById('sw_usd_info').innerText = `Value: $${(v * prices[f]).toLocaleString()}`;
        } else {
            document.getElementById('sw_res').value = "";
            document.getElementById('sw_usd_info').innerText = "Value: $0.00";
        }
    }

    function validateSwap() {
        const btn = document.getElementById('sw_btn');
        btn.disabled = (document.getElementById('sw_from').value === document.getElementById('sw_to').value);
    }

    window.onload = init;
</script>
</body>
</html>
