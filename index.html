<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #0d1117; --border: #1a1f26;
            --primary: #00ff95; --secondary: #ff3b57; --gold: #f0b90b; 
            --text-dim: #707a8a; --text-main: #e6e8ea;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; color: var(--gold); font-size: 14px; letter-spacing: 1px; }

        /* КОНТЕЙНЕР ДЛЯ ЭКРАНОВ */
        .view { display: none; flex-direction: column; flex-grow: 1; height: calc(100vh - 120px); overflow-y: auto; }
        .view.active { display: flex; }

        /* ЭКРАН MARKET (ТВОЙ ПРЕДЫДУЩИЙ ДИЗАЙН) */
        .chart-section { height: 33vh; min-height: 200px; position: relative; background: #000; border-bottom: 2px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }
        .main-content { display: grid; grid-template-columns: 1.1fr 0.9fr; flex-grow: 1; background: var(--border); gap: 1px; }
        .panel { background: var(--card); padding: 12px; }

        /* ЭКРАН AUTO-BOT */
        .bot-container { padding: 15px; }
        .strategy-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 16px; margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .bot-badge { background: rgba(0, 255, 149, 0.1); color: var(--primary); font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 700; }
        
        .bot-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .bot-field { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
        .bot-field label { font-size: 9px; color: var(--text-dim); display: block; margin-bottom: 2px; }
        .bot-field input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; outline: none; font-weight: 600; }

        /* СТИЛИ СТАКАНА (32% ПРОЗРАЧНОСТЬ) */
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 19px; align-items: center; font-family: 'Roboto Mono'; }
        .depth-bar { position: absolute; right: 0; top: 0; height: 100%; z-index: 0; opacity: 0.32; transition: width 0.4s; }
        .price-up { color: var(--primary); font-weight: 700; }
        .price-down { color: var(--secondary); font-weight: 700; }

        /* КНОПКИ */
        .btn { padding: 12px; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; text-align: center; }
        .btn-primary { background: var(--primary); color: #05070a; width: 100%; margin-top: 15px; }

        /* НАВИГАЦИЯ */
        nav { background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; position: fixed; bottom: 0; width: 100%; }
        .nav-item { font-size: 10px; color: var(--text-dim); text-align: center; cursor: pointer; flex: 1; transition: 0.2s; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">STRATEX <span>V2.0</span></div>
    <div id="ton-connect-button"></div>
</header>

<div id="view-market" class="view active">
    <div class="chart-section">
        <div id="tv_container"></div>
    </div>
    <div class="main-content">
        <div class="panel">
            <div style="font-size: 12px; margin-bottom: 10px; font-weight: 700;">FAST TRADE</div>
            <div class="bot-field" style="margin-bottom: 10px;"><label>Amount TON</label><input type="number" placeholder="0.00"></div>
            <button class="btn btn-primary" style="margin-top: 5px;">BUY TON</button>
            <button class="btn" style="background: var(--secondary); color: white; width: 100%; margin-top: 8px;">SELL TON</button>
        </div>
        <div class="panel" id="orderbook-container" style="font-size: 10px;">
            <div id="asks-box"></div>
            <div style="text-align:center; padding: 5px 0; color: var(--primary); font-weight: 800; border: 1px solid var(--border); margin: 3px 0;">5.3502</div>
            <div id="bids-box"></div>
        </div>
    </div>
</div>

<div id="view-bot" class="view">
    <div class="bot-container">
        <div class="strategy-card">
            <div style="display: flex; justify-content: space-between;">
                <b style="font-size: 18px;">Spot Grid Bot</b>
                <span class="bot-badge">ACTIVE</span>
            </div>
            <p style="font-size: 12px; color: var(--text-dim); margin-top: 8px;">Автоматическая покупка и продажа в ценовом коридоре.</p>
            
            <div class="bot-input-row">
                <div class="bot-field"><label>Lower Price</label><input type="number" value="4.50"></div>
                <div class="bot-field"><label>Upper Price</label><input type="number" value="6.20"></div>
            </div>
            <div class="bot-input-row">
                <div class="bot-field"><label>Grid Steps</label><input type="number" value="20"></div>
                <div class="bot-field"><label>Investment (TON)</label><input type="number" placeholder="10.0"></div>
            </div>
            <button class="btn btn-primary">ЗАПУСТИТЬ ГРОКА</button>
        </div>

        <div class="strategy-card" style="opacity: 0.5;">
            <b style="font-size: 16px;">DCA Accumulator</b>
            <p style="font-size: 11px; color: var(--text-dim);">Усреднение цены при просадках. Скоро в доступе.</p>
        </div>
    </div>
</div>

<div id="view-assets" class="view">
    <div style="padding: 30px; text-align: center;">
        <div style="font-size: 40px;">🏦</div>
        <h3>Твои Активы</h3>
        <p style="color: var(--text-dim);">Подключи Tonkeeper, чтобы увидеть баланс.</p>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="switchView('market')"><span class="nav-icon">📊</span>Market</div>
    <div class="nav-item" onclick="switchView('bot')"><span class="nav-icon">🤖</span>Auto-Bot</div>
    <div class="nav-item" onclick="switchView('assets')"><span class="nav-icon">🏦</span>Assets</div>
    <div class="nav-item" onclick="switchView('market')"><span class="nav-icon">⚙️</span>Settings</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
    function switchView(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        
        document.getElementById('view-' + viewName).classList.add('active');
        event.currentTarget.classList.add('active');

        if(viewName === 'market') initChart(); // Перезапуск графика при возврате
    }

    function initChart() {
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15",
            "theme": "dark", "style": "1", "container_id": "tv_container",
            "hide_top_toolbar": true, "backgroundColor": "#05070a", "gridColor": "rgba(26,31,38,0.5)"
        });
    }

    function drawOB() {
        const asks = document.getElementById('asks-box');
        const bids = document.getElementById('bids-box');
        if(!asks) return;
        asks.innerHTML = ''; bids.innerHTML = '';
        for(let i=0; i<6; i++) {
            let aV = Math.random()*100;
            asks.innerHTML = `<div class="ob-row"><span class="price-down">5.3${51+i}</span><span style="z-index:1">${aV.toFixed(1)}</span><div class="depth-bar" style="width:${aV}%; background:var(--secondary);"></div></div>` + asks.innerHTML;
            let bV = Math.random()*100;
            bids.innerHTML += `<div class="ob-row"><span class="price-up">5.3${49-i}</span><span style="z-index:1">${bV.toFixed(1)}</span><div class="depth-bar" style="width:${bV}%; background:var(--primary);"></div></div>`;
        }
    }

    window.onload = () => { initChart(); drawOB(); setInterval(drawOB, 2500); };
</script>
</body>
</html>
