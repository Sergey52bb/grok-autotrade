<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grok Avto Trade</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        #main_content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        
        .screen { display: none; }
        .screen.active { display: block; }

        /* Элементы кошелька */
        .balance-card { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-white { background: white; color: black; }
        .btn-green { background: var(--green); color: black; }

        /* Маркет */
        .market-item { display: flex; justify-content: space-between; padding: 15px; background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }

        /* Навигация */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: var(--text); }
        .nav-item.active { color: var(--green); }

        /* Кнопка кошелька - принудительный стиль */
        #wallet-auth-container { display: flex; justify-content: center; padding: 20px; min-height: 50px; }
    </style>
</head>
<body>

<header><h3>💎 Grok Avto Trade</h3></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 12px; opacity: 0.5;">BALANCE</div>
            <h1 id="disp_ton">0.00 TON</h1>
            <div style="color: var(--green);">$0.00</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="handleDeposit()">⬇ DEPOSIT</button>
            <button class="btn btn-green" onclick="showTab('profile')">⬆ SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom:15px;">Market Analysis</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_profile" class="screen">
        <h4>System Profile</h4>
        <div style="background: var(--panel); padding: 20px; border-radius: 15px; margin-top: 15px; text-align: center;">
            <p style="margin-bottom: 20px;">Connect your wallet to start</p>
            <div id="wallet-auth-container"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet')">💼 Wallet</div>
    <div class="nav-item" onclick="showTab('market')">🔄 Market</div>
    <div class="nav-item" onclick="showTab('profile')">👤 Profile</div>
</nav>

<script>
    // 1. Инициализация UI
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/Grok-Avto-Trade/tonconnect-manifest.json',
        buttonRootId: 'wallet-auth-container'
    });

    // 2. Логика вкладок
    function showTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');

        if(id === 'market') renderMarket();
    }

    // 3. Депозит (через прямое обращение к аккаунту)
    function handleDeposit() {
        const currentAccount = tonConnectUI.account;
        if (currentAccount) {
            alert("Ваш адрес для пополнения:\n" + currentAccount.address);
        } else {
            alert("Сначала подключите кошелек в профиле!");
            showTab('profile');
        }
    }

    // 4. Маркет (автономный рендер)
    function renderMarket() {
        const list = document.getElementById('market_list');
        const data = [
            { n: 'TON/USDT', p: '5.32' },
            { n: 'BNB/TON', p: '584.2' },
            { n: 'BTC/USDT', p: '64120' }
        ];
        list.innerHTML = data.map(item => `
            <div class="market-item">
                <span>${item.n}</span>
                <span style="color:var(--green)">$${item.p}</span>
            </div>
        `).join('');
    }

    // Принудительный запуск маркета при загрузке
    renderMarket();
</script>
</body>
</html>
