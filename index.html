<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grok AutoTrade Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- TON Connect UI -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, Inter, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: linear-gradient(180deg, #0b1220, #05080f);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }

    .price {
      font-size: 36px;
      font-weight: 700;
    }

    .pair {
      opacity: .6;
      margin-top: 4px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .buy { background: #22c55e; color: #062b15; }
    .sell { background: #ef4444; color: #2b0606; }

    .label {
      font-size: 12px;
      opacity: .5;
      margin-top: 12px;
    }

    .value {
      font-size: 18px;
      font-weight: 600;
    }

    .chart {
      height: 120px;
      background: linear-gradient(180deg, #020617, #020617);
      border-radius: 14px;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- PRICE -->
    <div class="card">
      <div class="price">1.248 USDT</div>
      <div class="pair">USDT / TON</div>
    </div>

    <!-- BUY / SELL -->
    <div class="card">
      <div class="buttons">
        <button class="btn buy" disabled>BUY</button>
        <button class="btn sell" disabled>SELL</button>
      </div>
    </div>

    <!-- WALLET -->
    <div class="card" id="wallet-card">
      <div id="ton-connect"></div>

      <div id="wallet-info" style="display:none;">
        <div class="label">Wallet</div>
        <div class="value" id="wallet-address"></div>

        <div class="label">Balance</div>
        <div class="value" id="wallet-balance">Loading...</div>
      </div>
    </div>

    <!-- CHART PLACEHOLDER -->
    <div class="card">
      <div class="chart"></div>
    </div>

  </div>

  <script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: "https://rgey52bb.github.io/tonconnect-manifest.json",
      buttonRootId: "ton-connect"
    });

    const TONCENTER_API = "https://toncenter.com/api/v2/getAddressBalance";

    async function getTonBalance(address) {
      const res = await fetch(`${TONCENTER_API}?address=${address}`);
      const data = await res.json();
      return (Number(data.result) / 1e9).toFixed(4);
    }

    tonConnectUI.onStatusChange(async wallet => {
      if (!wallet) return;

      const address = wallet.account.address;

      document.getElementById("wallet-info").style.display = "block";
      document.getElementById("wallet-address").innerText =
        address.slice(0, 6) + "..." + address.slice(-4);

      const balance = await getTonBalance(address);
      document.getElementById("wallet-balance").innerText =
        balance + " TON";

      document.querySelector(".buy").disabled = false;
      document.querySelector(".sell").disabled = false;
    });
  </script>
</body>
</html>
