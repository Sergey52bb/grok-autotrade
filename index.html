<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: Arial;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

/* GRID */
.main {
    display: grid;
    grid-template-columns: 55% 45%;
    height: calc(100vh - 60px);
}

/* LEFT (FORM) */
.left {
    padding: 10px;
}

.tabs {
    display: flex;
    background: #1a2230;
    border-radius: 10px;
    overflow: hidden;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 10px;
}

.buy { background: #2ebd85; }
.sell { background: #2a2f3a; color: #aaa; }

.box {
    background: #1a2230;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    font-weight: bold;
    background: #2ebd85;
}

/* RIGHT (ORDER BOOK) */
.right {
    background: #111827;
    padding: 5px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.orderbook {
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* RED / GREEN BLOCK */
.section {
    flex: 1;
    overflow: hidden;
}

.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 5px;
}

.fill {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    opacity: 0.2;
}

/* COLORS */
.red { color: #f6465d; }
.green { color: #2ebd85; }

/* CENTER PRICE */
.price {
    text-align: center;
    padding: 5px;
    font-weight: bold;
    background: #0f172a;
}

</style>
</head>

<body>

<div class="header">💎 SYN TERMINAL</div>

<div class="main">

    <!-- LEFT -->
    <div class="left">
        <div class="tabs">
            <div class="tab buy">Купить</div>
            <div class="tab sell">Продать</div>
        </div>

        <div class="box">Цена: 1.288</div>
        <div class="box">Количество: 25 TON</div>
        <div class="box">Комиссия: 0.25%</div>

        <div class="btn">Купить TON</div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="orderbook">

            <!-- RED -->
            <div class="section">
                <div class="row red">
                    <div class="fill" style="width:80%; background:#f6465d;"></div>
                    <span>1.302</span><span>5256</span>
                </div>
                <div class="row red">
                    <div class="fill" style="width:60%; background:#f6465d;"></div>
                    <span>1.301</span><span>7724</span>
                </div>
                <div class="row red">
                    <div class="fill" style="width:90%; background:#f6465d;"></div>
                    <span>1.300</span><span>8865</span>
                </div>
            </div>

            <!-- PRICE -->
            <div class="price">1.288</div>

            <!-- GREEN -->
            <div class="section">
                <div class="row green">
                    <div class="fill" style="width:70%; background:#2ebd85;"></div>
                    <span>1.287</span><span>8741</span>
                </div>
                <div class="row green">
                    <div class="fill" style="width:50%; background:#2ebd85;"></div>
                    <span>1.286</span><span>6541</span>
                </div>
                <div class="row green">
                    <div class="fill" style="width:85%; background:#2ebd85;"></div>
                    <span>1.285</span><span>4300</span>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
