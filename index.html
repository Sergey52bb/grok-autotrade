<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V3.8 FULLSCREEN</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #1c2127; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .header { background: var(--panel); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 45px; box-sizing: border-box; }
        .pair-selector { flex-grow: 1; background: var(--input); color: var(--gold); border: 1px solid #444; border-radius: 6px; padding: 5px; font-size: 13px; font-weight: bold; outline: none; margin-right: 10px; }

        /* Контейнер графика и стакана */
        .trading-grid { display: grid; grid-template-columns: 1fr 1fr; height: 320px; border-bottom: 2px solid #000; background: #131722; position: relative; transition: 0.3s; }
        
        /* Полноэкранный режим для графика */
        .trading-grid.fullscreen { grid-template-columns: 1fr 0fr; height: 80vh; }
        .trading-grid.fullscreen .order-book-side { display: none; }

        #tv_wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; border-right: 1px solid #333; }
        #tv_widget { width: 100%; height: 100%; }

        /* Кнопка развертывания */
        .expand-btn { position: absolute; right: 10px; top: 10px; z-index: 10; background: rgba(43, 49, 57, 0.8); border: 1px solid #444; color: white; border-radius: 4px; padding: 5px 8px; font-size: 12px; cursor: pointer; }

        .order-book-side { background: var(--panel); font-size: 10px; padding: 5px; display: flex; flex-direction: column; overflow: hidden; height: 100%; box-sizing: border-box; }
        .ob-row { position: relative; display: flex; justify-content: space-between; padding: 2px 0; z-index: 1; height: 18px; }
        .ob-bg { position: absolute; right: 0; top: 0; bottom: 0; z-index: -1; opacity: 0.15; }
        .price-center { font-size: 15px; font-weight: bold; text-align: center; color: var(--green); padding: 6px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin: 4px 0; }

        .page-content { display: none; padding: 15px; padding-bottom: 80px; height: calc(100vh - 365px); overflow-y: auto; }
        .page-content.active { display: block; }
        
        .input-group { background: var(--input); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 12px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--text); }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <select class="pair-selector" id="pair-select" onchange="changePair()">
        <option value="TONUSDT">TON / USDT</option>
        <option value="BTCUSDT">BTC / USDT</option>
        <option value="ETHUSDT">ETH / USDT</option>
        <option value="BNBUSDT">BNB / USDT</option>
        <option value="SOLUSDT">SOL / USDT</option>
        <option value="PEPEUSDT">PEPE / USDT</option>
        <option value="PAXGUSDT">GOLD / USDT</option>
    </select>
    <div id="ton-connect-button"></div>
</div>

<div id="market-top" class="trading-grid">
    <div id="tv_wrapper">
        <button class="expand-btn" onclick="toggleFullscreen()">⬜/⬛</button>
        <div id="tv_widget"></div>
    </div>
    <div class="order-book-side" id="order-book"></div>
</div>

<div id="page-market" class="page-content active">
    <div class="input-group">
        <span>Цена</span>
        <b id="market-price-val" style="color:var(--gold); font-size: 18px;">...</b>
    </div>
    <button class="btn-main">ДЕПОЗИТ</button>
</div>

<div id="page-assets" class="page-content">
    <h3>🏦 Баланс</h3>
    <div class="input-group"><span>TON</span><b id="ton-bal">0.00</b></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('market', this)">📊 РЫНОК</div>
    <div class="nav-item" onclick="showPage('assets', this)">🏦 АКТИВЫ</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPair = "TONUSDT";
    let isFullscreen = false;

    function initTV(symbol) {
        document.getElementById('tv_widget').innerHTML = "";
        setTimeout(() => {
            new TradingView.widget({
                "autosize": true,
                "symbol": "OKX:" + symbol,
                "interval": "15",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "container_id": "tv_widget",
                "hide_top_toolbar": true,
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "save_image": false,
                "backgroundColor": "#131722",
                "left_toolbar": false,
                "width": "100%",
                "height": "100%"
            });
        }, 50);
    }

    function toggleFullscreen() {
        const grid = document.getElementById('market-top');
        isFullscreen = !isFullscreen;
        if(isFullscreen) {
            grid.classList.add('fullscreen');
        } else {
            grid.classList.remove('fullscreen');
        }
        // Переинициализируем, чтобы график подстроился под новый размер
        initTV(currentPair);
    }

    async function fetchPrice() {
        const ids = {"TONUSDT":"the-open-network","BTCUSDT":"bitcoin","ETHUSDT":"ethereum","BNBUSDT":"binancecoin","SOLUSDT":"solana","PEPEUSDT":"pepe","PAXGUSDT":"pax-gold"};
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids[currentPair]}&vs_currencies=usd`);
            const data = await res.json();
            const price = data[ids[currentPair]].usd;
            const prec = price < 0.01 ? 7 : 2;
            document.getElementById('market-price-val').innerText = price.toFixed(prec) + " USDT";
            updateOrderBook(price, prec);
        } catch(e) {}
    }

    function updateOrderBook(price, prec) {
        if(isFullscreen) return;
        const ob = document.getElementById('order-book');
        let html = '<div style="color:var(--text); font-size:9px; margin-bottom:4px; display:flex; justify-content:space-between;"><span>Цена</span><span>Кол.</span></div>';
        for(let i=6; i>0; i--) {
            let p = (price + (i*(price*0.001))).toFixed(prec);
            html += `<div class="ob-row" style="color:var(--red)"><div class="ob-bg" style="width:${Math.random()*60}%; background:var(--red)"></div><span>${p}</span><span>${(Math.random()*10).toFixed(1)}</span></div>`;
        }
        html += `<div class="price-center">${price.toFixed(prec)}</div>`;
        for(let i=1; i<=6; i++) {
            let p = (price - (i*(price*0.001))).toFixed(prec);
            html += `<div class="ob-row" style="color:var(--green)"><div class="ob-bg" style="width:${Math.random()*60}%; background:var(--green)"></div><span>${p}</span><span>${(Math.random()*10).toFixed(1)}</span></div>`;
        }
        ob.innerHTML = html;
    }

    function changePair() {
        currentPair = document.getElementById('pair-select').value;
        initTV(currentPair);
        fetchPrice();
    }

    function showPage(pId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + pId).classList.add('active');
        el.classList.add('active');
        document.getElementById('market-top').style.display = (pId === 'market' ? 'grid' : 'none');
    }

    initTV(currentPair);
    fetchPrice();
    setInterval(fetchPrice, 8000);
</script>
</body>
</html>
