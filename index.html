<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX FIX</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body style="background:#0b0e11; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">

    <h2 style="color:#f0b90b">STRATEX RECOVERY</h2>
    <p id="status">Статус: Проверка...</p>
    
    <div id="ton-connect-button"></div>

    <script>
        // Кодируем манифест прямо в скрипт, чтобы не зависеть от файлов
        const manifest = {
            url: "https://rgey52bb.github.io",
            name: "STRATEX",
            iconUrl: "https://rgey52bb.github.io/icon.png"
        };
        const encodedManifest = "data:application/json;base64," + btoa(JSON.stringify(manifest));

        try {
            const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: encodedManifest,
                buttonRootId: 'ton-connect-button'
            });

            tonConnectUI.onStatusChange(wallet => {
                if (wallet) {
                    document.getElementById('status').innerText = "ПОДКЛЮЧЕНО: " + wallet.account.address.slice(0,6) + "...";
                    document.getElementById('status').style.color = "#0ecb81";
                }
            });
        } catch(e) {
            document.getElementById('status').innerText = "Ошибка: " + e.message;
        }
    </script>
</body>
</html>
