<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg-color: #0b121e;
    --card-bg: #1a2230;
    --text-main: #ffffff;
    --text-dim: #8e96a3;
    --green: #2ebd85;
    --red: #f6465d;
    --blue: #2a6df3;
    --orange: #f0b90b;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 10px;
    font-size: 14px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.pair-info {
    font-size: 18px;
    font-weight: bold;
}
.change {
    color: var(--green);
    font-size: 14px;
}

/* MAIN */
.main-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* TRADE */
.trade-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.tabs {
    display: flex;
    background: var(--card-bg);
    border-radius: 8px;
    padding: 2px;
}
.tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 6px;
    font-weight: bold;
}
.tab.buy { background: var(--blue); }
.tab.sell { color: var(--orange); }

.input-group {
    background: var(--card-bg);
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}

.btn-main {
    background: var(--green);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
}

/* ORDERBOOK */
.orderbook {
    background: #0f1722;
    border-radius: 12px;
    overflow: hidden;
    padding: 6px;
    height: 320px;
    display: flex;
    flex-direction: column;
}

#asks, #bids {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

.price-line {
    text-align: center;
    font-weight: bold;
    padding: 6px;
    background: #111827;
    font-size: 14px;
    border-top: 1px solid #1f2937;
    border-bottom: 1px solid #1f2937;
}

.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 2px 6px;
    height: 18px;
}

.fill {
    position: absolute;
    top: 0;
    bottom: 0;
    opacity: 0.2;
    z-index: 1;
}

.ask .fill {
    right: 0;
    background: #f6465d;
}

.bid .fill {
    left: 0;
    background: #2ebd85;
}

.row span {
    z-index: 2;
        }

.price-red { color: var(--red); }
.price-green { color: var(--green); }

/* PRICE */
.price-center {
    text-align: center;
    font-weight: bold;
    padding: 5px;
}

/* CHART */
.chart-section {
    border-top: 1px solid #252d3a;
    padding-top: 10px;
}
.chart-placeholder {
    height: 120px;
    background: #121926;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="pair-info">
        💎 SYN TERMINAL<br>
        <span style="font-size:12px;color:#8e96a3;">AI Trading System</span>
    </div>
</div>

<div class="main-container">

<!-- TRADE -->
<div class="trade-form">

<div class="tabs">
    <div class="tab buy">Buy</div>
    <div class="tab sell">Sell</div>
</div>

<div class="input-group">
    <span>Amount</span>
    <span>25 TON</span>
</div>

<div class="input-group">
    <span>Receive</span>
    <span>133 USDT</span>
</div>

<div class="input-group">
    <span>DEX Fee</span>
    <span>0.25%</span>
</div>

<button class="btn-main">Buy TON</button>

</div>

<!-- ORDERBOOK -->
<div class="orderbook">

  <!-- SELL (верх) -->
  <div id="asks"></div>

  <!-- ТЕКУЩАЯ ЦЕНА -->
  <div class="price-line">5.30</div>

  <!-- BUY (низ) -->
  <div id="bids"></div>

</div>

<!-- CHART -->
<div class="chart-section">
    <div style="font-size:12px;color:#8e96a3;">TON / USDT</div>
    <div class="chart-placeholder">Chart скоро</div>
</div>

</div>

<script>
const orderbook = document.getElementById('orderbook');

function generateOrderBook() {
    orderbook.innerHTML = '';

    let basePrice = 5.30;

    let rows = [];

    // SELL (красные)
    for (let i = 20; i > 0; i--) {
        let price = basePrice + i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        rows.push({
            type: 'sell',
            price,
            amount,
            depth
        });
    }

    // PRICE (центр)
    rows.push({
        type: 'price',
        price: basePrice
    });

    // BUY (зелёные)
    for (let i = 1; i <= 20; i++) {
        let price = basePrice - i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        rows.push({
            type: 'buy',
            price,
            amount,
            depth
        });
    }

    // РЕНДЕР ОДНИМ ПОТОКОМ
    rows.forEach(item => {
        if (item.type === 'price') {
            const priceRow = document.createElement('div');
            priceRow.className = 'price';
            priceRow.innerText = item.price.toFixed(2);
            orderbook.appendChild(priceRow);
            return;
        }

        const row = document.createElement('div');
        row.className = 'row ' + item.type;

        const fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = item.depth + '%';
        fill.style.background = item.type === 'sell' ? 'red' : '#00ff9c';

        row.innerHTML = `
            <span>${item.price.toFixed(2)}</span>
            <span>${item.amount.toFixed(0)}</span>
        `;

        row.appendChild(fill);
        orderbook.appendChild(row);
    });
}

generateOrderBook();
setInterval(generateOrderBook, 2000);
</script>

</body>
</html>
