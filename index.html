<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade V4.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; --card-bg: #1a1e26; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; font-size: 18px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Стили карточек Маркета */
        .market-card { 
            background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 12px; 
            display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border);
            transition: 0.3s;
        }
        .market-card:active { transform: scale(0.98); background: #232935; }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .coin-icon img { width: 100%; height: 100%; object-fit: cover; }
        .coin-name { font-weight: 800; font-size: 15px; }
        .coin-symbol { font-size: 11px; color: var(--text); }
        .price-info { text-align: right; margin-right: 10px; }
        .current-price { font-weight: 700; font-size: 16px; color: #fff; }
        .buy-mini-btn { background: var(--green); color: #000; border: none; padding: 8px 15px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; }

        /* Общие кнопки и модалки (из V4.7) */
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        #qrcode { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin-bottom: 15px; }
        #qrcode img { width: 150px; height: 150px; }
        .addr-text { font-size: 10px; word-break: break-all; background: #000; padding: 12px; border-radius: 10px; margin-bottom: 15px; color: var(--green); border: 1px solid var(--border); position: relative; }
        .copy-hint { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--green); display: none; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; }

        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.6; }
        .nav-item.active { color: var(--green); opacity: 1; }
    </style>
</head>
<body>

<header>💎 GROK AVTO TRADE <span style="font-size: 10px; color: var(--green);">V4.8</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 8px; letter-spacing: 1px;">ACTIVE ACCOUNT</div>
            <h1 id="main_status" style="font-size: 32px; margin: 0; font-weight: 900;">OFFLINE</h1>
            <div id="addr_display" style="font-size: 11px; margin-top: 10px; color: var(--green); opacity: 0.8;">Вход не выполнен</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="openModal('deposit')">📥 DEPOSIT</button>
            <button class="btn btn-green" onclick="openModal('send')">📤 SEND</button>
            <button class="btn btn-white" style="grid-column: span 2; margin-top: 5px; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border);" onclick="showTab('profile')">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 20px; opacity: 0.7; font-size: 12px; letter-spacing: 1px;">TOP ASSETS</h4>
        <div id="market_list">
            </div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">CONNECTION</h4>
        <div style="background: var(--panel); padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center;">
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top: 0;">Deposit TON</h3>
        <div id="qrcode"></div>
        <div class="addr-text">
            <span id="full_address">---</span>
            <div id="copy_hint" class="copy-hint">Copied to clipboard!</div>
        </div>
        <button id="copy_btn" class="btn btn-green" style="width: 100%;" onclick="copyUserAddr()">📋 COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top: 0;">Send Asset</h3>
        <input type="text" id="send_to" placeholder="Recipient Address">
        <input type="number" id="send_amount" placeholder="Amount">
        <button class="btn btn-green" style="width: 100%;" onclick="processSend()">CONFIRM TRANSACTION</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let tonConnectUI;
    let userFullAddr = "";

    // Настройка активов для Маркета
    const assets = [
        { name: 'The Open Network', symbol: 'TON', pair: 'TONUSDT', icon: 'https://cryptologos.cc/logos/toncoin-ton-logo.png' },
        { name: 'Binance Coin', symbol: 'BNB', pair: 'BNBUSDT', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' },
        { name: 'Near Protocol', symbol: 'NEAR', pair: 'NEARUSDT', icon: 'https://cryptologos.cc/logos/near-protocol-near-logo.png' },
        { name: 'Bitcoin', symbol: 'BTC', pair: 'BTCUSDT', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' }
    ];

    async function init() {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('main_status').innerText = "ONLINE";
                userFullAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = userFullAddr.substring(0,8) + "..." + userFullAddr.substring(userFullAddr.length-8);
                updateQR(userFullAddr);
            } else {
                document.getElementById('main_status').innerText = "OFFLINE";
                userFullAddr = "";
            }
        });
        updatePrices();
    }

    async function updatePrices() {
        const list = document.getElementById('market_list');
        let html = '';
        for (let a of assets) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${a.pair}`);
                const data = await res.json();
                const price = parseFloat(data.price).toFixed(a.symbol === 'TON' || a.symbol === 'NEAR' ? 3 : 2);
                
                html += `
                    <div class="market-card">
                        <div class="coin-info">
                            <div class="coin-icon"><img src="${a.icon}" alt=""></div>
                            <div>
                                <div class="coin-name">${a.symbol}</div>
                                <div class="coin-symbol">${a.name}</div>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <div class="price-info">
                                <div class="current-price">$${price}</div>
                            </div>
                            <button class="buy-mini-btn" onclick="openModal('send')">BUY</button>
                        </div>
                    </div>
                `;
            } catch (e) { console.error(e); }
        }
        list.innerHTML = html;
    }

    function updateQR(text) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        if (text) {
            new QRCode(qrContainer, { text: text, width: 150, height: 150 });
            document.getElementById('full_address').innerText = text;
        }
    }

    function openModal(type) {
        if (!userFullAddr) { tg.showAlert("Please connect wallet first!"); return; }
        document.getElementById('modal_' + type).style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeModal(type) { document.getElementById('modal_' + type).style.display = 'none'; }

    function copyUserAddr() {
        if (!userFullAddr) return;
        navigator.clipboard.writeText(userFullAddr).then(() => {
            const btn = document.getElementById('copy_btn');
            const hint = document.getElementById('copy_hint');
            btn.innerText = "✅ COPIED";
            hint.style.display = "block";
            tg.HapticFeedback.notificationOccurred('success');
            setTimeout(() => {
                btn.innerText = "📋 COPY ADDRESS";
                hint.style.display = "none";
            }, 2000);
        });
    }

    function processSend() {
        const to = document.getElementById('send_to').value;
        const amount = document.getElementById('send_amount').value;
        if(!to || !amount) { tg.showAlert("Fill all fields"); return; }
        tg.showAlert("Transaction sent to network!");
        closeModal('send');
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'market') updatePrices();
    }

    window.addEventListener('load', () => setTimeout(init, 500));
    setInterval(updatePrices, 10000); // Обновление раз в 10 сек
</script>
</body>
</html>
