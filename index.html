<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      background: #0b1220;
      color: white;
      font-family: Arial;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0f1a2e;
    }

    .subtitle {
      color: #aaa;
      font-size: 14px;
    }

    #chart {
      height: 350px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 15px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
    }

    .buy { background: green; }
    .sell { background: red; }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #0f1a2e;
      padding: 10px 0;
    }
  </style>
</head>

<body>

<header>
  <h1>💎 SYN TERMINAL</h1>
  <div class="subtitle">AI Trading System</div>
</header>

<div id="chart"></div>

<div class="buttons">
  <button class="btn buy">BUY</button>
  <button class="btn sell">SELL</button>
</div>

<div class="menu">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

<script>
window.onload = function () {
  new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: 350,
    symbol: "BINANCE:TONUSDT",
    interval: "5",
    theme: "dark"
  });
};
</script>

</body>
</html>
