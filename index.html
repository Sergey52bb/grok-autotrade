<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v8.5 [PRO]</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #050b14; 
            --panel: rgba(18, 26, 38, 0.9); 
            --blue: #3897ff; 
            --green: #00ff95; 
            --border: rgba(255,255,255,0.1); 
        }
        
        body { 
            background: radial-gradient(circle at top right, #0a1f32 0%, #050b14 60%),
                        radial-gradient(circle at bottom left, rgba(0, 255, 149, 0.08) 0%, transparent 45%);
            color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 25px 15px 10px; text-align: center; }
        header .title { font-weight: 900; font-size: 20px; background: linear-gradient(90deg, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 140px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px 20px; border-radius: 28px; backdrop-filter: blur(10px); margin-bottom: 20px; }
        
        /* Фича: Мониторинг рынка */
        .market-list { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .market-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(0,0,0,0.2); border-radius: 18px; border: 1px solid var(--border); }
        .ticker { font-weight: 700; font-size: 14px; }
        .price { color: var(--green); font-family: monospace; }

        .btn-action { padding: 18px; border-radius: 20px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; }
        .btn-action:disabled { background: #2b2f36 !important; color: #555 !important; cursor: not-allowed; }
        
        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 80px; background: var(--panel); display: flex; border-radius: 24px; border: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; transition: 0.3s; color: white; }
        .nav-item span { font-size: 32px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); color: var(--blue); }

        input, select { width: 100%; padding: 18px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 16px; color: white; margin-bottom: 10px; outline: none; font-size: 16px; box-sizing: border-box; }
        
        #rev_btn { background: var(--panel); border: 1px solid var(--border); color: var(--blue); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -25px auto; z-index: 5; position: relative; cursor: pointer; font-size: 20px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #121a26; padding: 30px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header><div class="title">GROK AVTO TRADE</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="card" style="text-align: center;">
            <div style="font-size: 11px; opacity: 0.5; margin-bottom: 8px;">TOTAL BALANCE</div>
            <h1 id="main_balance" style="font-size: 40px; margin: 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 11px; color: var(--blue); margin-top: 12px; font-family: monospace;">NOT CONNECTED</div>
        </div>
        
        <div class="card">
            <div style="font-size: 11px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px;">MARKET RATES</div>
            <div class="market-list">
                <div class="market-item"><span class="ticker">💎 TON/USD</span><span class="price" id="p_ton">$7.42</span></div>
                <div class="market-item"><span class="ticker">🟠 BTC/USD</span><span class="price" id="p_btc">$69,420</span></div>
                <div class="market-item"><span class="ticker">🔹 ETH/USD</span><span class="price" id="p_eth">$3,505</span></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-action" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-action" style="background:var(--blue); color:#fff;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="card">
            <p style="font-size:11px; opacity:0.5; margin-left:5px;">PAY</p>
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from" onchange="validateSwap(); calculateSwap()"></select>
            
            <div id="rev_btn" onclick="swapReverse()">🔄</div>
            
            <p style="font-size:11px; opacity:0.5; margin: 15px 0 8px 5px;">RECEIVE</p>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <select id="sw_to" onchange="validateSwap(); calculateSwap()"></select>
            
            <button id="sw_confirm_btn" class="btn-action" style="background:var(--green); color:#000; margin-top:10px;" onclick="tg.showAlert('Confirming swap...')">CONFIRM SWAP</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="card" style="text-align: center; padding: 40px 20px;">
            <h3>Settings</h3>
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-top:20px;"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span></div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🌀</span></div>
    <div class="nav-item" onclick="showTab('connect', this)"><span>🔗</span></div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--green)">Deposit TON</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0; background:#fff; padding:15px; border-radius:15px; min-height: 150px;"></div>
        <p id="full_addr" style="font-size:11px; word-break:break-all; opacity:0.5;">Not connected</p>
        <button class="btn-action" style="background:var(--blue); color:#fff;" onclick="copyAddr()">COPY</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send Crypto</h3>
        <select id="send_asset_select"></select>
        <input type="text" placeholder="Recipient Address">
        <input type="number" placeholder="Amount">
        <button class="btn-action" style="background:var(--green); color:#000;">SEND</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let prices = { 'TON': 7.42, 'BTC': 69400, 'ETH': 3500, 'USDT': 1.00 };
    let currentAddr = "";

    function init() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to'), s = document.getElementById('send_asset_select');
        f.innerHTML = ""; t.innerHTML = ""; s.innerHTML = "";
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
            s.innerHTML += `<option value="${c}">${c}</option>`;
        });
        t.value = "USDT";

        const tc = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tc.onStatusChange(w => {
            if (w) {
                currentAddr = w.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"...";
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 150, height: 150 });
            }
        });
        
        // Обновление цен в реальном времени (имитация для фичи)
        setInterval(() => {
            document.getElementById('p_ton').innerText = "$" + (prices.TON + (Math.random()*0.1 - 0.05)).toFixed(2);
            document.getElementById('p_btc').innerText = "$" + (prices.BTC + (Math.random()*20 - 10)).toLocaleString();
        }, 3000);
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function swapReverse() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        validateSwap(); calculateSwap();
        tg.HapticFeedback.notificationOccurred('success');
    }

    function validateSwap() {
        const f = document.getElementById('sw_from').value;
        const t = document.getElementById('sw_to').value;
        const btn = document.getElementById('sw_confirm_btn');
        const res = document.getElementById('sw_res');
        
        if (f === t) {
            btn.disabled = true;
            res.value = "Invalid pair";
            res.style.color = "#ff4a4a";
        } else {
            btn.disabled = false;
            res.style.color = "var(--green)";
            calculateSwap();
        }
    }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value;
        const t = document.getElementById('sw_to').value;
        const v = document.getElementById('sw_val').value;
        if(v > 0 && f !== t) {
            document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
        }
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    function copyAddr() { if(currentAddr) { navigator.clipboard.writeText(currentAddr); tg.showAlert("Copied!"); } }

    window.onload = init;
</script>
</body>
</html>
