<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratex Fix</title>
    <style>
        body { background: #0b0e11; color: white; margin: 0; font-family: sans-serif; }
        #chart_box { height: 350px; width: 100%; background: #171a1e; }
        .controls { padding: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #2b3139; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 15px; background: #0ecb81; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div style="padding: 10px; border-bottom: 1px solid #2b2f36;"><b>TON/USDT</b></div>
    
    <div id="chart_box">
        <div class="tradingview-widget-container">
            <div id="tradingview_1"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
            <script type="text/javascript">
            new TradingView.MediumWidget({
              "symbols": [["BINANCE:TONUSDT|1D"]],
              "chartOnly": true,
              "width": "100%",
              "height": "100%",
              "locale": "ru",
              "colorTheme": "dark",
              "gridLineColor": "rgba(42, 46, 57, 0)",
              "container_id": "tradingview_1"
            });
            </script>
        </div>
    </div>

    <div class="controls">
        <label>Цена покупки:</label>
        <input type="text" value="Загрузка...">
        <button>КУПИТЬ TON</button>
    </div>
</body>
</html>
