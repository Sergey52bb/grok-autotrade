<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 45px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }

        /* Зона графика */
        .chart-area { height: 200px; position: relative; background: #0b0e11; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        #canvasChart { width: 100%; height: 100%; display: block; }

        /* Основной контент */
        .trade-content { display: flex; flex: 1; overflow: hidden; }

        /* Лево: Стакан */
        .orderbook { width: 45%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 5px; font-family: monospace; }
        .ob-row { display: flex; justify-content: space-between; font-size: 11px; height: 18px; position: relative; align-items: center; }
        .ob-bar { position: absolute; right: 0; height: 80%; opacity: 0.12; z-index: 0; }

        /* Право: Торговля */
        .trade-panel { width: 55%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 2px; }
        .tab-btn { background: none; border: none; color: var(--text); font-size: 12px; font-weight: bold; border-bottom: 2px solid transparent; padding-bottom: 3px; }
        .tab-btn.active { color: white; border-bottom-color: var(--green); }

        .side-ctrl { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .s-btn { flex: 1; border: none; padding: 7px; border-radius: 3px; font-size: 12px; font-weight: bold; color: var(--text); background: none; }
        .s-btn.buy { background: var(--green); color: white; }
        .s-btn.sell { background: var(--red); color: white; }

        .inp { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .inp label { display: block; font-size: 8px; color: var(--text); text-transform: uppercase; }
        .inp input { background: none; border: none; color: white; width: 100%; font-size: 15px; outline: none; font-weight: bold; }

        .buy-action { background: var(--green); border: none; color: white; padding: 14px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-top: auto; }

        nav { height: 55px; display: flex; justify-content: space-around; align-items: center; background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">TON/USDT</div>
    <div id="priceHeader" style="color:var(--green); font-weight:bold;">1.3145</div>
</header>

<div class="chart-area">
    <canvas id="canvasChart"></canvas>
</div>

<div class="trade-content">
    <div class="orderbook">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="priceMid" style="text-align:center; padding:10px 0; font-weight:bold; font-size:15px; color:var(--green);">1.3145</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>

    <div class="trade-panel">
        <div class="tabs">
            <button class="tab-btn active">Limit</button>
            <button class="tab-btn">Market</button>
        </div>
        <div class="side-ctrl">
            <button class="s-btn buy" id="buyToggle">Buy</button>
            <button class="s-btn" id="sellToggle">Sell</button>
        </div>
        <div class="inp">
            <label>Price</label>
            <input type="number" id="priceInp" value="1.3145">
        </div>
        <div class="inp">
            <label>Amount</label>
            <input type="number" placeholder="0.00">
        </div>
        <button class="buy-action" id="mainBtn">Buy TON</button>
    </div>
</div>

<nav>
    <span style="font-size: 10px; color: white;">📊 Market</span>
    <span style="font-size: 10px; color: var(--text);">💼 Assets</span>
    <span style="font-size: 10px; color: var(--text);">⚙️ Settings</span>
</nav>

<script>
    let currentPrice = 1.3145;
    const canvas = document.getElementById('canvasChart');
    const ctx = canvas.getContext('2d');

    // 1. ЛОГИКА ГРАФИКА
    let candles = Array.from({length: 40}, (_, i) => ({
        h: 1.315 + Math.random()*0.005,
        l: 1.310 + Math.random()*0.005,
        o: 1.312, c: 1.313
    }));

    function drawChart() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const candleWidth = canvas.width / candles.length;
        candles.forEach((c, i) => {
            const x = i * candleWidth + 2;
            const yHigh = (1.325 - c.h) * 5000;
            const yLow = (1.325 - c.l) * 5000;
            const yOpen = (1.325 - c.o) * 5000;
            const yClose = (1.325 - c.c) * 5000;

            ctx.strokeStyle = c.c >= c.o ? '#0ecb81' : '#f6465d';
            ctx.beginPath(); ctx.moveTo(x + candleWidth/4, yHigh); ctx.lineTo(x + candleWidth/4, yLow); ctx.stroke();
            ctx.fillStyle = ctx.strokeStyle;
            ctx.fillRect(x, Math.min(yOpen, yClose), candleWidth/2, Math.max(0.5, Math.abs(yOpen - yClose)));
        });
    }

    // 2. СТАКАН
    function updateOB() {
        const row = (p, c) => `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*80}%; background:${c}"></div><span>${p.toFixed(4)}</span><span style="color:var(--text)">${(Math.random()*20).toFixed(1)}</span></div>`;
        let ah = '', bh = '';
        for(let i=0; i<7; i++) {
            ah += row(currentPrice + 0.001 + i*0.001, 'var(--red)');
            bh += row(currentPrice - 0.001 - i*0.001, 'var(--green)');
        }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }

    // 3. ПЕРЕКЛЮЧАТЕЛИ
    document.getElementById('buyToggle').onclick = () => {
        document.getElementById('buyToggle').className = 's-btn buy';
        document.getElementById('sellToggle').className = 's-btn';
        document.getElementById('mainBtn').style.background = 'var(--green)';
        document.getElementById('mainBtn').innerText = 'Buy TON';
    };
    document.getElementById('sellToggle').onclick = () => {
        document.getElementById('sellToggle').className = 's-btn sell';
        document.getElementById('buyToggle').className = 's-btn';
        document.getElementById('mainBtn').style.background = 'var(--red)';
        document.getElementById('mainBtn').innerText = 'Sell TON';
    };

    // ЦИКЛ ОБНОВЛЕНИЯ
    setInterval(() => {
        currentPrice += (Math.random() - 0.5) * 0.0006;
        document.getElementById('priceHeader').innerText = currentPrice.toFixed(4);
        document.getElementById('priceMid').innerText = currentPrice.toFixed(4);
        
        let last = candles[candles.length - 1];
        last.c = currentPrice;
        if(currentPrice > last.h) last.h = currentPrice;
        if(currentPrice < last.l) last.l = currentPrice;
        
        drawChart();
        updateOB();
    }, 1000);

    window.onresize = drawChart;
    drawChart();
    updateOB();
</script>
</body>
</html>
