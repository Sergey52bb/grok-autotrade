<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .green {
            background-color: green;
            border: none;
            color: white;
        }
        .red {
            background-color: red;
            border: none;
            color: white;
        }
        .blue {
            background-color: blue;
            border: none;
            color: white;
        }
        .status {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Crypto Trading</h1>
    <div class="container">
        <div>Pair: USDT / TON</div>
        <div>Status: Active</div>
        <div id="balance">Balance: 0.00 USDT</div>
        <div id="position">Position: No position</div>
        <div id="price">Price: -</div>

        <button class="green" id="buyBtn">BUY</button>
        <button class="red" id="sellBtn">SELL</button>

        <div class="status" id="walletStatus">Wallet not connected</div>
        <button class="blue" id="connectBtn">Connect Wallet</button>
        <button class="red" id="disconnectBtn">Disconnect</button>
    </div>

    <script>
        let balance = 0;
        let position = null;
        let walletConnected = false;
        let currentPrice = null;

        // API fetch function to get price
        async function fetchPrice() {
            try {
                const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd");
                const data = await res.json();
                currentPrice = data['the-open-network'].usd;
                document.getElementById("price").innerText = `Price: ${currentPrice} USD`;
            } catch (e) {
                document.getElementById("price").innerText = "Price error";
            }
        }

        // Function to update UI elements based on state
        function updateUI() {
            document.getElementById("balance").innerText = `Balance: ${balance.toFixed(2)} USDT`;
            if (position) {
                document.getElementById("position").innerText = `Position: ${position}`;
            } else {
                document.getElementById("position").innerText = "Position: No position";
            }
            if (walletConnected) {
                document.getElementById("walletStatus").innerText = "Wallet connected";
            } else {
                document.getElementById("walletStatus").innerText = "Wallet not connected";
            }
        }

        // Connect wallet
        document.getElementById("connectBtn").addEventListener("click", () => {
            walletConnected = true;
            updateUI();
        });

        // Disconnect wallet
        document.getElementById("disconnectBtn").addEventListener("click", () => {
            walletConnected = false;
            position = null;
            balance = 0;
            updateUI();
        });

        // Buy function
        document.getElementById("buyBtn").addEventListener("click", () => {
            if (!walletConnected) {
                alert("Please connect your wallet first.");
                return;
            }
            if (currentPrice === null) {
                alert("Price data is not available.");
                return;
            }
            const amountToBuy = 1000 / currentPrice;
            balance -= 1000;
            position = `LONG @ ${currentPrice}`;
            updateUI();
        });

        // Sell function
        document.getElementById("sellBtn").addEventListener("click", () => {
            if (!walletConnected) {
                alert("Please connect your wallet first.");
                return;
            }
            if (!position) {
                alert("No position to sell.");
                return;
            }
            const profit = currentPrice - parseFloat(position.split('@')[1]);
            balance += profit;
            position = null;
            updateUI();
        });

        // Start fetching the price every 5 seconds
        setInterval(fetchPrice, 5000);

        // Initial fetch price
        fetchPrice();
    </script>
</body>
</html>
