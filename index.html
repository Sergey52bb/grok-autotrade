<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TON CONNECT -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <!-- TradingView -->
  <script src="https://s3.tradingview.com/tv.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0f1a2e;
    }

    h1 { margin: 0; }
    .subtitle { color: #aaa; font-size: 14px; }

    .wallet {
      text-align: center;
      padding: 10px;
    }

    #chart {
      height: 350px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      padding: 15px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      border: none;
      color: white;
      font-size: 18px;
    }

    .buy { background: green; }
    .sell { background: red; }
  </style>
</head>

<body>

<header>
  <h1>💎 SYN TERMINAL</h1>
  <div class="subtitle">AI Trading System</div>
</header>

<div class="wallet">
  <div id="ton-connect"></div>
</div>

<div id="chart"></div>

<div class="buttons">
  <button class="btn buy">BUY</button>
  <button class="btn sell">SELL</button>
</div>

<script>
  // ⚡ УПРОЩЕННЫЙ TON CONNECT (без manifest — чтобы не ломался)
  const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    buttonRootId: 'ton-connect'
  });

  // ⚡ ГАРАНТИРОВАННАЯ загрузка графика
  window.onload = function () {
    new TradingView.widget({
      container_id: "chart",
      width: "100%",
      height: 350,
      symbol: "BINANCE:TONUSDT",
      interval: "5",
      theme: "dark"
    });
  };
</script>

</body>
</html>
