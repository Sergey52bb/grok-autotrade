<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Pro Terminal</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .pair-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .price-main { color: var(--green); font-weight: bold; font-size: 18px; font-family: monospace; }

        #coinList { position: absolute; top: 55px; left: 10px; right: 10px; background: var(--panel); z-index: 2000; display: none; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .coin-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

        /* Контейнер графика */
        #chart_box { height: 300px; width: 100%; background: #000; position: relative; border-bottom: 1px solid var(--border); }
        #tv_widget { width: 100%; height: 100%; border: none; }
        
        /* Сетка-заглушка для красоты во время загрузки */
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.1; 
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        .orderbook { width: 42%; border-right: 1px solid var(--border); padding: 5px; font-size: 11px; font-family: monospace; }
        .ob-row { display: flex; justify-content: space-between; height: 20px; position: relative; align-items: center; }
        .ob-bar { position: absolute; right: 0; height: 85%; opacity: 0.12; transition: width 0.3s; }

        .trade-panel { width: 58%; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .type-toggle { display: flex; background: var(--input); border-radius: 6px; padding: 3px; }
        .t-btn { flex: 1; border: none; padding: 10px; border-radius: 4px; font-size: 12px; font-weight: bold; color: var(--text); background: none; transition: 0.2s; }
        .t-btn.active.buy { background: var(--green); color: white; }
        .t-btn.active.sell { background: var(--red); color: white; }

        .field { background: var(--input); border-radius: 6px; padding: 8px 12px; border: 1px solid transparent; }
        .field:focus-within { border-color: var(--green); }
        .field label { display: block; font-size: 9px; color: var(--text); margin-bottom: 2px; }
        .field input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }

        .submit-btn { background: var(--green); border: none; color: white; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 15px; margin-top: auto; cursor: pointer; }
        
        nav { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text); font-size: 10px; }
    </style>
</head>
<body>

<header>
    <div class="pair-info" onclick="toggleList()">
        <b id="curPair" style="font-size: 15px;">STRAT/USDT</b>
        <span style="font-size: 10px; color: var(--text);">▼</span>
    </div>
    <div class="price-main" id="livePrice">17.3800</div>
</header>

<div id="coinList">
    <div class="coin-item" onclick="select('STRAT')"><b>STRAT</b> <span style="color:var(--green)">17.3800</span></div>
    <div class="coin-item" onclick="select('TON')"><b>TON</b> <span id="list-TON" style="color:var(--green)">...</span></div>
    <div class="coin-item" onclick="select('ASTER')"><b>ASTER</b> <span id="list-ASTER" style="color:var(--green)">...</span></div>
</div>

<div id="chart_box">
    <div id="tv_widget"></div>
    <div class="grid-overlay"></div>
</div>

<div class="workspace">
    <div class="orderbook">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="spread" style="text-align:center; padding:10px 0; font-weight:bold; font-size:16px; color:var(--green); border-top:1px solid #222; border-bottom:1px solid #222; margin:5px 0;">0.0000</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>
    
    <div class="trade-panel">
        <div class="type-toggle">
            <button class="t-btn active buy" id="tBuy" onclick="setSide('buy')">Buy</button>
            <button class="t-btn" id="tSell" onclick="setSide('sell')">Sell</button>
        </div>
        <div class="field">
            <label>Price (USDT)</label>
            <input type="number" id="mainInputPrice" step="any">
        </div>
        <div class="field">
            <label>Amount (STRAT)</label>
            <input type="number" placeholder="0.00" id="mainAmount">
        </div>
        <button class="submit-btn" id="actionBtn">Buy STRAT</button>
    </div>
</div>

<nav>
    <div class="nav-item" style="color:white;"><span>📊</span>Trade</div>
    <div class="nav-item"><span>💼</span>Wallet</div>
    <div class="nav-item"><span>🚀</span>Launch</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let current = 'STRAT';
    let prices = { STRAT: 17.3800, TON: 0, ASTER: 0 };
    
    // Инициализация графика
    function loadChart(symbol) {
        document.getElementById('tv_widget').innerHTML = '';
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "container_id": "tv_widget",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "locale": "ru"
        });
    }

    // WebSocket для живых котировок
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        data.forEach(t => {
            if (t.s === 'TONUSDT') {
                prices.TON = parseFloat(t.c);
                document.getElementById('list-TON').innerText = prices.TON.toFixed(4);
            }
            if (t.s === 'ASTRUSDT') {
                prices.ASTER = parseFloat(t.c);
                document.getElementById('list-ASTER').innerText = prices.ASTER.toFixed(4);
            }
        });
        updateDisplay();
    };

    function updateDisplay() {
        let p = current === 'STRAT' ? (prices.STRAT + (Math.random()-0.5)*0.01) : prices[current];
        if(!p) return;
        
        let formatted = p.toFixed(4);
        document.getElementById('livePrice').innerText = formatted;
        document.getElementById('spread').innerText = formatted;
        document.getElementById('mainInputPrice').value = formatted;

        // Генерация стакана
        const genRows = (color) => {
            let h = '';
            for(let i=0; i<7; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.003)).toFixed(4);
                let rV = (Math.random()*15).toFixed(1);
                h += `<div class="ob-row">
                    <div class="ob-bar" style="width:${Math.random()*80}%; background:${color}"></div>
                    <span>${rP}</span><span style="color:#eee">${rV}</span>
                </div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = genRows('var(--red)');
        document.getElementById('bids').innerHTML = genRows('var(--green)');
    }

    function select(id) {
        current = id;
        document.getElementById('curPair').innerText = id + '/USDT';
        document.getElementById('coinList').style.display = 'none';
        
        // Магия: для STRAT мы тоже грузим график TON, но в интерфейсе это STRAT
        // Это единственный способ получить "живой" и красивый график
        loadChart(id === 'ASTER' ? 'BINANCE:ASTRUSDT' : 'BINANCE:TONUSDT');
        
        document.getElementById('actionBtn').innerText = (document.getElementById('tBuy').classList.contains('active') ? 'Buy ' : 'Sell ') + id;
    }

    function setSide(s) {
        document.getElementById('tBuy').className = 't-btn' + (s==='buy' ? ' active buy' : '');
        document.getElementById('tSell').className = 't-btn' + (s==='sell' ? ' active sell' : '');
        document.getElementById('actionBtn').style.background = s==='buy' ? 'var(--green)' : 'var(--red)';
        document.getElementById('actionBtn').innerText = (s==='buy' ? 'Buy ' : 'Sell ') + current;
    }

    function toggleList() {
        let l = document.getElementById('coinList');
        l.style.display = l.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = () => {
        loadChart('BINANCE:TONUSDT');
        setInterval(updateDisplay, 2500);
    };
</script>
</body>
</html>
