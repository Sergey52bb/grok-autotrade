<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Grok Avto Trade v16.0</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --red: #ff4a4a; --border: rgba(255,255,255,0.08); }

body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { padding: 15px 15px 5px; text-align: center; flex-shrink: 0; }
.logo-svg { width: 140px; height: auto; }
header .subtitle { font-size: 11px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.9; }

#main_content { flex: 1; overflow-y: auto; padding: 10px 15px 150px; }

.screen { display: none; }
.screen.active { display: block; }

.card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 25px; margin-bottom: 15px; }

/* ===== АНИМАЦИЯ ===== */
.crypto-animation {
  position: relative;
  width: 100%;
  height: 220px;
  margin-bottom: 15px;
  border-radius: 25px;
  overflow: hidden;
}

.crypto-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.9;
}

/* монеты */
.coin {
  position: absolute;
  width: 55px;
  filter: drop-shadow(0 0 12px rgba(77,184,255,0.8));
}

/* позиции */
.c1 { top: 10%; left: 10%; }
.c2 { top: 10%; right: 10%; }
.c3 { bottom: 10%; left: 10%; }
.c4 { bottom: 10%; right: 10%; }

/* орбита */
@keyframes orbit1 {
  from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
  to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
}
@keyframes orbit2 {
  from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
  to { transform: rotate(-360deg) translateX(70px) rotate(360deg); }
}

.c1 { animation: orbit1 8s linear infinite; }
.c2 { animation: orbit2 10s linear infinite; }
.c3 { animation: orbit2 12s linear infinite; }
.c4 { animation: orbit1 9s linear infinite; }

/* ===== остальной UI ===== */

.asset-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 20px; margin-bottom: 12px; background: rgba(77, 184, 255, 0.05); }

nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 85px; background: var(--panel); display: flex; border-radius: 28px; border: 1px solid var(--border); }

.nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; font-size: 30px; }
.nav-item.active { opacity: 1; transform: translateY(-5px); }

.rotating {
  animation: rotateSticker 20s linear infinite;
}

@keyframes rotateSticker {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>
<div class="subtitle">👛 SYN WALLET</div>
</header>

<div id="main_content">

<div id="scr_wallet" class="screen active">

<!-- 🔥 АНИМАЦИЯ -->
<div class="crypto-animation">
  <img src="https://i.ibb.co/3WfKQ0G/crypto-space.jpg" class="crypto-bg">

  <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png" class="coin c1">
  <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png" class="coin c2">
  <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/bitcoin/info/logo.png" class="coin c3">
  <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="coin c4">
</div>

<div style="text-align:center; padding: 15px 0 25px;">
<div style="font-size: 11px; opacity: 0.5;">ESTIMATED BALANCE</div>
<h1 style="font-size:40px;">0.00 TON</h1>
</div>

</div>

</div>

<nav>
<div class="nav-item active">📊</div>
<div class="nav-item">🌀</div>
<div class="nav-item">🔏</div>
</nav>

</body>
    </html>
