<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STRATEX V2.0</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #171a1e; --gold: #f0b90b; --green: #0ecb81; --red: #f6465d; }
        body { background: var(--bg); color: #e6e8ea; font-family: 'Roboto', sans-serif; margin: 0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid #2b3139; }
        .logo { color: var(--gold); font-weight: 800; font-size: 18px; }
        
        .market-info { display: grid; grid-template-columns: 1fr 140px; gap: 1px; background: #2b3139; }
        .chart-placeholder { background: var(--bg); height: 250px; display: flex; align-items: center; justify-content: center; color: #474d57; }
        .order-book { background: var(--bg); font-size: 11px; padding: 8px; }
        
        .trade-container { padding: 20px; background: var(--card); }
        .input-box { background: #2b3139; border-radius: 4px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; }
        .input-box input { background: transparent; border: none; color: white; width: 70%; outline: none; font-size: 16px; }
        
        .buy-btn { background: var(--green); color: white; border: none; width: 100%; padding: 16px; border-radius: 4px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        
        nav { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: var(--card); padding: 10px 0; border-top: 1px solid #2b3139; }
        .nav-item { text-align: center; font-size: 10px; color: #848e9c; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div class="logo">STRATEX <span style="font-size: 12px; font-weight: 400; color: #848e9c;">V2.0</span></div>
    <div id="ton-connect-button"></div>
</header>

<div class="market-info">
    <div class="chart-placeholder">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=OKX%3ATONUSDT&interval=5&theme=dark" style="width:100%; height:100%; border:none;"></iframe>
    </div>
    <div class="order-book" id="ob">
        </div>
</div>

<div class="trade-container">
    <div style="display: flex; gap: 20px; margin-bottom: 10px;">
        <span style="color: var(--green); border-bottom: 2px solid var(--green); padding-bottom: 5px;">Купить</span>
        <span style="color: #848e9c;">Продать</span>
    </div>
    
    <div class="input-box">
        <input type="number" value="25" id="amount">
        <span style="color: #848e9c;">TON</span>
    </div>
    
    <div style="font-size: 12px; color: #848e9c; display: flex; justify-content: space-between; margin: 10px 0;">
        <span>Комиссия STRATEX</span>
        <span>0.35%</span>
    </div>

    <button class="buy-btn" id="main-action" onclick="handleAction()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<nav>
    <div class="nav-item active">📊<br>Рынок</div>
    <div class="nav-item">🤖<br>Автобот</div>
    <div class="nav-item">🏛️<br>Ресурсы</div>
    <div class="nav-item">⚙️<br>Настройки</div>
</nav>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    tonConnectUI.onStatusChange(wallet => {
        const btn = document.getElementById('main-action');
        if (wallet) {
            btn.innerText = "КУПИТЬ TON";
            btn.style.background = "var(--green)";
        } else {
            btn.innerText = "ПОДКЛЮЧИТЬ КОШЕЛЕК";
            btn.style.background = "#474d57";
        }
    });

    async function handleAction() {
        if (!tonConnectUI.connected) {
            await tonConnectUI.openModal();
        } else {
            alert("Ордер отправлен в обработку Гроку...");
        }
    }

    // Простая имитация стакана
    function updateOB() {
        const ob = document.getElementById('ob');
        let h = '<div style="color:#848e9c;margin-bottom:4px">Order Book</div>';
        for(let i=0; i<5; i++) h += `<div style="display:flex;justify-content:space-between;color:var(--red)"><span>${(5.35+Math.random()*0.01).toFixed(3)}</span><span>${(Math.random()*100).toFixed(1)}</span></div>`;
        h += `<div style="text-align:center;margin:4px 0;font-weight:bold;color:var(--green)">5.3502 ↑</div>`;
        for(let i=0; i<5; i++) h += `<div style="display:flex;justify-content:space-between;color:var(--green)"><span>${(5.34+Math.random()*0.01).toFixed(3)}</span><span>${(Math.random()*100).toFixed(1)}</span></div>`;
        ob.innerHTML = h;
    }
    setInterval(updateOB, 2500); updateOB();
</script>

</body>
</html>
