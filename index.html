<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grok AutoTrade</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg,#020617,#020617,#020617);
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

.card {
  background: #0b1225;
  border-radius: 18px;
  padding: 15px;
  margin-bottom: 15px;
}

.row {
  display: flex;
  justify-content: space-between;
  margin: 6px 0;
}

button {
  width: 48%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

.buy { background: #22c55e; }
.sell { background: #ef4444; }

.full {
  width: 100%;
  margin-top: 10px;
}

.blue { background: #3b82f6; }
.red { background: #ef4444; }

.log {
  max-height: 150px;
  overflow-y: auto;
  font-size: 14px;
  opacity: .9;
}
</style>
</head>

<body>
<div class="container">

<h1>Grok AutoTrade</h1>

<div class="card">
  <div class="row"><span>Pair</span><span>USDT / TON</span></div>
  <div class="row"><span>Status</span><span>Active</span></div>
</div>

<div class="card">
  <div class="row"><span>Balance</span><span id="balance">0.00 USDT</span></div>
  <div class="row"><span>Position</span><span id="position">No position</span></div>
</div>

<div class="row">
  <button class="buy" id="buyBtn">BUY</button>
  <button class="sell" id="sellBtn">SELL</button>
</div>

<div class="card">
  <canvas id="priceChart"></canvas>
</div>

<button class="blue full" onclick="connect()">Connect Wallet</button>
<button class="red full" onclick="disconnect()">Disconnect</button>

<p id="walletStatus" style="text-align:center;opacity:.7;">
Wallet not connected
</p>

<div class="card">
  <b>Trade Log</b>
  <div class="log" id="log"></div>
</div>

</div>

<script>
let connected = false;
let position = 'No position';
let priceChart;

// ===== LOG =====
function log(text) {
  const el = document.getElementById('log');
  el.innerHTML = new Date().toLocaleTimeString() + ' — ' + text + '<br>' + el.innerHTML;
}

// ===== WALLET =====
function connect() {
  connected = true;
  document.getElementById('walletStatus').innerText = 'Wallet connected (simulation)';
}

function disconnect() {
  connected = false;
  position = 'No position';
  document.getElementById('position').innerText = position;
  document.getElementById('walletStatus').innerText = 'Wallet not connected';
}

// ===== BUTTONS =====
document.getElementById('buyBtn').onclick = () => {
  if (!connected) return alert('Wallet not connected');
  position = 'LONG';
  document.getElementById('position').innerText = position;
  log('BUY executed (simulation)');
};

document.getElementById('sellBtn').onclick = () => {
  if (!connected) return alert('Wallet not connected');
  position = 'No position';
  document.getElementById('position').innerText = position;
  log('SELL executed (simulation)');
};

// ===== CHART =====
const ctx = document.getElementById('priceChart').getContext('2d');

priceChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'USDT / TON',
      data: [],
      borderColor: '#38bdf8',
      backgroundColor: 'rgba(56,189,248,.1)',
      tension: 0.4,
      pointRadius: 3
    }]
  },
  options: {
    responsive: true,
    scales: {
      x: { display: true },
      y: { display: true }
    }
  }
});

// ===== BINANCE API =====
async function fetchPrice() {
  try {
    const res = await fetch(
      'https://api.binance.com/api/v3/klines?symbol=TONUSDT&interval=1m&limit=20'
    );
    const data = await res.json();

    priceChart.data.labels = data.map(d =>
      new Date(d[0]).toLocaleTimeString().slice(0,5)
    );

    priceChart.data.datasets[0].data = data.map(d => parseFloat(d[4]));
    priceChart.update();

  } catch (e) {
    console.error(e);
  }
}

fetchPrice();
setInterval(fetchPrice, 60000);
</script>

</body>
    </html>
