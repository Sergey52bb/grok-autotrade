<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>

/* ОСНОВА */
body {
  margin: 0;
  background: #071326;
  font-family: Arial;
  color: white;
}

/* HEADER */
.header {
  height: 60px;
  padding-top: 44px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* MAIN */
.main {
  height: calc(100vh - 60px - 40px - 44px - 64px - 34px);
  display: flex;
  flex-direction: column;
}

/* ГРАФИК (СВЕРНУТ) */
.chart {
  height: 44px;
  background: #0c1f3a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

/* СТАКАН */
.orderbook {
  flex: 1;
  overflow-y: auto;
}

/* СТРОКИ */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  padding: 2px 10px;
  font-size: 12px;
  position: relative;
}

.row span {
  position: relative;
  z-index: 2;
}

/* ГЛУБИНА */
.row::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: var(--depth);
  opacity: 0.2;
  z-index: 1;
}

.sell { color: #ff4d4d; }
.sell::before { background: red; }

.buy { color: #00ff9c; }
.buy::before { background: #00ff9c; }

/* ЦЕНА */
.price {
  text-align: center;
  padding: 6px;
  font-size: 14px;
  font-weight: bold;
  background: #0c1f3a;
  position: sticky;
  top: 0;
  z-index: 5;
}

/* WALLET */
.wallet {
  height: 40px;
  font-size: 11px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  background: #0c1f3a;
}

/* BOTTOM */
.bottom {
  height: 64px;
  padding-bottom: 34px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: #0c1f3a;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  💎 SYN TERMINAL<br>
  <span style="font-size:12px; opacity:0.7;">AI Trading System</span>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ГРАФИК ПОЛОСКА -->
  <div class="chart">📉 Развернуть график</div>

  <!-- СТАКАН -->
  <div class="orderbook" id="orderbook"></div>

</div>

<!-- WALLET -->
<div class="wallet">
  Balance: 1200 USDT | Fee: 0.25%
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
</div>

<script>

const orderbook = document.getElementById('orderbook');

function generateOrders() {
  orderbook.innerHTML = '';

  let price = 100;

  // SELL (красные)
  for (let i = 0; i < 20; i++) {
    let amount = Math.random() * 5;
    let depth = Math.random() * 100;

    const row = document.createElement('div');
    row.className = 'row sell';
    row.style.setProperty('--depth', depth + '%');

    row.innerHTML = `
      <span>${(price + i * 0.2).toFixed(2)}</span>
      <span>${amount.toFixed(3)}</span>
    `;

    orderbook.appendChild(row);
  }

  // PRICE
  const priceRow = document.createElement('div');
  priceRow.className = 'price';
  priceRow.innerText = price.toFixed(2);
  orderbook.appendChild(priceRow);

  // BUY (зелёные)
  for (let i = 0; i < 20; i++) {
    let amount = Math.random() * 5;
    let depth = Math.random() * 100;

    const row = document.createElement('div');
    row.className = 'row buy';
    row.style.setProperty('--depth', depth + '%');

    row.innerHTML = `
      <span>${(price - i * 0.2).toFixed(2)}</span>
      <span>${amount.toFixed(3)}</span>
    `;

    orderbook.appendChild(row);
  }
}

generateOrders();
setInterval(generateOrders, 2000);

</script>

</body>
</html>
