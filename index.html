<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade Pro</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --gold: #f0b90b; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Верхняя панель */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--panel); height: 50px; border-bottom: 1px solid #222; }
        .pair-info { display: flex; align-items: center; gap: 8px; }
        .pair-name { font-weight: bold; font-size: 16px; }

        /* Секция торговли */
        .trade-container { display: flex; height: 210px; padding: 8px; gap: 8px; flex-shrink: 0; transition: 0.3s; }
        .order-form { flex: 1.2; display: flex; flex-direction: column; gap: 6px; }
        .order-book { flex: 0.8; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; justify-content: space-between; }

        /* Переключатель Buy/Sell */
        .side-tabs { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 6px; border-radius: 4px; color: var(--text); background: transparent; font-weight: bold; cursor: pointer; }
        .side-btn.active.buy { background: var(--green); color: white; }
        .side-btn.active.sell { background: var(--red); color: white; }

        /* Инпуты */
        .input-box { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .input-box span { font-size: 10px; color: var(--text); display: block; }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        /* Основная кнопка (теперь белая по умолчанию или цветная) */
        .action-btn { width: 100%; border: none; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; margin-top: auto; }
        .btn-buy { background: var(--green); color: white; }
        .btn-sell { background: var(--red); color: white; }

        /* Стакан */
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 16px; align-items: center; padding: 0 4px; }
        .ob-bg { position: absolute; right: 0; height: 100%; opacity: 0.2; z-index: 0; }
        .ob-price { z-index: 1; }
        .ob-amt { z-index: 1; color: var(--text); }

        /* График */
        .chart-wrapper { flex-grow: 1; position: relative; background: #131722; display: flex; flex-direction: column; }
        #tv_chart_container { flex-grow: 1; width: 100%; }
        
        .fs-toggle { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.6); color: var(--gold); border: 1px solid #444; padding: 5px 10px; border-radius: 4px; font-size: 10px; }

        /* Нижнее меню */
        .bottom-nav { display: flex; background: var(--panel); height: 60px; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 10px; text-decoration: none; }
        .nav-item.active { color: white; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        /* Режимы экрана */
        body.is-fullscreen .trade-container, 
        body.is-fullscreen .header { display: none; }
    </style>
</head>
<body id="app-body">

<div class="header">
    <div class="pair-info">
        <span class="pair-name">TON / USDT</span>
        <span id="price-change" style="font-size: 12px; color: var(--green);">+2.45%</span>
    </div>
    <div id="ton-connect-btn"></div>
</div>

<div class="trade-container">
    <div class="order-form">
        <div class="side-tabs">
            <button id="tab-buy" class="side-btn active buy" onclick="setSide('buy')">Buy</button>
            <button id="tab-sell" class="side-btn" onclick="setSide('sell')">Sell</button>
        </div>
        <div class="input-box">
            <span>Price</span>
            <input type="number" id="inp-price" value="1.300">
        </div>
        <div class="input-box">
            <span>Amount</span>
            <input type="number" id="inp-amount" placeholder="0.0">
        </div>
        <button id="submit-btn" class="action-btn btn-buy">Buy TON</button>
    </div>

    <div class="order-book">
        <div id="ob-asks"></div>
        <div id="ob-mid-price" style="text-align: center; font-size: 16px; font-weight: bold; color: var(--green); padding: 4px 0;">1.300</div>
        <div id="ob-bids"></div>
    </div>
</div>

<div class="chart-wrapper">
    <button class="fs-toggle" onclick="toggleFS()">РАЗВЕРНУТЬ</button>
    <div id="tv_chart_container"></div>
</div>

<div class="bottom-nav">
    <a href="#" class="nav-item active"><span class="nav-icon">📊</span>Рынок</a>
    <a href="#" class="nav-item"><span class="nav-icon">💼</span>Активы</a>
    <a href="#" class="nav-item"><span class="nav-icon">📜</span>Сделки</a>
    <a href="#" class="nav-item"><span class="nav-icon">⚙️</span>Настройки</a>
</div>

<script>
    // 1. Инициализация графика с рабочими настройками
    let widget;
    function loadChart() {
        widget = new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:TONUSDT",
            "interval": "15",
            "container_id": "tv_chart_container",
            "library_path": "https://s3.tradingview.com/tv.js",
            "locale": "ru",
            "theme": "dark",
            "style": "1",
            "toolbar_bg": "#131722",
            "enable_publishing": false,
            "hide_top_toolbar": false, // ВКЛЮЧАЕМ ВЕРХНЮЮ ПАНЕЛЬ (Таймфреймы)
            "withdateranges": true,
            "hide_side_toolbar": false, // ВКЛЮЧАЕМ ИНСТРУМЕНТЫ РИСОВАНИЯ
            "allow_symbol_change": true,
            "details": true,
            "hotlist": true,
            "calendar": true,
            "show_popup_button": true,
            "popup_width": "1000",
            "popup_height": "650"
        });
    }

    // 2. Переключение сторон (Купить/Продать)
    function setSide(side) {
        const buyTab = document.getElementById('tab-buy');
        const sellTab = document.getElementById('tab-sell');
        const btn = document.getElementById('submit-btn');

        if(side === 'buy') {
            buyTab.classList.add('active', 'buy');
            sellTab.classList.remove('active', 'sell');
            btn.className = 'action-btn btn-buy';
            btn.innerText = 'Buy TON';
        } else {
            sellTab.classList.add('active', 'sell');
            buyTab.classList.remove('active', 'buy');
            btn.className = 'action-btn btn-sell';
            btn.innerText = 'Sell TON';
        }
    }

    // 3. Полноэкранный режим
    function toggleFS() {
        const body = document.getElementById('app-body');
        const isFull = body.classList.toggle('is-fullscreen');
        document.querySelector('.fs-toggle').innerText = isFull ? 'СВЕРНУТЬ' : 'РАЗВЕРНУТЬ';
    }

    // 4. Подключение TON Connect
    const tc = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    // Запуск при загрузке
    window.onload = () => {
        loadChart();
        // Здесь можно добавить генерацию стакана (как в прошлом коде)
    };
</script>

</body>
</html>
