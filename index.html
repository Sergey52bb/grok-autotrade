<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Pro Final Fix</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 40px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 16px; }

        #main_content { flex: 1; position: relative; overflow: hidden; margin-bottom: 60px; display: flex; flex-direction: column; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; }
        #screen_trade { display: flex; }

        /* График */
        #chart_wrap { height: 35%; width: 100%; background: #000; flex-shrink: 0; position: relative; border-bottom: 1px solid var(--border); }
        .chart-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* Торговая зона - ГИБКАЯ */
        .trade-area { display: flex; flex: 1; min-height: 200px; border-bottom: 1px solid var(--border); overflow: hidden; }
        
        /* Исправленный стакан */
        .book { width: 45%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px 2px; font-family: monospace; font-size: 11px; }
        .side-book { flex: 1; display: flex; flex-direction: column; overflow: hidden; justify-content: flex-end; }
        .side-book.bids { justify-content: flex-start; }
        
        .ob-row { display: flex; justify-content: space-between; min-height: 14px; position: relative; width: 100%; padding: 0 4px; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.15; z-index: 0; }
        .ob-row span { z-index: 1; }
        
        #midPrice { text-align: center; padding: 4px 0; font-size: 14px; color: var(--green); font-weight: bold; margin: 2px 0; background: rgba(255,255,255,0.03); }
        
        /* Форма */
        .trade-form { width: 55%; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 6px; border-radius: 3px; color: var(--text); background: none; font-weight: bold; font-size: 11px; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }
        
        .fld { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .fld label { display: block; font-size: 8px; color: var(--text); text-transform: uppercase; }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 14px; outline: none; }
        .action-btn { background: var(--green); border: none; color: black; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 13px; margin-top: auto; }

        /* Ордера внизу */
        .orders-area { height: 120px; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-top: 4px solid var(--panel); }
        .orders-tabs { display: flex; gap: 15px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .order-tab { font-size: 11px; color: var(--text); font-weight: bold; }
        .order-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .order-item { display: flex; justify-content: space-between; font-size: 10px; padding: 6px 0; border-bottom: 1px solid #1e2329; }

        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 10px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<div id="main_content">
    <div id="screen_trade" class="screen">
        <header><b id="pair_name">TON/USDT</b><div class="price-top" id="topPrice">0.0000</div></header>
        
        <div id="chart_wrap">
            <div class="chart-overlay"></div>
            <div id="tv_container" style="width:100%; height:100%;"></div>
        </div>
        
        <div class="trade-area">
            <div class="book">
                <div id="asks" class="side-book" style="color:var(--red);"></div>
                <div id="midPrice">0.0000</div>
                <div id="bids" class="side-book" style="color:var(--green);"></div>
            </div>
            
            <div class="trade-form">
                <div class="side-btns">
                    <button class="side-btn active buy" onclick="setSide('buy', this)">BUY</button>
                    <button class="side-btn" onclick="setSide('sell', this)">SELL</button>
                </div>
                <div class="fld"><label>Price</label><input type="number" id="iPrice" step="any"></div>
                <div class="fld"><label>Amount</label><input type="number" id="iAmount" placeholder="0.0"></div>
                <button class="action-btn" id="mainBtn" onclick="placeOrder()">BUY TON</button>
            </div>
        </div>

        <div class="orders-area">
            <div class="orders-tabs"><div class="order-tab">Open Orders (0)</div></div>
            <div class="order-list" id="historyList"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active"><span>📊</span>Trade</div>
    <div class="nav-item"><span>📈</span>Market</div>
    <div class="nav-item"><span>💼</span>Wallet</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let prices = { TON: 0, BTC: 0 };
    let currentCoin = 'TON';
    let currentSide = 'buy';

    function loadChart(id) {
        const symbol = id === 'BTC' ? 'BINANCE:BTCUSDT' : 'BINANCE:TONUSDT';
        document.getElementById('tv_container').innerHTML = '';
        setTimeout(() => {
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "15", "theme": "dark", "style": "1",
                "locale": "ru", "container_id": "tv_container", "hide_top_toolbar": true, "hide_legend": true,
                "save_image": false, "enable_publishing": false, "preset": "mobile",
                "disabled_features": ["header_symbol_search", "context_menus"]
            });
        }, 50);
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@ticker/btcusdt@ticker');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.s === 'TONUSDT') prices.TON = parseFloat(data.c);
        if (data.s === 'BTCUSDT') prices.BTC = parseFloat(data.c);
        updateUI();
    };

    function updateUI() {
        const p = currentCoin === 'TON' ? prices.TON : prices.BTC;
        if(!p) return;
        const fmt = { minimumFractionDigits: currentCoin === 'BTC' ? 1 : 3 };
        document.getElementById('topPrice').innerText = p.toLocaleString(undefined, fmt);
        document.getElementById('midPrice').innerText = p.toLocaleString(undefined, fmt);
        
        const genRows = (clr, isRev) => {
            let h = '';
            for(let i=0; i<7; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.0015)).toFixed(currentCoin === 'BTC' ? 1 : 3);
                h += `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*70}%; background:${clr}"></div><span>${rP}</span><span style="color:var(--text)">${(Math.random()*1.5).toFixed(1)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = genRows('var(--red)');
        document.getElementById('bids').innerHTML = genRows('var(--green)');
    }

    function setSide(side, btn) {
        currentSide = side;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active', 'buy', 'sell'));
        btn.classList.add('active', side);
        const b = document.getElementById('mainBtn');
        b.style.background = side === 'buy' ? 'var(--green)' : 'var(--red)';
        b.style.color = side === 'buy' ? 'black' : 'white';
        b.innerText = side.toUpperCase() + ' ' + currentCoin;
    }

    window.onload = () => loadChart('TON');
</script>
</body>
</html>
