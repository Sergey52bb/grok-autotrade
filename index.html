<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg-color: #0b121e;
    --card-bg: #1a2230;
    --text-main: #ffffff;
    --text-dim: #8e96a3;
    --green: #2ebd85;
    --red: #f6465d;
    --blue: #2a6df3;
    --orange: #f0b90b;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 10px;
    font-size: 14px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.pair-info {
    font-size: 18px;
    font-weight: bold;
}
.change {
    color: var(--green);
    font-size: 14px;
}

/* MAIN */
.main-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* TRADE */
.trade-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.tabs {
    display: flex;
    background: var(--card-bg);
    border-radius: 8px;
    padding: 2px;
}
.tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    border-radius: 6px;
    font-weight: bold;
}
.tab.buy { background: var(--blue); }
.tab.sell { color: var(--orange); }

.input-group {
    background: var(--card-bg);
    padding: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}

.btn-main {
    background: var(--green);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: bold;
}

/* ORDERBOOK */
.order-book {
    background: #161d2a;
    border-radius: 10px;
    padding: 5px;
    border: 1px solid #252d3a;
    height: 320px;
    overflow-y: auto;
}

.ob-title {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 5px;
}

/* ROW */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    height: 20px;
    align-items: center;
    font-size: 11px;
    padding: 0 5px;
}

.row span {
    z-index: 2;
}

.fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    opacity: 0.2;
    z-index: 1;
}

.price-red { color: var(--red); }
.price-green { color: var(--green); }

/* PRICE */
.price-center {
    text-align: center;
    font-weight: bold;
    padding: 5px;
}

/* CHART */
.chart-section {
    border-top: 1px solid #252d3a;
    padding-top: 10px;
}
.chart-placeholder {
    height: 120px;
    background: #121926;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #444;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="pair-info">
        💎 SYN TERMINAL<br>
        <span style="font-size:12px;color:#8e96a3;">AI Trading System</span>
    </div>
</div>

<div class="main-container">

<!-- TRADE -->
<div class="trade-form">

<div class="tabs">
    <div class="tab buy">Buy</div>
    <div class="tab sell">Sell</div>
</div>

<div class="input-group">
    <span>Amount</span>
    <span>25 TON</span>
</div>

<div class="input-group">
    <span>Receive</span>
    <span>133 USDT</span>
</div>

<div class="input-group">
    <span>DEX Fee</span>
    <span>0.25%</span>
</div>

<button class="btn-main">Buy TON</button>

</div>

<!-- ORDERBOOK -->
<div class="order-book" id="orderbook">
    <div class="ob-title">Swap Depth</div>
</div>

<!-- CHART -->
<div class="chart-section">
    <div style="font-size:12px;color:#8e96a3;">TON / USDT</div>
    <div class="chart-placeholder">Chart скоро</div>
</div>

</div>

<script>
const ob = document.getElementById('orderbook');

function render() {
    ob.innerHTML = '<div class="ob-title">Swap Depth</div>';

    let base = 5.30;

    // SELL
    for (let i = 15; i > 0; i--) {
        let price = base + i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = 'var(--red)';

        row.innerHTML = `
            <span class="price-red">${price.toFixed(2)}</span>
            <span>${amount.toFixed(0)}</span>
        `;

        row.appendChild(fill);
        ob.appendChild(row);
    }

    // PRICE
    let price = document.createElement('div');
    price.className = 'price-center';
    price.innerText = base.toFixed(2);
    ob.appendChild(price);

    // BUY
    for (let i = 0; i < 15; i++) {
        let price = base - i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = 'var(--green)';

        row.innerHTML = `
            <span class="price-green">${price.toFixed(2)}</span>
            <span>${amount.toFixed(0)}</span>
        `;

        row.appendChild(fill);
        ob.appendChild(row);
    }
}

render();
setInterval(render, 2000);
</script>

</body>
</html>
