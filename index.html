<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V2.1</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #1c2127; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        /* Header */
        .header { background: var(--panel); padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .brand { color: var(--gold); font-size: 18px; font-weight: bold; }

        /* Trading Grid: График + Стакан */
        .trading-grid { display: grid; grid-template-columns: 1.6fr 1fr; height: 260px; border-bottom: 2px solid #000; }
        .order-book-side { background: var(--panel); font-size: 10px; padding: 5px; display: flex; flex-direction: column; justify-content: space-between; border-left: 1px solid #333; }
        .ob-row { display: flex; justify-content: space-between; padding: 1px 0; }
        .price-center { font-size: 14px; font-weight: bold; text-align: center; color: var(--green); margin: 4px 0; }

        /* Trade Form */
        .trade-container { padding: 12px; padding-bottom: 80px; }
        .trade-tabs { display: flex; gap: 20px; margin-bottom: 12px; border-bottom: 1px solid #333; }
        .t-tab { padding-bottom: 8px; font-weight: bold; font-size: 14px; cursor: pointer; color: var(--text); }
        .t-tab.active { color: var(--green); border-bottom: 2px solid var(--green); }

        .input-group { background: var(--input); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-label { font-size: 12px; color: var(--text); }
        .input-val { font-weight: bold; font-size: 15px; }

        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .fee-text { text-align: center; font-size: 10px; color: var(--text); margin-top: 6px; }

        /* Navigation Bar */
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text); }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }

        /* Warning Overlay */
        .warning-strip { background: rgba(246, 70, 93, 0.1); color: #ffbaba; font-size: 9px; padding: 5px 12px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">STRATEX</div>
    <div id="ton-connect-button"></div>
</div>

<div class="trading-grid">
    <div id="tv_widget" style="height:100%;"></div>
    <div class="order-book-side">
        <div style="color:var(--text); margin-bottom:4px;">Цена <span style="float:right">Кол-во</span></div>
        <div class="ob-row" style="color:var(--red)"><span>7.245</span><span>142</span></div>
        <div class="ob-row" style="color:var(--red)"><span>7.241</span><span>85</span></div>
        <div class="ob-row" style="color:var(--red)"><span>7.238</span><span>1.2K</span></div>
        <div class="price-center">7.235 ↑</div>
        <div class="ob-row" style="color:var(--green)"><span>7.232</span><span>410</span></div>
        <div class="ob-row" style="color:var(--green)"><span>7.229</span><span>95</span></div>
        <div class="ob-row" style="color:var(--green)"><span>7.225</span><span>2.4K</span></div>
    </div>
</div>

<div class="trade-container">
    <div class="trade-tabs">
        <div class="t-tab active">Купить</div>
        <div class="t-tab">Продать</div>
    </div>

    <div class="input-group">
        <span class="input-label">Цена</span>
        <span class="input-val">7.235 <small style="color:var(--text)">USDT</small></span>
    </div>

    <div class="input-group">
        <span class="input-label">Количество</span>
        <span class="input-val">0 <small style="color:var(--text)">TON</small></span>
    </div>

    <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:10px;">
        <span style="color:var(--text)">Доступно:</span>
        <span>0.0033 TON</span>
    </div>

    <button class="btn-main">Купить TON</button>
    <div class="fee-text">Комиссия STRATEX: 0.13 TON</div>
</div>

<div class="warning-strip">
    ⚠️ Только сеть TON. Проверяйте адрес перед отправкой.
</div>

<div class="nav-bar">
    <div class="nav-item active"><div class="nav-icon">📊</div>Рынок</div>
    <div class="nav-item"><div class="nav-icon">🤖</div>Автобот</div>
    <div class="nav-item"><div class="nav-icon">🏦</div>Активы</div>
    <div class="nav-item"><div class="nav-icon">⚙️</div>Настройки</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Инициализация графика
    new TradingView.widget({
        "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15", "theme": "dark",
        "style": "1", "locale": "ru", "hide_top_toolbar": true, "container_id": "tv_widget"
    });

    // Инициализация кошелька
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });
</script>

</body>
</html>
