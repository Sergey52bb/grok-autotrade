<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v8.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #050b14; 
            --panel: rgba(18, 26, 38, 0.9); 
            --blue: #3897ff; 
            --green: #00ff95; 
            --salad: #adff2f;
            --text: #94a3b8; 
            --border: rgba(255,255,255,0.1); 
        }
        
        body { 
            background: radial-gradient(circle at top right, #0a1f32 0%, #050b14 60%),
                        radial-gradient(circle at bottom left, rgba(0, 255, 149, 0.05) 0%, transparent 40%);
            color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 25px 15px 15px; text-align: center; }
        header .title { font-weight: 900; font-size: 20px; background: linear-gradient(90deg, var(--blue), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 140px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Кнопки Депозит / Отправить */
        .balance-card { background: var(--panel); border: 1px solid var(--border); padding: 35px 20px; border-radius: 28px; text-align: center; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .btn-action { padding: 18px; border-radius: 20px; border: none; font-weight: 800; font-size: 13px; cursor: pointer; width: 100%; transition: 0.2s; }
        
        /* Навигация */
        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 85px; background: var(--panel); display: flex; border-radius: 24px; border: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item img { width: 38px; height: 38px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); }

        /* Своп */
        .swap-card { background: var(--panel); padding: 20px; border-radius: 26px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 18px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 16px; color: white; margin-bottom: 10px; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #121a26; padding: 30px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header><div class="title">GROK AVTO TRADE</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.5; margin-bottom: 10px;">AVAILABLE BALANCE</div>
            <h1 id="main_balance" style="font-size: 38px; margin: 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 11px; color: var(--blue); margin-top: 12px; font-family: monospace;">Disconnected</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-action" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-action" style="background:var(--blue); color:#fff;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="swap-card">
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from"></select>
            <div style="text-align:center; margin: -5px 0;">↓</div>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <select id="sw_to"></select>
            <button class="btn-action" style="background:var(--green); color:#000; margin-top:10px;">SWAP</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="balance-card">
            <h3>Connect Wallet</h3>
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-top:20px;"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><img src="https://i.ibb.co/vzYp5zM/wallet-logo.png"></div>
    <div class="nav-item" onclick="showTab('swap', this)"><img src="https://i.ibb.co/fHwQ3mG/swap-logo.png"></div>
    <div class="nav-item" onclick="showTab('connect', this)"><img src="https://i.ibb.co/hR0p5R1/connect-logo.png"></div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--green)">Deposit TON</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0; background:#fff; padding:15px; border-radius:15px;"></div>
        <p id="full_addr" style="font-size:11px; word-break:break-all; opacity:0.5;">Not connected</p>
        <button class="btn-action" style="background:var(--blue); color:#fff;" onclick="copyAddr()">COPY</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send Crypto</h3>
        <input type="text" placeholder="Address">
        <input type="number" placeholder="Amount">
        <button class="btn-action" style="background:var(--green); color:#000;">SEND</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let currentAddr = "";
    let prices = { 'TON': 7.2, 'BTC': 69000, 'USDT': 1 };

    function init() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
        });
        
        const tc = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tc.onStatusChange(w => {
            if (w) {
                currentAddr = w.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"...";
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 150, height: 150 });
            }
        });
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    function copyAddr() { if(currentAddr) { navigator.clipboard.writeText(currentAddr); tg.showAlert("Copied!"); } }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value, t = document.getElementById('sw_to').value, v = document.getElementById('sw_val').value;
        if(v > 0) document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
    }

    window.onload = init;
</script>
</body>
</html>
