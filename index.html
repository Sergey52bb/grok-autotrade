<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #0b1019; --card: #121926; --primary: #02c076; 
            --secondary: #f84960; --gold: #f0b90b; --text-dim: #848e9c;
            --border: #1e2633; --input-bg: #1e2633;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 8px 12px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        .logo-main { color: white; font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .logo-main span { color: var(--gold); font-size: 10px; border: 1px solid var(--gold); padding: 1px 3px; border-radius: 3px; }

        /* ОСНОВНАЯ СЕТКА */
        .main-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 1px; background: var(--border); }

        .trade-panel { background: var(--card); padding: 12px; }
        .order-book { background: var(--card); padding: 12px 8px; font-size: 11px; }

        /* ТАБЫ BUY/SELL */
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 8px; text-align: center; font-weight: 700; border-radius: 4px; background: #232d3f; cursor: pointer; transition: 0.2s; }
        .tab.buy.active { background: linear-gradient(to right, #02c076, #029d61); }
        .tab.sell.active { background: linear-gradient(to right, #f84960, #d63e52); }

        /* ПОЛЯ ВВОДА */
        .field-group { margin-bottom: 10px; }
        .field-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; display: flex; justify-content: space-between; }
        .input-wrap { background: var(--input-bg); border-radius: 4px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        .input-wrap input { background: transparent; border: none; color: white; width: 70%; font-weight: 600; outline: none; }
        .input-wrap .unit { color: var(--text-dim); font-size: 11px; }

        /* ПОЛЗУНОК (SLIDER) */
        .slider-wrap { display: flex; justify-content: space-between; margin: 15px 0; position: relative; }
        .slider-dot { width: 8px; height: 8px; background: #4a576d; border-radius: 50%; z-index: 2; cursor: pointer; }
        .slider-dot.active { background: var(--gold); box-shadow: 0 0 5px var(--gold); }
        .slider-line { position: absolute; top: 3px; left: 0; right: 0; height: 2px; background: #4a576d; z-index: 1; }

        /* КОМИССИИ */
        .info-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }
        .info-row b { color: #dee2e6; }

        .btn-main { 
            width: 100%; padding: 14px; border-radius: 6px; border: none; color: white; 
            font-weight: 800; font-size: 14px; margin-top: 10px; cursor: pointer; 
            background: var(--primary); box-shadow: 0 4px 15px rgba(2, 192, 118, 0.2);
        }

        /* SWAP DEPTH (СТАКАН) */
        .ob-header { color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 10px; }
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 20px; align-items: center; margin-bottom: 2px; z-index: 1; }
        .depth-bar { position: absolute; right: 0; top: 0; height: 100%; z-index: -1; opacity: 0.2; transition: 0.3s; }
        .price-up { color: var(--primary); }
        .price-down { color: var(--secondary); }

        /* ГРАФИК */
        .chart-section { flex-grow: 1; position: relative; background: #000; border-top: 1px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }

        nav { background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid var(--border); }
        .nav-item { font-size: 10px; color: var(--text-dim); text-align: center; text-decoration: none; font-weight: 500; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<header>
    <div class="logo-main">STRATEX <span>AUTO</span></div>
    <div id="ton-connect-button"></div>
</header>

<div class="main-layout">
    <div class="trade-panel">
        <div class="tabs">
            <div class="tab buy active" onclick="setSide('buy')">Buy</div>
            <div class="tab sell" onclick="setSide('sell')">Sell</div>
        </div>
        
        <div class="field-group">
            <div class="field-label">Amount</div>
            <div class="input-wrap">
                <input type="number" id="amount" value="25" oninput="calc()">
                <span class="unit">TON</span>
            </div>
        </div>

        <div class="info-row"><span>You Receive</span><b id="receive">133.25 USDT</b></div>
        
        <div class="slider-wrap">
            <div class="slider-line"></div>
            <div class="slider-dot active"></div>
            <div class="slider-dot"></div>
            <div class="slider-dot"></div>
            <div class="slider-dot"></div>
            <div class="slider-dot"></div>
        </div>

        <div class="info-row"><span>DEX Fee</span><b>0.25%</b></div>
        <div class="info-row"><span>STRATEX Fee</span><b style="color: var(--gold);">0.35%</b></div>
        
        <button class="btn-main" id="action-btn">Buy TON</button>
    </div>

    <div class="order-book">
        <div class="ob-header"><span>Price</span><span>Amount</span></div>
        <div id="asks"></div>
        <div style="font-size: 15px; font-weight: 700; padding: 8px 0; color: var(--primary); text-align: center;">5.350 <small style="font-size: 9px; color:var(--text-dim)">≈ $5.35</small></div>
        <div id="bids"></div>
    </div>
</div>

<div class="chart-section">
    <div id="tv_container"></div>
</div>

<nav>
    <a href="#" class="nav-item active">📊<br>Market</a>
    <a href="#" class="nav-item">🤖<br>Auto-Bot</a>
    <a href="#" class="nav-item">🏦<br>Assets</a>
    <a href="#" class="nav-item">⚙️<br>Settings</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function loadChart() {
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15",
            "theme": "dark", "style": "1", "locale": "ru",
            "container_id": "tv_container", "hide_top_toolbar": true,
            "backgroundColor": "#0b1019", "gridColor": "rgba(30, 38, 51, 0.5)"
        });
    }

    function setSide(side) {
        const btn = document.getElementById('action-btn');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        if(side === 'buy') {
            btn.style.background = 'var(--primary)'; btn.innerText = 'Buy TON';
        } else {
            btn.style.background = 'var(--secondary)'; btn.innerText = 'Sell TON';
        }
    }

    function renderOB() {
        const asks = document.getElementById('asks');
        const bids = document.getElementById('bids');
        asks.innerHTML = ''; bids.innerHTML = '';
        
        for(let i=0; i<5; i++) {
            const valAsks = Math.random() * 100;
            asks.innerHTML = `<div class="ob-row price-down">
                <span>5.3${50+i*2}</span><span>${valAsks.toFixed(1)}</span>
                <div class="depth-bar" style="width: ${valAsks}%; background: var(--secondary);"></div>
            </div>` + asks.innerHTML;

            const valBids = Math.random() * 100;
            bids.innerHTML += `<div class="ob-row price-up">
                <span>5.3${48-i*2}</span><span>${valBids.toFixed(1)}</span>
                <div class="depth-bar" style="width: ${valBids}%; background: var(--primary);"></div>
            </div>`;
        }
    }

    function calc() {
        const amt = document.getElementById('amount').value;
        document.getElementById('receive').innerText = (amt * 5.35).toFixed(2) + ' USDT';
    }

    window.onload = () => { loadChart(); renderOB(); setInterval(renderOB, 2000); };
</script>
</body>
</html>
