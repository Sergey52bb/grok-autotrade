<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #0b0e11; --card: #161a1e; --primary: #02c076; 
            --secondary: #f84960; --gold: #f0b90b; --text-dim: #848e9c;
            --border: #2b2f36;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        .logo-main { color: var(--gold); font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        /* ОСНОВНАЯ СЕТКА (КАК НА СКРИНШОТЕ) */
        .main-layout {
            display: grid; grid-template-columns: 1.2fr 1fr; 
            gap: 1px; background: var(--border); flex-grow: 0;
        }

        .trade-panel { background: var(--card); padding: 12px; }
        .order-book { background: var(--card); padding: 12px; font-size: 12px; border-left: 1px solid var(--border); }

        /* СТИЛЬ КНОПОК BUY/SELL */
        .tabs { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 12px; background: #2b2f36; }
        .tab { flex: 1; padding: 8px; text-align: center; font-weight: 600; cursor: pointer; font-size: 13px; }
        .tab.buy.active { background: var(--primary); color: white; }
        .tab.sell.active { background: var(--secondary); color: white; }

        .input-box { background: #2b2f36; border-radius: 4px; padding: 8px; margin-bottom: 8px; position: relative; }
        .input-label { font-size: 10px; color: var(--text-dim); }
        .input-box input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 14px; font-weight: 600; }
        
        .btn-action { 
            width: 100%; padding: 12px; border-radius: 4px; border: none; 
            color: white; font-weight: 700; margin-top: 5px; cursor: pointer;
        }

        /* ГРАФИК ВНИЗУ */
        .chart-section {
            flex-grow: 1; position: relative; background: #000;
            border-top: 1px solid var(--border); transition: 0.3s;
        }
        #tv_chart_container { width: 100%; height: 100%; }

        .expand-btn {
            position: absolute; right: 10px; top: 10px; z-index: 10;
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 5px 8px; border-radius: 4px; font-size: 10px; cursor: pointer;
        }

        nav {
            background: var(--card); display: flex; justify-content: space-around; 
            padding: 8px 0; border-top: 1px solid var(--border);
        }
        .nav-item { font-size: 10px; color: var(--text-dim); text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-main">STRATEX</div>
    <div id="ton-connect-button"></div>
</header>

<div class="main-layout">
    <div class="trade-panel">
        <div class="tabs">
            <div class="tab buy active" id="t-buy" onclick="setMode('buy')">Buy</div>
            <div class="tab sell" id="t-sell" onclick="setMode('sell')">Sell</div>
        </div>
        <div class="input-box">
            <div class="input-label">Price</div>
            <input type="number" value="5.350">
        </div>
        <div class="input-box">
            <div class="input-label">Amount (TON)</div>
            <input type="number" placeholder="0.00">
        </div>
        <button class="btn-action" id="main-btn" style="background: var(--primary);">Buy TON</button>
    </div>

    <div class="order-book">
        <div style="color: var(--secondary); margin-bottom: 2px;">5.358 <span style="float:right; color:var(--text-dim)">72.4</span></div>
        <div style="color: var(--secondary); margin-bottom: 2px;">5.354 <span style="float:right; color:var(--text-dim)">18.2</span></div>
        <div style="font-size: 16px; font-weight: bold; padding: 5px 0; color: var(--primary);">5.350</div>
        <div style="color: var(--primary); margin-bottom: 2px;">5.348 <span style="float:right; color:var(--text-dim)">96.1</span></div>
        <div style="color: var(--primary); margin-bottom: 2px;">5.344 <span style="float:right; color:var(--text-dim)">79.0</span></div>
    </div>
</div>

<div class="chart-section" id="chart-area">
    <button class="expand-btn" onclick="toggleExpand()">РАЗВЕРНУТЬ ↕</button>
    <div id="tv_chart_container"></div>
</div>

<nav>
    <a href="#" class="nav-item">📊<br>Market</a>
    <a href="#" class="nav-item" style="color:var(--gold)">🤖<br>Auto-Bot</a>
    <a href="#" class="nav-item">🏦<br>Assets</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function loadChart() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:TONUSDT",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tv_chart_container",
            "hide_top_toolbar": true,
            "backgroundColor": "#0b0e11"
        });
    }

    function setMode(mode) {
        const b = document.getElementById('t-buy');
        const s = document.getElementById('t-sell');
        const btn = document.getElementById('main-btn');
        if(mode === 'buy') {
            b.classList.add('active'); s.classList.remove('active');
            btn.style.background = 'var(--primary)'; btn.innerText = 'Buy TON';
        } else {
            s.classList.add('active'); b.classList.remove('active');
            btn.style.background = 'var(--secondary)'; btn.innerText = 'Sell TON';
        }
    }

    let isExpanded = false;
    function toggleExpand() {
        const area = document.getElementById('chart-area');
        const layout = document.querySelector('.main-layout');
        if(!isExpanded) {
            layout.style.display = 'none';
            area.style.height = '100%';
        } else {
            layout.style.display = 'grid';
            area.style.height = 'auto';
        }
        isExpanded = !isExpanded;
        loadChart(); // Перерисовываем под новый размер
    }

    window.onload = loadChart;
</script>
</body>
</html>
