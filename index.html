<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Real-Time</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 1000; }
        .selector { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; background: var(--panel); cursor: pointer; }
        .price-top { color: var(--green); font-weight: bold; font-family: 'Roboto Mono', monospace; font-size: 17px; }

        #coinList { position: absolute; top: 55px; left: 10px; right: 10px; background: var(--panel); z-index: 3000; display: none; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .coin-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; cursor: pointer; }

        #trade_screen { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        #chart_wrap { height: 320px; width: 100%; position: relative; background: #000; border-bottom: 1px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        .book { width: 42%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px; font-family: monospace; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; height: 17px; position: relative; overflow: hidden; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.15; transition: width 0.3s; }

        .trade-panel { width: 58%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 10px; border-radius: 3px; font-size: 12px; font-weight: bold; color: var(--text); background: none; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }

        .fld { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .fld label { display: block; font-size: 9px; color: var(--text); }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }

        .action-btn { background: var(--green); border: none; color: black; padding: 16px; border-radius: 6px; font-weight: bold; margin-top: auto; }

        #wallet_screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 55px); background: var(--bg); z-index: 5000; padding: 20px; overflow-y: auto; }
        .balance-card { background: linear-gradient(135deg, #2b3139 0%, #1e2329 100%); padding: 25px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 25px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--panel); border-radius: 12px; margin-bottom: 12px; }

        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 6000; }
        .nav-item { text-align: center; color: var(--text); font-size: 10px; cursor: pointer; flex: 1; padding: 10px; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<div id="trade_screen">
    <header onclick="toggleList()">
        <div class="selector">
            <b id="activePair">TON/USDT</b> <span style="font-size: 10px; color: var(--text);">▼</span>
        </div>
        <div class="price-top" id="topPrice">...</div>
    </header>

    <div id="coinList">
        <div class="coin-item" onclick="selectCoin('TON')"><b>TON</b> <span id="list-TON" style="color:var(--green)">...</span></div>
        <div class="coin-item" onclick="selectCoin('ASTER')"><b>ASTER</b> <span id="list-ASTER" style="color:var(--green)">...</span></div>
    </div>

    <div id="chart_wrap">
        <div id="tv_container"></div>
    </div>

    <div class="main-content">
        <div class="book">
            <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
            <div id="midPrice" style="text-align:center; padding:8px 0; font-weight:bold; font-size:16px; color:var(--green);">...</div>
            <div id="bids" style="color:var(--green);"></div>
        </div>
        <div class="trade-panel">
            <div class="side-btns">
                <button class="side-btn active buy" onclick="setSide('buy', this)">BUY</button>
                <button class="side-btn" onclick="setSide('sell', this)">SELL</button>
            </div>
            <div class="fld"><label>Price (USDT)</label><input type="number" id="iPrice" step="any"></div>
            <div class="fld"><label>Amount</label><input type="number" placeholder="0.0"></div>
            <button class="action-btn" id="mainActionBtn">BUY TON</button>
        </div>
    </div>
</div>

<div id="wallet_screen">
    <h2 style="margin-bottom:20px;">My Assets</h2>
    <div class="balance-card">
        <span style="color:var(--text); font-size:14px;">Total Balance</span>
        <div style="font-size:32px; font-weight:bold; margin:10px 0;">$ <span id="total_val">0.00</span></div>
        <div style="display:flex; gap:10px;">
            <button style="flex:1; padding:12px; border-radius:8px; border:none; background:var(--green); color:black; font-weight:bold;">Deposit</button>
            <button style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); background:none; color:white;">Withdraw</button>
        </div>
    </div>
    <div class="asset-item">
        <div><b>TON</b><br><span style="font-size:12px; color:var(--text);">150.00 TON</span></div>
        <div style="text-align:right;"><b id="val-TON">$0.00</b></div>
    </div>
    <div class="asset-item">
        <div><b>ASTER</b><br><span style="font-size:12px; color:var(--text);">1200.00 ASTR</span></div>
        <div style="text-align:right;"><b id="val-ASTR">$0.00</b></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="switchTab('trade')">📊<br>Trade</div>
    <div class="nav-item" onclick="switchTab('wallet')">💼<br>Wallet</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentCoin = 'TON';
    let prices = { TON: 0, ASTER: 0 };
    let currentSide = 'buy';

    function loadChart(symbol) {
        const tvSymbol = symbol === 'ASTER' ? 'ASTR' : symbol;
        document.getElementById('tv_container').innerHTML = '';
        new TradingView.widget({
            "autosize": true, "symbol": "BINANCE:" + tvSymbol + "USDT",
            "interval": "15", "theme": "dark", "container_id": "tv_container",
            "hide_top_toolbar": true, "hide_legend": true, "locale": "ru"
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        data.forEach(t => {
            if (t.s === 'TONUSDT') prices.TON = parseFloat(t.c);
            if (t.s === 'ASTRUSDT') prices.ASTER = parseFloat(t.c);
        });
        updateUI();
    };

    function updateUI() {
        let p = currentCoin === 'TON' ? prices.TON : prices.ASTER;
        if(!p) return;

        document.getElementById('topPrice').innerText = p.toFixed(4);
        document.getElementById('midPrice').innerText = p.toFixed(4);
        document.getElementById('iPrice').value = p.toFixed(4);
        
        document.getElementById('list-TON').innerText = prices.TON.toFixed(4);
        document.getElementById('list-ASTER').innerText = prices.ASTER.toFixed(4);

        // Расчет баланса
        let tonVal = 150 * prices.TON;
        let astrVal = 1200 * prices.ASTER;
        document.getElementById('val-TON').innerText = '$' + tonVal.toFixed(2);
        document.getElementById('val-ASTR').innerText = '$' + astrVal.toFixed(2);
        document.getElementById('total_val').innerText = (tonVal + astrVal).toLocaleString(undefined, {minimumFractionDigits: 2});

        const getRows = (clr) => {
            let h = '';
            for(let i=0; i<8; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.002)).toFixed(4);
                h += `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*80}%; background:${clr}"></div><span>${rP}</span><span>${(Math.random()*15).toFixed(1)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = getRows('var(--red)');
        document.getElementById('bids').innerHTML = getRows('var(--green)');
    }

    function switchTab(tab) {
        document.getElementById('trade_screen').style.display = tab === 'trade' ? 'flex' : 'none';
        document.getElementById('wallet_screen').style.display = tab === 'wallet' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach((el, i) => {
            el.classList.toggle('active', (tab === 'trade' && i === 0) || (tab === 'wallet' && i === 1));
        });
    }

    function selectCoin(id) {
        currentCoin = id;
        document.getElementById('activePair').innerText = id + '/USDT';
        document.getElementById('mainActionBtn').innerText = currentSide.toUpperCase() + ' ' + id;
        document.getElementById('coinList').style.display = 'none';
        loadChart(id);
    }

    function setSide(side, btn) {
        currentSide = side;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active', 'buy', 'sell'));
        btn.classList.add('active', side);
        const actionBtn = document.getElementById('mainActionBtn');
        actionBtn.innerText = side.toUpperCase() + ' ' + currentCoin;
        actionBtn.style.background = side === 'buy' ? 'var(--green)' : 'var(--red)';
        actionBtn.style.color = side === 'buy' ? 'black' : 'white';
    }

    function toggleList() {
        const el = document.getElementById('coinList');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    window.onload = () => { loadChart('TON'); setInterval(updateUI, 1000); };
</script>
</body>
</html>
