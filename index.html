<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #071326;
  color: white;
}

/* Контейнер как приложение */
.app {
  max-width: 420px;
  margin: auto;
}

/* Header */
.header {
  text-align: center;
  padding: 15px;
  background: linear-gradient(180deg, #0c1f3a, #071326);
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin: 3px 0 0;
  font-size: 13px;
  color: #aaa;
}

/* Chart */
.chart {
  height: 220px;
  background: black;
}

/* ORDERBOOK */
.orderbook {
  height: 300px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-top: 1px solid #111;
  border-bottom: 1px solid #111;
}

/* ОДИН скролл */
.orderbook-inner {
  flex: 1;
  overflow-y: auto;
}

/* Общие строки */
.row {
  display: flex;
  justify-content: space-between;
  padding: 2px 8px;
  font-size: 13px;
  position: relative;
}

/* Красные */
.sell {
  color: #ff4d4d;
}

.sell::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: var(--size);
  background: rgba(255, 0, 0, 0.2);
}

/* Зелёные */
.buy {
  color: #00ff9c;
}

.buy::before {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: var(--size);
  background: rgba(0, 255, 156, 0.2);
}

/* Цена по центру */
.price-center {
  text-align: center;
  padding: 6px;
  font-weight: bold;
  background: #0c1f3a;
}

/* Buttons */
.buttons {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.buy-btn {
  background: green;
}

.sell-btn {
  background: red;
}

/* Bottom nav */
.nav {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #0c1f3a;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>💎 SYN TERMINAL</h1>
  <p>AI Trading System</p>
</div>

<div class="chart" id="chart"></div>

<div class="orderbook">
  <div class="orderbook-inner" id="orderbook"></div>
</div>

<div class="buttons">
  <button class="buy-btn">BUY</button>
  <button class="sell-btn">SELL</button>
</div>

<div class="nav">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  "container_id": "chart",
  "width": "100%",
  "height": 220,
  "symbol": "BINANCE:TONUSDT",
  "interval": "5",
  "theme": "dark",
  "style": "1",
  "hide_top_toolbar": true,
  "hide_legend": true
});
</script>

<script>
const orderbook = document.getElementById("orderbook");

function generateOrders() {
  orderbook.innerHTML = "";

  let base = 1.288;

  // SELL (красные)
  for (let i = 0; i < 15; i++) {
    let price = (base + i * 0.001).toFixed(3);
    let volume = Math.floor(Math.random() * 60000);

    let row = document.createElement("div");
    row.className = "row sell";
    row.style.setProperty('--size', volume / 600 + "%");

    row.innerHTML = `<span>${price}</span><span>${volume}</span>`;
    orderbook.appendChild(row);
  }

  // Цена
  let center = document.createElement("div");
  center.className = "price-center";
  center.innerText = base.toFixed(3);
  orderbook.appendChild(center);

  // BUY (зелёные)
  for (let i = 0; i < 15; i++) {
    let price = (base - i * 0.001).toFixed(3);
    let volume = Math.floor(Math.random() * 60000);

    let row = document.createElement("div");
    row.className = "row buy";
    row.style.setProperty('--size', volume / 600 + "%");

    row.innerHTML = `<span>${price}</span><span>${volume}</span>`;
    orderbook.appendChild(row);
  }
}

setInterval(generateOrders, 2000);
generateOrders();
</script>

</body>
</html>
