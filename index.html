<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX DEBUG V4.5</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; }
        #log-screen { background: #000; color: #00ff95; font-family: monospace; font-size: 11px; padding: 15px; height: 120px; overflow-y: scroll; border-bottom: 2px solid #1a1f26; }
        .btn-connect { background: #f0b90b; color: black; border: none; padding: 15px; width: 90%; margin: 20px 5%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        header { padding: 15px; background: #0d1117; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="log-screen">/ Инициализация лога...</div>

<header>
    <div style="font-weight: bold; color: #f0b90b;">STRATEX PRO</div>
    <div id="ton-connect-button"></div>
</header>

<div style="padding: 20px; text-align: center;">
    <p style="color: #848e9c; font-size: 14px;">Статус системы:</p>
    <h2 id="status-display">ОЖИДАНИЕ</h2>
    <button class="btn-connect" onclick="startConnect()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    const logger = document.getElementById('log-screen');
    function addLog(text) {
        logger.innerHTML += `<br>> ${text}`;
        logger.scrollTop = logger.scrollHeight;
    }

    // 1. Инициализация
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // 2. Следим за подключением
    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            addLog("УСПЕХ: Кошелек подключен!");
            document.getElementById('status-display').innerText = "ПОДКЛЮЧЕНО ✅";
            document.getElementById('status-display').style.color = "#00ff95";
        } else {
            addLog("Статус: Кошелек не найден.");
            document.getElementById('status-display').innerText = "НЕ ПОДКЛЮЧЕН ❌";
        }
    });

    async function startConnect() {
        addLog("Запуск меню выбора...");
        try {
            await tonConnectUI.openModal();
        } catch (e) {
            addLog("ОШИБКА МОДАЛКИ: " + e.message);
        }
    }

    // 3. САМОПРОВЕРКА (Самое важное!)
    window.onload = async () => {
        addLog("Проверка манифеста по адресу: https://rgey52bb.github.io/tonconnect-manifest.json");
        try {
            const response = await fetch('https://rgey52bb.github.io/tonconnect-manifest.json');
            if (response.ok) {
                const data = await response.json();
                addLog("МАНИФЕСТ НАЙДЕН! Имя приложения: " + data.name);
                if (data.url !== "https://rgey52bb.github.io") {
                    addLog("ВНИМАНИЕ: URL в манифесте не совпадает с сайтом!");
                }
            } else {
                addLog("ОШИБКА 404: Файл манифеста не найден на GitHub!");
            }
        } catch (e) {
            addLog("ОШИБКА ЧТЕНИЯ: " + e.message);
        }
    };
</script>
</body>
</html>
