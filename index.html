<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Шапка с ценой */
        header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .pair { font-weight: bold; font-size: 16px; }
        .price-up { color: var(--green); font-weight: bold; font-family: monospace; }

        /* Зона графика (сжатая) */
        .chart-min { height: 180px; background: #0b0e11; border-bottom: 1px solid var(--border); position: relative; }
        .chart-placeholder { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: var(--text); }

        /* ГЛАВНЫЙ БЛОК: Стакан слева, Форма справа (как на скрине 2) */
        .trade-container { display: flex; flex: 1; overflow: hidden; border-bottom: 1px solid var(--border); }

        /* СТАКАН (Левая колонка) */
        .order-book { flex: 1; display: flex; flex-direction: column; padding: 8px; border-right: 1px solid var(--border); font-family: monospace; }
        .ob-header { display: flex; justify-content: space-between; font-size: 9px; color: var(--text); margin-bottom: 4px; }
        .ob-list { flex: 1; display: flex; flex-direction: column; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; }

        /* ТОРГОВЛЯ (Правая колонка) */
        .trade-form { flex: 1; padding: 12px 8px; display: flex; flex-direction: column; gap: 8px; }
        .side-selector { display: flex; background: var(--input); border-radius: 4px; padding: 2px; margin-bottom: 4px; }
        .side-btn { flex: 1; border: none; padding: 6px; border-radius: 3px; font-size: 11px; font-weight: bold; color: var(--text); background: transparent; }
        .side-btn.buy { background: var(--green); color: white; }

        .input-item { background: var(--input); border-radius: 4px; padding: 6px 8px; }
        .input-item label { display: block; font-size: 8px; color: var(--text); text-transform: uppercase; }
        .input-item input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; outline: none; font-weight: bold; }

        .exec-button { background: var(--green); border: none; color: white; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-top: auto; }

        /* НИЖНЕЕ МЕНЮ */
        nav { height: 60px; display: flex; justify-content: space-around; align-items: center; background: var(--panel); border-top: 1px solid var(--border); }
        .nav-tab { text-align: center; color: var(--text); font-size: 10px; text-decoration: none; }
        .nav-tab.active { color: white; }
    </style>
</head>
<body>

<header>
    <div class="pair">TON/USDT</div>
    <div class="price-up">1.3145 ↑</div>
</header>

<div class="chart-min">
    <canvas id="miniChart" style="width: 100%; height: 100%;"></canvas>
    <div class="chart-placeholder">1H Chart</div>
</div>

<div class="trade-container">
    <div class="order-book">
        <div class="ob-header"><span>Цена</span><span>Кол-во</span></div>
        <div id="asks" style="color: var(--red); display: flex; flex-direction: column-reverse;"></div>
        <div style="padding: 10px 0; text-align: center; font-weight: bold; font-size: 14px;">1.3145</div>
        <div id="bids" style="color: var(--green);"></div>
    </div>

    <div class="trade-form">
        <div class="side-selector">
            <button class="side-btn buy">Купить</button>
            <button class="side-btn">Продать</button>
        </div>
        
        <div class="input-item">
            <label>Цена</label>
            <input type="number" value="1.3145">
        </div>
        
        <div class="input-item">
            <label>Количество</label>
            <input type="number" placeholder="0.0">
        </div>

        <div style="font-size: 10px; color: var(--text); display: flex; justify-content: space-between; margin-top: 5px;">
            <span>Доступно:</span>
            <span style="color: white;">0.00 TON</span>
        </div>

        <button class="exec-button">Купить TON</button>
    </div>
</div>

<nav>
    <a href="#" class="nav-tab active">📊<br>Рынок</a>
    <a href="#" class="nav-tab">💼<br>Активы</a>
    <a href="#" class="nav-tab">📜<br>Сделки</a>
</nav>

<script>
    // Простейшая анимация стакана
    function updateBook() {
        const row = (p, a) => `<div class="ob-row"><span>${p.toFixed(4)}</span><span>${a.toFixed(1)}</span></div>`;
        let ah = '', bh = '';
        for(let i=0; i<6; i++) {
            ah += row(1.315 + i*0.001, Math.random()*15);
            bh += row(1.314 - i*0.001, Math.random()*15);
        }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }

    // Рисуем простую линию графика на фоне
    const ctx = document.getElementById('miniChart').getContext('2d');
    function draw() {
        ctx.strokeStyle = '#2b3139';
        ctx.beginPath();
        ctx.moveTo(0, 100);
        for(let i=0; i<400; i+=10) ctx.lineTo(i, 80 + Math.random()*40);
        ctx.stroke();
    }
    
    updateBook();
    draw();
    setInterval(updateBook, 1500);
</script>

</body>
</html>
