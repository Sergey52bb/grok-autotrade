<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 800; }
        #main_content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .balance-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--panel); border-radius: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); }
        .nav-item.active { color: var(--green); }
        #ton-connect-btn { display: flex; justify-content: center; margin-top: 15px; min-height: 44px; }
    </style>
</head>
<body>

<header>💎 SYN TERMINAL</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 5px;">ACCOUNT BALANCE</div>
            <h1 style="font-size: 34px; margin: 0;">0.00 TON</h1>
            <div id="usd_rate" style="color: var(--green); font-weight: bold;">$0.00</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="doDeposit()">⬇ Deposit</button>
            <button class="btn btn-green" onclick="showTab('profile')">⬆ Send</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 15px; opacity: 0.7;">AI MARKET PULSE</h4>
        <div id="market_list">Загрузка цен...</div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">АВТОРИЗАЦИЯ</h4>
        <div style="background: var(--panel); padding: 20px; border-radius: 20px; margin-top: 15px; border: 1px solid var(--border); text-align: center;">
            <p style="font-size: 12px; color: var(--text); margin-bottom: 15px;">Войдите через TON для доступа к торгам</p>
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>🔄</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>👤</span>Profile</div>
</nav>

<script>
    // Сообщаем Телеграму, что приложение готово
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на весь экран

    const MY_ADDR = "ТВОЙ_АДРЕС_КОШЕЛЬКА"; // Вставь свой реальный адрес

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'market') updatePrices();
    }

    function doDeposit() {
        const addr = tonConnectUI.account ? tonConnectUI.account.address : MY_ADDR;
        tg.showAlert("UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb:\n\n" + addr);
    }

    async function updatePrices() {
        const list = document.getElementById('market_list');
        const coins = [{ n: 'TON/USDT', b: 'TONUSDT' }, { n: 'BNB/USDT', b: 'BNBUSDT' }, { n: 'BTC/USDT', b: 'BTCUSDT' }];
        let resHtml = '';
        for (let c of coins) {
            let price = "0.00";
            try {
                const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${c.b}`);
                const d = await r.json();
                price = parseFloat(d.price).toFixed(2);
                if(c.n === 'TON/USDT') document.getElementById('usd_rate').innerText = '$' + price;
            } catch(e) { price = "Error"; }
            resHtml += `<div class="coin-row"><b>${c.n}</b><b style="color:var(--green)">$${price}</b></div>`;
        }
        list.innerHTML = resHtml;
    }
    updatePrices();
</script>
</body>
</html>
