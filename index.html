<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
body {
  margin: 0;
  background: #071326;
  font-family: Arial;
  color: white;
}

.app {
  max-width: 420px;
  margin: auto;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
}

.header h1 {
  margin: 0;
}

.header p {
  margin: 5px 0;
  color: #aaa;
}

/* CHART */
.chart {
  height: 220px;
}

/* ORDERBOOK */
.orderbook {
  height: 160px;
  overflow-y: auto;
  border-top: 1px solid #111;
  border-bottom: 1px solid #111;
}

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  padding: 2px 10px;
  font-size: 13px;
  position: relative;
}

/* DEPTH BAR */
.row::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  height: 100%;
  width: var(--depth);
  z-index: 0;
}

/* SELL */
.sell {
  color: #ff4d4d;
}
.sell::before {
  background: rgba(255,0,0,0.2);
}

/* BUY */
.buy {
  color: #00ff9c;
}
.buy::before {
  background: rgba(0,255,156,0.2);
}

/* PRICE CENTER */
.price {
  text-align: center;
  padding: 6px;
  background: #0c1f3a;
  font-weight: bold;
  }

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  padding: 10px;
}

button {
  flex: 1;
  padding: 15px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.buy-btn { background: green; }
.sell-btn { background: red; }

/* NAV */
.nav {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #0c1f3a;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>💎 SYN TERMINAL</h1>
  <p>AI Trading System</p>
</div>

<div id="chart" class="chart"></div>

<div class="orderbook" id="orderbook"></div>

<div class="buttons">
  <button class="buy-btn">BUY</button>
  <button class="sell-btn">SELL</button>
</div>

<div class="nav">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({
  container_id: "chart",
  width: "100%",
  height: 220,
  symbol: "BINANCE:TONUSDT",
  interval: "5",
  theme: "dark",
  style: "1",
  hide_top_toolbar: true,
  hide_legend: true
});
</script>

<script>
const el = document.getElementById("orderbook");

function updateBook() {
  el.innerHTML = "";

  let mid = 1.288;

  // SELL
  for (let i = 15; i > 0; i--) {
    let price = (mid + i * 0.001).toFixed(3);
    let vol = Math.random() * 60000;

    let row = document.createElement("div");
    row.className = "row sell";
    row.style.setProperty("--depth", (vol / 600) + "%");
    row.innerHTML = `<span>${price}</span><span>${Math.floor(vol)}</span>`;
    el.appendChild(row);
  }

  // MID PRICE
  let midRow = document.createElement("div");
  midRow.className = "price";
  midRow.innerText = mid.toFixed(3);
  el.appendChild(midRow);

  // BUY
  for (let i = 1; i <= 15; i++) {
    let price = (mid - i * 0.001).toFixed(3);
    let vol = Math.random() * 60000;

    let row = document.createElement("div");
    row.className = "row buy";
    row.style.setProperty("--depth", (vol / 600) + "%");
    row.innerHTML = `<span>${price}</span><span>${Math.floor(vol)}</span>`;
    el.appendChild(row);
  }
}

setInterval(updateBook, 2000);
updateBook();
</script>

</body>
</html>
