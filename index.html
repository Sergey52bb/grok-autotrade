<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v11.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #050b14; 
            --panel: rgba(18, 26, 38, 0.95); 
            --blue: #3897ff; 
            --green: #00ff95; 
            --red: #ff4a4a;
            --border: rgba(255,255,255,0.08); 
        }
        
        body { 
            background: #050b14;
            background-image: radial-gradient(circle at 50% -20%, #1a3a5a 0%, #050b14 70%);
            color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 20px 15px 5px; text-align: center; }
        header .title { font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        header .subtitle { font-size: 10px; color: var(--blue); letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 120px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* Компактный баланс */
        .total-balance-card { text-align: center; padding: 20px 0 30px; }
        .total-balance-card h1 { font-size: 46px; margin: 5px 0; font-weight: 900; letter-spacing: -1px; }
        .address-badge { font-size: 11px; color: var(--blue); background: rgba(56, 151, 255, 0.1); padding: 6px 14px; border-radius: 20px; display: inline-block; font-family: monospace; }

        /* Список активов */
        .card { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(15px); }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .asset-item:last-child { border: none; }
        .asset-icon { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.03); }
        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: 800; font-size: 16px; display: flex; align-items: center; }
        .asset-price { font-size: 12px; opacity: 0.5; margin-top: 3px; }
        .asset-balance { text-align: right; }
        .bal-amount { font-weight: 700; font-size: 16px; }
        .bal-value { font-size: 12px; opacity: 0.5; margin-top: 3px; }

        /* Навигация */
        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: var(--panel); display: flex; border-radius: 25px; border: 1px solid var(--border); backdrop-filter: blur(20px); z-index: 1000; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .nav-item span { font-size: 28px; }
        .nav-item.active { opacity: 1; transform: translateY(-3px); }

        /* Модальные окна */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; align-items: flex-end; }
        .modal-content { background: #0d141d; width: 100%; border-radius: 35px 35px 0 0; padding: 30px 20px 50px; border-top: 1px solid var(--border); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; color: white; margin-bottom: 12px; outline: none; font-size: 16px; }
        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="title">💎 SYN TERMINAL</div>
    <div class="subtitle">AI TRADING SYSTEM</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="total-balance-card">
            <div style="font-size: 11px; opacity: 0.5; letter-spacing: 1px;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" class="address-badge">Not Connected</div>
        </div>

        <div class="card">
            <div class="asset-item" onclick="openAction('TON')">
                <div class="asset-icon" style="color:#0088cc;">💎</div>
                <div class="asset-details">
                    <div class="asset-name">TON</div>
                    <div class="asset-price">$7.42 <span style="color:var(--green); margin-left:5px;">+2.4%</span></div>
                </div>
                <div class="asset-balance">
                    <div class="bal-amount" id="bal_ton">0.00</div>
                    <div class="bal-value">$0.00</div>
                </div>
            </div>
            <div class="asset-item" onclick="openAction('BTC')">
                <div class="asset-icon" style="color:#f7931a;">🟠</div>
                <div class="asset-details">
                    <div class="asset-name">Bitcoin</div>
                    <div class="asset-price">$69,420 <span style="color:var(--red); margin-left:5px;">-0.5%</span></div>
                </div>
                <div class="asset-balance"><div class="bal-amount">0.00</div><div class="bal-value">$0.00</div></div>
            </div>
            <div class="asset-item" onclick="openAction('USDT')">
                <div class="asset-icon" style="color:#26a17b;">💵</div>
                <div class="asset-details">
                    <div class="asset-name">Tether</div>
                    <div class="asset-price">$1.00 <span style="color:var(--green); margin-left:5px;">+0.01%</span></div>
                </div>
                <div class="asset-balance"><div class="bal-amount">0.00</div><div class="bal-value">$0.00</div></div>
            </div>
        </div>
    </div>
    
    </div>

<div id="action_modal" class="modal" onclick="closeModal('action')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="action_title" style="margin-top:0; text-align:center;">Asset Action</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
            <button class="btn-confirm" style="background:#fff;" onclick="closeModal('action'); openModal('deposit')">RECEIVE</button>
            <button class="btn-confirm" style="background:var(--blue); color:white;" onclick="closeModal('action'); openModal('send')">SEND</button>
        </div>
    </div>
</div>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" style="border-radius: 35px 35px 35px 35px; margin: 20px;">
        <h3>Receive <span id="dep_asset_name">TON</span></h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0; background:#fff; padding:15px; border-radius:15px;"></div>
        <p id="full_addr" style="font-size:11px; word-break:break-all; opacity:0.5; font-family:monospace;">Please connect wallet</p>
        <button class="btn-confirm" onclick="copyAddr()">Copy Address</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" style="border-radius: 35px 35px 35px 35px; margin: 20px;">
        <h3>Send <span id="send_asset_name">TON</span></h3>
        <input type="text" placeholder="Recipient Address">
        <input type="text" placeholder="Memo (Required for CEX)">
        <input type="number" placeholder="Amount">
        <button class="btn-confirm">Confirm Transfer</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span></div>
    <div class="nav-item"><span>🌀</span></div>
    <div class="nav-item"><span>🔗</span></div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let currentAsset = 'TON';

    function openAction(asset) {
        currentAsset = asset;
        document.getElementById('action_title').innerText = asset + " Wallet";
        document.getElementById('dep_asset_name').innerText = asset;
        document.getElementById('send_asset_name').innerText = asset;
        document.getElementById('action_modal').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    
    // Функция навигации (упрощенная для примера)
    function showTab(id, el) {
        tg.HapticFeedback.selectionChanged();
    }

    // Инициализация TonConnect и цен (как в прошлых версиях)
    // ...
</script>
</body>
</html>
