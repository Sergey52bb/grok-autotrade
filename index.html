<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok AutoTrade</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1e3a, #02040a);
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
}

.row {
  display: flex;
  justify-content: space-between;
}

button {
  width: 48%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

.buy { background: #2ecc71; color: #000; }
.sell { background: #e74c3c; color: #000; }

.disabled {
  opacity: 0.4;
  pointer-events: none;
}

.blue { background: #3b82f6; }
.red { background: #ef4444; }

.log {
  max-height: 150px;
  overflow-y: auto;
  font-size: 14px;
  opacity: 0.9;
}
</style>
</head>

<body>
<div class="container">

<h2 style="text-align:center;">Grok AutoTrade</h2>

<div class="card">
  <div class="row"><span>Pair</span><span>USDT / TON</span></div>
  <div class="row"><span>Status</span><span>Active</span></div>
</div>

<div class="card">
  <div class="row"><span>Balance</span><span id="balance">0.00 USDT</span></div>
  <div class="row"><span>Position</span><span id="position">No position</span></div>
</div>

<div class="row">
  <button id="buyBtn" class="buy" onclick="buy()">BUY</button>
  <button id="sellBtn" class="sell disabled" onclick="sell()">SELL</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="row">
  <button class="blue" onclick="connectWallet()">Connect Wallet</button>
  <button class="red" onclick="disconnectWallet()">Disconnect</button>
</div>

<p id="walletStatus" style="text-align:center; opacity:0.8;">
Wallet not connected
</p>

<div class="card log" id="log"></div>

</div>

<script>
let walletConnected = false;
let position = null;

const positionEl = document.getElementById("position");
const buyBtn = document.getElementById("buyBtn");
const sellBtn = document.getElementById("sellBtn");
const logEl = document.getElementById("log");
const walletStatus = document.getElementById("walletStatus");

function log(text) {
  const time = new Date().toLocaleTimeString();
  logEl.innerHTML = `<div>${time} — ${text}</div>` + logEl.innerHTML;
}

function updateUI() {
  if (position === "LONG") {
    positionEl.textContent = "LONG";
    buyBtn.classList.add("disabled");
    sellBtn.classList.remove("disabled");
  } else {
    positionEl.textContent = "No position";
    buyBtn.classList.remove("disabled");
    sellBtn.classList.add("disabled");
  }
}

function buy() {
  if (!walletConnected || position) return;
  position = "LONG";
  log("BUY executed (simulation)");
  updateUI();
}

function sell() {
  if (!walletConnected || !position) return;
  position = null;
  log("SELL executed (simulation)");
  updateUI();
}

function connectWallet() {
  walletConnected = true;
  walletStatus.textContent = "Wallet connected (simulation)";
  log("Wallet connected");
}

function disconnectWallet() {
  walletConnected = false;
  position = null;
  walletStatus.textContent = "Wallet not connected";
  log("Wallet disconnected");
  updateUI();
}

// chart
const ctx = document.getElementById("chart");
new Chart(ctx, {
  type: "line",
  data: {
    labels: ["00:00","01:00","02:00","03:00","04:00"],
    datasets: [{
      label: "USDT / TON",
      data: [1.0,1.2,1.5,1.4,1.3],
      borderColor: "#5dade2",
      tension: 0.4
    }]
  },
  options: { plugins:{legend:{display:true}} }
});

updateUI();
</script>

</body>
</html>
