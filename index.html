<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grok AutoTrade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1220, #050812);
      color: #fff;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: #0e1625;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .price {
      font-size: 36px;
      font-weight: bold;
    }

    .pair {
      opacity: 0.7;
      margin-top: 4px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .buy {
      background: #22c55e;
      color: #000;
    }

    .sell {
      background: #ef4444;
      color: #000;
    }

    .trade-panel {
      margin-top: 16px;
      padding: 16px;
      background: #0e1625;
      border-radius: 14px;
    }

    .trade-panel input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 12px;
    }

    .calc-line {
      display: flex;
      justify-content: space-between;
      color: #9aa4b2;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .wallet {
      margin-top: 16px;
      text-align: center;
    }

    .connect {
      background: #3b82f6;
      color: #fff;
      width: 100%;
      margin-top: 10px;
    }

    .balance {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- PRICE CARD -->
    <div class="card">
      <div class="price">1.248 USDT</div>
      <div class="pair">USDT / TON</div>

      <div class="buttons">
        <button class="buy" id="buyBtn" disabled>BUY</button>
        <button class="sell">SELL</button>
      </div>
    </div>

    <!-- TRADE PANEL -->
    <div class="trade-panel">
      <label>Amount (TON)</label>
      <input
        type="number"
        id="amountInput"
        placeholder="0.0"
        step="0.01"
        min="0"
      />

      <div class="calc-line">
        <span>Commission (0.25%)</span>
        <span id="commissionValue">0.0000 TON</span>
      </div>

      <div class="calc-line">
        <span>You will receive</span>
        <span id="receiveValue">0.0000 TON</span>
      </div>
    </div>

    <!-- WALLET -->
    <div class="card wallet">
      <button class="connect">Connect Wallet</button>
      <div class="balance">Balance: <span id="tonBalance">0.0000</span> TON</div>
    </div>

  </div>

  <script>
    const amountInput = document.getElementById("amountInput");
    const commissionValue = document.getElementById("commissionValue");
    const receiveValue = document.getElementById("receiveValue");
    const buyBtn = document.getElementById("buyBtn");
    const tonBalanceEl = document.getElementById("tonBalance");

    const COMMISSION_RATE = 0.0025;

    // ⚠️ тут потом подставим реальный баланс из кошелька
    let tonBalance = 0.0;
    tonBalanceEl.textContent = tonBalance.toFixed(4);

    amountInput.addEventListener("input", () => {
      const amount = parseFloat(amountInput.value);

      if (!amount || amount <= 0) {
        commissionValue.textContent = "0.0000 TON";
        receiveValue.textContent = "0.0000 TON";
        buyBtn.disabled = true;
        return;
      }

      if (amount > tonBalance) {
        receiveValue.textContent = "Not enough balance";
        buyBtn.disabled = true;
        return;
      }

      const commission = amount * COMMISSION_RATE;
      const receive = amount - commission;

      commissionValue.textContent = commission.toFixed(4) + " TON";
      receiveValue.textContent = receive.toFixed(4) + " TON";
      buyBtn.disabled = false;
    });
  </script>
</body>
</html>
