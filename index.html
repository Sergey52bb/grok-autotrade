<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TON Demo Trade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0b1220;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    .container {
      padding: 16px;
      max-width: 420px;
      margin: auto;
    }
    .card {
      background: linear-gradient(180deg, #121c2f, #0d1526);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .btn-row {
      display: flex;
      gap: 12px;
    }
    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      color: #fff;
    }
    .buy { background: #2ecc71; color:#000; }
    .sell { background: #7a2e2e; }
    .connect { background: #3b82f6; }
    .disconnect { background: #ef4444; }
    .center { text-align: center; opacity: 0.8; }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <div class="row">
      <div>Pair</div>
      <div>USDT / TON</div>
    </div>
    <div class="row">
      <div>Status</div>
      <div>Active</div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>Balance</div>
      <div id="balance">0.00 USDT</div>
    </div>
    <div class="row">
      <div>Position</div>
      <div id="position">No position</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>

  <div class="card"></div>

  <div class="btn-row">
    <button class="connect" onclick="connectWallet()">Connect Wallet</button>
    <button class="disconnect" onclick="disconnectWallet()">Disconnect</button>
  </div>

  <div class="card">
    <div class="row">
      <div>Price</div>
      <div id="price">—</div>
    </div>
  </div>

  <div class="center" id="walletStatus">Wallet not connected</div>

</div>

<script>
  https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd
</script>

</body>
  </html>
