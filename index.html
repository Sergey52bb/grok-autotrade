<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grok AutoTrade</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --gold: #f0b90b; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Верхняя панель */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--panel); border-bottom: 1px solid #222; }
        .pair { font-weight: bold; font-size: 16px; }

        /* Торговый блок (как на твоих скринах) */
        .trade-section { display: flex; padding: 8px; gap: 8px; flex-shrink: 0; }
        .order-form { flex: 1.2; }
        .order-book { flex: 0.8; font-size: 11px; }

        /* Buy/Sell переключатель */
        .tabs { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        .tab { flex: 1; border: none; padding: 8px; color: white; font-weight: bold; cursor: pointer; opacity: 0.5; }
        .tab.buy { background: var(--green); }
        .tab.sell { background: var(--red); }
        .tab.active { opacity: 1; }

        /* Поля ввода */
        .input-box { background: var(--input); border-radius: 4px; padding: 6px 10px; margin-bottom: 6px; }
        .label { font-size: 10px; color: var(--text); }
        .row { display: flex; justify-content: space-between; align-items: center; }
        input { background: transparent; border: none; color: white; font-size: 16px; width: 80%; outline: none; }

        /* Проценты */
        .pct-row { display: flex; justify-content: space-between; margin: 10px 0; }
        .pct { font-size: 10px; color: var(--text); cursor: pointer; border-bottom: 1px solid #333; padding-bottom: 2px; }

        .btn-main { width: 100%; border: none; padding: 12px; border-radius: 4px; color: white; font-weight: bold; font-size: 14px; margin-top: 5px; }
        .btn-main.buy { background: var(--green); }
        .btn-main.sell { background: var(--red); }

        /* Стакан */
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 16px; margin-bottom: 1px; align-items: center; }
        .ob-bg { position: absolute; right: 0; height: 100%; opacity: 0.15; z-index: 0; }
        .ob-row span { z-index: 1; }

        /* СЕКЦИЯ ГРАФИКА — теперь она заполнит всё свободное место */
        .chart-container { flex-grow: 1; min-height: 250px; border-top: 2px solid #000; background: #131722; }
        #tv_chart { width: 100%; height: 100%; }

        .footer { display: flex; background: var(--panel); padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text); }
    </style>
</head>
<body>

<div class="header">
    <div class="pair">TON/USDT <span style="color:var(--red); font-size:12px;">-2.41%</span></div>
    <div id="ton-connect"></div>
</div>

<div class="trade-section">
    <div class="order-form">
        <div class="tabs">
            <button id="t-buy" class="tab buy active" onclick="setMode('buy')">Buy</button>
            <button id="t-sell" class="tab sell" onclick="setMode('sell')">Sell</button>
        </div>
        <div class="input-box">
            <span class="label">Price</span>
            <div class="row"><input type="number" id="p" value="1.32"><span>USDT</span></div>
        </div>
        <div class="input-box">
            <span class="label">Amount</span>
            <div class="row"><input type="number" id="a" placeholder="0"><span>TON</span></div>
        </div>
        <div class="pct-row">
            <span class="pct">25%</span><span class="pct">50%</span><span class="pct">75%</span><span class="pct">100%</span>
        </div>
        <button id="main-btn" class="btn-main buy">Buy TON</button>
    </div>

    <div class="order-book">
        <div id="asks"></div>
        <div style="font-weight:bold; font-size:14px; margin: 4px 0;">1.32 <small style="color:var(--text);">$</small></div>
        <div id="bids"></div>
    </div>
</div>

<div class="chart-container">
    <div id="tv_chart"></div>
</div>

<div class="footer">
    <div class="nav-item" style="color:white;">📊 Trade</div>
    <div class="nav-item">🏦 Assets</div>
    <div class="nav-item">🕒 Orders</div>
</div>

<script>
    // Инициализация TON Connect
    const tonUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect'
    });

    // Функция отрисовки графика TradingView
    function initChart() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:TONUSDT",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tv_chart",
            "hide_top_toolbar": true,
            "backgroundColor": "#131722",
            "save_image": false
        });
    }

    function setMode(m) {
        document.getElementById('t-buy').classList.toggle('active', m==='buy');
        document.getElementById('t-sell').classList.toggle('active', m==='sell');
        const b = document.getElementById('main-btn');
        b.className = 'btn-main ' + m;
        b.innerText = (m==='buy' ? 'Buy' : 'Sell') + ' TON';
    }

    // Симуляция стакана
    function renderOB() {
        const a = document.getElementById('asks');
        const b = document.getElementById('bids');
        a.innerHTML = ''; b.innerHTML = '';
        for(let i=0; i<5; i++) {
            let v = (Math.random()*90).toFixed(1);
            a.innerHTML += `<div class="ob-row" style="color:var(--red)"><div class="ob-bg" style="width:${v}%; background:var(--red)"></div><span>1.32${i}</span><span>${v}</span></div>`;
            let v2 = (Math.random()*90).toFixed(1);
            b.innerHTML += `<div class="ob-row" style="color:var(--green)"><div class="ob-bg" style="width:${v2}%; background:var(--green)"></div><span>1.31${i}</span><span>${v2}</span></div>`;
        }
    }

    window.onload = () => {
        initChart();
        renderOB();
        setInterval(renderOB, 3000);
    };
</script>
</body>
</html>
