<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Terminal - TON Spot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #161a1e; --text: #eaecef; --primary: #02c076; --secondary: #f84960; --input: #2b3139; --border: #474d57; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 10px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { color: var(--primary); font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; }

        .main-layout { display: grid; grid-template-columns: 1fr 280px 320px; flex-grow: 1; gap: 1px; background: var(--border); overflow: hidden; }
        .panel { background: var(--card); display: flex; flex-direction: column; position: relative; }

        /* График TradingView */
        #tradingview_widget { flex-grow: 1; width: 100%; }

        /* Стакан ордеров */
        .order-book { padding: 10px; font-family: 'Roboto Mono', monospace; font-size: 11px; border-right: 1px solid var(--border); }
        .ob-header { display: flex; justify-content: space-between; color: #848e9c; padding-bottom: 10px; }
        .ob-row { display: flex; justify-content: space-between; padding: 1px 0; }
        .sell-side { color: var(--secondary); }
        .buy-side { color: var(--primary); }
        .mid-price { font-size: 18px; font-weight: 700; margin: 15px 0; text-align: center; color: white; }

        /* Панель торговли */
        .trade-panel { padding: 20px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: 600; background: var(--input); transition: 0.2s; }
        .tab.active-buy { background: var(--primary); color: white; }
        .tab.active-sell { background: var(--secondary); color: white; }
        
        .trade-input { background: var(--input); border-radius: 4px; padding: 12px; margin-bottom: 15px; }
        .trade-input label { font-size: 12px; color: #848e9c; display: block; margin-bottom: 5px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; font-weight: 600; }

        .action-btn { width: 100%; padding: 14px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-buy { background: var(--primary); color: white; }
        .btn-sell { background: var(--secondary); color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>EDGEX</span> <span style="color:white; font-size: 14px; font-weight: 400;">TON / USDT</span></div>
    <div id="ton-connect-button"></div>
</header>

<div class="main-layout">
    <div class="panel">
        <div id="tradingview_widget"></div>
    </div>

    <div class="panel order-book">
        <div class="ob-header"><span>Price(USDT)</span><span>Amount(TON)</span></div>
        <div id="asks"></div>
        <div class="mid-price" id="current-price">0.00</div>
        <div id="bids"></div>
    </div>

    <div class="panel trade-panel">
        <div class="tabs">
            <div class="tab active-buy" id="tab-buy" onclick="setMode('buy')">Buy</div>
            <div class="tab" id="tab-sell" onclick="setMode('sell')">Sell</div>
        </div>
        
        <div class="trade-input">
            <label>Price</label>
            <div class="input-row"><input type="number" id="price-input" readonly><span>USDT</span></div>
        </div>

        <div class="trade-input">
            <label>Amount</label>
            <div class="input-row"><input type="number" placeholder="0.00"><span>TON</span></div>
        </div>

        <button class="action-btn btn-buy" id="main-btn">Buy TON</button>
        <div style="margin-top: 15px; font-size: 12px; color: #848e9c; display: flex; justify-content: space-between;">
            <span>Avail.</span><span>0.00 TON</span>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. Инициализация графика
    new TradingView.widget({
        "autosize": true,
        "symbol": "OKX:TONUSDT",
        "interval": "30",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "save_image": false,
        "container_id": "tradingview_widget"
    });

    // 2. Кошелек
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // 3. Логика стакана и цен
    let price = 5.35;
    function updateData() {
        fetch('https://api.ston.fi/v1/assets').then(r => r.json()).then(data => {
            const ton = data.assets.find(a => a.symbol === 'TON');
            if(ton) {
                price = parseFloat(ton.dex_usd_price);
                document.getElementById('current-price').innerText = price.toFixed(3);
                document.getElementById('price-input').value = price.toFixed(3);
                fillOB();
            }
        });
    }

    function fillOB() {
        const a = document.getElementById('asks'); const b = document.getElementById('bids');
        a.innerHTML = ''; b.innerHTML = '';
        for(let i=0; i<10; i++) {
            a.innerHTML = `<div class="ob-row sell-side"><span>${(price + i*0.001).toFixed(3)}</span><span>${(Math.random()*50).toFixed(2)}</span></div>` + a.innerHTML;
            b.innerHTML += `<div class="ob-row buy-side"><span>${(price - i*0.001).toFixed(3)}</span><span>${(Math.random()*50).toFixed(2)}</span></div>`;
        }
    }

    function setMode(mode) {
        const b = document.getElementById('main-btn');
        const tB = document.getElementById('tab-buy'); const tS = document.getElementById('tab-sell');
        if(mode === 'buy') {
            b.innerText = 'Buy TON'; b.className = 'action-btn btn-buy';
            tB.className = 'tab active-buy'; tS.className = 'tab';
        } else {
            b.innerText = 'Sell TON'; b.className = 'action-btn btn-sell';
            tB.className = 'tab'; tS.className = 'tab active-sell';
        }
    }

    updateData(); setInterval(updateData, 10000);
</script>
</body>
</html>
