<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V2.1 | Ultra Fix</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --green: #0ecb81; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .log { background: #000; color: #00ff95; font-family: monospace; font-size: 10px; padding: 10px; height: 80px; overflow-y: auto; border-bottom: 1px solid #333; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b2f36; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; max-width: 300px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 15px rgba(240, 185, 11, 0.2); }
        #status-box { font-size: 20px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="log" id="sys-log">/ System Recovery: Protocol 2.1...</div>

<header>
    <div style="font-weight: 900; color: var(--gold); font-size: 22px;">STRATEX</div>
    <div id="ton-connect-button"></div>
</header>

<div class="main">
    <div id="status-box">СТАТУС: <span style="color: #ff465d;">OFFLINE</span></div>
    <div style="color: #848e9c; font-size: 14px;">Манифест внедрен напрямую (No Fetch Mode)</div>
    
    <button class="btn-main" onclick="connect()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    const logEl = document.getElementById('sys-log');
    function print(m) { logEl.innerHTML += `<br>> ${m}`; logEl.scrollTop = logEl.scrollHeight; }

    // СОЗДАЕМ МАНИФЕСТ НА ЛЕТУ (Base64)
    // Это обходит ошибку "Failed to fetch", так как файл не качается из сети
    const manifestJson = {
        "url": "https://rgey52bb.github.io",
        "name": "STRATEX PRO",
        "iconUrl": "https://rgey52bb.github.io/icon.png"
    };
    const manifestDataUrl = "data:application/json;base64," + btoa(JSON.stringify(manifestJson));

    print("Инициализация Ultra-Fix...");
    
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifestDataUrl,
        buttonRootId: 'ton-connect-button'
    });

    async function connect() {
        print("Запуск окна подключения...");
        try {
            await tonConnectUI.openModal();
            print("Окно открыто. Выберите кошелек.");
        } catch (e) {
            print("ОШИБКА: " + e.message);
        }
    }

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            print("СОЕДИНЕНИЕ УСТАНОВЛЕНО!");
            document.getElementById('status-box').innerHTML = 'СТАТУС: <span style="color: #0ecb81;">ONLINE</span>';
            document.getElementById('status-box').style.color = "#0ecb81";
        } else {
            print("Кошелек не подключен.");
        }
    });

    window.onload = () => {
        print("Система готова. Сетевые блокировки обнулены.");
    };
</script>

</body>
</html>
