<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v5.7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; --card-bg: #1a1e26; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER UPDATED TO SYN TERMINAL */
        header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 18px; letter-spacing: 1px; }
        header .subtitle { font-size: 9px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .asset-card { background: rgba(26, 30, 38, 0.6); backdrop-filter: blur(10px); border-radius: 22px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-green { background: var(--green); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 149, 0.2); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .modal input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; outline: none; }
        
        .swap-input-group { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; }
        .swap-input-group input { background: transparent; border: none; color: #fff; font-size: 18px; font-weight: 700; width: 50%; outline: none; }
        .swap-input-group select { background: var(--card-bg); color: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 8px; font-size: 12px; width: 40%; }

        /* NAV STABLE */
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.5; }
        .nav-item.active { color: var(--green); opacity: 1; }
        
        /* SYN NET WORTH CARD */
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="title">💎 SYN TERMINAL</div>
    <div class="subtitle">AI Trading System</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; letter-spacing: 1px;">NET WORTH</div>
            <h1 id="main_status" style="font-size: 34px; margin: 5px 0; font-weight: 900;">ONLINE</h1>
            <div id="addr_display" style="font-size: 11px; opacity: 0.5; font-family: monospace;">Awaiting Connection...</div>
            <div style="color: var(--green); font-size: 12px; font-weight: 700; font-style: italic; margin-top: 5px;">Trade Smart, Live Large</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;" onclick="openModal('deposit')">📥 DEPOSIT</button>
            <button class="btn-general btn-green" onclick="openModal('send')">📤 SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="opacity: 0.6; font-size: 12px; margin-bottom: 15px;">LIVE MARKET</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <h4 style="text-align: center; margin-bottom: 20px;">⚡ SYN SWAP</h4>
        <div style="background: var(--panel); padding: 20px; border-radius: 25px; border: 1px solid var(--border);">
            <div class="swap-input-group">
                <input type="number" id="swap_from_amount" oninput="calculateSwap()" placeholder="0.00">
                <select id="swap_from_asset" onchange="calculateSwap()"></select>
            </div>
            <div style="text-align: center; margin: -10px 0; position: relative; z-index: 5;">
                <button onclick="reverseSwap()" style="background:var(--green); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer;">⬇️</button>
            </div>
            <div class="swap-input-group" style="border-color: var(--green); margin-top: 5px;">
                <input type="number" id="swap_to_amount" style="color:var(--green);" placeholder="0.00" readonly>
                <select id="swap_to_asset" onchange="calculateSwap()"></select>
            </div>
            <div id="swap_rate_info" style="font-size: 10px; text-align: center; margin-top: 15px; color: var(--text);">Rate: -- | Fee: 1%</div>
            <button class="btn-general btn-green" style="width: 100%; margin-top: 15px; padding: 20px;" onclick="executeSwap()">CONFIRM SWAP</button>
        </div>
    </div>

    <div id="scr_profile" class="screen">
        <div style="background: var(--panel); padding: 30px; border-radius: 25px; border: 1px solid var(--border); text-align: center;">
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Wallet Address</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0;"></div>
        <div style="font-size: 10px; background:#000; padding:12px; border-radius:10px; margin-bottom:15px; color:var(--green); word-break:break-all;" id="full_address">---</div>
        <button id="copy_btn" class="btn-general btn-green" style="width: 100%;" onclick="copyUserAddr()">📋 COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0">Send Assets</h3>
        <input type="text" id="send_to" placeholder="Recipient Address">
        <input type="text" id="send_memo" placeholder="Memo / Tag (Optional)">
        <input type="number" id="send_amount" placeholder="Amount">
        <button class="btn-general btn-green" style="width: 100%; margin-top: 10px;" onclick="tg.showAlert('Sending...')">CONFIRM SEND</button>
    </div>
</div>

<div id="modal_buy" class="modal" onclick="closeModal('buy')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; color:var(--green);">Buy <span id="buy_coin_name">...</span></h3>
        <input type="number" id="buy_amount" oninput="calculateBuyCost()" placeholder="Amount in TON">
        <div id="buy_cost_usd" style="font-size: 12px; opacity: 0.6; margin-bottom: 15px;">Cost: $0.00 USDT</div>
        <button class="btn-general btn-green" style="width: 100%;" onclick="tg.showAlert('Order Placed!')">CONFIRM BUY</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let tonConnectUI;
    let userFullAddr = "";
    let prices = {};

    const assets = [
        { s: 'TON', n: 'TON Network', p: 'TONUSDT', i: 'https://cryptologos.cc/logos/toncoin-ton-logo.png' },
        { s: 'USDT', n: 'Tether', p: 'USDT', i: 'https://cryptologos.cc/logos/tether-usdt-logo.png' },
        { s: 'BTC', n: 'Bitcoin', p: 'BTCUSDT', i: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
        { s: 'ETH', n: 'Ethereum', p: 'ETHUSDT', i: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
        { s: 'NEAR', n: 'Near Protocol', p: 'NEARUSDT', i: 'https://cryptologos.cc/logos/near-protocol-near-logo.png' }
    ];

    async function init() {
        const fromS = document.getElementById('swap_from_asset');
        const toS = document.getElementById('swap_to_asset');
        assets.forEach(a => {
            fromS.innerHTML += `<option value="${a.s}">${a.s}</option>`;
            toS.innerHTML += `<option value="${a.s}">${a.s}</option>`;
        });
        toS.value = "USDT";

        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                userFullAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = userFullAddr.substring(0,8) + "...";
                updateQR(userFullAddr);
            }
        });
        updatePrices();
    }

    async function updatePrices() {
        try {
            const symbols = assets.filter(a => a.p !== 'USDT').map(a => `"${a.p}"`).join(',');
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=[${symbols}]`);
            const data = await res.json();
            
            data.forEach(item => {
                const asset = assets.find(a => a.p === item.symbol);
                if(asset) prices[asset.s] = parseFloat(item.price);
            });
            prices['USDT'] = 1.0;
            renderMarket();
        } catch(e) {}
    }

    function renderMarket() {
        const list = document.getElementById('market_list');
        list.innerHTML = assets.filter(a => a.s !== 'USDT').map(a => `
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${a.i}" style="width:35px; height:35px;">
                    <div><b>${a.s}</b><br><small style="opacity:0.5;">${a.n}</small></div>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:900;">$${prices[a.s] ? prices[a.s].toFixed(2) : '...'}</div>
                    <button class="btn-green" style="padding:6px 12px; font-size:10px; border-radius:8px; border:none; margin-top:5px;" onclick="openBuy('${a.s}')">BUY</button>
                </div>
            </div>
        `).join('');
    }

    function calculateSwap() {
        const amount = document.getElementById('swap_from_amount').value;
        const fromAsset = document.getElementById('swap_from_asset').value;
        const toAsset = document.getElementById('swap_to_asset').value;
        const toInput = document.getElementById('swap_to_amount');
        const info = document.getElementById('swap_rate_info');
        if (!amount || amount <= 0 || !prices[fromAsset] || !prices[toAsset]) { toInput.value = ""; return; }
        const rate = prices[fromAsset] / prices[toAsset];
        const result = amount * rate * 0.99;
        toInput.value = result.toFixed(2);
        info.innerText = `Rate: 1 ${fromAsset} ≈ ${rate.toFixed(4)} ${toAsset} | Fee: 1%`;
    }

    function reverseSwap() {
        const f = document.getElementById('swap_from_asset');
        const t = document.getElementById('swap_to_asset');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        calculateSwap();
    }

    function calculateBuyCost() {
        const val = document.getElementById('buy_amount').value;
        const display = document.getElementById('buy_cost_usd');
        if(!val || val <= 0) { display.innerText = "Cost: $0.00 USDT"; return; }
        const total = val * (prices['TON'] || 7.3);
        display.innerText = `Cost: $${total.toFixed(2)} USDT`;
    }

    function openBuy(s) {
        document.getElementById('buy_coin_name').innerText = s;
        document.getElementById('modal_buy').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function updateQR(t) {
        const c = document.getElementById("qrcode"); c.innerHTML = "";
        new QRCode(c, { text: t, width: 150, height: 150 });
        document.getElementById('full_address').innerText = t;
    }

    function openModal(t) { document.getElementById('modal_'+t).style.display = 'flex'; }
    function closeModal(t) { document.getElementById('modal_'+t).style.display = 'none'; }
    function copyUserAddr() { navigator.clipboard.writeText(userFullAddr); tg.showAlert("Copied!"); }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    function executeSwap() {
        if(!document.getElementById('swap_from_amount').value) return;
        tg.showAlert("Swap successfully executed!");
    }

    window.addEventListener('load', () => setTimeout(init, 500));
    setInterval(updatePrices, 30000);
</script>
</body>
</html>
