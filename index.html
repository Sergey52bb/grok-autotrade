<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #081221;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0d1b2a;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header p {
      margin: 5px 0 0;
      color: #aaa;
    }

    #chart {
      height: 300px;
    }

    /* ===== ORDER BOOK ===== */

    .orderbook {
      margin: 15px;
      background: #0d1b2a;
      padding: 10px;
      border-radius: 10px;
    }

    .orderbook-title {
      margin-bottom: 10px;
      font-size: 14px;
    }

    .order {
      position: relative;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 6px;
      margin: 2px 0;
      overflow: hidden;
      border-radius: 4px;
    }

    /* ГЛУБИНА (ПОЛОСЫ) */
    .order::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: var(--depth);
      opacity: 0.2;
    }

    .sell::before {
      background: red;
    }

    .buy::before {
      background: lime;
    }

    .sell {
      color: #ff4d4d;
    }

    .buy {
      color: #00c853;
    }

    .price {
      text-align: center;
      margin: 8px 0;
      font-weight: bold;
    }

    /* ===== BUTTONS ===== */

    .buttons {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    .btn {
      width: 45%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
    }

    .buy-btn {
      background: green;
    }

    .sell-btn {
      background: red;
    }

    /* ===== MENU ===== */

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #0d1b2a;
      padding: 10px 0;
    }

    .menu div {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>💎 SYN TERMINAL</h1>
  <p>AI Trading System</p>
</header>

<div id="chart"></div>

<!-- СТАКАН -->
<div class="orderbook">
  <div class="orderbook-title">Order Book</div>

  <!-- SELL -->
  <div class="order sell" style="--depth: 80%;">
    <span>1.308</span><span>320</span>
  </div>

  <div class="order sell" style="--depth: 60%;">
    <span>1.307</span><span>210</span>
  </div>

  <div class="order sell" style="--depth: 40%;">
    <span>1.306</span><span>150</span>
  </div>

  <!-- CURRENT PRICE -->
  <div class="price">1.307</div>

  <!-- BUY -->
  <div class="order buy" style="--depth: 70%;">
    <span>1.306</span><span>280</span>
  </div>

  <div class="order buy" style="--depth: 50%;">
    <span>1.305</span><span>190</span>
  </div>

  <div class="order buy" style="--depth: 30%;">
    <span>1.304</span><span>120</span>
  </div>

</div>

<!-- КНОПКИ -->
<div class="buttons">
  <button class="btn buy-btn">BUY</button>
  <button class="btn sell-btn">SELL</button>
</div>

<!-- МЕНЮ -->
<div class="menu">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
  new TradingView.widget({
    width: "100%",
    height: 300,
    symbol: "BINANCE:TONUSDT",
    interval: "5",
    theme: "dark",
    style: "1",
    container_id: "chart"
  });
</script>

</body>
</html>
