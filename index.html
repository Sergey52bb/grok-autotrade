<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Trading</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #181818;
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .green {
            background-color: green;
            border: none;
            color: white;
        }
        .red {
            background-color: red;
            border: none;
            color: white;
        }
        .blue {
            background-color: blue;
            border: none;
            color: white;
        }
        .status {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Crypto Trading</h1>
    <div class="container">
        <div>Pair: USDT / TON</div>
        <div>Status: Active</div>
        <div id="balance">Balance: 0.00 USDT</div>
        <div id="position">Position: No position</div>
        <div id="price">Price: -</div>

        <button class="green" id="buyBtn">BUY</button>
        <button class="red" id="sellBtn">SELL</button>

        <div class="status" id="walletStatus">Wallet not connected</div>
        <button class="blue" id="connectBtn">Connect Wallet</button>
        <button class="red" id="disconnectBtn">Disconnect</button>
    </div>

    <script>
        /* ===== STATE ===== */
let walletConnected = true; // кошелек НЕ трогаем
let balanceUSDT = 1000;
let position = null;
let entryPrice = 0;
let currentPrice = 1.21;
const COMMISSION_RATE = 0.0025; // 0.25%

/* ===== UI ===== */
const priceEl = document.getElementById("price");
const posEl = document.getElementById("position");
const balanceEl = document.getElementById("balance");
const logEl = document.getElementById("log");

/* ===== PRICE SIMULATION ===== */
setInterval(() => {
  const delta = (Math.random() - 0.5) * 0.02;
  currentPrice = +(currentPrice + delta).toFixed(4);
  priceEl.innerText = currentPrice + " USDT";
}, 1500);

/* ===== BUY ===== */
function buy() {
  if (!walletConnected) return alert("Wallet not connected");
  if (position) return alert("Position already open");

  const tradeSize = 100;
  const fee = tradeSize * COMMISSION_RATE;

  if (balanceUSDT < tradeSize + fee)
    return alert("Insufficient balance");

  balanceUSDT -= tradeSize + fee;
  entryPrice = currentPrice;
  position = "LONG";

  log(`BUY @ ${entryPrice} | Fee: ${fee.toFixed(2)} USDT`);
  updateUI();
}

/* ===== SELL ===== */
function sell() {
  if (!position) return alert("No open position");

  const tradeSize = 100;
  const pnl = (currentPrice - entryPrice) * tradeSize;
  const fee = tradeSize * COMMISSION_RATE;

  balanceUSDT += tradeSize + pnl - fee;
  log(`SELL @ ${currentPrice} | PnL: ${pnl.toFixed(2)} | Fee: ${fee.toFixed(2)}`);

  position = null;
  entryPrice = 0;
  updateUI();
}

/* ===== UI UPDATE ===== */
function updateUI() {
  balanceEl.innerText = balanceUSDT.toFixed(2) + " USDT";
  posEl.innerText = position ? `LONG @ ${entryPrice}` : "NO POSITION";
}

/* ===== LOG ===== */
function log(text) {
  const p = document.createElement("div");
  p.innerText = text;
  logEl.prepend(p);
}

updateUI();
    </script>
</body>
</html>
