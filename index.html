<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROK TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c2127; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand { color: #f0b90b; font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .status-box { background: #2b3139; padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid #444; }
        #balance { font-size: 22px; color: #0ecb81; font-weight: bold; margin: 10px 0; }
        .address { font-size: 10px; color: #848e9c; word-break: break-all; }
        #ton-connect-button { display: flex; justify-content: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">GROK AUTOTRADE</div>
    <div id="ton-connect-button"></div>
    
    <div class="status-box" id="infoBox" style="display:none;">
        <div style="font-size: 12px; color: #848e9c;">ВАШ БАЛАНС:</div>
        <div id="balance">Загрузка...</div>
        <div class="address" id="userAddress"></div>
    </div>
</div>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // Функция получения баланса через публичное API
    async function fetchBalance(address) {
        try {
            const response = await fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${address}`);
            const data = await response.json();
            if (data.ok) {
                // Переводим из нанотонов в TON
                const result = (parseFloat(data.result) / 1000000000).toFixed(4);
                document.getElementById('balance').innerText = result + " TON";
            }
        } catch (e) {
            document.getElementById('balance').innerText = "Ошибка сети";
        }
    }

    tonConnectUI.onStatusChange(wallet => {
        const infoBox = document.getElementById('infoBox');
        if (wallet) {
            infoBox.style.display = 'block';
            document.getElementById('userAddress').innerText = wallet.account.address;
            fetchBalance(wallet.account.address);
            
            // Обновляем баланс каждые 30 секунд
            setInterval(() => fetchBalance(wallet.account.address), 30000);
        } else {
            infoBox.style.display = 'none';
        }
    });
</script>
</body>
</html>
