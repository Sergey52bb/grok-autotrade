<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b121e;
    --card: #151c28;
    --border: #222c3a;
    --text: #fff;
    --dim: #8e96a3;
    --green: #00ff9c;
    --red: #ff4d4d;
}

/* BASE */
body {
    margin: 0;
    background: var(--bg);
    font-family: Arial;
    color: var(--text);
}

/* HEADER */
.header {
    padding: 16px;
    text-align: center;
    font-weight: bold;
}
.sub {
    font-size: 12px;
    color: var(--dim);
}

/* LAYOUT */
.container {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 10px;
}

/* CARD */
.card {
    background: var(--card);
    border-radius: 14px;
    padding: 12px;
    border: 1px solid var(--border);
}

/* SWAP BLOCK */
.swap-title {
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 8px;
}

.input-block {
    background: #0f1622;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
}

.token {
    font-weight: bold;
}

.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    background: var(--green);
    color: black;
}

/* ORDERBOOK */
.orderbook {
    height: 300px;
    overflow: hidden;
}

.ob-scroll {
    height: 100%;
    overflow-y: auto;
}

/* ROW */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 3px 6px;
    font-size: 11px;
}

.fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    opacity: 0.2;
}

/* COLORS */
.sell span:first-child { color: var(--red); }
.buy span:first-child { color: var(--green); }

/* PRICE CENTER */
.price {
    text-align: center;
    padding: 6px;
    font-weight: bold;
}

/* BOTTOM */
.bottom {
    height: 60px;
    background: #0f1622;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid var(--border);
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span class="sub">AI Trading System</span>
</div>

<div class="container">

<!-- SWAP -->
<div class="card">
<div class="swap-title">Swap</div>

<div class="input-block">
<span class="token">TON</span>
<span>25</span>
</div>

<div class="input-block">
<span class="token">USDT</span>
<span>133.2</span>
</div>

<div style="font-size:11px; color:var(--dim); margin-bottom:8px;">
Fee: 0.25%
</div>

<button class="btn">Swap</button>
</div>

<!-- ORDERBOOK -->
<div class="card orderbook">
<div class="ob-scroll" id="orderbook"></div>
</div>

</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
const ob = document.getElementById('orderbook');

function renderOB() {
    ob.innerHTML = '';
    let base = 5.30;

    // SELL
    for (let i = 0; i < 15; i++) {
        let p = base + i * 0.01;
        let a = Math.random() * 300;
        let d = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row sell';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = d + '%';
        fill.style.background = 'red';

        row.innerHTML = `<span>${p.toFixed(2)}</span><span>${a.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }

    let price = document.createElement('div');
    price.className = 'price';
    price.innerText = base.toFixed(2);
    ob.appendChild(price);

    // BUY
    for (let i = 0; i < 15; i++) {
        let p = base - i * 0.01;
        let a = Math.random() * 300;
        let d = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row buy';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = d + '%';
        fill.style.background = '#00ff9c';

        row.innerHTML = `<span>${p.toFixed(2)}</span><span>${a.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }
}

renderOB();
setInterval(renderOB, 2000);
</script>

</body>
</html>
