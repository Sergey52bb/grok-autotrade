<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal V3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #0d1117; --border: #1a1f26;
            --primary: #00ff95; --secondary: #ff3b57; --gold: #f0b90b; 
            --text-dim: #707a8a; --text-main: #e6e8ea;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .logo { font-weight: 800; color: var(--gold); font-size: 14px; letter-spacing: 1px; }

        /* Вкладки */
        .view { display: none; flex-direction: column; height: calc(100vh - 125px); overflow-y: auto; }
        .view.active { display: flex; }

        /* Market */
        .chart-section { height: 35vh; background: #000; border-bottom: 2px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }
        .market-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; flex-grow: 1; background: var(--border); gap: 1px; }
        .panel { background: var(--card); padding: 12px; }

        /* Order Book */
        .ob-row { display: flex; justify-content: space-between; position: relative; height: 18px; align-items: center; font-family: 'Roboto Mono'; font-size: 11px; }
        .depth-bar { position: absolute; right: 0; top: 0; height: 100%; z-index: 0; opacity: 0.32; }
        .price-up { color: var(--primary); font-weight: 700; }
        .price-down { color: var(--secondary); font-weight: 700; }

        /* Nav */
        nav { background: var(--card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-item { font-size: 10px; color: var(--text-dim); text-align: center; cursor: pointer; flex: 1; opacity: 0.6; transition: 0.2s; }
        .nav-item.active { color: var(--gold); opacity: 1; }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        .btn-main { background: var(--primary); color: #05070a; border: none; padding: 14px; width: 100%; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">STRATEX <span>AUTO</span></div>
    <div id="ton-connect-button"></div>
</header>

<div id="view-market" class="view active">
    <div class="chart-section"><div id="tv_container"></div></div>
    <div class="market-grid">
        <div class="panel">
            <div style="font-size: 12px; color: var(--gold); font-weight: 700;">TRADE</div>
            <button class="btn-main" onclick="connectAndPay()">TEST CONNECTION</button>
            <p id="status-log" style="font-size: 9px; color: var(--text-dim); margin-top: 10px;"></p>
        </div>
        <div class="panel">
            <div id="asks-box"></div>
            <div style="text-align:center; padding: 4px; color: var(--primary); font-weight: 800; border: 1px solid var(--border); margin: 3px 0;">5.3502</div>
            <div id="bids-box"></div>
        </div>
    </div>
</div>

<div id="view-bot" class="view">
    <div style="padding: 20px;">
        <h3>Robot Configuration</h3>
        <div style="background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 12px;">
            <p style="color: var(--text-dim);">Выберите стратегию и подключите кошелек для старта.</p>
        </div>
    </div>
</div>

<div id="view-assets" class="view">
    <div style="padding: 40px; text-align: center;">
        <h2 id="wallet-status">Ожидание кошелька</h2>
        <div id="wallet-details" style="font-family: 'Roboto Mono'; font-size: 10px; background: #161b22; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); display: none;"></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="switchView('market')"><span class="nav-icon">📊</span>Market</div>
    <div class="nav-item" onclick="switchView('bot')"><span class="nav-icon">🤖</span>Bot</div>
    <div class="nav-item" onclick="switchView('assets')"><span class="nav-icon">🏦</span>Assets</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. ИНИЦИАЛИЗАЦИЯ
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json', // УБЕДИСЬ ЧТО ОН ТАМ ЕСТЬ
        buttonRootId: 'ton-connect-button'
    });

    // 2. СЛУШАТЕЛЬ СТАТУСА
    tonConnectUI.onStatusChange(wallet => {
        const statusText = document.getElementById('wallet-status');
        const details = document.getElementById('wallet-details');
        const log = document.getElementById('status-log');

        if (wallet) {
            statusText.innerHTML = "Подключено ✅";
            details.style.display = "block";
            details.innerText = "Address: " + wallet.account.address;
            log.innerText = "Wallet Connected Successfully";
            console.log("Wallet info:", wallet);
        } else {
            statusText.innerHTML = "Не подключено ❌";
            details.style.display = "none";
            log.innerText = "Waiting for connection...";
        }
    });

    // 3. ФУНКЦИЯ ПРОВЕРКИ
    async function connectAndPay() {
        if (!tonConnectUI.connected) {
            alert("Пожалуйста, нажмите на кнопку 'Connect Wallet' вверху экрана.");
            tonConnectUI.openModal();
            return;
        }
        alert("Кошелек уже подключен! Проверь вкладку Assets.");
    }

    // 4. ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
    function switchView(name) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('view-' + name).classList.add('active');
        event.currentTarget.classList.add('active');
        if(name === 'market') initChart();
    }

    function initChart() {
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15",
            "theme": "dark", "container_id": "tv_container",
            "hide_top_toolbar": true, "backgroundColor": "#05070a"
        });
    }

    function drawOB() {
        const asks = document.getElementById('asks-box');
        const bids = document.getElementById('bids-box');
        if(!asks) return;
        asks.innerHTML = ''; bids.innerHTML = '';
        for(let i=0; i<6; i++) {
            let aV = Math.random()*100;
            asks.innerHTML = `<div class="ob-row"><span class="price-down">5.3${51+i}</span><span>${aV.toFixed(1)}</span><div class="depth-bar" style="width:${aV}%; background:var(--secondary);"></div></div>` + asks.innerHTML;
            let bV = Math.random()*100;
            bids.innerHTML += `<div class="ob-row"><span class="price-up">5.3${49-i}</span><span>${bV.toFixed(1)}</span><div class="depth-bar" style="width:${bV}%; background:var(--primary);"></div></div>`;
        }
    }

    window.onload = () => { initChart(); drawOB(); setInterval(drawOB, 2500); };
</script>
</body>
</html>
