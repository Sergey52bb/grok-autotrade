<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX V2.2</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c1f24; padding: 25px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 300px; }
        .btn { background: #0098ea; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: #0098ea;">STRATEX</h2>
    <div id="status">Статус: Ожидание...</div>
    
    <div id="ton-button" style="margin: 20px 0;"></div>

    <button class="btn" onclick="connect()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    // Добавляем ?v=1, чтобы кошелек принудительно прочитал новый файл
    const manifestPath = 'https://rgey52bb.github.io/tonconnect-manifest.json?v=1';

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifestPath,
        buttonRootId: 'ton-button'
    });

    async function connect() {
        try {
            await tonConnectUI.openModal();
        } catch (e) {
            console.error(e);
            alert("Ошибка: " + e.message);
        }
    }

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            document.getElementById('status').innerText = "АКТИВЕН: " + wallet.account.address.substring(0, 8) + "...";
            document.getElementById('status').style.color = "#0ecb81";
        }
    });
</script>

</body>
</html>
