<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v15.1</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --border: rgba(255,255,255,0.08); }
        
        * { box-sizing: border-box; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px; text-align: center; flex-shrink: 0; }
        .logo-svg { width: 140px; height: auto; }
        .subtitle { font-size: 11px; color: var(--blue); letter-spacing: 2px; font-weight: 800; margin-top: 5px; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 120px; } 
        .screen { display: none; }
        .screen.active { display: block; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 25px; margin-bottom: 15px; }
        
        /* Стили списка активов */
        .asset-item { display: flex; align-items: center; padding: 15px; border: 1px solid rgba(77, 184, 255, 0.2); border-radius: 20px; margin-bottom: 10px; background: rgba(77, 184, 255, 0.03); }
        .asset-icon-box { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .asset-icon-img { width: 100%; height: 100%; }
        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: bold; font-size: 16px; }
        .asset-price { font-size: 12px; color: var(--green); opacity: 0.8; }
        
        /* Стили Свапа */
        input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 15px; color: white; font-size: 18px; outline: none; margin-bottom: 10px; }
        .swap-selector { display: flex; align-items: center; gap: 10px; background: #1a222c; padding: 12px; border-radius: 15px; cursor: pointer; border: 1px solid var(--border); }
        .swap-selector img { width: 24px; height: 24px; border-radius: 50%; }
        #rev_btn { width: 40px; height: 40px; background: var(--panel); border: 1px solid var(--blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -25px auto 10px; position: relative; z-index: 2; cursor: pointer; }

        /* Навигация */
        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: var(--panel); display: flex; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 24px; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); font-size: 30px; }

        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 15px; width: 100%; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Анимация стикера */
        .rotating { animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Модалки */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .modal-body { background: var(--panel); width: 100%; border-radius: 30px 30px 0 0; padding: 30px 20px; }
    </style>
</head>
<body>

<header>
    <svg class="logo-svg" viewBox="0 0 668 237" fill="none"><path d="M118.204 0.000194514C183.486 0.000194514 236.408 52.9223 236.408 118.204C236.408 183.487 183.486 236.408 118.204 236.408C52.9216 236.408 0.000184007 183.486 0 118.204C0 52.9224 52.9215 0.000354089 118.204 0.000194514ZM74.1011 62.1964C57.6799 62.1964 47.268 79.9119 55.5308 94.2346L109.964 188.582C113.619 194.922 122.781 194.922 126.436 188.582L180.88 94.2346C189.132 79.9342 178.72 62.1965 162.31 62.1964H74.1011ZM162.288 78.8411C166.031 78.8411 168.234 82.812 166.45 85.9074L137.856 137.091L137.851 137.099L126.506 159.046V78.8411H162.288ZM109.872 78.8516V159.024L98.5376 137.087L98.5334 137.08L69.9294 85.9214L69.8468 85.7724C68.2134 82.6996 70.405 78.8516 74.0899 78.8516H109.872" fill="#4DB8FF"/><path d="M639.524 146.751V62.9139H668V188.849H636.565L573.696 99.0752V188.849H545.034V62.9139H581.277L639.524 146.751Z" fill="white"/><path d="M456.407 191.686C414.432 191.686 384.107 163.081 384.107 126.74C384.107 90.3983 414.432 61.7931 456.407 61.7931C498.382 61.7931 528.707 90.5782 528.707 126.74C528.707 162.901 498.382 191.686 456.407 191.686ZM456.407 167.219C481 167.219 497.272 149.408 497.272 126.74C497.272 104.071 481 86.2605 456.407 86.2605C431.814 86.2605 415.542 104.071 415.542 126.74C415.542 149.408 431.814 167.219 456.407 167.219Z" fill="white"/><path d="M384.269 63.5978V85.7264H342.11V189.533H312.339V85.7264H270.179V63.5978H384.269Z" fill="white"/></svg>
    <div class="subtitle">👛 SYN WALLET</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div style="text-align:center; padding-bottom: 20px;">
            <div style="font-size: 11px; opacity: 0.5;">ESTIMATED BALANCE</div>
            <h1 id="main_balance" style="font-size:36px; margin:5px 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size:12px; color:var(--blue); background:rgba(77,184,255,0.1); padding:5px 12px; border-radius:15px; display:inline-block;">Disconnected</div>
        </div>
        <div id="asset_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="card">
            <div style="font-size:11px; opacity:0.5; margin-bottom:5px;">PAY</div>
            <input type="number" id="sw_val" placeholder="0.0">
            <div class="swap-selector" onclick="openCoinPicker('from')">
                <img id="sw_from_img" src=""> <span id="sw_from_txt">TON</span>
            </div>
            
            <div id="rev_btn" onclick="swapReverse()">🌀</div>
            
            <div style="font-size:11px; opacity:0.5; margin-bottom:5px;">RECEIVE</div>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <div class="swap-selector" onclick="openCoinPicker('to')">
                <img id="sw_to_img" src=""> <span id="sw_to_txt">USDT</span>
            </div>
            
            <button class="btn-confirm" style="margin-top:20px;" onclick="window.Telegram.WebApp.showAlert('Swap initiated')">Confirm Swap</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="card" style="text-align:center;">
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-bottom:30px;"></div>
            <img src="https://i.ibb.co/JwD2qCDf/WEB3-Design-Works-Nariman-Mammadzada.jpg" class="rotating" style="width:150px; height:150px; border-radius:50%; border:2px solid var(--blue);">
            <p style="margin-top:20px; opacity:0.7;">Secure Web3 Connection</p>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)">📊</div>
    <div class="nav-item" onclick="showTab('swap', this)">🌀</div>
    <div class="nav-item" onclick="showTab('connect', this)">🔏</div>
</nav>

<div id="picker_modal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-body" onclick="event.stopPropagation()">
        <h3 style="text-align:center; margin-bottom:20px;">Select Asset</h3>
        <div id="coin_options_list" style="max-height:300px; overflow-y:auto;"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const assets = [
        { id: 'TON', name: 'TON', cg: 'the-open-network', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png' },
        { id: 'BTC', name: 'Bitcoin', cg: 'bitcoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/bitcoin/info/logo.png' },
        { id: 'USDT', name: 'USDT', cg: 'tether', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
        { id: 'ETH', name: 'Ethereum', cg: 'ethereum', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png' }
    ];

    let swapFrom = "TON", swapTo = "USDT", prices = {};

    function init() {
        renderAssets();
        updatePrices();
        setInterval(updatePrices, 30000);
        
        const tc = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tc.onStatusChange(wallet => {
            if (wallet) {
                const addr = wallet.account.address;
                document.getElementById('addr_display').innerText = addr.substring(0,6) + "..." + addr.substring(addr.length-4);
            }
        });

        document.getElementById('sw_val').addEventListener('input', calculateSwap);
        updateSwapUI();
    }

    function renderAssets() {
        const list = document.getElementById('asset_list');
        list.innerHTML = assets.map(a => `
            <div class="asset-item">
                <div class="asset-icon-box"><img src="${a.img}" class="asset-icon-img"></div>
                <div class="asset-details">
                    <div class="asset-name">${a.id}</div>
                    <div class="asset-price" id="price_${a.id}">$0.00</div>
                </div>
                <div class="bal-amount">0.00</div>
            </div>
        `).join('');
    }

    async function updatePrices() {
        try {
            const ids = assets.map(a => a.cg).join(',');
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
            const data = await res.json();
            assets.forEach(a => {
                if (data[a.cg]) {
                    prices[a.id] = data[a.cg].usd;
                    document.getElementById(`price_${a.id}`).innerText = "$" + prices[a.id].toLocaleString();
                }
            });
            calculateSwap();
        } catch(e) { console.log("Price error"); }
    }

    function showTab(tab, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + tab).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function openCoinPicker(type) {
        const list = document.getElementById('coin_options_list');
        list.innerHTML = assets.map(a => `
            <div style="display:flex; align-items:center; padding:15px; border-bottom:1px solid var(--border);" onclick="selectCoin('${a.id}', '${type}')">
                <img src="${a.img}" style="width:30px; margin-right:15px;"> ${a.id}
            </div>
        `).join('');
        document.getElementById('picker_modal').style.display = 'flex';
    }

    function selectCoin(id, type) {
        if (type === 'from') swapFrom = id; else swapTo = id;
        updateSwapUI();
        document.getElementById('picker_modal').style.display = 'none';
    }

    function updateSwapUI() {
        document.getElementById('sw_from_img').src = assets.find(a => a.id === swapFrom).img;
        document.getElementById('sw_from_txt').innerText = swapFrom;
        document.getElementById('sw_to_img').src = assets.find(a => a.id === swapTo).img;
        document.getElementById('sw_to_txt').innerText = swapTo;
        calculateSwap();
    }

    function calculateSwap() {
        const val = document.getElementById('sw_val').value;
        if (val > 0 && prices[swapFrom] && prices[swapTo]) {
            document.getElementById('sw_res').value = ((val * prices[swapFrom]) / prices[swapTo]).toFixed(6);
        } else {
            document.getElementById('sw_res').value = "0.0";
        }
    }

    function swapReverse() {
        [swapFrom, swapTo] = [swapTo, swapFrom];
        updateSwapUI();
    }

    window.onload = init;
</script>
</body>
</html>
