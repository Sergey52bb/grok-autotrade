<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX LIVE</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: white; font-family: -apple-system, sans-serif; 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden; 
        }

        /* ВЕРХ (40%) */
        .header-section { height: 40%; display: flex; flex-direction: column; border-bottom: 1px solid #222; }
        .coin-bar { display: flex; justify-content: space-between; align-items: center; padding: 4px 12px; height: 35px; background: #121518; }
        .top-main { display: flex; flex: 1; padding: 8px; gap: 8px; overflow: hidden; }
        
        .trade-form { flex: 1.1; display: flex; flex-direction: column; gap: 6px; }
        .order-book { flex: 0.9; background: #121518; border-radius: 4px; padding: 4px; display: flex; flex-direction: column; overflow: hidden; font-family: monospace; font-size: 11px; }
        
        .tabs { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .tab { flex: 1; border: none; padding: 8px; border-radius: 3px; color: var(--text); background: transparent; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .tab.active-buy { background: var(--green); color: white; }
        .tab.active-sell { background: var(--red); color: white; }

        .field { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .field label { font-size: 8px; color: var(--text); display: block; text-transform: uppercase; }
        .field input { background: transparent; border: none; color: white; width: 100%; font-size: 15px; outline: none; }
        
        .exec-btn { width: 100%; border: none; padding: 14px; border-radius: 4px; background: var(--green); color: white; font-weight: bold; margin-top: auto; font-size: 14px; }

        .ob-row { display: flex; justify-content: space-between; height: 14px; position: relative; width: 100%; margin: 1px 0; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.2; transition: width 0.3s; }

        /* ГРАФИК (30%) и RSI (10%) */
        #main-chart { height: 30%; width: 100%; border-bottom: 1px solid #222; }
        #rsi-chart { height: 10%; width: 100%; border-bottom: 1px solid #222; }

        /* НАВИГАЦИЯ (20%) */
        .nav-section { height: 20%; display: flex; flex-direction: column; background: var(--panel); }
        .nav-grid { flex: 1; display: flex; align-items: center; justify-content: space-around; }
        .nav-link { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text); text-decoration: none; font-size: 10px; opacity: 0.7; }
        .nav-link.active { color: white; opacity: 1; font-weight: bold; }
        .nav-link i { font-style: normal; font-size: 22px; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="coin-bar">
        <div style="font-weight:bold;">STRATEX <span style="color:var(--green); font-size:10px;">TON/USDT</span></div>
        <div id="price-tick" style="font-size:12px; font-weight:bold;">1.314</div>
    </div>
    <div class="top-main">
        <div class="trade-form">
            <div class="tabs" id="trade-tabs">
                <button class="tab active-buy" onclick="setMode('buy')">Buy</button>
                <button class="tab" onclick="setMode('sell')">Sell</button>
            </div>
            <div class="field"><label>Price (USDT)</label><input type="number" id="input-price" value="1.314" step="0.001"></div>
            <div class="field"><label>Amount (TON)</label><input type="number" id="input-amt" placeholder="0.0"></div>
            <button class="exec-btn" id="main-btn">Buy TON</button>
        </div>
        <div class="order-book">
            <div id="asks" style="display:flex; flex-direction:column-reverse; flex:1"></div>
            <div id="mid-price" style="text-align:center; color:var(--green); font-weight:bold; padding:4px; font-size:13px; border-y: 1px solid #222;">1.314</div>
            <div id="bids" style="flex:1"></div>
        </div>
    </div>
</div>

<div id="main-chart"></div>
<div id="rsi-chart"></div>

<div class="nav-section">
    <div class="nav-grid">
        <a href="#" class="nav-link active" onclick="nav(this)"><i>📊</i><span>Рынок</span></a>
        <a href="#" class="nav-link" onclick="nav(this)"><i>💼</i><span>Активы</span></a>
        <a href="#" class="nav-link" onclick="nav(this)"><i>📜</i><span>Сделки</span></a>
        <a href="#" class="nav-link" onclick="nav(this)"><i>⚙️</i><span>Настройки</span></a>
    </div>
</div>

<script>
    let currentPrice = 1.314;

    // 1. ОЖИВЛЯЕМ КНОПКИ ТОРГОВЛИ
    function setMode(mode) {
        const btn = document.getElementById('main-btn');
        const tabs = document.querySelectorAll('#trade-tabs .tab');
        tabs.forEach(t => t.classList.remove('active-buy', 'active-sell'));
        
        if(mode === 'buy') {
            tabs[0].classList.add('active-buy');
            btn.style.background = 'var(--green)';
            btn.innerText = 'Buy TON';
        } else {
            tabs[1].classList.add('active-sell');
            btn.style.background = 'var(--red)';
            btn.innerText = 'Sell TON';
        }
    }

    // 2. ОЖИВЛЯЕМ НАВИГАЦИЮ
    function nav(el) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        el.classList.add('active');
    }

    // 3. ЖИВОЙ СТАКАН
    function updateBook() {
        const a = document.getElementById('asks'), b = document.getElementById('bids');
        let ah = '', bh = '';
        for(let i=0; i<8; i++) {
            let askVol = Math.random() * 80;
            let bidVol = Math.random() * 80;
            ah += `<div class="ob-row" style="color:var(--red)"><div class="ob-bar" style="width:${askVol}%; background:var(--red)"></div><span>${(currentPrice + (8-i)*0.001).toFixed(3)}</span><span>${askVol.toFixed(1)}</span></div>`;
            bh += `<div class="ob-row" style="color:var(--green)"><div class="ob-bar" style="width:${bidVol}%; background:var(--green)"></div><span>${(currentPrice - (i+1)*0.001).toFixed(3)}</span><span>${bidVol.toFixed(1)}</span></div>`;
        }
        a.innerHTML = ah; b.innerHTML = bh;
    }

    window.addEventListener('load', () => {
        // ИНИЦИАЛИЗАЦИЯ ГРАФИКОВ
        const chartOptions = {
            layout: { backgroundColor: '#0b0e11', textColor: '#848e9c', fontSize: 10 },
            grid: { vertLines: { visible: false }, horzLines: { color: '#1f2226' } },
            timeScale: { visible: false },
            handleScroll: { mouseWheel: true, pressedMouseMove: true, touchAddPointers: true },
            handleScale: { axisPressedMouseMove: true, pinch: true },
        };

        const mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), chartOptions);
        const candleSeries = mainChart.addCandlestickSeries({ upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false });

        const rsiChart = LightweightCharts.createChart(document.getElementById('rsi-chart'), {
            ...chartOptions,
            timeScale: { visible: true, borderColor: '#333' }
        });
        const rsiSeries = rsiChart.addLineSeries({ color: '#9043ff', lineWidth: 2 });

        // ФЕЙКОВЫЕ ДАННЫЕ
        let data = [];
        let rsiData = [];
        let time = Math.floor(Date.now() / 1000) - 100 * 60;
        for(let i=0; i<100; i++) {
            const val = 1.310 + Math.random() * 0.01;
            const bar = { time: time + i*60, open: val, high: val+0.002, low: val-0.001, close: val+0.001 };
            data.push(bar);
            rsiData.push({ time: time + i*60, value: 30 + Math.random() * 40 });
        }
        candleSeries.setData(data);
        rsiSeries.setData(rsiData);

        // LIVE ОБНОВЛЕНИЕ ЦЕНЫ
        setInterval(() => {
            currentPrice += (Math.random() - 0.5) * 0.002;
            document.getElementById('price-tick').innerText = currentPrice.toFixed(3);
            document.getElementById('mid-price').innerText = currentPrice.toFixed(3);
            document.getElementById('input-price').value = currentPrice.toFixed(3);
            
            const lastBar = data[data.length-1];
            lastBar.close = currentPrice;
            candleSeries.update(lastBar);
            updateBook();
        }, 1000);

        // СИНХРОНИЗАЦИЯ
        mainChart.timeScale().subscribeVisibleTimeRangeChange(range => {
            rsiChart.timeScale().setVisibleRange(range);
        });

        // ПОДСТРОЙКА ПОД ЭКРАН
        window.addEventListener('resize', () => {
            mainChart.resize(window.innerWidth, document.getElementById('main-chart').offsetHeight);
            rsiChart.resize(window.innerWidth, document.getElementById('rsi-chart').offsetHeight);
        });
    });
</script>
</body>
</html>
