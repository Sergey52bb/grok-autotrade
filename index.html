<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1c2127; padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 320px; }
        #status { margin: 20px 0; font-weight: bold; color: #f0b90b; }
        .btn-connect { background: #0098ea; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#f0b90b">STRATEX PRO</h2>
    <div id="status">СИСТЕМА ГОТОВА</div>
    
    <div id="ton-connect-button" style="display:none"></div>
    
    <button class="btn-connect" id="mainButton" onclick="connect()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    // САМЫЙ ВАЖНЫЙ МОМЕНТ:
    // Мы не ищем файл на сервере, а создаем его прямо в памяти браузера (Data URL)
    const myManifest = {
        "url": window.location.origin,
        "name": "STRATEX TERMINAL",
        "iconUrl": "https://ton.org/static/my_dest/apple-touch-icon.png"
    };
    
    const manifestDataUrl = "data:application/json;base64," + btoa(JSON.stringify(myManifest));

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifestDataUrl,
        buttonRootId: 'ton-connect-button'
    });

    async function connect() {
        if (!tonConnectUI.connected) {
            await tonConnectUI.openModal();
        }
    }

    tonConnectUI.onStatusChange(wallet => {
        const status = document.getElementById('status');
        const btn = document.getElementById('mainButton');
        if (wallet) {
            status.innerText = "ONLINE";
            status.style.color = "#0ecb81";
            btn.innerText = "КОШЕЛЕК ПРИВЯЗАН";
            btn.style.background = "#232a31";
        } else {
            status.innerText = "OFFLINE";
            status.style.color = "#f6465d";
        }
    });
</script>

</body>
</html>
