<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b121e;
    --card: #161d2a;
    --text: #fff;
    --dim: #8e96a3;
    --green: #00ff9c;
    --red: #ff4d4d;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: Arial;
    color: var(--text);
}

/* HEADER */
.header {
    padding: 10px;
    font-size: 16px;
    font-weight: bold;
}

/* MAIN GRID */
.main {
    display: grid;
    grid-template-columns: 55% 45%;
    height: calc(100vh - 120px);
}

/* ORDERBOOK */
.orderbook {
    background: #101722;
    overflow-y: auto;
}

/* ROW */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 3px 8px;
    font-size: 11px;
}

.fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    opacity: 0.2;
}

/* COLORS */
.sell span:first-child { color: var(--red); }
.buy span:first-child { color: var(--green); }

/* PRICE */
.price {
    text-align: center;
    padding: 6px;
    background: #121926;
    font-weight: bold;
    position: sticky;
    top: 0;
}

/* TRADE PANEL */
.trade {
    background: var(--card);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.tabs {
    display: flex;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
}

.buy-tab { background: var(--green); }
.sell-tab { background: #333; }

.input {
    background: #0f1622;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
}

.btn-buy {
    background: var(--green);
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn-sell {
    background: var(--red);
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

/* BOTTOM */
.bottom {
    height: 60px;
    background: #121926;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span style="font-size:12px;color:#8e96a3;">TON / USDT</span>
</div>

<div class="main">

<!-- ORDERBOOK -->
<div class="orderbook" id="orderbook"></div>

<!-- TRADE -->
<div class="trade">

<div class="tabs">
<div class="tab buy-tab">BUY</div>
<div class="tab sell-tab">SELL</div>
</div>

<div class="input">Amount: 25 TON</div>
<div class="input">Receive: 133 USDT</div>
<div class="input">Fee: 0.25%</div>

<button class="btn-buy">BUY</button>
<button class="btn-sell">SELL</button>

</div>

</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
const ob = document.getElementById('orderbook');

function generate() {
    ob.innerHTML = '';
    let base = 5.30;

    // SELL
    for (let i = 0; i < 25; i++) {
        let price = base + i * 0.01;
        let amount = Math.random() * 1000;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row sell';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = 'red';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }

    // PRICE
    let price = document.createElement('div');
    price.className = 'price';
    price.innerText = base.toFixed(2);
    ob.appendChild(price);

    // BUY
    for (let i = 0; i < 25; i++) {
        let price = base - i * 0.01;
        let amount = Math.random() * 1000;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row buy';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = '#00ff9c';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        ob.appendChild(row);
    }
}

generate();
setInterval(generate, 2000);
</script>

</body>
</html>
