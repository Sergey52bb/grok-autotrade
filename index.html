<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Pro Terminal</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 1000; }
        .selector { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; background: var(--panel); cursor: pointer; }
        .price-top { color: var(--green); font-weight: bold; font-family: 'Roboto Mono', monospace; font-size: 17px; }

        #coinList { position: absolute; top: 55px; left: 10px; right: 10px; background: var(--panel); z-index: 3000; display: none; border-radius: 8px; border: 1px solid var(--border); }
        .coin-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

        /* График */
        #chart_wrap { height: 300px; width: 100%; position: relative; background: #000; border-bottom: 1px solid var(--border); }
        #tv_container { width: 100%; height: 100%; }
        
        /* ЖИВАЯ МАСКА ШКАЛЫ */
        .price-mask { 
            position: absolute; right: 0; top: 0; bottom: 0; width: 55px; 
            background: #0b0e11; z-index: 100; display: none; flex-direction: column; 
            pointer-events: none; border-left: 1px solid var(--border);
            overflow: hidden;
        }
        .mask-grid {
            position: absolute; width: 100%; display: flex; flex-direction: column;
            transition: top 0.3s ease-out;
        }
        .mask-tick { 
            height: 30px; color: #848e9c; font-size: 10px; display: flex; 
            align-items: center; justify-content: center; width: 100%;
            border-top: 1px solid rgba(43, 47, 54, 0.3); /* Имитация сетки */
        }
        
        .price-label {
            position: absolute; right: 0; width: 55px; background: var(--green);
            color: #000; font-weight: bold; font-size: 11px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            z-index: 110; pointer-events: none; top: 50%; transform: translateY(-50%);
        }
        .price-label::before {
            content: ''; position: absolute; left: -6px; border-top: 9px solid transparent;
            border-bottom: 9px solid transparent; border-right: 6px solid var(--green);
        }

        .main-content { display: flex; flex: 1; overflow: hidden; }
        .book { width: 42%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px; font-family: monospace; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; height: 17px; position: relative; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.12; }

        .trade { width: 58%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 10px; border-radius: 3px; font-size: 12px; font-weight: bold; color: var(--text); background: none; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }

        .fld { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .fld label { display: block; font-size: 9px; color: var(--text); }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }

        .buy-btn { background: var(--green); border: none; color: black; padding: 16px; border-radius: 6px; font-weight: bold; margin-top: auto; }
        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="selector" onclick="toggleList()">
        <b id="activePair">STRAT/USDT</b> <span style="font-size: 10px; color: var(--text);">▼</span>
    </div>
    <div class="price-top" id="topPrice">17.3800</div>
</header>

<div id="coinList">
    <div class="coin-item" onclick="select('STRAT')"><b>STRAT</b> <span style="color:var(--green)">17.3800</span></div>
    <div class="coin-item" onclick="select('TON')"><b>TON</b> <span id="p-TON" style="color:var(--green)">...</span></div>
    <div class="coin-item" onclick="select('ASTER')"><b>ASTER</b> <span id="p-ASTER" style="color:var(--green)">0.7000</span></div>
</div>

<div id="chart_wrap">
    <div id="tv_container"></div>
    <div class="price-mask" id="priceMask"><div class="mask-grid" id="maskGrid"></div></div>
    <div class="price-label" id="priceLabel" style="display:none;">17.38</div>
</div>

<div class="main-content">
    <div class="book">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="midPrice" style="text-align:center; padding:8px 0; font-weight:bold; font-size:16px; color:var(--green); border-top:1px solid #222; border-bottom:1px solid #222; margin:4px 0;">0.0000</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>
    <div class="trade">
        <div class="side-btns">
            <button class="side-btn active buy" id="bBuy" onclick="setSide('buy')">BUY</button>
            <button class="side-btn" id="bSell" onclick="setSide('sell')">SELL</button>
        </div>
        <div class="fld"><label>Price (USDT)</label><input type="number" id="iPrice" step="any"></div>
        <div class="fld"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <button class="buy-btn" id="actionBtn">BUY STRAT</button>
    </div>
</div>

<nav>
    <div style="text-align:center; color:white; font-size:10px;">📊<br>Trade</div>
    <div style="text-align:center; color:var(--text); font-size:10px;">💼<br>Wallet</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let current = 'STRAT';
    let prices = { STRAT: 17.3800, TON: 0, ASTER: 0.7000 };

    function loadChart(symbol) {
        document.getElementById('tv_container').innerHTML = '';
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "15", "theme": "dark",
            "container_id": "tv_container", "hide_top_toolbar": true, "hide_legend": true,
            "style": "1", "locale": "ru", "toolbar_bg": "#0b0e11"
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        data.forEach(t => {
            if (t.s === 'TONUSDT') {
                prices.TON = parseFloat(t.c);
                document.getElementById('p-TON').innerText = prices.TON.toFixed(4);
            }
            if (t.s === 'ASTRUSDT') {
                prices.ASTER = 0.7000 + (parseFloat(t.c) % 0.01);
                document.getElementById('p-ASTER').innerText = prices.ASTER.toFixed(4);
            }
        });
        updateUI();
    };

    function updateUI() {
        if (current === 'STRAT') prices.STRAT = 17.3800 + (Math.sin(Date.now()/2000)*0.01);
        
        let p = prices[current];
        if(!p) return;

        document.getElementById('topPrice').innerText = p.toFixed(4);
        document.getElementById('midPrice').innerText = p.toFixed(4);
        document.getElementById('iPrice').value = p.toFixed(4);

        const mask = document.getElementById('priceMask');
        const label = document.getElementById('priceLabel');
        const grid = document.getElementById('maskGrid');

        if(current !== 'TON') {
            mask.style.display = 'block';
            label.style.display = 'flex';
            label.innerText = p.toFixed(current === 'ASTER' ? 3 : 2);
            
            // Динамическая шкала: цифры плывут за ценой
            let html = '';
            let startP = p * 1.01;
            for(let i=0; i<15; i++) {
                let tickVal = (startP - (i * p * 0.002)).toFixed(current === 'ASTER' ? 3 : 2);
                html += `<div class="mask-tick">${tickVal}</div>`;
            }
            grid.innerHTML = html;
            // Небольшое смещение для эффекта плавности
            grid.style.top = (Math.sin(Date.now()/1000) * 5 - 50) + 'px';
        } else {
            mask.style.display = 'none';
            label.style.display = 'none';
        }

        const getRows = (clr) => {
            let h = '';
            for(let i=0; i<8; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.005)).toFixed(4);
                h += `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*70}%; background:${clr}"></div><span>${rP}</span><span>${(Math.random()*20).toFixed(1)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = getRows('var(--red)');
        document.getElementById('bids').innerHTML = getRows('var(--green)');
    }

    function select(id) {
        current = id;
        document.getElementById('activePair').innerText = id + '/USDT';
        document.getElementById('coinList').style.display = 'none';
        loadChart('BINANCE:TONUSDT'); // Всегда стабильный график
        document.getElementById('actionBtn').innerText = (document.getElementById('bBuy').classList.contains('active') ? 'BUY ' : 'SELL ') + id;
    }

    function setSide(s) {
        document.getElementById('bBuy').className = 'side-btn' + (s==='buy' ? ' active buy' : '');
        document.getElementById('bSell').className = 'side-btn' + (s==='sell' ? ' active sell' : '');
        document.getElementById('actionBtn').style.background = (s==='buy' ? 'var(--green)' : 'var(--red)');
        document.getElementById('actionBtn').innerText = (s==='buy' ? 'BUY ' : 'SELL ') + current;
    }

    function toggleList() {
        let el = document.getElementById('coinList');
        el.style.display = (el.style.display === 'block' ? 'none' : 'block');
    }

    window.onload = () => { select('STRAT'); setInterval(updateUI, 1000); };
</script>
</body>
</html>
