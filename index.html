<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
body {
    margin: 0;
    background: #0b1220;
    font-family: Arial;
    color: white;
}

/* HEADER */
.header {
    padding: 15px;
    background: #0f1a2e;
}
.title {
    font-size: 20px;
    font-weight: bold;
}
.pair {
    color: #888;
    font-size: 14px;
}

/* LAYOUT */
.container {
    display: flex;
    height: calc(100vh - 90px);
}

/* ORDERBOOK */
.orderbook {
    width: 50%;
    display: flex;
    flex-direction: column;
    background: #0d1626;
}

/* ОБЩИЕ СТРОКИ */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 2px 8px;
    font-size: 12px;
    height: 18px;
    overflow: hidden;
}

.fill {
    position: absolute;
    top: 0;
    bottom: 0;
    opacity: 0.2;
}

/* RED (SELL) */
.sell .fill {
    right: 0;
    background: #ff4d4d;
}
.sell .price {
    color: #ff4d4d;
}

/* GREEN (BUY) */
.buy .fill {
    left: 0;
    background: #00c087;
}
.buy .price {
    color: #00c087;
}

/* CENTER PRICE */
.price-center {
    text-align: center;
    padding: 6px;
    font-size: 16px;
    font-weight: bold;
    background: #111b2e;
}

/* SECTIONS */
.asks {
    flex: 1;
    display: flex;
    flex-direction: column-reverse;
}
.bids {
    flex: 1;
}

/* RIGHT PANEL */
.trade {
    width: 50%;
    padding: 10px;
    background: #0f1a2e;
}

.box {
    background: #1a2230;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    margin-top: 5px;
    font-size: 16px;
}

.buy-btn {
    background: #00c087;
}

.sell-btn {
    background: #ff4d4d;
}

/* FIX MOBILE */
@media(max-width: 768px){
    .container {
        flex-direction: column;
    }
    .orderbook, .trade {
        width: 100%;
        height: 50%;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="title">💎 SYN TERMINAL</div>
    <div class="pair">TON / USDT</div>
</div>

<div class="container">

    <!-- ORDER BOOK -->
    <div class="orderbook">

        <!-- SELL -->
        <div class="asks" id="asks"></div>

        <!-- CENTER PRICE -->
        <div class="price-center" id="price">1.288</div>

        <!-- BUY -->
        <div class="bids" id="bids"></div>

    </div>

    <!-- TRADE PANEL -->
    <div class="trade">
        <div class="box">Amount: 25 TON</div>
        <div class="box">Receive: 133 USDT</div>
        <div class="box">Fee: 0.25%</div>

        <button class="btn buy-btn">BUY</button>
        <button class="btn sell-btn">SELL</button>
    </div>

</div>

<script>

// генерация нормального стакана (как у биржи)
function generateOrderBook() {
    const asks = document.getElementById("asks");
    const bids = document.getElementById("bids");

    asks.innerHTML = "";
    bids.innerHTML = "";

    let base = 1.288;

    // SELL (красные)
    for (let i = 0; i < 15; i++) {
        let price = (base + i * 0.001).toFixed(3);
        let vol = Math.floor(Math.random() * 10000);
        let width = Math.random() * 100;

        asks.innerHTML += `
        <div class="row sell">
            <div class="fill" style="width:${width}%"></div>
            <span class="price">${price}</span>
            <span>${vol}</span>
        </div>`;
    }

    // BUY (зеленые)
    for (let i = 0; i < 15; i++) {
        let price = (base - i * 0.001).toFixed(3);
        let vol = Math.floor(Math.random() * 10000);
        let width = Math.random() * 100;

        bids.innerHTML += `
        <div class="row buy">
            <div class="fill" style="width:${width}%"></div>
            <span class="price">${price}</span>
            <span>${vol}</span>
        </div>`;
    }
}

generateOrderBook();

</script>

</body>
</html>
