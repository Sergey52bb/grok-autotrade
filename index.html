<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok AutoTrade V4.9</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; --card-bg: #1a1e26; --blue: #007aff; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; font-size: 18px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Market Cards */
        .market-card { background: var(--card-bg); border-radius: 20px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-icon { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #000; }
        .coin-icon img { width: 100%; height: 100%; }
        .buy-mini-btn { background: var(--green); color: #000; border: none; padding: 8px 18px; border-radius: 12px; font-weight: 800; font-size: 11px; }

        /* General UI */
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 11px; }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }

        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); background: #000; color: #fff; box-sizing: border-box; outline: none; }
        
        #qrcode { background: white; padding: 10px; border-radius: 15px; display: inline-block; margin-bottom: 15px; }
        .addr-text { font-size: 10px; word-break: break-all; background: #000; padding: 12px; border-radius: 10px; margin-bottom: 15px; color: var(--green); border: 1px solid var(--border); }

        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.6; }
        .nav-item.active { color: var(--green); opacity: 1; }
    </style>
</head>
<body>

<header>💎 GROK AUTOTRADE <span style="font-size: 10px; color: var(--green);">V4.9</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 8px;">TOTAL BALANCE</div>
            <h1 id="main_status" style="font-size: 32px; margin: 0; font-weight: 900;">OFFLINE</h1>
            <div id="addr_display" style="font-size: 11px; margin-top: 10px; color: var(--green);">Connect in Settings</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="openModal('deposit')">📥 DEPOSIT</button>
            <button class="btn btn-green" onclick="openModal('send')">📤 SEND</button>
            <button class="btn btn-white" style="grid-column: span 2; margin-top: 5px; background: rgba(255,255,255,0.05); color:#fff;" onclick="showTab('profile')">⚙️ SETTINGS</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 20px; opacity: 0.7; font-size: 12px;">LIVE MARKET</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">CONNECTION</h4>
        <div style="background: var(--panel); padding: 25px; border-radius: 25px; border: 1px solid var(--border); text-align: center;">
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin: 0 0 15px 0; color: #fff;">Deposit TON</h3>
        <div id="qrcode"></div>
        <div class="addr-text" id="full_address">---</div>
        <button id="copy_btn" class="btn btn-green" style="width: 100%;" onclick="copyUserAddr()">📋 COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin: 0 0 15px 0; color: #fff;">Send Assets</h3>
        <input type="text" id="send_to" placeholder="Recipient Address">
        <input type="number" id="send_amount" placeholder="Amount">
        <button class="btn btn-green" style="width: 100%;" onclick="processAction('SENT')">CONFIRM SEND</button>
    </div>
</div>

<div id="modal_buy" class="modal" onclick="closeModal('buy')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin: 0 0 5px 0; color: var(--green);">Buy <span id="buy_coin_name">Asset</span></h3>
        <p style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;">Enter amount to purchase</p>
        <input type="number" id="buy_amount" placeholder="Amount in TON">
        <button class="btn btn-green" style="width: 100%;" onclick="processAction('PURCHASED')">CONFIRM BUY</button>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let tonConnectUI;
    let userFullAddr = "";
    const assets = [
        { name: 'The Open Network', symbol: 'TON', pair: 'TONUSDT', icon: 'https://cryptologos.cc/logos/toncoin-ton-logo.png' },
        { name: 'Binance Coin', symbol: 'BNB', pair: 'BNBUSDT', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' },
        { name: 'Near Protocol', symbol: 'NEAR', pair: 'NEARUSDT', icon: 'https://cryptologos.cc/logos/near-protocol-near-logo.png' }
    ];

    async function init() {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                userFullAddr = wallet.account.address;
                document.getElementById('main_status').innerText = "ONLINE";
                document.getElementById('addr_display').innerText = userFullAddr.substring(0,8) + "...";
                updateQR(userFullAddr);
            } else {
                document.getElementById('main_status').innerText = "OFFLINE";
                userFullAddr = "";
            }
        });
        updatePrices();
    }

    function openBuy(symbol) {
        if (!userFullAddr) { tg.showAlert("Connect wallet first!"); return; }
        document.getElementById('buy_coin_name').innerText = symbol;
        document.getElementById('modal_buy').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function processAction(type) {
        tg.showAlert("Order successfully " + type + "!");
        closeModal('buy'); closeModal('send');
    }

    async function updatePrices() {
        const list = document.getElementById('market_list');
        let html = '';
        for (let a of assets) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${a.pair}`);
                const data = await res.json();
                html += `
                    <div class="market-card">
                        <div class="coin-info">
                            <div class="coin-icon"><img src="${a.icon}"></div>
                            <div><div class="coin-name">${a.symbol}</div><div class="coin-symbol">${a.name}</div></div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700; margin-bottom:5px">$${parseFloat(data.price).toFixed(2)}</div>
                            <button class="buy-mini-btn" onclick="openBuy('${a.symbol}')">BUY</button>
                        </div>
                    </div>`;
            } catch (e) {}
        }
        list.innerHTML = html;
    }

    function updateQR(t) {
        const c = document.getElementById("qrcode"); c.innerHTML = "";
        new QRCode(c, { text: t, width: 150, height: 150 });
        document.getElementById('full_address').innerText = t;
    }

    function openModal(t) { 
        if (!userFullAddr) { tg.showAlert("Connect wallet first!"); return; }
        document.getElementById('modal_'+t).style.display = 'flex'; 
    }
    function closeModal(t) { document.getElementById('modal_'+t).style.display = 'none'; }

    function copyUserAddr() {
        navigator.clipboard.writeText(userFullAddr);
        document.getElementById('copy_btn').innerText = "✅ COPIED";
        tg.HapticFeedback.notificationOccurred('success');
        setTimeout(() => { document.getElementById('copy_btn').innerText = "📋 COPY ADDRESS"; }, 2000);
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    window.addEventListener('load', () => setTimeout(init, 500));
    setInterval(updatePrices, 15000);
</script>
</body>
</html>
