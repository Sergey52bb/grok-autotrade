<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v14.7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --red: #ff4a4a; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px 15px 5px; text-align: center; flex-shrink: 0; }
        .logo-svg { width: 140px; height: auto; margin-bottom: 2px; }
        header .subtitle { font-size: 11px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.9; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 150px; } 
        .screen { display: none; }
        .screen.active { display: block; }
        
        .card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 25px; margin-bottom: 15px; }
        
        .asset-icon-box { width: 48px; height: 48px; min-width: 48px; display: flex; align-items: center; justify-content: center; background: #1a222c; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .asset-icon-img { width: 100%; height: 100%; object-fit: cover; }
        
        .asset-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 12px; border: 1px solid rgba(77, 184, 255, 0.25); 
            box-shadow: 0 0 10px rgba(77, 184, 255, 0.15); 
            cursor: pointer; position: relative; border-radius: 20px; margin-bottom: 12px;
            background: rgba(77, 184, 255, 0.02);
        }
        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: 800; font-size: 15px; }
        .asset-price { font-size: 12px; opacity: 0.6; color: var(--green); }

        /* Кастомный селектор в Свопе */
        .swap-selector { 
            display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); 
            border-radius: 20px; padding: 12px 15px; border: 1px solid var(--border); 
            cursor: pointer; transition: 0.2s;
        }
        .swap-selector:active { background: rgba(255,255,255,0.1); }
        .swap-selector img { width: 28px; height: 28px; border-radius: 50%; }
        .swap-selector span { font-weight: 700; flex: 1; }
        .swap-selector::after { content: '▼'; font-size: 10px; opacity: 0.5; }

        /* Список выбора монет в модалке */
        .coin-option { 
            display: flex; align-items: center; gap: 15px; padding: 15px; 
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .coin-option:last-child { border-bottom: none; }
        .coin-option img { width: 32px; height: 32px; border-radius: 50%; }
        .coin-option .coin-info { flex: 1; }
        .coin-option .coin-ticker { font-weight: 800; }
        .coin-option .coin-full { font-size: 12px; opacity: 0.5; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 85px; background: var(--panel); display: flex; border-radius: 28px; border: 1px solid var(--border); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.2s; font-size: 30px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); font-size: 36px; }

        input { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; color: white; margin-bottom: 12px; outline: none; font-size: 18px; box-sizing: border-box; font-weight: 700; }
        #rev_btn { background: #1a222c; border: 1px solid var(--border); color: var(--blue); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: -20px auto; z-index: 5; position: relative; cursor: pointer; }
        
        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; }
        .modal-body { background: #111a27; width: 100%; border-radius: 35px 35px 0 0; padding: 25px 20px 40px; box-sizing: border-box; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <svg class="logo-svg" viewBox="0 0 668 237" fill="none">
        <path d="M118.204 0.000194514C183.486 0.000194514 236.408 52.9223 236.408 118.204C236.408 183.487 183.486 236.408 118.204 236.408C52.9216 236.408 0.000184007 183.486 0 118.204C0 52.9224 52.9215 0.000354089 118.204 0.000194514ZM74.1011 62.1964C57.6799 62.1964 47.268 79.9119 55.5308 94.2346L109.964 188.582C113.619 194.922 122.781 194.922 126.436 188.582L180.88 94.2346C189.132 79.9342 178.72 62.1965 162.31 62.1964H74.1011ZM162.288 78.8411C166.031 78.8411 168.234 82.812 166.45 85.9074L137.856 137.091L137.851 137.099L126.506 159.046V78.8411H162.288ZM109.872 78.8516V159.024L98.5376 137.087L98.5334 137.08L69.9294 85.9214L69.8468 85.7724C68.2134 82.6996 70.405 78.8516 74.0899 78.8516H109.872" fill="#4DB8FF"/>
        <path d="M639.524 146.751V62.9139H668V188.849H636.565L573.696 99.0752V188.849H545.034V62.9139H581.277L639.524 146.751Z" fill="white"/>
        <path d="M456.407 191.686C414.432 191.686 384.107 163.081 384.107 126.74C384.107 90.3983 414.432 61.7931 456.407 61.7931C498.382 61.7931 528.707 90.5782 528.707 126.74C528.707 162.901 498.382 191.686 456.407 191.686ZM456.407 167.219C481 167.219 497.272 149.408 497.272 126.74C497.272 104.071 481 86.2605 456.407 86.2605C431.814 86.2605 415.542 104.071 415.542 126.74C415.542 149.408 431.814 167.219 456.407 167.219Z" fill="white"/>
        <path d="M384.269 63.5978V85.7264H342.11V189.533H312.339V85.7264H270.179V63.5978H384.269Z" fill="white"/>
    </svg>
    <div class="subtitle">👛 SYN WALLET</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div style="text-align:center; padding: 15px 0 25px;">
            <div style="font-size: 11px; opacity: 0.5;">ESTIMATED BALANCE</div>
            <h1 id="main_balance" style="font-size:40px; margin:5px 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 11px; color: var(--blue); background: rgba(77, 184, 255, 0.1); padding: 6px 14px; border-radius: 20px; display: inline-block; font-family: monospace;">Disconnected</div>
        </div>
        <div id="asset_list"></div>
    </div>
    
    <div id="scr_swap" class="screen">
        <div class="card" style="margin-top: 10px;">
            <div style="font-size: 11px; opacity: 0.5; margin-bottom: 8px;">PAY</div>
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <div class="swap-selector" onclick="openCoinPicker('from')">
                <img id="sw_from_img" src="">
                <span id="sw_from_txt">TON</span>
            </div>
            
            <div id="rev_btn" onclick="swapReverse()">🌀</div>
            
            <div style="font-size: 11px; opacity: 0.5; margin: 20px 0 8px;">RECEIVE</div>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <div class="swap-selector" onclick="openCoinPicker('to')">
                <img id="sw_to_img" src="">
                <span id="sw_to_txt">USDT</span>
            </div>
            
            <button class="btn-confirm" style="margin-top: 25px;" onclick="tg.showAlert('Transaction initiated')">Confirm Swap</button>
        </div>
    </div>
    
    <div id="scr_connect" class="screen">
        <div class="card" style="text-align:center; margin-top: 20px; padding: 40px 20px;">
            <div id="ton-connect-btn" style="display:flex; justify-content:center;"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)">💼</div>
    <div class="nav-item" onclick="showTab('swap', this)">🌀</div>
    <div class="nav-item" onclick="showTab('connect', this)">🔗</div>
</nav>

<div id="picker_modal" class="modal-overlay" onclick="closePicker()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <h3 style="text-align:center; margin-top:0; border-bottom: 1px solid var(--border); padding-bottom: 15px;">Select Asset</h3>
        <div id="coin_options_list"></div>
        <button class="btn-confirm" style="background:transparent; color:white; opacity:0.3; margin-top:15px;" onclick="closePicker()">CANCEL</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    const assets = [
        { id: 'TON', name: 'The Open Network', price: 7.42, cg: 'the-open-network', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png' },
        { id: 'BTC', name: 'Bitcoin', price: 69420, cg: 'bitcoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/bitcoin/info/logo.png' },
        { id: 'USDT', name: 'Tether USD', price: 1.00, cg: 'tether', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
        { id: 'ETH', name: 'Ethereum', price: 3505, cg: 'ethereum', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png' },
        { id: 'SOL', name: 'Solana', price: 145.2, cg: 'solana', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/solana/info/logo.png' },
        { id: 'NEAR', name: 'Near Protocol', price: 6.85, cg: 'near', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/near/info/logo.png' },
        { id: 'USDC', name: 'USD Coin', price: 1.00, cg: 'usd-coin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' },
        { id: 'DOGE', name: 'Dogecoin', price: 0.16, cg: 'dogecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/doge/info/logo.png' },
        { id: 'BNB', name: 'Binance Coin', price: 590.4, cg: 'binancecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png' },
        { id: 'LTC', name: 'Litecoin', price: 82.3, cg: 'litecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/litecoin/info/logo.png' },
        { id: 'SUI', name: 'Sui Network', price: 1.15, cg: 'sui', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/sui/info/logo.png' },
        { id: 'POL', name: 'Polygon POL', price: 0.72, cg: 'matic-network', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/polygon/info/logo.png' }
    ];

    let swapFrom = "TON", swapTo = "USDT", activePicker = "";

    async function updatePrices() {
        try {
            const ids = assets.map(a => a.cg).join(',');
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
            const data = await res.json();
            assets.forEach(a => {
                if(data[a.cg]) {
                    a.price = data[a.cg].usd;
                    const el = document.getElementById(`price_${a.id}`);
                    if(el) el.innerText = `$${a.price.toLocaleString()}`;
                }
            });
            calculateSwap();
        } catch(e) {}
    }

    function init() {
        const list = document.getElementById('asset_list');
        list.innerHTML = "";
        assets.forEach(a => {
            list.innerHTML += `
                <div class="asset-item">
                    <div class="asset-icon-box"><img src="${a.img}" class="asset-icon-img"></div>
                    <div class="asset-details">
                        <div class="asset-name">${a.id}</div>
                        <div class="asset-price" id="price_${a.id}">$${a.price.toLocaleString()}</div>
                    </div>
                    <div class="bal-amount">0.00</div>
                </div>`;
        });
        updatePrices();
        setInterval(updatePrices, 30000);
        updateSwapUI();
    }

    function openCoinPicker(type) {
        activePicker = type;
        const list = document.getElementById('coin_options_list');
        list.innerHTML = "";
        // Фильтруем, чтобы нельзя было выбрать одну и ту же монету
        const forbidden = type === 'from' ? swapTo : swapFrom;
        
        assets.forEach(a => {
            if(a.id === forbidden) return;
            list.innerHTML += `
                <div class="coin-option" onclick="selectCoin('${a.id}')">
                    <img src="${a.img}">
                    <div class="coin-info">
                        <div class="coin-ticker">${a.id}</div>
                        <div class="coin-full">${a.name}</div>
                    </div>
                </div>`;
        });
        document.getElementById('picker_modal').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('light');
    }

    function selectCoin(id) {
        if(activePicker === 'from') swapFrom = id;
        else swapTo = id;
        updateSwapUI();
        closePicker();
    }

    function closePicker() { document.getElementById('picker_modal').style.display = 'none'; }

    function updateSwapUI() {
        const aFrom = assets.find(x => x.id === swapFrom);
        const aTo = assets.find(x => x.id === swapTo);
        document.getElementById('sw_from_img').src = aFrom.img;
        document.getElementById('sw_from_txt').innerText = aFrom.id;
        document.getElementById('sw_to_img').src = aTo.img;
        document.getElementById('sw_to_txt').innerText = aTo.id;
        calculateSwap();
    }

    function calculateSwap() {
        const val = document.getElementById('sw_val').value;
        const res = document.getElementById('sw_res');
        const p1 = assets.find(x => x.id === swapFrom).price;
        const p2 = assets.find(x => x.id === swapTo).price;
        if(val > 0) res.value = ((val * p1) / p2).toFixed(6);
        else res.value = "0.0";
    }

    function swapReverse() {
        const tmp = swapFrom; swapFrom = swapTo; swapTo = tmp;
        updateSwapUI();
        tg.HapticFeedback.selectionChanged();
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
