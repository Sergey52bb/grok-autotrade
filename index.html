<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
body {
    margin: 0;
    background: #0b1220;
    color: white;
    font-family: Arial;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

/* GRID */
.main {
    display: grid;
    grid-template-columns: 55% 45%;
    height: calc(100vh - 60px);
}

/* LEFT (FORM) */
.left {
    padding: 10px;
}

.tabs {
    display: flex;
    background: #1a2230;
    border-radius: 10px;
    overflow: hidden;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 10px;
}

.buy { background: #2ebd85; }
.sell { background: #2a2f3a; color: #aaa; }

.box {
    background: #1a2230;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    font-weight: bold;
    background: #2ebd85;
}

/* RIGHT (ORDER BOOK) */
.order-book {
    background: #161d2a;
    border-radius: 10px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* Общие строки */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 6px;
    height: 20px;
    align-items: center;
    overflow: hidden;
}

/* Заливка */
.fill {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    opacity: 0.2;
}

.fill.red {
    background: #f6465d;
}

.fill.green {
    background: #2ebd85;
}

/* Цвета текста */
.price-red {
    color: #f6465d;
}

.price-green {
    color: #2ebd85;
}

/* Центр (цена) */
.current-price {
    text-align: center;
    font-weight: bold;
    padding: 6px 0;
    font-size: 14px;
    color: #fff;
    border-top: 1px solid #2a3445;
    border-bottom: 1px solid #2a3445;
    margin: 4px 0;
}

/* Блоки */
.orders {
    display: flex;
    flex-direction: column;
    gap: 2px;
    }

    <!-- ЦЕНА -->
    <div class="current-price">1.288</div>

    <!-- BUY (зелёные) -->
    <div class="orders buy">
        <div class="row">
            <div class="fill green" style="width: 60%"></div>
            <span class="price-green">1.287</span>
            <span>8741</span>
        </div>
      
    <div class="row">
            <div class="fill green" style="width: 45%"></div>
            <span class="price-green">1.286</span>
            <span>6541</span>
        </div>
        
    <div class="row">
            <div class="fill green" style="width: 30%"></div>
            <span class="price-green">1.285</span>
            <span>4300</span>
        </div>
    
</body>
</html>
