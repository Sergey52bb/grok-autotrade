<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  background: #0b1622;
  font-family: Arial;
  color: white;
}

/* ограничение как в приложении */
.container {
  max-width: 500px;
  margin: auto;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  background: #0f2235;
}

.header h1 {
  margin: 0;
}

.sub {
  opacity: 0.6;
}

/* CHART */
#chart {
  height: 250px;
}

/* ORDER BOOK */
.orderbook {
  height: 300px;
  overflow-y: auto;
  padding: 5px;
}

/* строки */
.row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 2px 6px;
  position: relative;
}

/* фон глубины */
.row::before {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  opacity: 0.2;
  z-index: 0;
}

.sell::before {
  background: red;
}

.buy::before {
  background: lime;
}

.price, .amount {
  position: relative;
  z-index: 1;
}

.sell .price { color: #ff4d4d; }
.buy .price { color: #00ff99; }

/* текущая цена */
.middle {
  text-align: center;
  padding: 6px;
  font-weight: bold;
  background: #08121c;
}

/* BUTTONS */
.buttons {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.buy-btn {
  flex: 1;
  background: green;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
}

.sell-btn {
  flex: 1;
  background: red;
  padding: 15px;
  text-align: center;
  border-radius: 10px;
}

/* MENU */
.menu {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #0f2235;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>💎 SYN TERMINAL</h1>
  <div class="sub">AI Trading System</div>
</div>

<div id="chart"></div>

<div class="orderbook" id="orderbook"></div>

<div class="buttons">
  <div class="buy-btn">BUY</div>
  <div class="sell-btn">SELL</div>
</div>

<div class="menu">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

</div>

<script>
new TradingView.widget({
  "container_id": "chart",
  "width": "100%",
  "height": 250,
  "symbol": "BINANCE:TONUSDT",
  "interval": "5",
  "theme": "dark",
  "style": "1",
  "hide_top_toolbar": true,
  "hide_legend": true
});

/* генерация живого стакана */
function generateOrders() {
  const ob = document.getElementById("orderbook");
  ob.innerHTML = "";

  let price = 1.300;

  // 🔴 SELL (сверху)
  for (let i = 0; i < 15; i++) {
    price += Math.random() * 0.002;

    const amount = Math.floor(Math.random() * 60000);

    const row = document.createElement("div");
    row.className = "row sell";

    row.innerHTML = `
      <span class="price">${price.toFixed(3)}</span>
      <span class="amount">${amount}</span>
    `;

    row.style.setProperty('--depth', amount);

    ob.appendChild(row);
  }

  // текущая цена
  const mid = document.createElement("div");
  mid.className = "middle";
  mid.innerText = price.toFixed(3);
  ob.appendChild(mid);

  // 🟢 BUY (снизу)
  for (let i = 0; i < 15; i++) {
    price -= Math.random() * 0.002;

    const amount = Math.floor(Math.random() * 60000);

    const row = document.createElement("div");
    row.className = "row buy";

    row.innerHTML = `
      <span class="price">${price.toFixed(3)}</span>
      <span class="amount">${amount}</span>
    `;

    ob.appendChild(row);
  }
}

setInterval(generateOrders, 1500);
generateOrders();
</script>

</body>
</html>
