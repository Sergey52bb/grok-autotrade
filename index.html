<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V4.0</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #0d1117; border-bottom: 1px solid #1a1f26; }
        #log { background: #000; color: #00ff95; font-family: monospace; font-size: 10px; padding: 10px; height: 80px; overflow-y: auto; border-bottom: 1px solid #333; }
        .btn-fix { background: #00ff95; color: black; border: none; padding: 15px; width: 90%; margin: 20px 5%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="log">/ System Log initialized...</div>

<header>
    <div style="font-weight: bold; color: #f0b90b;">STRATEX PRO</div>
    <div id="ton-connect-button"></div>
</header>

<div style="padding: 20px; text-align: center;">
    <p style="font-size: 13px; color: #848e9c;">Если обычная кнопка не вызывает подтверждение в кошельке, нажми кнопку ниже:</p>
    <button class="btn-fix" onclick="connectDirectly()">ВЫЗВАТЬ TONKEEPER</button>
</div>

<div id="view-assets" style="padding: 20px; text-align: center; border-top: 1px solid #333;">
    <div id="status">Статус: Ожидание...</div>
</div>

<script>
    const logEl = document.getElementById('log');
    function printLog(m) { logEl.innerHTML += `<br>> ${m}`; logEl.scrollTop = logEl.scrollHeight; }

    // 1. Инициализация с полными параметрами
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // 2. Слушаем изменения
    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            printLog("SUCCESS: Connected to " + wallet.device.appName);
            document.getElementById('status').innerHTML = "✅ ПОДКЛЮЧЕНО: " + wallet.account.address.substring(0,8) + "...";
        } else {
            printLog("Status: Disconnected");
            document.getElementById('status').innerHTML = "❌ НЕ ПОДКЛЮЧЕНО";
        }
    });

    // 3. Принудительный коннект
    async function connectDirectly() {
        printLog("Attempting to open modal...");
        try {
            await tonConnectUI.openModal();
            printLog("Modal opened. Please select Tonkeeper.");
        } catch (e) {
            printLog("ERROR: " + e.message);
            console.error(e);
        }
    }

    // Проверка манифеста при загрузке
    window.onload = async () => {
        printLog("Checking manifest access...");
        try {
            const resp = await fetch('https://rgey52bb.github.io/tonconnect-manifest.json');
            if (resp.ok) {
                printLog("Manifest found (200 OK)");
            } else {
                printLog("CRITICAL: Manifest not found! Check GitHub!");
            }
        } catch (e) {
            printLog("FETCH ERROR: " + e.message);
        }
    };
</script>
</body>
</html>
