<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX TERMINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #262a2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; }

        header { height: 45px; background: #121518; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; flex-shrink: 0; }

        /* ГЛАВНЫЙ КОНТЕЙНЕР */
        .main-container { 
            display: flex; 
            flex-wrap: wrap; /* Это магия: на мобилке перенесет блоки вниз, на ПК выстроит в ряд */
            padding: 8px; 
            gap: 8px; 
            flex: 1;
        }

        .box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column;
            min-width: 300px; /* Чтобы блоки не сжимались слишком сильно */
        }

        /* ГРАФИК (Приоритет) */
        .chart-section { flex: 2; min-height: 350px; height: 50vh; }
        #chart { width: 100%; height: 100%; }

        /* ТОРГОВЛЯ */
        .trade-section { flex: 0.8; padding: 15px; height: fit-content; }
        .inp-group { background: var(--input); padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .inp-group label { display: block; font-size: 10px; color: var(--text); margin-bottom: 2px; }
        .inp-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { flex: 1; border: none; padding: 14px; border-radius: 4px; font-weight: bold; color: white; cursor: pointer; }

        /* СТАКАН */
        .book-section { flex: 0.8; height: 350px; font-family: monospace; }
        .ob-row { display: flex; justify-content: space-between; padding: 3px 10px; font-size: 12px; }

        /* МОБИЛЬНЫЕ ПРАВИЛА */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .box { width: 100%; min-width: unset; }
            .chart-section { height: 300px; order: 1; } /* График сверху */
            .trade-section { order: 2; } /* Торговля под графиком */
            .book-section { order: 3; } /* Стакан в самом низу */
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; color: var(--green);">STRATEX PRO</div>
    <div id="price-top">1.3145 TON/USDT</div>
</header>

<div class="main-container">
    <div class="box book-section">
        <div style="padding: 8px; font-size: 11px; color: var(--text); border-bottom: 1px solid var(--border);">ORDER BOOK</div>
        <div id="asks" style="color: var(--red); flex: 1; display: flex; flex-direction: column-reverse; justify-content: flex-start; overflow: hidden;"></div>
        <div id="price-mid" style="text-align: center; padding: 8px; font-weight: bold; background: rgba(255,255,255,0.02);">1.3145</div>
        <div id="bids" style="color: var(--green); flex: 1; overflow: hidden;"></div>
    </div>

    <div class="box chart-section">
        <div id="chart"></div>
    </div>

    <div class="box trade-section">
        <div class="inp-group"><label>Price</label><input type="number" value="1.3145"></div>
        <div class="inp-group"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <div class="btn-row">
            <button class="action-btn" style="background: var(--green);">BUY</button>
            <button class="action-btn" style="background: var(--red);">SELL</button>
        </div>
    </div>
</div>

<script>
    var options = {
        series: [{ data: [] }],
        chart: { type: 'candlestick', height: '100%', toolbar: { show: false }, background: 'transparent', animations: {enabled: false} },
        xaxis: { type: 'datetime', labels: { style: { colors: '#848e9c' } } },
        yaxis: { opposite: true, labels: { style: { colors: '#848e9c' }, formatter: v => v.toFixed(3) } },
        grid: { borderColor: '#1f2226' }
    };
    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    function gen() {
        let d = []; let b = 1.314; let t = Date.now();
        for(let i=0; i<25; i++) {
            let o = b + Math.random()*0.01;
            d.push({ x: t - i*60000, y: [o, o+0.002, o-0.002, o+0.001] });
        }
        chart.updateSeries([{ data: d.reverse() }]);
        
        let ah = '', bh = '';
        for(let i=0; i<8; i++) {
            ah += `<div class="ob-row"><span>${(b+0.005-i*0.001).toFixed(4)}</span><span>${(Math.random()*50).toFixed(1)}</span></div>`;
            bh += `<div class="ob-row"><span>${(b-0.001-i*0.001).toFixed(4)}</span><span>${(Math.random()*50).toFixed(1)}</span></div>`;
        }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }
    gen();
</script>
</body>
</html>
