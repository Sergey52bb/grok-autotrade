<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v6.7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --red: #ff4a4a; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #welcome_screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; text-align: center; }
        #welcome_screen img { width: 100%; max-width: 280px; border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--green); }

        header { padding: 25px 15px 15px 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); opacity: 0.5; }
        .nav-item.active { color: var(--green); opacity: 1; }
        
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .asset-card { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
        
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer; width: 100%; }
        .btn-trade { padding: 8px 12px; font-size: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
        .modal input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<div id="welcome_screen">
    <img src="https://img.freepik.com/free-vector/gradient-crypto-logo-template_23-2149206159.jpg">
    <h1>SYN Terminal</h1>
    <p>Professional AI Trading</p>
    <button class="btn-general" style="background:var(--green); color:#000;" onclick="startApp()">LAUNCH</button>
</div>

<header>
    <div class="title">💎 SYN TERMINAL</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; opacity: 0.4;">Not Connected</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <div id="market_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <input type="number" id="sw_f_val" placeholder="0.0" oninput="doSwapCalc()" style="width:100%; background:#000; border:1px solid var(--border); padding:15px; border-radius:15px; color:#fff; margin-bottom:10px;">
            <select id="sw_f_coin" style="width:100%; background:#1a1e26; color:#fff; padding:10px; border-radius:10px; margin-bottom:15px;"></select>
            <div style="text-align:center; margin-bottom:15px; color:var(--green);">⬇️</div>
            <select id="sw_t_coin" style="width:100%; background:#1a1e26; color:#fff; padding:10px; border-radius:10px; margin-bottom:20px;"></select>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="tg.showAlert('Swap processing...')">SWAP</button>
        </div>
    </div>

    <div id="scr_profile" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; text-align:center;"><div id="ton-connect-btn"></div></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Deposit</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:white; padding:10px; border-radius:10px;"></div>
        <div id="full_addr" style="font-size:9px; color:var(--text); word-break:break-all; margin-bottom:15px;"></div>
        <button class="btn-general" style="background:var(--green); color:#000;" onclick="copyAddr()">COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send TON</h3>
        <input type="text" id="send_addr" placeholder="Recipient Address">
        <input type="text" id="send_memo" placeholder="Memo (Optional)">
        <input type="number" id="send_amount" placeholder="Amount">
        <button class="btn-general" style="background:var(--green); color:#000;">SEND</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    let prices = { 'TON': 7.2, 'BTC': 65000, 'USDT': 1 };
    const assets = [{s:'TON', i:'https://cryptologos.cc/logos/toncoin-ton-logo.png'}, {s:'BTC', i:'https://cryptologos.cc/logos/bitcoin-btc-logo.png'}];
    let currentAddr = "";

    function startApp() { document.getElementById('welcome_screen').style.display = 'none'; }

    function init() {
        const f = document.getElementById('sw_f_coin');
        const t = document.getElementById('sw_t_coin');
        assets.forEach(a => { f.innerHTML += `<option value="${a.s}">${a.s}</option>`; t.innerHTML += `<option value="${a.s}">${a.s}</option>`; });
        t.value = "BTC";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                currentAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8) + "...";
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 140, height: 140 });
                fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${currentAddr}`)
                    .then(r => r.json()).then(d => { if(d.ok) document.getElementById('main_balance').innerText = (d.result/1e9).toFixed(2) + " TON"; });
            }
        });
        renderMarket();
    }

    function renderMarket() {
        document.getElementById('market_list').innerHTML = assets.map(a => `
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:10px;"><img src="${a.i}" width="24"><b>${a.s}</b></div>
                <div style="text-align:right;">
                    <b>$${prices[a.s]}</b><br>
                    <button class="btn-trade" style="color:var(--green)" onclick="tg.showAlert('Buy order')">BUY</button>
                    <button class="btn-trade" style="color:var(--red)" onclick="tg.showAlert('Sell order')">SELL</button>
                </div>
            </div>
        `).join('');
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    function copyAddr() { navigator.clipboard.writeText(currentAddr); tg.showAlert("Address Copied!"); }

    window.onload = init;
</script>
</body>
</html>
