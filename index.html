<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grok AutoTrade</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- TON Connect UI -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #0b1224, #020617);
      color: #fff;
    }

    .card {
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, #0b1224, #020617);
      box-shadow: 0 20px 50px rgba(0,0,0,.6);
    }

    .price {
      font-size: 36px;
      font-weight: 700;
    }

    .pair {
      opacity: .7;
      margin-top: 6px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .buy { background: #22c55e; color: #000; }
    .sell { background: #ef4444; color: #000; }

    button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .row {
      margin-top: 14px;
      font-size: 14px;
      opacity: .85;
    }

    input {
      width: 100%;
      margin-top: 8px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
    }

    .connect {
      margin-top: 20px;
    }

    .wallet {
      margin-top: 10px;
      font-size: 13px;
      opacity: .75;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="price">1.248 USDT</div>
    <div class="pair">USDT / TON</div>

    <div class="buttons">
      <button id="buyBtn" class="buy" disabled>BUY</button>
      <button id="sellBtn" class="sell" disabled>SELL</button>
    </div>
  </div>

  <div class="card">
    <div class="row">Amount (TON)</div>
    <input id="amount" type="number" placeholder="0.0" min="0" step="any"/>

    <div class="row">Commission (0.25%): <span id="fee">0.0000</span> TON</div>
    <div class="row">You will receive: <span id="receive">0.0000</span> TON</div>

    <div class="connect" id="ton-connect"></div>

    <div class="wallet" id="walletInfo">Wallet not connected</div>
    <div class="wallet" id="balanceInfo">Balance: 0.0000 TON</div>
  </div>

<script>
  /* =========================
   DEV MODE CONFIG
========================= */
const DEV_MODE = true;          // ⬅️ false — для прода
const DEV_TON_BALANCE = 10;     // тестовый баланс

/* =========================
   ELEMENTS
========================= */
const amountInput = document.getElementById("amountInput");
const commissionValue = document.getElementById("commissionValue");
const receiveValue = document.getElementById("receiveValue");
const buyBtn = document.getElementById("buyBtn");
const sellBtn = document.getElementById("sellBtn");
const balanceEl = document.getElementById("tonBalance");

/* =========================
   CONSTANTS
========================= */
const COMMISSION_RATE = 0.0025;

/* =========================
   BALANCE
========================= */
let tonBalance = 0;

function setBalance(balance) {
  tonBalance = balance;
  balanceEl.textContent = balance.toFixed(4) + " TON";
}

/* DEV balance */
if (DEV_MODE) {
  setBalance(DEV_TON_BALANCE);
}

/* =========================
   CALCULATION
========================= */
function recalc() {
  const amount = parseFloat(amountInput.value);

  if (!amount || amount <= 0) {
    commissionValue.textContent = "0.0000 TON";
    receiveValue.textContent = "0.0000 TON";
    buyBtn.disabled = true;
    sellBtn.disabled = true;
    return;
  }

  const commission = amount * COMMISSION_RATE;
  const receive = amount - commission;

  commissionValue.textContent = commission.toFixed(4) + " TON";
  receiveValue.textContent = receive.toFixed(4) + " TON";

  const enabled =
    tonBalance > 0 &&
    amount <= tonBalance;

  buyBtn.disabled = !enabled;
  sellBtn.disabled = !enabled;
}

/* =========================
   EVENTS
========================= */
amountInput.addEventListener("input", recalc);

/* =========================
   BUTTON ACTIONS (DEV)
========================= */
buyBtn.addEventListener("click", () => {
  if (DEV_MODE) {
    alert("DEV MODE: BUY clicked\nTransaction not sent");
  }
});

sellBtn.addEventListener("click", () => {
  if (DEV_MODE) {
    alert("DEV MODE: SELL clicked\nTransaction not sent");
  }
});
</script>

</body>
</html>
