<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL V2.2</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --panel: #12151c;
            --green: #00ff95;
            --text: #94a3b8;
            --border: #2b2f36;
        }

        body {
            background: var(--bg);
            color: white;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            text-align: center;
            font-weight: 900;
            font-size: 20px;
            letter-spacing: 1px;
        }

        #main_content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px 100px 15px;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .balance-card {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            padding: 30px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btns { display: flex; gap: 12px; }
        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            transition: 0.2s active;
        }
        .btn:active { transform: scale(0.96); }
        .btn-white { background: #ffffff; color: #000; }
        .btn-green { background: var(--green); color: #000; }

        .coin-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: var(--panel);
            border-radius: 18px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(18, 21, 28, 0.95);
            display: flex;
            border-top: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text);
            font-weight: 600;
        }

        .nav-item.active { color: var(--green); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }

        #ton-connect-btn {
            display: flex;
            justify-content: center;
            margin: 20px auto;
            min-height: 44px;
        }
    </style>
</head>
<body>

<header>💎 SYN TERMINAL <span style="font-size: 10px; vertical-align: middle; opacity: 0.5;">V2.2</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 8px; letter-spacing: 1px;">AVAILABLE BALANCE</div>
            <h1 style="font-size: 42px; margin: 0; font-weight: 900;">0.00 TON</h1>
            <div id="usd_val" style="color: var(--green); font-weight: bold; font-size: 18px; margin-top: 5px;">$0.00</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="doDeposit()">⬇ Deposit</button>
            <button class="btn btn-green" onclick="showTab('profile')">⬆ Send</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 20px; letter-spacing: 1px; opacity: 0.8; text-transform: uppercase; font-size: 13px;">AI Market Pulse</h4>
        <div id="market_list">
            <div style="text-align: center; padding: 20px; color: var(--text);">Синхронизация с биржами...</div>
        </div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center; text-transform: uppercase; letter-spacing: 1px;">System Access</h4>
        <div style="background: var(--panel); padding: 30px; border-radius: 24px; margin-top: 20px; border: 1px solid var(--border); text-align: center;">
            <p style="font-size: 14px; color: var(--text); margin-bottom: 25px; line-height: 1.5;">Подключите кошелек TON для активации торгового терминала</p>
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>🔄</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>👤</span>Profile</div>
</nav>

<script>
    // 1. Инициализация Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 2. Настройки
    const MY_ADDR = "UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb"; 

    // 3. Инициализация TON Connect
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    // 4. Логика вкладок
    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'market') updatePrices();
    }

    // 5. Функция Депозита
    function doDeposit() {
        const addr = tonConnectUI.account ? tonConnectUI.account.address : MY_ADDR;
        tg.showPopup({
            title: 'Deposit Address',
            message: addr,
            buttons: [{type: 'ok', text: 'Copy to Clipboard'}]
        });
    }

    // 6. Живой Маркет (Binance API)
    async function updatePrices() {
        const list = document.getElementById('market_list');
        const pairs = [
            { n: 'TON/USDT', s: 'TONUSDT' },
            { n: 'BTC/USDT', s: 'BTCUSDT' },
            { n: 'ETH/USDT', s: 'ETHUSDT' },
            { n: 'BNB/USDT', s: 'BNBUSDT' }
        ];

        let html = '';
        for (let p of pairs) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${p.s}`);
                const data = await response.json();
                const price = parseFloat(data.price).toFixed(2);
                
                if(p.s === 'TONUSDT') document.getElementById('usd_val').innerText = '$' + price;

                html += `
                    <div class="coin-row">
                        <span style="font-weight: 800; font-size: 15px;">${p.n}</span>
                        <span style="color: var(--green); font-weight: 900; font-size: 16px;">$${price}</span>
                    </div>`;
            } catch (e) {
                html += `<div class="coin-row"><span>${p.n}</span><span style="color:red">Offline</span></div>`;
            }
        }
        list.innerHTML = html;
    }

    // Запуск первичных данных
    updatePrices();
    setInterval(updatePrices, 20000); // Обновление каждые 20 сек
</script>

</body>
</html>
