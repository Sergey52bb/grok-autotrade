<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v15.3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --red: #ff4a4a; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 15px 5px; text-align: center; flex-shrink: 0; }
        .logo-svg { width: 140px; height: auto; margin-bottom: 2px; }
        header .subtitle { font-size: 11px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.9; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 150px; } 
        .screen { display: none; }
        .screen.active { display: block; }
        
        .card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 25px; margin-bottom: 15px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 12px; border: 1px solid rgba(77, 184, 255, 0.25); box-shadow: 0 0 10px rgba(77, 184, 255, 0.15); cursor: pointer; border-radius: 20px; margin-bottom: 12px; background: rgba(77, 184, 255, 0.02); }
        .asset-icon-box { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; background: #1a222c; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .asset-icon-img { width: 100%; height: 100%; object-fit: cover; }
        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: 800; font-size: 15px; }
        .asset-price { font-size: 12px; opacity: 0.6; color: var(--green); }
        .bal-amount { font-weight: 700; font-size: 15px; text-align: right; }

        /* АНИМАЦИЯ ВРАЩЕНИЯ */
        @keyframes rotateSticker { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .rotating { animation: rotateSticker 20s linear infinite; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 85px; background: var(--panel); display: flex; border-radius: 28px; border: 1px solid var(--border); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.2s; font-size: 30px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); font-size: 36px; }

        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; }
        .modal-body { background: #111a27; width: 100%; border-radius: 35px 35px 0 0; padding: 25px 20px 40px; box-sizing: border-box; }
        .modal-view { display: none; }
        .modal-view.active { display: block; }
        input { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; color: white; margin-bottom: 12px; outline: none; box-sizing: border-box; }
        .modal-logo { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <svg class="logo-svg" viewBox="0 0 668 237" fill="none"><path d="M118.204 0.000194514C183.486 0.000194514 236.408 52.9223 236.408 118.204C236.408 183.487 183.486 236.408 118.204 236.408C52.9216 236.408 0.000184007 183.486 0 118.204C0 52.9224 52.9215 0.000354089 118.204 0.000194514ZM74.1011 62.1964C57.6799 62.1964 47.268 79.9119 55.5308 94.2346L109.964 188.582C113.619 194.922 122.781 194.922 126.436 188.582L180.88 94.2346C189.132 79.9342 178.72 62.1965 162.31 62.1964H74.1011ZM162.288 78.8411C166.031 78.8411 168.234 82.812 166.45 85.9074L137.856 137.091L137.851 137.099L126.506 159.046V78.8411H162.288ZM109.872 78.8516V159.024L98.5376 137.087L98.5334 137.08L69.9294 85.9214L69.8468 85.7724C68.2134 82.6996 70.405 78.8516 74.0899 78.8516H109.872" fill="#4DB8FF"/><path d="M639.524 146.751V62.9139H668V188.849H636.565L573.696 99.0752V188.849H545.034V62.9139H581.277L639.524 146.751Z" fill="white"/><path d="M456.407 191.686C414.432 191.686 384.107 163.081 384.107 126.74C384.107 90.3983 414.432 61.7931 456.407 61.7931C498.382 61.7931 528.707 90.5782 528.707 126.74C528.707 162.901 498.382 191.686 456.407 191.686ZM456.407 167.219C481 167.219 497.272 149.408 497.272 126.74C497.272 104.071 481 86.2605 456.407 86.2605C431.814 86.2605 415.542 104.071 415.542 126.74C415.542 149.408 431.814 167.219 456.407 167.219Z" fill="white"/><path d="M384.269 63.5978V85.7264H342.11V189.533H312.339V85.7264H270.179V63.5978H384.269Z" fill="white"/></svg>
    <div class="subtitle">👛 SYN WALLET</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div style="text-align:center; padding: 15px 0 25px;">
            <div style="font-size: 11px; opacity: 0.5;">ESTIMATED BALANCE</div>
            <h1 style="font-size:40px; margin:5px 0;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 11px; color: var(--blue); background: rgba(77, 184, 255, 0.1); padding: 6px 14px; border-radius: 20px; display: inline-block;">Disconnected</div>
        </div>
        <div id="asset_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="card">
            <h3 style="text-align:center;">Swap Assets</h3>
            <input type="number" placeholder="0.0">
            <button class="btn-confirm">Swap Now</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="card" style="text-align:center; padding: 40px 20px;">
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-bottom: 30px;"></div>
            <div style="display: flex; flex-direction: column; align-items: center;">
                <div class="rotating" style="width: 200px; height: 200px; display: flex; align-items: center; justify-content: center;">
                    <img src="https://i.ibb.co/S4F0cJFh/WEB3-Design-Works-Nariman-Mammadzada.jpg" style="width: 100%; height: auto; filter: drop-shadow(0 0 15px rgba(0,255,149,0.3));">
                </div>
                <p style="color: var(--blue); font-size: 12px; margin-top: 20px; opacity: 0.5; letter-spacing: 1px;">Secure Connection via TON Connect</p>
            </div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)">📊</div>
    <div class="nav-item" onclick="showTab('swap', this)">🌀</div>
    <div class="nav-item" onclick="showTab('connect', this)">🔐</div>
</nav>

<div id="universal_modal" class="modal-overlay" onclick="closeModal('universal_modal')">
    <div class="modal-body" onclick="event.stopPropagation()">
        
        <div id="view_menu" class="modal-view active">
            <div style="text-align:center; margin-bottom: 20px;">
                <img id="menu_asset_logo" class="modal-logo" src="">
                <h3 id="menu_title" style="margin:0;">Options</h3>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <button class="btn-confirm" style="background:#fff;" onclick="switchModalView('deposit')">RECEIVE</button>
                <button class="btn-confirm" style="background:var(--blue); color:white;" onclick="switchModalView('send')">SEND</button>
            </div>
        </div>

        <div id="view_deposit" class="modal-view">
            <div style="text-align:center;">
                <img id="deposit_asset_logo" class="modal-logo" src="" style="width:40px; height:40px;">
                <h3 style="margin-top:0;">Receive <span class="cur_asset"></span></h3>
            </div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:#fff; padding:15px; border-radius:15px;"></div>
            <p id="full_addr" style="font-size:11px; word-break:break-all; opacity:0.5; text-align:center;">Disconnected</p>
            <button class="btn-confirm" onclick="copyAddr()">Copy Address</button>
        </div>

        <div id="view_send" class="modal-view">
            <div style="text-align:center; margin-bottom: 15px;">
                <img id="send_asset_logo" class="modal-logo" src="" style="width:40px; height:40px;">
                <h3 style="margin:0;">Send <span class="cur_asset"></span></h3>
            </div>
            <input type="text" placeholder="Recipient Address">
            <input type="text" placeholder="Memo (Optional)">
            <input type="number" placeholder="Amount">
            <button class="btn-confirm" style="background:var(--green); color:black;">Confirm Send</button>
        </div>

        <button class="btn-confirm" style="background:transparent; color:white; opacity:0.3; margin-top:10px;" onclick="closeModal('universal_modal')">CLOSE</button>
    </div>
</div>

<script>
    const assets = [
        { id: 'TON', name: 'TON', cg: 'the-open-network', price: 0, img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png' },
        { id: 'BTC', name: 'Bitcoin', cg: 'bitcoin', price: 0, img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/bitcoin/info/logo.png' },
        { id: 'USDT', name: 'USDT', cg: 'tether', price: 0, img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
        { id: 'ETH', name: 'Ethereum', cg: 'ethereum', price: 0, img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png' },
        { id: 'SOL', name: 'Solana', cg: 'solana', price: 0, img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/solana/info/logo.png' }
    ];

    let currentAddr = "";

    async function updatePrices() {
        try {
            const ids = assets.map(a => a.cg).join(',');
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
            const data = await res.json();
            assets.forEach(a => {
                if(data[a.cg]) {
                    a.price = data[a.cg].usd;
                    const el = document.getElementById(`price_${a.id}`);
                    if(el) el.innerText = `$${a.price.toLocaleString()}`;
                }
            });
        } catch(e) { console.error("Price error"); }
    }

    function init() {
        const list = document.getElementById('asset_list'); list.innerHTML = "";
        assets.forEach(a => {
            list.innerHTML += `<div class="asset-item" onclick="showAssetMenu('${a.id}')"><div class="asset-icon-box"><img src="${a.img}" class="asset-icon-img"></div><div class="asset-details"><div class="asset-name">${a.id}</div><div class="asset-price" id="price_${a.id}">$0.00</div></div><div class="bal-amount">0.00</div></div>`;
        });
        updatePrices();
        const tc = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json', buttonRootId: 'ton-connect-btn' });
        tc.onStatusChange(w => { if(w) { currentAddr = w.account.address; document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"..."; document.getElementById('full_addr').innerText = currentAddr; document.getElementById("qrcode").innerHTML = ""; new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 150, height: 150 }); } });
    }

    function showAssetMenu(id) {
        const a = assets.find(x => x.id === id);
        document.getElementById('menu_title').innerText = a.name;
        document.getElementById('menu_asset_logo').src = a.img;
        document.getElementById('deposit_asset_logo').src = a.img;
        document.getElementById('send_asset_logo').src = a.img;
        document.querySelectorAll('.cur_asset').forEach(e => e.innerText = a.id);
        document.getElementById('universal_modal').style.display = 'flex';
    }

    function showTab(id, el) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById('scr_'+id).classList.add('active'); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; switchModalView('menu'); }
    function switchModalView(v) { document.querySelectorAll('.modal-view').forEach(x => x.classList.remove('active')); document.getElementById('view_'+v).classList.add('active'); }
    function copyAddr() { navigator.clipboard.writeText(currentAddr); Telegram.WebApp.showAlert("Copied!"); }

    window.onload = init;
</script>
</body>
</html>
