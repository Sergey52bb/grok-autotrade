<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX PRO</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Верхняя панель (45% высоты) */
        .top-section { height: 45%; display: flex; flex-direction: column; border-bottom: 1px solid #222; }
        .header { display: flex; justify-content: space-between; padding: 8px 12px; font-size: 14px; background: #121518; }
        
        .main-controls { display: flex; flex: 1; padding: 8px; gap: 8px; overflow: hidden; }
        
        /* Форма ордера */
        .order-form { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .mode-selector { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .mode-btn { flex: 1; border: none; padding: 8px; border-radius: 3px; color: var(--text); background: transparent; font-size: 12px; font-weight: bold; }
        .mode-btn.active-buy { background: var(--green); color: white; }
        .mode-btn.active-sell { background: var(--red); color: white; }
        
        .input-group { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .input-group label { font-size: 9px; color: var(--text); display: block; margin-bottom: 2px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        .action-btn { width: 100%; border: none; padding: 14px; border-radius: 4px; background: var(--green); color: white; font-weight: bold; margin-top: auto; font-size: 14px; }

        /* Стакан (Orderbook) - Фиксированная высота */
        .orderbook { flex: 1; background: #0b0e11; border-radius: 4px; border: 1px solid #222; display: flex; flex-direction: column; font-family: 'Roboto Mono', monospace; font-size: 11px; overflow: hidden; }
        .ob-header { display: flex; justify-content: space-between; color: var(--text); padding: 4px 6px; font-size: 10px; border-bottom: 1px solid #222; }
        .ob-list { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 6px; position: relative; cursor: pointer; height: 18px; align-items: center; }
        .ob-fill { position: absolute; right: 0; height: 100%; opacity: 0.15; z-index: 0; }
        .ob-val { z-index: 1; }

        /* Секция графика (35% высоты) */
        #chart-container { height: 35%; width: 100%; background: var(--bg); position: relative; }

        /* Навигация (20% высоты) */
        .nav-bar { height: 20%; display: flex; background: var(--panel); border-top: 1px solid #222; align-items: center; justify-content: space-around; }
        .nav-link { text-align: center; color: var(--text); text-decoration: none; font-size: 11px; display: flex; flex-direction: column; gap: 5px; }
        .nav-link.active { color: white; font-weight: bold; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>

<div class="top-section">
    <div class="header">
        <div>STRATEX <b>TON/USDT</b></div>
        <div id="price-top" style="color:var(--green)">1.3148</div>
    </div>
    <div class="main-controls">
        <div class="order-form">
            <div class="mode-selector">
                <button id="buy-mode" class="mode-btn active-buy" onclick="toggleMode('buy')">Buy</button>
                <button id="sell-mode" class="mode-btn" onclick="toggleMode('sell')">Sell</button>
            </div>
            <div class="input-group">
                <label>Price (USDT)</label>
                <input type="number" id="target-price" value="1.3148" step="0.0001">
            </div>
            <div class="input-group">
                <label>Amount (TON)</label>
                <input type="number" placeholder="0.0">
            </div>
            <button class="action-btn" id="submit-btn">Buy TON</button>
        </div>
        
        <div class="orderbook">
            <div class="ob-header"><span>Price</span><span>Amount</span></div>
            <div id="asks" class="ob-list" style="justify-content: flex-end;"></div>
            <div id="spread" style="text-align:center; padding:4px; font-weight:bold; color:var(--green); background:#121518; border-y: 1px solid #222;">1.3148</div>
            <div id="bids" class="ob-list"></div>
        </div>
    </div>
</div>

<div id="chart-container"></div>

<div class="nav-bar">
    <a href="#" class="nav-link active"><span class="nav-icon">📊</span>Рынок</a>
    <a href="#" class="nav-link"><span class="nav-icon">💼</span>Активы</a>
    <a href="#" class="nav-link"><span class="nav-icon">📜</span>Сделки</a>
    <a href="#" class="nav-link"><span class="nav-icon">⚙️</span>Настройки</a>
</div>

<script>
    // Инициализация стандартного графика
    const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
        layout: { backgroundColor: '#0b0e11', textColor: '#848e9c' },
        grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        priceScale: { borderColor: '#222' },
        timeScale: { borderColor: '#222', timeVisible: true },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#0ecb81', downColor: '#f6465d', borderVisible: false,
        wickUpColor: '#0ecb81', wickDownColor: '#f6465d'
    });

    // Генерация данных
    let currentPrice = 1.3148;
    let data = [];
    let now = Math.floor(Date.now() / 1000) - 100 * 60;
    for(let i=0; i<100; i++) {
        let open = currentPrice + (Math.random()-0.5)*0.005;
        let close = open + (Math.random()-0.5)*0.005;
        data.push({ time: now + i*60, open, high: Math.max(open, close)+0.002, low: Math.min(open, close)-0.002, close });
        currentPrice = close;
    }
    candleSeries.setData(data);

    function toggleMode(m) {
        const btn = document.getElementById('submit-btn');
        document.getElementById('buy-mode').className = m==='buy' ? 'mode-btn active-buy' : 'mode-btn';
        document.getElementById('sell-mode').className = m==='sell' ? 'mode-btn active-sell' : 'mode-btn';
        btn.style.background = m==='buy' ? 'var(--green)' : 'var(--red)';
        btn.innerText = m==='buy' ? 'Buy TON' : 'Sell TON';
    }

    function updateOrderbook() {
        const row = (p, a, color) => `
            <div class="ob-row" onclick="document.getElementById('target-price').value='${p.toFixed(4)}'">
                <div class="ob-fill" style="width:${a*5}%; background:${color}"></div>
                <span style="color:${color}" class="ob-val">${p.toFixed(4)}</span>
                <span class="ob-val">${a.toFixed(1)}</span>
            </div>`;
        
        let asks = '', bids = '';
        for(let i=0; i<8; i++) asks += row(currentPrice + 0.001 + i*0.001, Math.random()*15 + 2, 'var(--red)');
        for(let i=0; i<8; i++) bids += row(currentPrice - 0.001 - i*0.001, Math.random()*15 + 2, 'var(--green)');
        
        document.getElementById('asks').innerHTML = asks;
        document.getElementById('bids').innerHTML = bids;
        document.getElementById('spread').innerText = currentPrice.toFixed(4);
        document.getElementById('price-top').innerText = currentPrice.toFixed(4);
    }

    // Живое обновление
    setInterval(() => {
        let last = data[data.length-1];
        currentPrice += (Math.random()-0.5)*0.001;
        last.close = currentPrice;
        last.high = Math.max(last.high, currentPrice);
        last.low = Math.min(last.low, currentPrice);
        candleSeries.update(last);
        updateOrderbook();
    }, 1000);

    window.addEventListener('resize', () => {
        chart.resize(window.innerWidth, document.getElementById('chart-container').offsetHeight);
    });
    updateOrderbook();
</script>
</body>
</html>
