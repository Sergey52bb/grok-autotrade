<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Terminal LIVE</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; --gold: #f0b90b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 48px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); z-index: 1001; background: var(--bg); cursor: pointer; }
        .brand { display: flex; align-items: center; gap: 6px; }
        .brand-logo { width: 22px; height: 22px; filter: drop-shadow(0 0 3px var(--green)); }
        .brand-name { color: var(--green); font-weight: 900; font-size: 16px; letter-spacing: 0.5px; }
        
        .current-asset { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 4px; background: var(--panel); }
        .price-display { color: var(--green); font-weight: bold; font-family: monospace; font-size: 15px; min-width: 80px; text-align: right; }

        #coinList { position: absolute; top: 48px; left: 0; width: 100%; height: calc(100vh - 48px); background: var(--bg); z-index: 1000; display: none; overflow-y: auto; }
        .coin-item { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .coin-item:active { background: var(--panel); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-logo-img { width: 24px; height: 24px; border-radius: 50%; object-fit: contain; background: #fff; }
        .coin-name { font-weight: bold; font-size: 14px; }
        .live-p { font-family: monospace; font-weight: bold; }

        .chart-box { height: 240px; width: 100%; border-bottom: 1px solid var(--border); }
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .book { width: 42%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px; font-family: monospace; font-size: 10px; }
        .row { display: flex; justify-content: space-between; height: 18px; position: relative; align-items: center; }
        .bar { position: absolute; right: 0; height: 80%; opacity: 0.12; }

        .trade { width: 58%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-toggle { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .s-btn { flex: 1; border: none; padding: 8px; border-radius: 3px; font-size: 11px; font-weight: bold; color: var(--text); background: none; }
        .s-btn.buy { background: var(--green); color: white; }
        .s-btn.sell { background: var(--red); color: white; }

        .inp { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .inp label { display: block; font-size: 8px; color: var(--text); }
        .inp input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }

        .action-btn { background: var(--green); border: none; color: white; padding: 14px; border-radius: 4px; font-weight: bold; margin-top: auto; }
        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
        .n-link { font-size: 10px; color: var(--text); text-decoration: none; }
    </style>
</head>
<body>

<header onclick="toggleCoins()">
    <div class="brand">
        <img class="brand-logo" src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png">
        <span class="brand-name">STRATEX</span>
    </div>
    <div class="current-asset">
        <img id="activeImg" class="coin-logo-img" style="width:16px; height:16px;" src="https://assets.coingecko.com/coins/images/4324/standard/diamond.png">
        <span id="activePair" style="font-weight: bold; font-size: 12px;">STRAT/USDT</span>
    </div>
    <div class="price-display" id="topPrice">17.3800</div>
</header>

<div id="coinList">
    </div>

<div class="chart-box"><div id="tv_main" style="width:100%; height:100%;"></div></div>

<div class="workspace">
    <div class="book">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="midPrice" style="text-align:center; padding:8px 0; font-weight:bold; font-size:14px; color:var(--green);">0.00</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>
    <div class="trade">
        <div class="side-toggle">
            <button class="s-btn buy" id="bBuy" onclick="side('buy')">Buy</button>
            <button class="s-btn" id="bSell" onclick="side('sell')">Sell</button>
        </div>
        <div class="inp"><label>Price</label><input type="number" id="iPrice" step="any"></div>
        <div class="inp"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <button class="action-btn" id="mainBtn">Buy STRAT</button>
    </div>
</div>

<nav>
    <a href="#" class="n-link" style="color: white;">📊 Trade</a>
    <a href="#" class="n-link">💼 Wallet</a>
    <a href="#" class="n-link">💎 STRAT</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const coins = [
        { id: 'STRAT', name: 'STRAT', symbol: 'STRATUSDT', price: 17.3800, img: 'https://assets.coingecko.com/coins/images/4324/standard/diamond.png', live: false },
        { id: 'bitcoin', name: 'BTC', symbol: 'BTCUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/1/standard/bitcoin.png', live: true },
        { id: 'ethereum', name: 'ETH', symbol: 'ETHUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/279/standard/ethereum.png', live: true },
        { id: 'ton', name: 'TON', symbol: 'TONUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/17980/standard/ton_symbol.png', live: true },
        { id: 'solana', name: 'SOL', symbol: 'SOLUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/4128/standard/solana.png', live: true },
        { id: 'dogecoin', name: 'DOGE', symbol: 'DOGEUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/5/standard/dogecoin.png', live: true },
        { id: 'binancecoin', name: 'BNB', symbol: 'BNBUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/825/standard/bnb.png', live: true },
        { id: 'astar', name: 'ASTER', symbol: 'ASTRUSDT', price: 0, img: 'https://assets.coingecko.com/coins/images/22137/standard/astar.png', live: true },
        { id: 'hot', name: 'HOT', symbol: 'HOTUSDT', price: 0, img: 'https://raw.githubusercontent.com/here-wallet/hot-logo/main/logo.png', live: false, soon: true }
    ];

    let currentCoin = coins[0];
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');

    function renderList() {
        const list = document.getElementById('coinList');
        list.innerHTML = coins.map(c => `
            <div class="coin-item" onclick="pick('${c.symbol}')">
                <div class="coin-info">
                    <img class="coin-logo-img" src="${c.img}">
                    <span class="coin-name">${c.name}</span>
                </div>
                <div class="live-p" id="p-${c.symbol}" style="color:${c.soon ? 'var(--gold)' : 'var(--green)'}">
                    ${c.soon ? 'SOON' : (c.price > 0 ? c.price.toFixed(c.price < 1 ? 4 : 2) : 'Загрузка...')}
                </div>
            </div>
        `).join('');
    }

    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        data.forEach(ticker => {
            const coin = coins.find(c => c.symbol === ticker.s && c.live);
            if (coin) {
                coin.price = parseFloat(ticker.c);
                const el = document.getElementById(`p-${coin.symbol}`);
                if (el) el.innerText = coin.price.toFixed(coin.price < 1 ? 4 : 2);
                if (currentCoin.symbol === coin.symbol) updateLiveUI();
            }
        });
    };

    function pick(symbol) {
        currentCoin = coins.find(c => c.symbol === symbol);
        document.getElementById('activeImg').src = currentCoin.img;
        document.getElementById('activePair').innerText = currentCoin.name + '/USDT';
        document.getElementById('iPrice').value = currentCoin.soon ? "" : currentCoin.price;
        document.getElementById('iPrice').placeholder = currentCoin.soon ? "Listing Soon" : "";
        toggleCoins();
        updateBtn();
        initChart(symbol);
    }

    function updateLiveUI() {
        if (currentCoin.soon) return;
        const p = currentCoin.price.toFixed(currentCoin.price < 1 ? 4 : 2);
        document.getElementById('topPrice').innerText = p;
        document.getElementById('midPrice').innerText = p;
        // Обновляем стакан (имитация)
        const row = (c) => `<div class="row"><div class="bar" style="width:${Math.random()*80}%; background:${c}"></div><span>${(currentCoin.price * (1 + (Math.random()-0.5)*0.002)).toFixed(4)}</span><span style="color:var(--text)">${(Math.random()*5).toFixed(1)}</span></div>`;
        let ah = '', bh = '';
        for(let i=0; i<6; i++) { ah += row('var(--red)'); bh += row('var(--green)'); }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }

    function toggleCoins() {
        const list = document.getElementById('coinList');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }

    function initChart(symbol) {
        let s = (symbol === "STRATUSDT" || symbol === "HOTUSDT") ? "BINANCE:TONUSDT" : "BINANCE:" + symbol;
        new TradingView.widget({ "autosize": true, "symbol": s, "interval": "15", "theme": "dark", "style": "1", "locale": "ru", "container_id": "tv_main", "hide_legend": true, "toolbar_bg": "#0b0e11" });
    }

    function side(s) {
        document.getElementById('bBuy').className = s === 'buy' ? 's-btn buy' : 's-btn';
        document.getElementById('bSell').className = s === 'sell' ? 's-btn sell' : 's-btn';
        document.getElementById('mainBtn').style.background = s === 'buy' ? 'var(--green)' : 'var(--red)';
        updateBtn();
    }

    function updateBtn() {
        const isBuy = document.getElementById('bBuy').classList.contains('buy');
        document.getElementById('mainBtn').innerText = (isBuy ? 'Buy ' : 'Sell ') + currentCoin.name;
    }

    renderList();
    initChart("STRATUSDT");
    updateLiveUI();
</script>
</body>
</html>
