<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Terminal Fixed</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: white; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 45px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 17px; }

        #main_content { flex: 1; position: relative; overflow: hidden; margin-bottom: 60px; }
        .screen { display: none; height: 100%; width: 100%; flex-direction: column; }
        
        /* График */
        #chart_wrap { height: 38%; width: 100%; background: #000; flex-shrink: 0; position: relative; }
        
        /* Торговая зона */
        .trade-area { display: flex; height: 190px; border-top: 1px solid var(--border); overflow: hidden; flex-shrink: 0; }
        .book { width: 45%; border-right: 1px solid var(--border); padding: 4px; font-family: monospace; font-size: 11px; overflow: hidden; }
        .ob-row { display: flex; justify-content: space-between; height: 16px; position: relative; padding: 0 2px; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.12; z-index: 0; }
        .ob-row span { z-index: 1; white-space: nowrap; }
        
        .trade-form { width: 55%; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 7px; border-radius: 3px; color: var(--text); background: none; font-weight: bold; font-size: 11px; transition: 0.2s; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }
        
        .fld { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .fld label { display: block; font-size: 8px; color: var(--text); text-transform: uppercase; margin-bottom: 1px; }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 14px; outline: none; font-family: monospace; }
        .action-btn { background: var(--green); border: none; color: black; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 14px; margin-top: auto; }

        /* Ордера */
        .orders-area { flex: 1; border-top: 1px solid var(--border); background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        .orders-tabs { display: flex; gap: 15px; padding: 10px 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .order-tab { font-size: 12px; color: var(--text); font-weight: bold; }
        .order-tab.active { color: white; border-bottom: 2px solid var(--green); }
        .order-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .order-item { display: flex; justify-content: space-between; font-size: 11px; padding: 8px 0; border-bottom: 1px solid #1e2329; }

        /* Навигация */
        nav { height: 60px; background: var(--panel); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 10px; }
        .nav-item.active { color: white; }
        
        #toast { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--green); color: black; padding: 8px 20px; border-radius: 20px; font-weight: bold; display: none; z-index: 10001; font-size: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="toast">Order Success!</div>

<div id="main_content">
    <div id="screen_trade" class="screen">
        <header><b id="pair_name">TON/USDT</b><div class="price-top" id="topPrice">0.0000</div></header>
        <div id="chart_wrap"><div id="tv_container" style="width:100%; height:100%;"></div></div>
        
        <div class="trade-area">
            <div class="book">
                <div id="asks" style="color:var(--red); display:flex; flex-direction:column-reverse;"></div>
                <div id="midPrice" style="text-align:center; padding:4px 0; font-size:15px; color:var(--green); font-weight:bold; border-top:1px solid #1e2329; border-bottom:1px solid #1e2329; margin:2px 0;">0.0000</div>
                <div id="bids" style="color:var(--green);"></div>
            </div>
            <div class="trade-form">
                <div class="side-btns">
                    <button class="side-btn active buy" onclick="setSide('buy', this)">BUY</button>
                    <button class="side-btn" onclick="setSide('sell', this)">SELL</button>
                </div>
                <div class="fld"><label>Price</label><input type="number" id="iPrice" step="any"></div>
                <div class="fld"><label>Amount</label><input type="number" id="iAmount" placeholder="0.0"></div>
                <button class="action-btn" id="mainBtn" onclick="placeOrder()">BUY TON</button>
            </div>
        </div>

        <div class="orders-area">
            <div class="orders-tabs">
                <div class="order-tab active" id="openOrdersCount">Open Orders (0)</div>
                <div class="order-tab">History</div>
            </div>
            <div class="order-list" id="historyList">
                <div style="text-align:center; color:var(--text); font-size:11px; margin-top:20px;">No active orders</div>
            </div>
        </div>
    </div>

    <div id="screen_market" class="screen" style="padding: 20px;">
        <h2 style="margin-bottom:20px;">Markets</h2>
        <div style="background:var(--panel); border-radius:12px; overflow:hidden;">
            <div style="padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid var(--border);" onclick="selectCoin('TON')">
                <b>TON / USDT</b> <span id="mPriceTON" style="color:var(--green)">...</span>
            </div>
            <div style="padding:15px; display:flex; justify-content:space-between;" onclick="selectCoin('BTC')">
                <b>BTC / USDT</b> <span id="mPriceBTC" style="color:var(--green)">...</span>
            </div>
        </div>
    </div>

    <div id="screen_wallet" class="screen" style="padding: 20px;">
        <h2>Wallet</h2>
        <div style="background:var(--panel); padding:25px; border-radius:15px; margin-top:20px; text-align:center;">
            <div style="color:var(--text); font-size:12px;">Total Balance</div>
            <div style="font-size:32px; font-weight:bold; margin-top:10px;">$ <span id="total_val">0.00</span></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showScreen('trade', this)"><span>📊</span>Trade</div>
    <div class="nav-item" onclick="showScreen('market', this)"><span>📈</span>Market</div>
    <div class="nav-item" onclick="showScreen('wallet', this)"><span>💼</span>Wallet</div>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let prices = { TON: 0, BTC: 0 };
    let currentCoin = 'TON';
    let currentSide = 'buy';
    let history = [];

    function loadChart(id) {
        const symbol = id === 'BTC' ? 'BINANCE:BTCUSDT' : 'BINANCE:TONUSDT';
        document.getElementById('tv_container').innerHTML = '';
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "toolbar_bg": "#0b0e11",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "tv_container",
            "studies": [],
            "disabled_features": ["header_widget", "left_toolbar", "control_bar", "timeframes_toolbar", "header_indicators", "header_settings", "header_compare"],
            "overrides": {
                "paneProperties.background": "#0b0e11",
                "paneProperties.vertGridProperties.color": "#171a1e",
                "paneProperties.horzGridProperties.color": "#171a1e",
                "scalesProperties.showSymbolLabels": false, // ОТКЛЮЧАЕМ лишние надписи
                "mainSeriesProperties.priceLineColor": "transparent" // Убираем линию текущей цены на шкале
            }
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@ticker/btcusdt@ticker');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.s === 'TONUSDT') prices.TON = parseFloat(data.c);
        if (data.s === 'BTCUSDT') prices.BTC = parseFloat(data.c);
        updateUI();
    };

    function updateUI() {
        const p = currentCoin === 'TON' ? prices.TON : prices.BTC;
        if(!p) return;
        
        document.getElementById('topPrice').innerText = p.toLocaleString(undefined, {minimumFractionDigits: currentCoin === 'BTC' ? 1 : 4});
        document.getElementById('midPrice').innerText = p.toLocaleString(undefined, {minimumFractionDigits: currentCoin === 'BTC' ? 1 : 4});
        
        if(prices.TON) document.getElementById('mPriceTON').innerText = '$' + prices.TON.toFixed(2);
        if(prices.BTC) document.getElementById('mPriceBTC').innerText = '$' + prices.BTC.toLocaleString();

        const genRows = (clr) => {
            let h = '';
            for(let i=0; i<6; i++) {
                let rP = (p * (1 + (Math.random()-0.5)*0.0012)).toFixed(currentCoin === 'BTC' ? 1 : 4);
                h += `<div class="ob-row"><div class="ob-bar" style="width:${Math.random()*60}%; background:${clr}"></div><span>${rP}</span><span style="color:var(--text)">${(Math.random()*2).toFixed(2)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = genRows('var(--red)');
        document.getElementById('bids').innerHTML = genRows('var(--green)');
    }

    function placeOrder() {
        const amt = document.getElementById('iAmount').value;
        if(!amt || amt <= 0) return;
        const prc = currentCoin === 'TON' ? prices.TON : prices.BTC;

        history.unshift({ pair: currentCoin, side: currentSide, amount: amt, price: prc.toLocaleString(), time: new Date().toLocaleTimeString() });
        
        updateHistory();
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
        document.getElementById('iAmount').value = '';
    }

    function updateHistory() {
        document.getElementById('openOrdersCount').innerText = `Open Orders (${history.length})`;
        document.getElementById('historyList').innerHTML = history.map(o => `
            <div class="order-item">
                <span style="color:${o.side === 'buy' ? 'var(--green)' : 'var(--red)'}">${o.side.toUpperCase()}</span>
                <span style="font-weight:bold">${o.pair}</span>
                <span>${o.amount} @ ${o.price}</span>
            </div>
        `).join('');
    }

    function selectCoin(id) {
        currentCoin = id;
        document.getElementById('pair_name').innerText = id + '/USDT';
        document.getElementById('mainBtn').innerText = currentSide.toUpperCase() + ' ' + id;
        loadChart(id);
        showScreen('trade', document.querySelectorAll('.nav-item')[0]);
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('screen_' + id).style.display = (id === 'trade' ? 'flex' : 'block');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    function setSide(side, btn) {
        currentSide = side;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active', 'buy', 'sell'));
        btn.classList.add('active', side);
        const b = document.getElementById('mainBtn');
        b.style.background = side === 'buy' ? 'var(--green)' : 'var(--red)';
        b.style.color = side === 'buy' ? 'black' : 'white';
        b.innerText = side.toUpperCase() + ' ' + currentCoin;
    }

    window.onload = () => loadChart('TON');
</script>
</body>
</html>
