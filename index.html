<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AutoTrade - Spot Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #161a1e; --text: #eaecef; --primary: #02c076; --secondary: #f84960; --input: #2b3139; --border: #474d57; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { padding: 10px 20px; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { color: var(--primary); font-weight: 700; font-size: 18px; }

        .main-layout { display: grid; grid-template-columns: 1fr 300px 300px; grid-template-rows: 1fr 250px; flex-grow: 1; gap: 2px; background: var(--border); }
        .panel { background: var(--card); padding: 15px; position: relative; }

        /* График */
        .chart-area { grid-column: 1 / 2; grid-row: 1 / 2; display: flex; align-items: center; justify-content: center; color: #474d57; }

        /* Стакан ордеров (Order Book) */
        .order-book { grid-column: 2 / 3; grid-row: 1 / 3; font-family: 'Roboto Mono', monospace; font-size: 12px; }
        .ob-header { display: flex; justify-content: space-between; color: #848e9c; margin-bottom: 10px; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 0; position: relative; }
        .ob-price { width: 40%; }
        .ob-amount { width: 30%; text-align: right; }
        .ob-total { width: 30%; text-align: right; }
        .sell-side { color: var(--secondary); }
        .buy-side { color: var(--primary); }
        .current-price { font-size: 18px; font-weight: 700; margin: 15px 0; text-align: center; }

        /* Панель торговли */
        .trade-panel { grid-column: 3 / 4; grid-row: 1 / 3; border-left: 1px solid var(--border); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 4px; cursor: pointer; font-weight: 600; background: var(--input); }
        .tab.buy { color: var(--primary); border: 1px solid var(--primary); }
        .tab.sell { color: var(--secondary); border: 1px solid var(--secondary); }
        
        .trade-input { background: var(--input); border: 1px solid transparent; border-radius: 4px; padding: 10px; margin-bottom: 15px; }
        .trade-input label { font-size: 12px; color: #848e9c; display: block; margin-bottom: 5px; }
        .trade-input-row { display: flex; justify-content: space-between; align-items: center; }
        .trade-input input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; }

        .action-btn { width: 100%; padding: 12px; border-radius: 4px; border: none; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-buy { background: var(--primary); color: white; }
        .btn-sell { background: var(--secondary); color: white; }

        /* История / Ассеты */
        .assets-panel { grid-column: 1 / 2; grid-row: 2 / 3; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<header>
    <div class="logo">EDGEX <span style="color:white">TON</span></div>
    <div id="ton-connect-button"></div>
</header>

<div class="main-layout">
    <div class="panel chart-area">
        <div style="text-align: center;">
            <p>TON/USDT Chart</p>
            <small>(Здесь будет график TradingView)</small>
        </div>
    </div>

    <div class="panel order-book">
        <div class="ob-header"><span>Price</span><span>Amount</span><span>Total</span></div>
        <div id="asks"></div> <div class="current-price" id="mid-price">0.00</div>
        <div id="bids"></div> </div>

    <div class="panel trade-panel">
        <div class="tabs">
            <div class="tab buy" onclick="setMode('buy')">Buy</div>
            <div class="tab sell" onclick="setMode('sell')">Sell</div>
        </div>
        
        <div class="trade-input">
            <label>Price</label>
            <div class="trade-input-row">
                <input type="number" id="market-price" readonly>
                <span>USDT</span>
            </div>
        </div>

        <div class="trade-input">
            <label>Amount</label>
            <div class="trade-input-row">
                <input type="number" placeholder="0.00" id="amount-input">
                <span>TON</span>
            </div>
        </div>

        <button class="action-btn btn-buy" id="main-trade-btn">Buy TON</button>
        
        <div style="margin-top: 20px; font-size: 12px; color: #848e9c;">
            <div style="display: flex; justify-content: space-between;"><span>Avail.</span><span>0.00 TON</span></div>
        </div>
    </div>

    <div class="panel assets-panel">
        <div style="font-size: 14px; font-weight: 600; color: #848e9c;">Open Orders (0)</div>
    </div>
</div>

<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    let currentPrice = 5.35;

    // Имитация стакана (Order Book)
    function generateOrderBook() {
        const asks = document.getElementById('asks');
        const bids = document.getElementById('bids');
        asks.innerHTML = ''; bids.innerHTML = '';

        for(let i=0; i<8; i++) {
            const price = (currentPrice + (i * 0.002)).toFixed(3);
            asks.innerHTML = `<div class="ob-row sell-side"><span class="ob-price">${price}</span><span class="ob-amount">0.${(Math.random()*99).toFixed(0)}</span><span class="ob-total">1.2</span></div>` + asks.innerHTML;
            
            const bPrice = (currentPrice - (i * 0.002)).toFixed(3);
            bids.innerHTML += `<div class="ob-row buy-side"><span class="ob-price">${bPrice}</span><span class="ob-amount">0.${(Math.random()*99).toFixed(0)}</span><span class="ob-total">0.8</span></div>`;
        }
    }

    async function fetchLivePrice() {
        try {
            const res = await fetch('https://api.ston.fi/v1/assets');
            const data = await res.json();
            const ton = data.assets.find(a => a.symbol === 'TON');
            if (ton) {
                currentPrice = parseFloat(ton.dex_usd_price);
                document.getElementById('mid-price').innerText = currentPrice.toFixed(2);
                document.getElementById('market-price').value = currentPrice.toFixed(2);
                generateOrderBook();
            }
        } catch(e) { console.log("Price error"); }
    }

    function setMode(mode) {
        const btn = document.getElementById('main-trade-btn');
        if(mode === 'buy') {
            btn.innerText = 'Buy TON';
            btn.className = 'action-btn btn-buy';
        } else {
            btn.innerText = 'Sell TON';
            btn.className = 'action-btn btn-sell';
        }
    }

    fetchLivePrice();
    setInterval(fetchLivePrice, 5000);
</script>
</body>
</html>
