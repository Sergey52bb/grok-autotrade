<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Terminal</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; --gold: #f0b90b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 48px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 1001; background: var(--bg); cursor: pointer; }
        .brand { display: flex; align-items: center; gap: 6px; }
        .brand-logo { width: 22px; height: 22px; filter: drop-shadow(0 0 5px var(--green)); }
        .brand-name { color: var(--green); font-weight: 900; font-size: 16px; letter-spacing: 0.5px; }
        
        .current-asset { display: flex; align-items: center; gap: 8px; margin-left: 10px; padding: 4px 8px; border-radius: 4px; background: var(--panel); }
        .price-display { color: var(--green); font-weight: bold; font-family: monospace; font-size: 15px; }

        /* СПИСОК МОНЕТ */
        #coinList { 
            position: absolute; top: 48px; left: 0; width: 100%; height: calc(100vh - 48px); 
            background: var(--bg); z-index: 1000; display: none; overflow-y: auto; padding: 5px 0;
        }
        .coin-item { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .coin-item:active { background: var(--panel); }
        .coin-info { display: flex; align-items: center; gap: 12px; }
        .coin-logo-img { width: 24px; height: 24px; border-radius: 50%; }
        .coin-name { font-weight: bold; font-size: 14px; }
        .soon-badge { color: var(--gold); font-size: 11px; font-weight: bold; border: 1px solid var(--gold); padding: 1px 5px; border-radius: 3px; }

        .chart-box { height: 240px; width: 100%; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .workspace { display: flex; flex: 1; overflow: hidden; }

        .book { width: 42%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px; font-family: monospace; }
        .row { display: flex; justify-content: space-between; font-size: 10px; height: 18px; position: relative; align-items: center; cursor: pointer; }
        .bar { position: absolute; right: 0; height: 80%; opacity: 0.12; z-index: 0; pointer-events: none; }

        .trade { width: 58%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-toggle { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .s-btn { flex: 1; border: none; padding: 8px; border-radius: 3px; font-size: 11px; font-weight: bold; color: var(--text); background: none; }
        .s-btn.buy { background: var(--green); color: white; }
        .s-btn.sell { background: var(--red); color: white; }

        .inp { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .inp label { display: block; font-size: 8px; color: var(--text); text-transform: uppercase; }
        .inp input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; font-weight: bold; }

        .action-btn { background: var(--green); border: none; color: white; padding: 14px; border-radius: 4px; font-weight: bold; font-size: 14px; margin-top: auto; }

        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
        .n-link { font-size: 10px; color: var(--text); text-decoration: none; text-align: center; }
        .n-link i { display: block; font-size: 18px; margin-bottom: 2px; }
    </style>
</head>
<body>

<header onclick="toggleCoins()">
    <div class="brand">
        <img class="brand-logo" src="https://cdn-icons-png.flaticon.com/512/2091/2091665.png" alt="logo">
        <span class="brand-name">STRATEX</span>
    </div>
    <div class="current-asset">
        <img id="activeImg" class="coin-logo-img" style="width:16px; height:16px;" src="https://cryptologos.cc/logos/diamond-dmd-logo.png">
        <span id="activePair" style="font-weight: bold; font-size: 12px;">STRAT/USDT</span>
    </div>
    <div class="price-display" id="topPrice">17.3800</div>
</header>

<div id="coinList">
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/diamond-dmd-logo.png', 'STRAT/USDT', 17.3800)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/diamond-dmd-logo.png"><span class="coin-name">STRAT</span></div>
        <div style="color:var(--green)">17.3800</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/toncoin-ton-logo.png', 'TON/USDT', 1.3145)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/toncoin-ton-logo.png"><span class="coin-name">TON</span></div>
        <div style="color:var(--green)">1.3145</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/ethereum-eth-logo.png', 'ETH/USDT', 3942.50)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/ethereum-eth-logo.png"><span class="coin-name">ETH</span></div>
        <div style="color:var(--green)">3942.50</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/bitcoin-btc-logo.png', 'BTC/USDT', 71205.10)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/bitcoin-btc-logo.png"><span class="coin-name">BTC</span></div>
        <div style="color:var(--red)">71205.10</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/bnb-bnb-logo.png', 'BNB/USDT', 612.40)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/bnb-bnb-logo.png"><span class="coin-name">BNB</span></div>
        <div style="color:var(--green)">612.40</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/solana-sol-logo.png', 'SOL/USDT', 148.15)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/solana-sol-logo.png"><span class="coin-name">SOL</span></div>
        <div style="color:var(--green)">148.15</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/near-protocol-near-logo.png', 'NEAR/USDT', 6.9200)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/near-protocol-near-logo.png"><span class="coin-name">NEAR</span></div>
        <div style="color:var(--green)">6.9200</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/tron-trx-logo.png', 'TRX/USDT', 0.1325)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/tron-trx-logo.png"><span class="coin-name">TRON</span></div>
        <div style="color:var(--green)">0.1325</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/litecoin-ltc-logo.png', 'LTC/USDT', 88.40)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/litecoin-ltc-logo.png"><span class="coin-name">LITECOIN</span></div>
        <div style="color:var(--red)">88.40</div>
    </div>
    <div class="coin-item" onclick="pick('https://cryptologos.cc/logos/astar-astr-logo.png', 'ASTR/USDT', 0.1210)">
        <div class="coin-info"><img class="coin-logo-img" src="https://cryptologos.cc/logos/astar-astr-logo.png"><span class="coin-name">ASTER</span></div>
        <div style="color:var(--green)">0.1210</div>
    </div>
    <div class="coin-item" onclick="pick('https://raw.githubusercontent.com/here-wallet/hot-logo/main/logo.png', 'HOT/USDT', 0)">
        <div class="coin-info"><img class="coin-logo-img" src="https://raw.githubusercontent.com/here-wallet/hot-logo/main/logo.png"><span class="coin-name">HOT</span></div>
        <div class="soon-badge">SOON</div>
    </div>
</div>

<div class="chart-box">
    <div id="tv_main" style="width: 100%; height: 100%;"></div>
</div>

<div class="workspace">
    <div class="book">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="midPrice" style="text-align:center; padding:8px 0; font-weight:bold; font-size:15px; color:var(--green);">17.3800</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>
    <div class="trade">
        <div class="side-toggle">
            <button class="s-btn buy" id="bBuy" onclick="side('buy')">Buy</button>
            <button class="s-btn" id="bSell" onclick="side('sell')">Sell</button>
        </div>
        <div class="inp"><label>Price</label><input type="number" id="iPrice" value="17.3800"></div>
        <div class="inp"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <button class="action-btn" id="mainBtn">Buy STRAT</button>
    </div>
</div>

<nav>
    <a href="#" class="n-link" style="color: white;"><i>📊</i>Trade</a>
    <a href="#" class="n-link"><i>💼</i>Wallet</a>
    <a href="#" class="n-link"><i>💎</i>STRAT</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let curP = 17.3800;
    function toggleCoins() {
        const list = document.getElementById('coinList');
        list.style.display = list.style.display === 'block' ? 'none' : 'block';
    }
    function pick(img, pair, price) {
        document.getElementById('activeImg').src = img;
        document.getElementById('activePair').innerText = pair;
        const priceInput = document.getElementById('iPrice');
        if(price === 0) {
            priceInput.value = "";
            priceInput.placeholder = "Listing Soon";
            curP = 5.24; // Дефолтная база для HOT
        } else {
            priceInput.value = price;
            curP = price;
        }
        toggleCoins();
        updateBtn();
        initChart(pair.split('/')[0] + "USDT");
    }
    function initChart(symbol) {
        let s = (symbol === "STRATUSDT" || symbol === "HOTUSDT") ? "OKX:TONUSDT" : "BYBIT:" + symbol;
        new TradingView.widget({
            "autosize": true, "symbol": s, "interval": "15", "theme": "dark",
            "style": "1", "locale": "ru", "container_id": "tv_main", "hide_legend": true
        });
    }
    function side(s) {
        document.getElementById('bBuy').className = s === 'buy' ? 's-btn buy' : 's-btn';
        document.getElementById('bSell').className = s === 'sell' ? 's-btn sell' : 's-btn';
        document.getElementById('mainBtn').style.background = s === 'buy' ? 'var(--green)' : 'var(--red)';
        updateBtn();
    }
    function updateBtn() {
        const name = document.getElementById('activePair').innerText.split('/')[0];
        const isBuy = document.getElementById('bBuy').classList.contains('buy');
        document.getElementById('mainBtn').innerText = (isBuy ? 'Buy ' : 'Sell ') + name;
    }
    function live() {
        curP += (Math.random() - 0.5) * (curP * 0.001);
        const row = (c) => `<div class="row" onclick="document.getElementById('iPrice').value=${(curP + (Math.random()-0.5)*(curP*0.01)).toFixed(4)}">
            <div class="bar" style="width:${Math.random()*80}%; background:${c}"></div>
            <span>${(curP + (Math.random()-0.5)*(curP*0.01)).toFixed(4)}</span>
            <span style="color:var(--text)">${(Math.random()*10).toFixed(1)}</span>
        </div>`;
        let ah = '', bh = '';
        for(let i=0; i<8; i++) { ah += row('var(--red)'); bh += row('var(--green)'); }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
        document.getElementById('topPrice').innerText = curP.toFixed(4);
        document.getElementById('midPrice').innerText = curP.toFixed(4);
    }
    initChart("TONUSDT");
    setInterval(live, 2000);
    live();
</script>
</body>
</html>
