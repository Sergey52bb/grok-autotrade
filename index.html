<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EDGEX Grok-AutoTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #080a0f; --card: #11141d; --primary: #00d084; 
            --secondary: #ff4d4d; --gold: #f0b90b; --text-dim: #848e9c;
            --border: #1e222d; --input: #1b1f29;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 10px 15px; background: var(--card); display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }

        .logo-area { display: flex; flex-direction: column; }
        .logo-main { color: var(--gold); font-weight: 800; font-size: 18px; text-shadow: 0 0 10px rgba(240, 185, 11, 0.3); }
        .logo-sub { font-size: 9px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

        .pair-selector {
            background: var(--input); color: white; border: 1px solid var(--border);
            padding: 5px 10px; border-radius: 6px; font-weight: 700; font-size: 13px; outline: none;
        }

        .app-container {
            display: flex; flex-direction: column; flex-grow: 1; overflow-y: auto; padding-bottom: 75px;
        }

        /* Фикс для графика */
        #tv_chart_container { 
            width: 100%; height: 300px; min-height: 300px; 
            background: #000; border-bottom: 1px solid var(--border);
        }

        .market-data { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); }
        .order-book { background: var(--card); padding: 10px; font-family: 'Roboto Mono', monospace; font-size: 11px; }
        .ob-row { display: flex; justify-content: space-between; margin: 2px 0; }
        .price-up { color: var(--primary); } .price-down { color: var(--secondary); }

        .trade-controls { background: var(--card); padding: 15px; border-top: 1px solid var(--border); }
        .trade-tabs { display: flex; gap: 10px; margin-bottom: 12px; }
        .tab-btn {
            flex: 1; padding: 10px; text-align: center; border-radius: 6px;
            background: var(--input); font-weight: 700; cursor: pointer; font-size: 14px;
        }
        .tab-buy.active { border: 2px solid var(--primary); color: var(--primary); }
        .tab-sell.active { border: 2px solid var(--secondary); color: var(--secondary); }

        .input-group { background: var(--input); border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .input-label { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; font-size: 16px; font-weight: 600; }

        .btn-main {
            width: 100%; padding: 14px; border-radius: 8px; border: none;
            font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 5px;
        }
        .btn-buy { background: linear-gradient(180deg, #00d084 0%, #008f5b 100%); color: white; }
        .btn-sell { background: linear-gradient(180deg, #ff4d4d 0%, #b32d2d 100%); color: white; }

        .legal-block {
            margin-top: 12px; font-size: 9px; color: var(--text-dim); 
            line-height: 1.3; text-align: center;
        }

        nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid var(--border);
        }
        .nav-item { font-size: 9px; color: var(--text-dim); text-align: center; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo-main">EDGEX</span>
        <span class="logo-sub">grok-autotrade</span>
    </div>
    <select class="pair-selector" id="pair-select" onchange="changePair()">
        <option value="TON/USDT">💎 TON/USDT</option>
        <option value="BTC/USDT">₿ BTC/USDT</option>
        <option value="ETH/USDT">Ξ ETH/USDT</option>
        <option value="SOL/USDT">☀️ SOL/USDT</option>
        <option value="XAU/USDT">📀 GOLD/USDT</option>
    </select>
    <div id="ton-connect-button"></div>
</header>

<div class="app-container">
    <div id="tv_chart_container"></div>

    <div class="market-data">
        <div class="order-book">
            <div id="asks"></div>
            <div style="text-align:center; font-size:16px; font-weight:bold; padding:5px 0; color:var(--primary);" id="live-price">5.350</div>
            <div id="bids"></div>
        </div>
        <div class="order-book" style="border-left: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
            Market Trades (Live)
        </div>
    </div>

    <div class="trade-controls">
        <div class="trade-tabs">
            <div class="tab-btn tab-buy active" onclick="switchTrade('buy')">BUY</div>
            <div class="tab-btn tab-sell" onclick="switchTrade('sell')">SELL</div>
        </div>

        <div class="input-group">
            <div class="input-label">Price (USDT)</div>
            <input type="number" id="trade-price" value="5.350" step="0.001">
        </div>

        <div class="input-group">
            <div class="input-label">Amount</div>
            <input type="number" id="trade-amount" placeholder="Min 3.7 USDT">
        </div>

        <button class="btn-main btn-buy" id="action-button">BUY TON</button>
        
        <div class="legal-block">
            * Нажимая кнопку, вы соглашаетесь с Политикой конфиденциальности Telegram и законами РФ. 
            Комиссия: 0.4 TON активация, 0.3 TON сделка.
        </div>
    </div>
</div>

<nav>
    <a href="#" class="nav-item active"><span class="nav-icon">📊</span>SPOT</a>
    <a href="#" class="nav-item"><span class="nav-icon">🤖</span>AUTO-BOT</a>
    <a href="#" class="nav-item"><span class="nav-icon">🏦</span>WALLET</a>
    <a href="#" class="nav-item"><span class="nav-icon">⚙️</span>SETTINGS</a>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. Инициализация кошелька
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    // 2. Функция загрузки графика
    function loadChart(symbol = "OKX:TONUSDT") {
        if (typeof TradingView !== 'undefined') {
            new TradingView.widget({
                "width": "100%",
                "height": 300,
                "symbol": symbol,
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "ru",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": true,
                "save_image": false,
                "container_id": "tv_chart_container"
            });
        }
    }

    // Загрузка при старте
    window.onload = () => loadChart();

    function changePair() {
        const pair = document.getElementById('pair-select').value;
        const btn = document.getElementById('action-button');
        const coin = pair.split('/')[0];
        btn.innerText = `BUY ${coin}`;
        
        let tvSymbol = "OKX:" + pair.replace('/', '');
        if(coin === 'XAU') tvSymbol = "FX_IDC:XAUUSD";
        loadChart(tvSymbol);
    }

    function switchTrade(mode) {
        const btn = document.getElementById('action-button');
        const coin = document.getElementById('pair-select').value.split('/')[0];
        const tBuy = document.querySelector('.tab-buy');
        const tSell = document.querySelector('.tab-sell');
        
        if(mode === 'buy') {
            btn.innerText = `BUY ${coin}`; btn.className = 'btn-main btn-buy';
            tBuy.classList.add('active'); tSell.classList.remove('active');
        } else {
            btn.innerText = `SELL ${coin}`; btn.className = 'btn-main btn-sell';
            tSell.classList.add('active'); tBuy.classList.remove('active');
        }
    }

    // Имитация стакана
    function fillOB() {
        const a = document.getElementById('asks'); const b = document.getElementById('bids');
        a.innerHTML = ''; b.innerHTML = '';
        let p = 5.350;
        for(let i=0; i<4; i++) {
            a.innerHTML = `<div class="ob-row price-down"><span>${(p + i*0.002).toFixed(3)}</span><span>${(Math.random()*50).toFixed(1)}</span></div>` + a.innerHTML;
            b.innerHTML += `<div class="ob-row price-up"><span>${(p - i*0.002).toFixed(3)}</span><span>${(Math.random()*50).toFixed(1)}</span></div>`;
        }
    }
    setInterval(fillOB, 3000);
    fillOB();
</script>
</body>
</html>
