<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX PRO V5.0</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; overflow-y: auto; height: 100vh; }
        
        .header { background: var(--panel); padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; height: 45px; }
        .pair-selector { background: transparent; color: white; border: none; font-size: 16px; font-weight: bold; outline: none; }

        /* Основной контейнер торговли */
        .trade-container { display: flex; padding: 10px; gap: 10px; background: var(--panel); }
        
        /* Левая часть: ввод ордера */
        .order-form { flex: 1.1; }
        .side-tabs { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 10px; height: 32px; }
        .side-btn { flex: 1; border: none; font-weight: bold; font-size: 12px; cursor: pointer; color: #fff; opacity: 0.5; }
        .side-btn.buy { background: var(--green); }
        .side-btn.sell { background: var(--red); }
        .side-btn.active { opacity: 1; }

        .input-box { background: var(--input); border-radius: 4px; padding: 8px; margin-bottom: 8px; display: flex; flex-direction: column; border: 1px solid transparent; }
        .input-box:focus-within { border-color: var(--gold); }
        .input-label { font-size: 10px; color: var(--text); margin-bottom: 4px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; outline: none; }
        .input-row span { font-size: 12px; color: white; font-weight: bold; }

        .pct-row { display: flex; justify-content: space-between; margin: 12px 0; }
        .pct-item { font-size: 10px; color: var(--text); border-bottom: 2px solid #333; flex: 1; text-align: center; padding-bottom: 4px; cursor: pointer; }
        .pct-item.active { color: var(--gold); border-color: var(--gold); }

        .submit-btn { width: 100%; border: none; padding: 12px; border-radius: 4px; font-weight: bold; color: white; font-size: 14px; cursor: pointer; margin-top: 10px; }
        .submit-btn.buy { background: var(--green); }
        .submit-btn.sell { background: var(--red); }

        /* Правая часть: стакан */
        .order-book { flex: 0.9; font-size: 11px; }
        .ob-header { display: flex; justify-content: space-between; color: var(--text); font-size: 9px; margin-bottom: 5px; }
        .ob-row { display: flex; justify-content: space-between; height: 18px; align-items: center; position: relative; }
        .ob-bar { position: absolute; right: 0; height: 100%; opacity: 0.2; transition: width 0.4s ease; }
        .price-current { font-size: 16px; font-weight: bold; padding: 8px 0; display: flex; align-items: center; gap: 5px; }

        /* Индикатор давления */
        .depth-bar { height: 4px; display: flex; width: 100%; margin-top: 5px; border-radius: 2px; overflow: hidden; }

        /* Нижняя часть: график */
        .chart-section { height: 350px; background: #131722; border-top: 2px solid #000; position: relative; }
        #tv_widget { height: 100%; width: 100%; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 10px 0; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text); }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center;">
        <select class="pair-selector" id="pair-select" onchange="changePair()">
            <option value="TONUSDT">TON/USDT</option>
            <option value="BTCUSDT">BTC/USDT</option>
            <option value="ETHUSDT">ETH/USDT</option>
        </select>
        <span id="price-change" style="font-size: 11px; margin-left: 8px;">+0.00%</span>
    </div>
    <div id="ton-connect-button"></div>
</div>

<div class="trade-container">
    <div class="order-form">
        <div class="side-tabs">
            <button id="buy-tab" class="side-btn buy active" onclick="setSide('buy')">Buy</button>
            <button id="sell-tab" class="side-btn sell" onclick="setSide('sell')">Sell</button>
        </div>
        
        <div class="input-box">
            <span class="input-label">Price</span>
            <div class="input-row">
                <input type="number" id="limit-price" step="0.001">
                <span>USDT</span>
            </div>
        </div>

        <div class="input-box">
            <span class="input-label">Amount</span>
            <div class="input-row">
                <input type="number" id="order-amount" placeholder="0">
                <span id="target-symbol">TON</span>
            </div>
        </div>

        <div class="pct-row">
            <div class="pct-item" onclick="setPct(25)">25%</div>
            <div class="pct-item" onclick="setPct(50)">50%</div>
            <div class="pct-item" onclick="setPct(75)">75%</div>
            <div class="pct-item" onclick="setPct(100)">100%</div>
        </div>

        <button id="action-btn" class="submit-btn buy">Buy TON</button>
    </div>

    <div class="order-book">
        <div class="ob-header"><span>Price</span><span>Amount</span></div>
        <div id="asks-list"></div>
        <div class="price-current" id="mid-price">...</div>
        <div id="bids-list"></div>
        <div class="depth-bar">
            <div id="buy-ratio" style="background: var(--green); width: 50%;"></div>
            <div id="sell-ratio" style="background: var(--red); width: 50%;"></div>
        </div>
    </div>
</div>

<div class="chart-section">
    <div id="tv_widget"></div>
</div>

<div style="height: 60px;"></div> <div class="nav-bar">
    <div class="nav-item active">📊 Trade</div>
    <div class="nav-item">🏦 Assets</div>
    <div class="nav-item">🕒 Orders</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPair = "TONUSDT";
    let side = 'buy';

    function initTV(symbol) {
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:" + symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tv_widget",
            "hide_top_toolbar": true,
            "backgroundColor": "#131722",
            "hide_legend": true,
            "save_image": false
        });
    }

    async function updateData() {
        const ids = {"TONUSDT":"the-open-network","BTCUSDT":"bitcoin","ETHUSDT":"ethereum"};
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids[currentPair]}&vs_currencies=usd&include_24hr_change=true`);
            const data = await res.json();
            const info = data[ids[currentPair]];
            
            const price = info.usd;
            const change = info.usd_24h_change;
            
            document.getElementById('mid-price').innerHTML = `${price} <small style="font-size:10px; color:var(--text)">$</small>`;
            document.getElementById('limit-price').value = price;
            
            const chEl = document.getElementById('price-change');
            chEl.innerText = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            chEl.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';

            renderOrderBook(price);
        } catch(e) {}
    }

    function renderOrderBook(price) {
        const asks = document.getElementById('asks-list');
        const bids = document.getElementById('bids-list');
        asks.innerHTML = ''; bids.innerHTML = '';

        // Продавцы (Asks) - Сверху вниз
        for(let i=5; i>0; i--) {
            let p = (price + (i * 0.002)).toFixed(3);
            let amt = (Math.random() * 50 + 10).toFixed(1);
            let barW = Math.min(amt * 2, 100);
            asks.innerHTML += `<div class="ob-row" style="color:var(--red)"><div class="ob-bar" style="width:${barW}%; background:var(--red)"></div><span>${p}</span><span>${amt}</span></div>`;
        }

        // Покупатели (Bids)
        for(let i=1; i<=5; i++) {
            let p = (price - (i * 0.002)).toFixed(3);
            let amt = (Math.random() * 50 + 10).toFixed(1);
            let barW = Math.min(amt * 2, 100);
            bids.innerHTML += `<div class="ob-row" style="color:var(--green)"><div class="ob-bar" style="width:${barW}%; background:var(--green)"></div><span>${p}</span><span>${amt}</span></div>`;
        }

        // Рандомный индикатор давления
        let r = Math.floor(Math.random() * 40) + 30;
        document.getElementById('buy-ratio').style.width = r + '%';
        document.getElementById('sell-ratio').style.width = (100 - r) + '%';
    }

    function setSide(s) {
        side = s;
        document.getElementById('buy-tab').classList.toggle('active', s === 'buy');
        document.getElementById('sell-tab').classList.toggle('active', s === 'sell');
        const btn = document.getElementById('action-btn');
        btn.className = 'submit-btn ' + s;
        btn.innerText = (s === 'buy' ? 'Buy ' : 'Sell ') + currentPair.replace('USDT', '');
    }

    function setPct(p) {
        document.querySelectorAll('.pct-item').forEach(el => el.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('order-amount').value = (p * 0.5).toFixed(2); // Заглушка
    }

    function changePair() {
        currentPair = document.getElementById('pair-select').value;
        document.getElementById('target-symbol').innerText = currentPair.replace('USDT', '');
        initTV(currentPair);
        updateData();
    }

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    window.onload = () => {
        initTV(currentPair);
        updateData();
        setInterval(updateData, 4000);
    };
</script>
</body>
</html>
