<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V4.3 ULTIMATE</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #1c2127; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .header { background: var(--panel); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 48px; }
        .pair-selector { background: var(--input); color: var(--gold); border: 1px solid #444; border-radius: 6px; padding: 6px; font-weight: bold; outline: none; }

        .trading-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; height: 320px; border-bottom: 2px solid #000; background: #131722; position: relative; }
        .trading-grid.fullscreen { grid-template-columns: 1fr 0fr; height: 75vh; }
        .trading-grid.fullscreen .order-book-side { display: none; }

        #tv_wrapper { position: relative; width: 100%; height: 100%; border-right: 1px solid #333; box-sizing: border-box; }
        #tv_widget { width: 100%; height: 100%; }

        .expand-btn { position: absolute; left: 8px; top: 8px; z-index: 100; background: rgba(30,34,45,0.9); border: 1px solid #444; color: var(--gold); border-radius: 4px; padding: 5px 10px; font-size: 10px; }

        .order-book-side { background: var(--panel); font-size: 10px; padding: 5px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; overflow: hidden; }
        .price-center { font-size: 14px; font-weight: bold; text-align: center; color: var(--green); padding: 6px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin: 4px 0; }
        .ob-row { display: flex; justify-content: space-between; height: 18px; position: relative; align-items: center; z-index: 1; }
        .ob-bg { position: absolute; right: 0; top: 0; bottom: 0; z-index: -1; opacity: 0.15; transition: width 0.5s ease; }

        .page-content { display: none; padding: 15px; height: calc(100vh - 368px); overflow-y: auto; }
        .page-content.active { display: block; }
        
        .input-group { background: var(--input); border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #trade-panel { position: fixed; bottom: -100%; left: 0; width: 100%; background: var(--panel); border-top: 2px solid var(--gold); border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        #trade-panel.open { bottom: 0; }
        .trade-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; color: white; opacity: 0.4; }
        .tab-btn.active { opacity: 1; }
        .amount-input { width: 100%; background: var(--input); border: 1px solid #444; padding: 15px; border-radius: 8px; color: white; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .pct-btn { flex: 1; background: #333; border: none; color: var(--text); padding: 8px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 12px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: var(--text); }
        .nav-item.active { color: var(--gold); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; z-index: 1999; }
    </style>
</head>
<body>

<div id="overlay" class="overlay" onclick="closeTrade()"></div>

<div class="header">
    <select class="pair-selector" id="pair-select" onchange="changePair()">
        <option value="TONUSDT">TON / USDT</option>
        <option value="BTCUSDT">BTC / USDT</option>
        <option value="ETHUSDT">ETH / USDT</option>
        <option value="SOLUSDT">SOL / USDT</option>
    </select>
    <div id="ton-connect-button"></div>
</div>

<div id="market-top" class="trading-grid">
    <div id="tv_wrapper">
        <button class="expand-btn" id="full-btn" onclick="toggleFullscreen()">РАЗВЕРНУТЬ</button>
        <div id="tv_widget"></div>
    </div>
    <div class="order-book-side" id="order-book"></div>
</div>

<div id="page-market" class="page-content active">
    <div class="input-group">
        <span>Цена (Live)</span>
        <b id="market-price-val" style="color:var(--gold); font-size: 20px;">...</b>
    </div>
    <button class="btn-main" onclick="openTrade()">ОТКРЫТЬ СДЕЛКУ</button>
</div>

<div id="page-assets" class="page-content">
    <h3 style="margin-top:0;">🏦 Мои Активы</h3>
    <div class="input-group"><span>TON Balance</span><b id="ton-bal">0.00</b></div>
    <div class="input-group"><span>USDT</span><b>0.00</b></div>
</div>

<div id="trade-panel">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <b id="trade-pair-name">TON / USDT</b>
        <span onclick="closeTrade()" style="color:var(--text); cursor:pointer;">✖</span>
    </div>
    <div class="trade-tabs">
        <button id="buy-tab" class="tab-btn active" style="background:var(--green)" onclick="setSide('buy')">КУПИТЬ</button>
        <button id="sell-tab" class="tab-btn" style="background:var(--red)" onclick="setSide('sell')">ПРОДАТЬ</button>
    </div>
    <input type="number" class="amount-input" placeholder="Сумма" id="trade-amount">
    <div style="display:flex; gap:8px; margin-bottom:20px;">
        <button class="pct-btn" onclick="setPct(25)">25%</button>
        <button class="pct-btn" onclick="setPct(50)">50%</button>
        <button class="pct-btn" onclick="setPct(100)">MAX</button>
    </div>
    <button class="btn-main" id="confirm-btn">ПОДТВЕРДИТЬ</button>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('market', this)">📊 РЫНОК</div>
    <div class="nav-item" onclick="showPage('assets', this)">🏦 АКТИВЫ</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPair = "TONUSDT";
    let isFullscreen = false;
    let lastPrice = 0;

    function initTV(symbol) {
        const container = document.getElementById('tv_widget');
        if(!container) return;
        container.innerHTML = "";
        
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:" + symbol,
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tv_widget",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "backgroundColor": "#131722",
            "overrides": {
                "paneProperties.rightAxisMargin": 5,
                "scalesProperties.fontSize": 11
            }
        });
    }

    async function fetchPrice() {
        const ids = {"TONUSDT":"the-open-network","BTCUSDT":"bitcoin","ETHUSDT":"ethereum","SOLUSDT":"solana"};
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids[currentPair]}&vs_currencies=usd`);
            const data = await res.json();
            const price = data[ids[currentPair]].usd;
            lastPrice = price;
            const prec = price < 0.01 ? 7 : 2;
            document.getElementById('market-price-val').innerText = price.toFixed(prec) + " USDT";
            updateOrderBook(price, prec);
        } catch(e) {}
    }

    function updateOrderBook(price, prec) {
        const ob = document.getElementById('order-book');
        if (isFullscreen || !ob) return;
        
        const spread = price * 0.0003;
        let html = '<div style="color:var(--text); font-size:8px; display:flex; justify-content:space-between; margin-bottom:5px;"><span>ЦЕНА</span><span>КОЛ-ВО</span></div>';
        
        for(let i=6; i>0; i--) {
            let p = (price + spread + (Math.random() * price * 0.002)).toFixed(prec);
            let vol = (Math.random() * 12 + 0.1).toFixed(1);
            html += `<div class="ob-row" style="color:var(--red)"><div class="ob-bg" style="width:${vol*8}%; background:var(--red)"></div><span>${p}</span><span>${vol}</span></div>`;
        }
        html += `<div class="price-center">${price.toFixed(prec)}</div>`;
        for(let i=1; i<=6; i++) {
            let p = (price - spread - (Math.random() * price * 0.002)).toFixed(prec);
            let vol = (Math.random() * 12 + 0.1).toFixed(1);
            html += `<div class="ob-row" style="color:var(--green)"><div class="ob-bg" style="width:${vol*8}%; background:var(--green)"></div><span>${p}</span><span>${vol}</span></div>`;
        }
        ob.innerHTML = html;
    }

    function openTrade() {
        document.getElementById('trade-pair-name').innerText = currentPair;
        document.getElementById('trade-panel').classList.add('open');
        document.getElementById('overlay').style.display = 'block';
    }

    function closeTrade() {
        document.getElementById('trade-panel').classList.remove('open');
        document.getElementById('overlay').style.display = 'none';
    }

    function setSide(side) {
        document.getElementById('buy-tab').classList.toggle('active', side === 'buy');
        document.getElementById('sell-tab').classList.toggle('active', side === 'sell');
        document.getElementById('confirm-btn').style.background = (side === 'buy' ? 'var(--green)' : 'var(--red)');
    }

    function setPct(pct) {
        document.getElementById('trade-amount').value = (pct * 1.5).toFixed(2); // Заглушка до баланса
    }

    function toggleFullscreen() {
        const grid = document.getElementById('market-top');
        isFullscreen = !isFullscreen;
        grid.classList.toggle('fullscreen', isFullscreen);
        document.getElementById('full-btn').innerText = isFullscreen ? "ВЕРНУТЬ" : "РАЗВЕРНУТЬ";
        setTimeout(() => initTV(currentPair), 300);
    }

    function changePair() {
        currentPair = document.getElementById('pair-select').value;
        initTV(currentPair);
        fetchPrice();
    }

    function showPage(pId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + pId).classList.add('active');
        el.classList.add('active');
        document.getElementById('market-top').style.display = (pId === 'market' ? 'grid' : 'none');
    }

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    window.onload = () => {
        setTimeout(() => initTV(currentPair), 500);
        fetchPrice();
        setInterval(fetchPrice, 3000);
    };
</script>
</body>
</html>
