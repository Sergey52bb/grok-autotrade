<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Pro Chart</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 45px; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 18px; }
        .wallet { background: var(--panel); padding: 8px 15px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); font-size: 12px; }
        #chart_container { flex: 1; min-height: 250px; position: relative; }
        .trade-form { height: 220px; padding: 12px; background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        .fld { background: #2b3139; padding: 8px; border-radius: 6px; }
        .fld label { display: block; font-size: 10px; color: var(--text); }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        .buy-btn { background: var(--green); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <b>TON/USDT</b>
    <div class="price-top" id="topPrice">0.000</div>
</header>

<div class="wallet">
    <div>USDT: <b id="balUSDT">1000.00</b></div>
    <div>TON: <b id="balTON">0.00</b></div>
</div>

<div id="chart_container"></div>

<div class="trade-form">
    <div class="fld"><label>ЦЕНА</label><input type="number" id="iPrice" step="any"></div>
    <div class="fld"><label>КОЛИЧЕСТВО</label><input type="number" id="iAmount" placeholder="0.0"></div>
    <button class="buy-btn">КУПИТЬ TON</button>
</div>

<script>
    // 1. Создаем график
    const chart = LightweightCharts.createChart(document.getElementById('chart_container'), {
        layout: { backgroundColor: '#0b0e11', textColor: '#d1d4dc' },
        grid: { vertLines: { color: '#1f2226' }, horzLines: { color: '#1f2226' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: '#2b2f36' },
        timeScale: { borderColor: '#2b2f36', timeVisible: true },
    });

    const candleSeries = chart.addCandlestickSeries({
        upColor: '#0ecb81', downColor: '#f6465d', borderDownColor: '#f6465d',
        borderUpColor: '#0ecb81', wickDownColor: '#f6465d', wickUpColor: '#0ecb81',
    });

    // 2. WebSocket для живых данных Binance
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@kline_1m');
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        const candle = data.k;
        
        const price = parseFloat(candle.c);
        document.getElementById('topPrice').innerText = price.toFixed(3);
        if(!document.getElementById('iPrice').value) document.getElementById('iPrice').value = price.toFixed(3);

        candleSeries.update({
            time: candle.t / 1000,
            open: parseFloat(candle.o),
            high: parseFloat(candle.h),
            low: parseFloat(candle.l),
            close: price,
        });
    };

    // Авто-изменение размера графика
    window.addEventListener('resize', () => {
        chart.resize(window.innerWidth, document.getElementById('chart_container').clientHeight);
    });
</script>
</body>
</html>
