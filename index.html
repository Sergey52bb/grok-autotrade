<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v15.7</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 15px 15px 5px; text-align: center; flex-shrink: 0; }
        .logo-svg { width: 130px; height: auto; }
        .subtitle { font-size: 10px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.8; margin-top: 5px; }

        /* ИСПРАВЛЕНО: Увеличил отступ снизу до 160px, чтобы Polygon не уходил под нави */
        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 160px; scrollbar-width: none; }
        #main_content::-webkit-scrollbar { display: none; }
        
        .screen { display: none; }
        .screen.active { display: block; }

        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid rgba(77, 184, 255, 0.1); border-radius: 22px; margin-bottom: 12px; background: rgba(13, 20, 29, 0.6); }
        .asset-icon { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); }
        .asset-info { flex: 1; margin-left: 12px; }
        .asset-name { font-weight: 800; font-size: 15px; }
        .asset-price { font-size: 11px; color: var(--green); }

        /* SWAP STYLE */
        .swap-container { background: var(--panel); border-radius: 28px; padding: 20px; border: 1px solid var(--border); }
        .swap-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px; margin-bottom: 8px; border: 1px solid transparent; transition: 0.3s; }
        .swap-card:focus-within { border-color: rgba(77,184,255,0.3); background: rgba(255,255,255,0.05); }
        .swap-label { font-size: 11px; opacity: 0.5; margin-bottom: 10px; display: block; }
        .swap-input-row { display: flex; align-items: center; justify-content: space-between; }
        .swap-input-row input { background: transparent; border: none; color: white; font-size: 24px; font-weight: 700; width: 60%; outline: none; padding: 0; }
        .swap-coin { display: flex; align-items: center; gap: 8px; background: rgba(77,184,255,0.1); padding: 6px 12px; border-radius: 12px; font-weight: 800; font-size: 14px; }
        .swap-coin img { width: 22px; height: 22px; border-radius: 50%; }

        @keyframes rotateCryst { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cryst-anim { animation: rotateCryst 25s linear infinite; filter: drop-shadow(0 0 20px rgba(77,184,255,0.3)); mix-blend-mode: screen; width: 220px; }

        /* NAVIGATION */
        nav { position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px; background: rgba(13, 20, 29, 0.9); display: flex; border-radius: 25px; border: 1px solid var(--border); backdrop-filter: blur(15px); z-index: 100; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; opacity: 0.3; transition: 0.3s; font-size: 26px; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); color: var(--blue); }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: flex-end; }
        .modal-body { background: #0d141d; width: 100%; border-radius: 32px 32px 0 0; padding: 25px; border-top: 1px solid var(--border); box-sizing: border-box; }
        .modal-view { display: none; }
        .modal-view.active { display: block; }
        .modal-header-icon { width: 55px; height: 55px; border-radius: 50%; margin-bottom: 15px; border: 1px solid var(--border); }
        input.mod-input { width: 100%; padding: 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; color: white; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; outline: none; }
        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer; font-size: 15px; }
    </style>
</head>
<body>

<header>
    <svg class="logo-svg" viewBox="0 0 668 237" fill="none"><path d="M118.204 0.000194514C183.486 0.000194514 236.408 52.9223 236.408 118.204C236.408 183.487 183.486 236.408 118.204 236.408C52.9216 236.408 0.000184007 183.486 0 118.204C0 52.9224 52.9215 0.000354089 118.204 0.000194514ZM74.1011 62.1964C57.6799 62.1964 47.268 79.9119 55.5308 94.2346L109.964 188.582C113.619 194.922 122.781 194.922 126.436 188.582L180.88 94.2346C189.132 79.9342 178.72 62.1965 162.31 62.1964H74.1011ZM162.288 78.8411C166.031 78.8411 168.234 82.812 166.45 85.9074L137.856 137.091L137.851 137.099L126.506 159.046V78.8411H162.288ZM109.872 78.8516V159.024L98.5376 137.087L98.5334 137.08L69.9294 85.9214L69.8468 85.7724C68.2134 82.6996 70.405 78.8516 74.0899 78.8516H109.872" fill="#4DB8FF"/><path d="M639.524 146.751V62.9139H668V188.849H636.565L573.696 99.0752V188.849H545.034V62.9139H581.277L639.524 146.751Z" fill="white"/><path d="M456.407 191.686C414.432 191.686 384.107 163.081 384.107 126.74C384.107 90.3983 414.432 61.7931 456.407 61.7931C498.382 61.7931 528.707 90.5782 528.707 126.74C528.707 162.901 498.382 191.686 456.407 191.686ZM456.407 167.219C481 167.219 497.272 149.408 497.272 126.74C497.272 104.071 481 86.2605 456.407 86.2605C431.814 86.2605 415.542 104.071 415.542 126.74C415.542 149.408 431.814 167.219 456.407 167.219Z" fill="white"/><path d="M384.269 63.5978V85.7264H342.11V189.533H312.339V85.7264H270.179V63.5978H384.269Z" fill="white"/></svg>
    <div class="subtitle">👛 SYN WALLET</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div style="text-align:center; padding: 20px 0 30px;">
            <div style="font-size: 11px; opacity: 0.5; letter-spacing: 1.5px;">ESTIMATED BALANCE</div>
            <h1 style="font-size:44px; margin:5px 0; font-weight:800;">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; color: var(--blue); background: rgba(77,184,255,0.1); padding: 6px 14px; border-radius: 20px; display: inline-block;">Disconnected</div>
        </div>
        <div id="asset_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="swap-container">
            <h3 style="margin: 0 0 15px; text-align: center; font-size: 18px;">Swap</h3>
            <div class="swap-card">
                <span class="swap-label">You Pay</span>
                <div class="swap-input-row">
                    <input type="number" id="swap_send_val" placeholder="0" oninput="calcSwap()">
                    <div class="swap-coin"><img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png">TON</div>
                </div>
            </div>
            <div style="text-align:center; margin: -15px 0; position:relative; z-index:2;">
                <div style="background:var(--bg); width:35px; height:35px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; border: 1px solid var(--border); color:var(--blue);">↓</div>
            </div>
            <div class="swap-card">
                <span class="swap-label">You Get</span>
                <div class="swap-input-row">
                    <input type="number" id="swap_get_val" placeholder="0" readonly>
                    <div class="swap-coin"><img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png">USDT</div>
                </div>
            </div>
            <div style="font-size:11px; text-align:center; margin: 15px 0 5px; opacity:0.5;">Rate: 1 TON ≈ 5.42 USDT</div>
            <button class="btn-confirm" onclick="tg.showAlert('Swap processing...')">Swap Now</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div style="text-align:center; padding-top: 30px;">
            <div id="ton-connect-btn" style="display:flex; justify-content:center; margin-bottom: 50px;"></div>
            <img src="https://i.ibb.co/JwD2qCDf/WEB3-Design-Works-Nariman-Mammadzada.jpg" class="cryst-anim">
            <p style="color: var(--blue); font-size: 11px; margin-top: 40px; font-weight:800; letter-spacing:3px; opacity:0.6;">NODE SYNCHRONIZED</p>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)">💼</div>
    <div class="nav-item" onclick="showTab('swap', this)">🌀</div>
    <div class="nav-item" onclick="showTab('connect', this)">🔗</div>
</nav>

<div id="universal_modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <div id="view_menu" class="modal-view active">
            <div style="text-align:center; margin-bottom:25px;">
                <img id="menu_logo" class="modal-header-icon" src="">
                <h3 id="menu_title" style="margin:0; font-size:22px;">Asset</h3>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <button class="btn-confirm" style="background:#fff;" onclick="switchModalView('deposit')">RECEIVE</button>
                <button class="btn-confirm" style="background:var(--blue); color:white;" onclick="switchModalView('send')">SEND</button>
            </div>
        </div>

        <div id="view_deposit" class="modal-view">
            <div style="text-align:center; margin-bottom:15px;">
                <img id="deposit_logo" class="modal-header-icon" src="">
                <h3 style="margin:0;">Receive <span class="cur_asset"></span></h3>
            </div>
            <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:#fff; padding:15px; border-radius:20px;"></div>
            <p id="full_addr" style="font-size:10px; word-break:break-all; opacity:0.5; text-align:center; font-family:monospace; margin-bottom:20px;"></p>
            <button class="btn-confirm" onclick="copyAddr()">Copy Address</button>
        </div>

        <div id="view_send" class="modal-view">
            <div style="text-align:center; margin-bottom:15px;">
                <img id="send_logo" class="modal-header-icon" src="">
                <h3 style="margin:0;">Send <span class="cur_asset"></span></h3>
            </div>
            <input type="text" class="mod-input" placeholder="Recipient Address (UQ...)">
            <input type="text" class="mod-input" placeholder="Memo / Comment (Optional)">
            <input type="number" class="mod-input" placeholder="Amount">
            <button class="btn-confirm">Confirm Send</button>
        </div>
        <button onclick="closeModal()" style="width:100%; background:transparent; border:none; color:white; opacity:0.3; margin-top:20px; font-weight:700;">CANCEL</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
    
    const assets = [
        { id: 'TON', name: 'TON', cg: 'the-open-network', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ton/info/logo.png' },
        { id: 'BTC', name: 'Bitcoin', cg: 'bitcoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/bitcoin/info/logo.png' },
        { id: 'USDT', name: 'USDT', cg: 'tether', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png' },
        { id: 'ETH', name: 'Ethereum', cg: 'ethereum', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/info/logo.png' },
        { id: 'SOL', name: 'Solana', cg: 'solana', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/solana/info/logo.png' },
        { id: 'NEAR', name: 'Near', cg: 'near', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/near/info/logo.png' },
        { id: 'USDC', name: 'USDC', cg: 'usd-coin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48/logo.png' },
        { id: 'DOGE', name: 'Doge', cg: 'dogecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/doge/info/logo.png' },
        { id: 'BNB', name: 'BNB', cg: 'binancecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png' },
        { id: 'LTC', name: 'Litecoin', cg: 'litecoin', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/litecoin/info/logo.png' },
        { id: 'SUI', name: 'Sui', cg: 'sui', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/sui/info/logo.png' },
        { id: 'POL', name: 'Polygon', cg: 'matic-network', img: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/polygon/info/logo.png' }
    ];

    let currentAddr = "";

    function calcSwap() {
        const val = document.getElementById('swap_send_val').value;
        const rate = 5.42; // Пока фиксированный курс
        document.getElementById('swap_get_val').value = val ? (val * rate).toFixed(2) : "";
    }

    async function updatePrices() {
        try {
            const ids = assets.map(a => a.cg).join(',');
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
            const data = await res.json();
            assets.forEach(a => {
                if(data[a.cg]) {
                    document.getElementById(`price_${a.id}`).innerText = `$${data[a.cg].usd.toLocaleString()}`;
                }
            });
        } catch(e) {}
    }

    function init() {
        const list = document.getElementById('asset_list'); list.innerHTML = "";
        assets.forEach(a => {
            list.innerHTML += `<div class="asset-item" onclick="showAssetMenu('${a.id}')"><img src="${a.img}" class="asset-icon"><div class="asset-info"><div class="asset-name">${a.id}</div><div class="asset-price" id="price_${a.id}">$0.00</div></div><div style="font-weight:700;">0.00</div></div>`;
        });
        updatePrices();
        const tc = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json', buttonRootId: 'ton-connect-btn' });
        tc.onStatusChange(w => { if(w) { currentAddr = w.account.address; document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"..."; document.getElementById('full_addr').innerText = currentAddr; document.getElementById("qrcode").innerHTML = ""; new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 160, height: 160 }); } });
    }

    function showAssetMenu(id) {
        const a = assets.find(x => x.id === id);
        document.getElementById('menu_title').innerText = a.name;
        document.getElementById('menu_logo').src = a.img;
        document.getElementById('deposit_logo').src = a.img;
        document.getElementById('send_logo').src = a.img;
        document.querySelectorAll('.cur_asset').forEach(e => e.innerText = a.id);
        document.getElementById('universal_modal').style.display = 'flex';
    }

    function showTab(id, el) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.getElementById('scr_'+id).classList.add('active'); 
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); 
        el.classList.add('active'); 
    }
    
    function closeModal() { document.getElementById('universal_modal').style.display = 'none'; switchModalView('menu'); }
    function switchModalView(v) { document.querySelectorAll('.modal-view').forEach(x => x.classList.remove('active')); document.getElementById('view_'+v).classList.add('active'); }
    function copyAddr() { navigator.clipboard.writeText(currentAddr); tg.showAlert("Address copied!"); }

    window.onload = init;
</script>
</body>
</html>
