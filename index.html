<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v6.8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --red: #ff4a4a; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { padding: 25px 15px 15px 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); opacity: 0.5; }
        .nav-item.active { color: var(--green); opacity: 1; }
        
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .asset-card { background: var(--panel); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        /* Мини-график (имитация) */
        .sparkline { width: 100px; height: 20px; stroke: var(--green); stroke-width: 2; fill: none; margin-top: 5px; }
        
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer; width: 100%; }
        .btn-trade { padding: 8px 15px; font-size: 10px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; cursor: pointer; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 30px; text-align: center; width: 100%; border: 1px solid var(--border); }
        .modal input { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; }
    </style>
</head>
<body>

<header><div class="title">💎 SYN TERMINAL</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; opacity: 0.4; font-family: monospace;">---</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;" onclick="openModal('deposit')">DEPOSIT</button>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="openModal('send')">SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <div id="market_list"></div>
    </div>

    <div id="scr_swap" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <div style="font-size:12px; opacity:0.6; margin-bottom:8px;">You Pay</div>
            <select id="sw_f_coin" style="width:100%; background:#000; color:#fff; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:15px;"></select>
            <div style="font-size:12px; opacity:0.6; margin-bottom:8px;">You Receive</div>
            <select id="sw_t_coin" style="width:100%; background:#000; color:#fff; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;"></select>
            <button class="btn-general" style="background:var(--green); color:#000;" onclick="tg.showAlert('Swap processing...')">SWAP ASSETS</button>
        </div>
    </div>

    <div id="scr_profile" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; text-align:center;"><div id="ton-connect-btn"></div></div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<div id="modal_deposit" class="modal" onclick="closeModal('deposit')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Your TON Address</h3>
        <div id="qrcode" style="display:flex; justify-content:center; margin:15px 0; background:white; padding:10px; border-radius:10px;"></div>
        <div id="full_addr" style="font-size:10px; color:var(--text); word-break:break-all; margin-bottom:15px; font-family:monospace;"></div>
        <button class="btn-general" style="background:var(--green); color:#000;" onclick="copyAddr()">COPY ADDRESS</button>
    </div>
</div>

<div id="modal_send" class="modal" onclick="closeModal('send')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Send Assets</h3>
        <input type="text" id="send_addr" placeholder="Recipient Address">
        <input type="text" id="send_memo" placeholder="Memo (Comment)">
        <input type="number" id="send_amount" placeholder="Amount">
        <button class="btn-general" style="background:var(--green); color:#000;">SEND</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let prices = { 'TON': 7.24, 'BTC': 69420.50, 'ETH': 3450.12, 'DOGE': 0.16, 'USDT': 1 };
    const assets = [
        {s:'TON', i:'https://cryptologos.cc/logos/toncoin-ton-logo.png', g:'M0,10 L10,8 L20,12 L30,5 L40,9 L50,4 L60,8 L70,3 L80,7 L90,2 L100,5'},
        {s:'BTC', i:'https://cryptologos.cc/logos/bitcoin-btc-logo.png', g:'M0,5 L10,7 L20,4 L30,8 L40,3 L50,6 L60,2 L70,5 L80,1 L90,4 L100,2'},
        {s:'ETH', i:'https://cryptologos.cc/logos/ethereum-eth-logo.png', g:'M0,8 L10,5 L20,9 L30,4 L40,7 L50,3 L60,6 L70,2 L80,5 L90,1 L100,4'},
        {s:'DOGE', i:'https://cryptologos.cc/logos/dogecoin-doge-logo.png', g:'M0,12 L10,10 L20,13 L30,9 L40,11 L50,8 L60,10 L70,7 L80,9 L90,6 L100,8'}
    ];
    let currentAddr = "";

    function init() {
        const f = document.getElementById('sw_f_coin');
        const t = document.getElementById('sw_t_coin');
        Object.keys(prices).forEach(s => {
            f.innerHTML += `<option value="${s}">${s}</option>`;
            t.innerHTML += `<option value="${s}">${s}</option>`;
        });
        t.value = "USDT";

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                currentAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,10) + "...";
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 140, height: 140 });
                fetch(`https://toncenter.com/api/v2/getAddressBalance?address=${currentAddr}`)
                    .then(r => r.json()).then(d => { if(d.ok) document.getElementById('main_balance').innerText = (d.result/1e9).toFixed(2) + " TON"; });
            }
        });
        renderMarket();
    }

    function renderMarket() {
        document.getElementById('market_list').innerHTML = assets.map(a => `
            <div class="asset-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${a.i}" width="28">
                        <div>
                            <b style="font-size:16px;">${a.s}</b><br>
                            <span style="color:var(--text); font-size:12px;">$${prices[a.s].toLocaleString()}</span>
                        </div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-trade" onclick="tg.showAlert('Order: Buy ${a.s}')" style="color:var(--green)">BUY</button>
                        <button class="btn-trade" onclick="tg.showAlert('Order: Sell ${a.s}')" style="color:var(--red)">SELL</button>
                    </div>
                </div>
                <div style="margin-top:10px; display:flex; align-items:center; gap:15px;">
                    <svg class="sparkline" viewBox="0 0 100 15"><path d="${a.g}" /></svg>
                    <span style="font-size:10px; color:var(--green); opacity:0.8;">+2.4% last 24h</span>
                </div>
            </div>
        `).join('');
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('light');
    }

    function openModal(id) { document.getElementById('modal_'+id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById('modal_'+id).style.display = 'none'; }
    
    function copyAddr() {
        const el = document.createElement('textarea');
        el.value = currentAddr;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        tg.showAlert("Address Copied!");
    }

    window.onload = init;
</script>
</body>
</html>
