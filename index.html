<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #081221;
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      background: #0d1b2a;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header p {
      margin: 5px 0 0;
      color: #aaa;
    }

    #chart {
      height: 300px;
    }

    .orderbook {
      margin: 15px;
      background: #0d1b2a;
      padding: 10px;
      border-radius: 10px;
      max-height: 300px;
      overflow: hidden;
    }

    .order {
      position: relative;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 6px;
      margin: 1px 0;
      border-radius: 4px;
      overflow: hidden;
    }

    .order::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: var(--depth);
      opacity: 0.25;
    }

    .sell::before {
      background: red;
    }

    .buy::before {
      background: lime;
    }

    .sell { color: #ff4d4d; }
    .buy { color: #00c853; }

    .price {
      text-align: center;
      margin: 6px 0;
      font-weight: bold;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    .btn {
      width: 45%;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
    }

    .buy-btn { background: green; }
    .sell-btn { background: red; }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #0d1b2a;
      padding: 10px 0;
    }

    .menu div {
      color: #aaa;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h1>💎 SYN TERMINAL</h1>
  <p>AI Trading System</p>
</header>

<div id="chart"></div>

<div class="orderbook" id="orderbook"></div>

<div class="buttons">
  <button class="btn buy-btn">BUY</button>
  <button class="btn sell-btn">SELL</button>
</div>

<div class="menu">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
  new TradingView.widget({
    width: "100%",
    height: 300,
    symbol: "BINANCE:TONUSDT",
    interval: "5",
    theme: "dark",
    style: "1",
    container_id: "chart"
  });

  async function loadOrderBook() {
    try {
      const res = await fetch('https://api.binance.com/api/v3/depth?symbol=TONUSDT&limit=20');
      const data = await res.json();

      const asks = data.asks; // SELL
      const bids = data.bids; // BUY

      const container = document.getElementById('orderbook');
      container.innerHTML = '';

      let maxVolume = 0;

      [...asks, ...bids].forEach(o => {
        const vol = parseFloat(o[1]);
        if (vol > maxVolume) maxVolume = vol;
      });

      // SELL (сверху)
      asks.reverse().forEach(order => {
        const price = parseFloat(order[0]).toFixed(3);
        const volume = parseFloat(order[1]);

        const depth = (volume / maxVolume) * 100;

        container.innerHTML += `
          <div class="order sell" style="--depth:${depth}%">
            <span>${price}</span>
            <span>${volume.toFixed(0)}</span>
          </div>
        `;
      });

      // CURRENT PRICE
      const mid = parseFloat(bids[0][0]).toFixed(3);

      container.innerHTML += `<div class="price">${mid}</div>`;

      // BUY (снизу)
      bids.forEach(order => {
        const price = parseFloat(order[0]).toFixed(3);
        const volume = parseFloat(order[1]);

        const depth = (volume / maxVolume) * 100;

        container.innerHTML += `
          <div class="order buy" style="--depth:${depth}%">
            <span>${price}</span>
            <span>${volume.toFixed(0)}</span>
          </div>
        `;
      });

    } catch (e) {
      console.log('Ошибка стакана:', e);
    }
  }

  loadOrderBook();
  setInterval(loadOrderBook, 3000);
</script>

</body>
</html>
