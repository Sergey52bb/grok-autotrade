<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYN TERMINAL</title>

  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .balance {
      padding: 15px;
      text-align: center;
      font-size: 16px;
    }

    .chart {
      height: 250px;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
    }

    .actions {
      display: flex;
      gap: 10px;
      padding: 15px;
    }

    button {
      flex: 1;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      color: white;
    }

    .buy {
      background: #16a34a;
    }

    .sell {
      background: #dc2626;
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      background: #020617;
      border-top: 1px solid #1e293b;
    }

    .footer div {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="header">
    💎 SYN TERMINAL
  </div>

  <div class="balance" id="balance">
    Loading balance...
  </div>

  <div class="chart">
    📊 Chart (soon TradingView)
  </div>

  <div class="actions">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>

  <div class="footer">
    <div>Home</div>
    <div>Trade</div>
    <div>Wallet</div>
    <div>Settings</div>
  </div>

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const user = tg.initDataUnsafe?.user;

    async function loadBalance() {
      if (!user) return;

      try {
        const res = await fetch('https://ton-wallet-api.onrender.com/balance?userId=' + user.id);
        const data = await res.json();

        document.getElementById('balance').innerText =
          '💰 TON: ' + data.ton + ' | USDT: ' + data.usdt;
      } catch (e) {
        document.getElementById('balance').innerText = 'Error loading balance';
      }
    }

    async function buy() {
      if (!user) return;

      await fetch('https://ton-wallet-api.onrender.com/buy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: user.id, amount: 10 })
      });

      alert('BUY executed 🚀');
      loadBalance();
    }

    async function sell() {
      if (!user) return;

      await fetch('https://ton-wallet-api.onrender.com/sell', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: user.id, amount: 10 })
      });

      alert('SELL executed 🔻');
      loadBalance();
    }

    loadBalance();
  </script>

</body>
</html>
