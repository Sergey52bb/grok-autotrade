<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX</title>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: white; font-family: sans-serif; 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
        }

        /* Верх: Торговля и Стакан (фиксированные 300px) */
        .top-container { height: 280px; display: flex; flex-direction: column; border-bottom: 1px solid #222; flex-shrink: 0; }
        .header { padding: 8px 12px; font-size: 14px; background: #121518; display: flex; justify-content: space-between; }
        
        .main-ui { display: flex; flex: 1; padding: 8px; gap: 8px; overflow: hidden; }
        
        .trade-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .input-item { background: var(--input); border-radius: 4px; padding: 6px; }
        .input-item label { font-size: 10px; color: var(--text); display: block; }
        .input-item input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; }
        
        .buy-btn { background: var(--green); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: bold; margin-top: auto; }

        .order-book { flex: 1; background: #0b0e11; border: 1px solid #222; border-radius: 4px; display: flex; flex-direction: column; overflow: hidden; font-family: monospace; font-size: 11px; }
        .ob-rows { flex: 1; overflow-y: auto; }
        .ob-row { display: flex; justify-content: space-between; padding: 2px 4px; }

        /* Центр: График (занимает всё свободное место) */
        #chart { flex-grow: 1; width: 100%; background: var(--bg); }

        /* Низ: Навигация (фиксированные 60px) */
        .nav { height: 65px; background: var(--panel); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; flex-shrink: 0; }
        .nav-item { text-align: center; color: var(--text); font-size: 10px; text-decoration: none; }
        .nav-item.active { color: white; }
    </style>
</head>
<body>

<div class="top-container">
    <div class="header">
        <b>STRATEX</b>
        <span style="color:var(--green)">1.3145 TON/USDT</span>
    </div>
    <div class="main-ui">
        <div class="trade-box">
            <div class="input-item"><label>Price</label><input type="number" value="1.3145"></div>
            <div class="input-item"><label>Amount</label><input type="number" placeholder="0.0"></div>
            <button class="buy-btn">Buy TON</button>
        </div>
        <div class="order-book">
            <div class="ob-rows" id="asks" style="color:var(--red)"></div>
            <div style="text-align:center; padding:2px; background:#121518; font-weight:bold;">1.3145</div>
            <div class="ob-rows" id="bids" style="color:var(--green)"></div>
        </div>
    </div>
</div>

<div id="chart"></div>

<nav class="nav">
    <a href="#" class="nav-item active">📊<br>Рынок</a>
    <a href="#" class="nav-item">💼<br>Активы</a>
    <a href="#" class="nav-item">📜<br>Сделки</a>
    <a href="#" class="nav-item">⚙️<br>Настройки</a>
</nav>

<script>
    // Настройка графика
    var options = {
        series: [{ data: [] }],
        chart: { type: 'candlestick', height: '100%', toolbar: { show: false }, animations: { enabled: false }, background: '#0b0e11' },
        theme: { mode: 'dark' },
        xaxis: { type: 'datetime', labels: { style: { colors: '#848e9c' } } },
        yaxis: { tooltip: { enabled: true }, labels: { style: { colors: '#848e9c' } } },
        grid: { borderColor: '#1f2226' }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    // Генерация данных
    function generateData() {
        let series = [];
        let time = Date.now() - (50 * 60000);
        for(let i=0; i<50; i++) {
            let o = 1.310 + Math.random()*0.01;
            series.push({ x: time + (i*60000), y: [o, o+0.002, o-0.001, o+0.001] });
        }
        chart.updateSeries([{ data: series }]);
    }
    generateData();

    // Стакан
    function fillOB() {
        let a = '', b = '';
        for(let i=0; i<6; i++) {
            a = `<div class="ob-row"><span>${(1.315+i*0.001).toFixed(4)}</span><span>${(Math.random()*10).toFixed(1)}</span></div>` + a;
            b += `<div class="ob-row"><span>${(1.314-i*0.001).toFixed(4)}</span><span>${(Math.random()*10).toFixed(1)}</span></div>`;
        }
        document.getElementById('asks').innerHTML = a;
        document.getElementById('bids').innerHTML = b;
    }
    fillOB();
</script>
</body>
</html>
