<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade V3.4</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonconnect-ui/2.0.9/tonconnect-ui.min.js"></script>
    
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; font-size: 18px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .balance-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--panel); border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); }
        .nav-item.active { color: var(--green); }
        #ton-connect-btn { display: flex; justify-content: center; margin-top: 20px; min-height: 44px; }
    </style>
</head>
<body>

<header>💎 GROK AVTO TRADE <span style="font-size: 10px; color: var(--green);">V3.4</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 5px;">ACCOUNT BALANCE</div>
            <h1 style="font-size: 38px; margin: 0; font-weight: 900;">0.00 TON</h1>
            <div id="usd_val" style="color: var(--green); font-weight: bold;">$0.00</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="doDeposit()">⬇ Deposit</button>
            <button class="btn btn-green" onclick="showTab('profile')">⬆ Send</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 15px; opacity: 0.8; font-size: 12px;">AI MARKET PULSE</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">SYSTEM ACCESS</h4>
        <div style="background: var(--panel); padding: 30px; border-radius: 25px; margin-top: 20px; border: 1px solid var(--border); text-align: center;">
            <p style="font-size: 13px; color: var(--text); margin-bottom: 20px;">Подключите TON кошелек для авторизации</p>
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>🔄</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>👤</span>Profile</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // ТВОЙ АДРЕС
    const MY_ADDR = "UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb";

    // Прямой манифест в коде (чтобы не создавать лишних файлов)
    const manifestContent = {
        url: "https://sergey52bb.github.io/grok-autotrade/",
        name: "Grok Avto Trade"
    };
    const manifestUrl = 'data:application/json,' + encodeURIComponent(JSON.stringify(manifestContent));

    let tonConnectUI;

    function initApp() {
        try {
            if (typeof TONConnectUI !== 'undefined') {
                tonConnectUI = new TONConnectUI.TonConnectUI({
                    manifestUrl: manifestUrl,
                    buttonRootId: 'ton-connect-btn'
                });
            } else {
                document.getElementById('ton-connect-btn').innerHTML = 
                    '<p style="color:orange; font-size:12px;">Сеть блокирует подключение. Попробуйте VPN или другой браузер.</p>';
            }
        } catch (e) {
            console.error(e);
        }
    }

    window.addEventListener('load', initApp);

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'market') updatePrices();
    }

    function doDeposit() {
        const addr = (tonConnectUI && tonConnectUI.account) ? tonConnectUI.account.address : MY_ADDR;
        tg.showAlert("Адрес для депозита: " + addr);
    }

    async function updatePrices() {
        const list = document.getElementById('market_list');
        const pairs = [{ n: 'TON/USDT', s: 'TONUSDT' }, { n: 'BTC/USDT', s: 'BTCUSDT' }, { n: 'ETH/USDT', s: 'ETHUSDT' }];
        let html = '';
        for (let p of pairs) {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${p.s}`);
                const data = await response.json();
                const price = parseFloat(data.price).toFixed(2);
                if(p.s === 'TONUSDT') document.getElementById('usd_val').innerText = '$' + price;
                html += `<div class="coin-row"><b>${p.n}</b><b style="color:var(--green)">$${price}</b></div>`;
            } catch (e) {
                html += `<div class="coin-row"><span>${p.n}</span><span>Error</span></div>`;
            }
        }
        list.innerHTML = html;
    }
    updatePrices();
</script>
</body>
</html>
