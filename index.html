<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v7.5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --red: #ff4a4a; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 25px 15px 15px 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; }
        header .title { font-weight: 900; font-size: 19px; letter-spacing: 1px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 140px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        nav { position: fixed; bottom: 0; width: 100%; height: 90px; background: var(--panel); display: flex; border-top: 1px solid var(--border); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); opacity: 0.5; cursor: pointer; }
        .nav-item.active { color: var(--green); opacity: 1; }
        .asset-card { background: var(--panel); border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .btn-general { padding: 18px; border-radius: 18px; border: none; font-weight: 800; text-transform: uppercase; font-size: 12px; cursor: pointer; width: 100%; }
        .btn-trade { padding: 10px 14px; font-size: 10px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; cursor: pointer; }
        select, input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        #swap_reverse_btn { background: var(--panel); border: 1px solid var(--border); color: var(--green); width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: -20px auto; z-index: 10; position: relative; }
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
    </style>
</head>
<body>

<header><div class="title">💎 SYN TERMINAL</div></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" style="font-size: 10px; opacity: 0.4;">Disconnected</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-general" style="background:#fff; color:#000;">DEPOSIT</button>
            <button class="btn-general" style="background:var(--green); color:#000;">SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <div id="market_list">
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" width="32">
                    <div><b>TON</b><br><span id="price-TON" style="font-size:12px; opacity:0.6;">$7.20</span></div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-trade" style="color:var(--green)">BUY</button>
                    <button class="btn-trade" style="color:var(--red)">SELL</button>
                </div>
            </div>
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" width="32">
                    <div><b>BTC</b><br><span id="price-BTC" style="font-size:12px; opacity:0.6;">$69,000</span></div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-trade" style="color:var(--green)">BUY</button>
                    <button class="btn-trade" style="color:var(--red)">SELL</button>
                </div>
            </div>
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="https://cryptologos.cc/logos/ethereum-eth-logo.png" width="32">
                    <div><b>ETH</b><br><span id="price-ETH" style="font-size:12px; opacity:0.6;">$3,450</span></div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-trade" style="color:var(--green)">BUY</button>
                    <button class="btn-trade" style="color:var(--red)">SELL</button>
                </div>
            </div>
            <div class="asset-card">
                <div style="display:flex; align-items:center; gap:12px;">
                    <img src="https://cryptologos.cc/logos/dogecoin-doge-logo.png" width="32">
                    <div><b>DOGE</b><br><span id="price-DOGE" style="font-size:12px; opacity:0.6;">$0.1600</span></div>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-trade" style="color:var(--green)">BUY</button>
                    <button class="btn-trade" style="color:var(--red)">SELL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div style="background:var(--panel); padding:20px; border-radius:25px; border:1px solid var(--border);">
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from" onchange="validateSwap(); calculateSwap()"></select>
            <button id="swap_reverse_btn" onclick="swapReverse()">🔄</button>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green); margin-top:10px;">
            <select id="sw_to" onchange="validateSwap(); calculateSwap()"></select>
            <div id="sw_usd_info" style="text-align:right; font-size:10px; color:var(--text); margin-bottom:10px;">Value: $0.00</div>
            <button id="sw_btn" class="btn-general" style="background:var(--green); color:#000;">CONFIRM SWAP</button>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🔄</span>Swap</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    let prices = { 'TON': 7.20, 'BTC': 69000, 'ETH': 3450, 'DOGE': 0.16, 'USDT': 1 };

    function connectMarket() {
        const socket = new WebSocket("wss://stream.binance.com:9443/ws/btcusdt@ticker/ethusdt@ticker/dogeusdt@ticker/tonusdt@ticker");
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const symbol = data.s.replace('USDT', '');
            const price = parseFloat(data.c);
            prices[symbol] = price;
            const el = document.getElementById(`price-${symbol}`);
            if (el) el.innerText = `$${price.toLocaleString(undefined, {minimumFractionDigits: (price < 1 ? 4 : 2)})}`;
        };
        socket.onclose = () => setTimeout(connectMarket, 5000);
    }

    function init() {
        const f = document.getElementById('sw_from');
        const t = document.getElementById('sw_to');
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
        });
        t.value = "USDT";
        connectMarket();
    }

    function swapReverse() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        const tmp = f.value; f.value = t.value; t.value = tmp;
        calculateSwap(); validateSwap();
    }

    function calculateSwap() {
        const f = document.getElementById('sw_from').value, t = document.getElementById('sw_to').value, v = document.getElementById('sw_val').value;
        if(v > 0) {
            document.getElementById('sw_res').value = ((v * prices[f]) / prices[t]).toFixed(4);
            document.getElementById('sw_usd_info').innerText = `Value: $${(v * prices[f]).toLocaleString()}`;
        }
    }

    function validateSwap() {
        const btn = document.getElementById('sw_btn');
        btn.disabled = (document.getElementById('sw_from').value === document.getElementById('sw_to').value);
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    window.onload = init;
</script>
</body>
</html>
