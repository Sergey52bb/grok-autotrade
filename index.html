<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --green: #0ecb81; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; }
        .log { background: #000; color: #00ff95; font-family: monospace; font-size: 10px; padding: 10px; height: 60px; overflow-y: auto; border-bottom: 1px solid #333; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2b2f36; }
        .main-container { padding: 40px 20px; text-align: center; }
        #status { font-size: 28px; font-weight: bold; margin-bottom: 10px; color: var(--gold); }
        .btn { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="log" id="sys-log">/ System check...</div>

<header>
    <div style="font-weight: 900; color: var(--gold); font-size: 20px;">STRATEX PRO</div>
    <div id="ton-button"></div>
</header>

<div class="main-container">
    <div id="status">OFFLINE</div>
    <div style="color: #848e9c;" id="sub-status">Проверка связи с манифестом...</div>
    <button class="btn" onclick="openTonModal()">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    const log = document.getElementById('sys-log');
    function print(m) { log.innerHTML += `<br>> ${m}`; log.scrollTop = log.scrollHeight; }

    // Используем динамический манифест, чтобы избежать ошибок 404
    const manifest = "https://rgey52bb.github.io/tonconnect-manifest.json";

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: manifest,
        buttonRootId: 'ton-button'
    });

    async function openTonModal() {
        print("Запуск модального окна...");
        try {
            await tonConnectUI.openModal();
        } catch(e) { print("Ошибка: " + e.message); }
    }

    tonConnectUI.onStatusChange(wallet => {
        if (wallet) {
            print("УСПЕХ! Адрес получен.");
            document.getElementById('status').innerText = "ONLINE";
            document.getElementById('status').style.color = "var(--green)";
            document.getElementById('sub-status').innerText = "Кошелек успешно привязан";
        }
    });

    // Принудительная проверка файла
    window.onload = async () => {
        try {
            const r = await fetch(manifest);
            if (r.ok) {
                print("МАНИФЕСТ ОЖИЛ ✅");
                document.getElementById('sub-status').innerText = "Система готова к работе";
            } else {
                print("GitHub блокирует файл (404/CORS)");
                document.getElementById('sub-status').innerText = "Ошибка GitHub! Манифест не виден.";
            }
        } catch(e) {
            print("СЕТЬ ВСЁ ЕЩЕ БЛОКИРУЕТ: " + e.message);
        }
    }
</script>
</body>
</html>
