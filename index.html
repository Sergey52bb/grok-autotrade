<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grok AutoTrade Bot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, system-ui, sans-serif;
  background: radial-gradient(circle at top, #0b1220, #050810);
  color: #fff;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

.card {
  background: linear-gradient(180deg, #0f172a, #020617);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.price {
  font-size: 34px;
  font-weight: 700;
}

.change.up { color: #22c55e; }
.change.down { color: #ef4444; }

button {
  flex: 1;
  padding: 14px;
  margin: 6px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}

.buy { background: #22c55e; }
.sell { background: #ef4444; }
.connect { background: #3b82f6; }

canvas {
  margin-top: 12px;
}
</style>
</head>

<body>
<div class="container">

  <!-- PRICE CARD -->
  <div class="card">
    <div class="row">
      <div>
        <div class="price" id="price">--</div>
        <div id="change" class="change">--</div>
      </div>
      <div>USDT / TON</div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="card row">
    <button class="buy">BUY</button>
    <button class="sell">SELL</button>
  </div>

  <!-- CHART -->
  <div class="card">
    <canvas id="chart" height="180"></canvas>
  </div>

  <!-- WALLET -->
  <div class="card">
    <button class="connect">Connect Wallet</button>
  </div>

</div>

<script>
const ctx = document.getElementById("chart").getContext("2d");

let prices = [];
let labels = [];

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels,
    datasets: [{
      data: prices,
      borderColor: "#38bdf8",
      borderWidth: 3,
      tension: 0.4,
      pointRadius: 0
    }]
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { display: false },
      y: { ticks: { color: "#94a3b8" } }
    }
  }
});

async function loadPrice() {
  try {
    const res = await fetch(
      "https://api.coingecko.com/api/v3/coins/the-open-network/market_chart?vs_currency=usd&days=1"
    );
    const data = await res.json();

    const sliced = data.prices.slice(-30);
    prices.length = 0;
    labels.length = 0;

    sliced.forEach(p => {
      prices.push(p[1]);
      labels.push("");
    });

    const first = prices[0];
    const last = prices[prices.length - 1];
    const change = ((last - first) / first * 100).toFixed(2);

    document.getElementById("price").textContent = last.toFixed(3) + " USDT";
    const changeEl = document.getElementById("change");
    changeEl.textContent = (change > 0 ? "+" : "") + change + "%";
    changeEl.className = "change " + (change >= 0 ? "up" : "down");

    chart.update();

  } catch {
    // fallback
    if (!prices.length) {
      prices.push(2.3,2.32,2.31,2.34,2.36);
      chart.update();
    }
  }
}

loadPrice();
setInterval(loadPrice, 10000);
</script>

</body>
</html>
