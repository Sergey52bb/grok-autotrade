<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRATEX Terminal</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal-card { background: #161a1e; padding: 30px; border-radius: 12px; border: 1px solid #2b2f36; text-align: center; width: 90%; max-width: 400px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #debug-info { font-family: monospace; font-size: 11px; color: #848e9c; margin-top: 20px; text-align: left; background: #000; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; }
        .btn { background: #f0b90b; color: black; border: none; padding: 15px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="terminal-card">
    <h2 style="color: #f0b90b; margin-top: 0;">STRATEX PRO</h2>
    <div id="connection-state">
        <span class="status-dot" style="background: #ff465d;"></span>
        <span id="state-text">Ожидание проверки...</span>
    </div>
    
    <div id="ton-connect-button" style="margin: 20px 0; display: flex; justify-content: center;"></div>

    <button class="btn" onclick="manualConnect()">ВЫЗВАТЬ КОШЕЛЕК</button>

    <div id="debug-info">Инициализация системы...</div>
</div>

<script>
    const debug = document.getElementById('debug-info');
    const stateText = document.getElementById('state-text');
    const dot = document.querySelector('.status-dot');

    function log(msg) {
        debug.innerHTML += "<br>> " + msg;
        console.log(msg);
    }

    // 1. Инициализируем TON Connect
    let tonConnectUI;
    
    try {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-button'
        });
        log("SDK инициализирован");
    } catch (e) {
        log("ОШИБКА SDK: " + e.message);
    }

    // 2. Проверяем доступность манифеста
    async function checkManifest() {
        log("Проверка манифеста...");
        try {
            const response = await fetch('https://rgey52bb.github.io/tonconnect-manifest.json');
            if (response.ok) {
                log("Манифест найден (200 OK)");
                stateText.innerText = "Система готова";
                dot.style.background = "#0ecb81";
            } else {
                log("ОШИБКА: Манифест не найден (404)");
                stateText.innerText = "Ошибка манифеста";
            }
        } catch (e) {
            log("СЕТЕВАЯ ОШИБКА: " + e.message);
        }
    }

    // 3. Ручной вызов
    async function manualConnect() {
        log("Нажата кнопка коннекта");
        if (tonConnectUI) {
            try {
                await tonConnectUI.openModal();
                log("Модальное окно открыто");
            } catch (e) {
                log("Ошибка модалки: " + e.message);
            }
        }
    }

    // Следим за статусом
    if (tonConnectUI) {
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                log("КОШЕЛЕК ПОДКЛЮЧЕН!");
                stateText.innerText = "Кошелек активен";
                stateText.style.color = "#0ecb81";
            }
        });
    }

    window.onload = checkManifest;
</script>

</body>
</html>
