<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Internal Engine</title>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { height: 40px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .price-top { color: var(--green); font-weight: bold; font-family: monospace; font-size: 16px; }

        .wallet-bar { background: var(--panel); padding: 6px 12px; display: flex; justify-content: space-around; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .wallet-item { text-align: center; }
        .wallet-item span { color: var(--text); font-size: 9px; display: block; }
        .wallet-item b { font-family: monospace; font-size: 13px; }

        #chart_container { flex: 1; min-height: 250px; background: #000; }
        
        .trade-area { height: 220px; display: flex; flex-shrink: 0; background: var(--bg); border-top: 1px solid var(--border); }
        .book { width: 42%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2px; font-family: monospace; font-size: 10px; }
        .side-book { flex: 1; display: flex; flex-direction: column; justify-content: space-around; }
        #midPrice { text-align: center; padding: 4px 0; font-size: 14px; color: var(--green); font-weight: bold; background: rgba(255,255,255,0.03); }

        .trade-form { width: 58%; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        .side-btns { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .side-btn { flex: 1; border: none; padding: 7px; border-radius: 3px; color: var(--text); background: none; font-weight: bold; font-size: 11px; }
        .side-btn.active.buy { background: var(--green); color: black; }
        .side-btn.active.sell { background: var(--red); color: white; }
        
        .fld { background: var(--input); border-radius: 4px; padding: 4px 8px; }
        .fld label { display: block; font-size: 8px; color: var(--text); }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 14px; outline: none; }
        .action-btn { background: var(--green); border: none; color: black; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 13px; margin-top: auto; }
        .history { height: 60px; overflow-y: auto; font-size: 10px; border-top: 1px solid var(--border); padding: 5px; color: var(--text); }
    </style>
</head>
<body>

<header>
    <b>TON/USDT</b>
    <div class="price-top" id="topPrice">0.000</div>
</header>

<div class="wallet-bar">
    <div class="wallet-item"><span>USDT</span><b id="balUSDT">1000.00</b></div>
    <div class="wallet-item"><span>TON</span><b id="balTON">0.00</b></div>
</div>

<div id="chart_container"></div>

<div class="trade-area">
    <div class="book">
        <div id="asks" class="side-book" style="color:var(--red);"></div>
        <div id="midPrice">0.000</div>
        <div id="bids" class="side-book" style="color:var(--green);"></div>
    </div>
    <div class="trade-form">
        <div class="side-btns">
            <button class="side-btn active buy" onclick="setSide('buy', this)">BUY</button>
            <button class="side-btn" onclick="setSide('sell', this)">SELL</button>
        </div>
        <div class="fld"><label>Price</label><input type="number" id="iPrice" step="any"></div>
        <div class="fld"><label>Amount</label><input type="number" id="iAmount" placeholder="0.0"></div>
        <button class="action-btn" id="mainBtn" onclick="placeOrder()">BUY TON</button>
    </div>
</div>

<div class="history" id="orderHistory"></div>

<script>
    let currentPrice = 0;
    let balanceUSDT = 1000;
    let balanceTON = 0;
    let currentSide = 'buy';

    // Загрузка локального ядра графика
    function initChart() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:TONUSDT",
            "interval": "15",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "chart_container",
            "disabled_features": ["header_symbol_search", "symbol_info"]
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/tonusdt@ticker');
    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        currentPrice = parseFloat(data.c);
        updateUI();
    };

    function updateUI() {
        const pStr = currentPrice.toFixed(3);
        document.getElementById('topPrice').innerText = pStr;
        document.getElementById('midPrice').innerText = pStr;
        if(!document.getElementById('iPrice').value) document.getElementById('iPrice').value = pStr;
        
        const genRows = () => {
            let h = '';
            for(let i=0; i<4; i++) {
                h += `<div style="display:flex; justify-content:space-between; padding:0 4px"><span>${(currentPrice * (1 + (Math.random()-0.5)*0.001)).toFixed(3)}</span><span>${(Math.random()*1.5).toFixed(1)}</span></div>`;
            }
            return h;
        };
        document.getElementById('asks').innerHTML = genRows();
        document.getElementById('bids').innerHTML = genRows();
    }

    function setSide(side, btn) {
        currentSide = side;
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active', 'buy', 'sell'));
        btn.classList.add('active', side);
        document.getElementById('mainBtn').style.background = side === 'buy' ? 'var(--green)' : 'var(--red)';
        document.getElementById('mainBtn').innerText = side.toUpperCase() + ' TON';
    }

    function placeOrder() {
        const p = parseFloat(document.getElementById('iPrice').value);
        const a = parseFloat(document.getElementById('iAmount').value) || 0;
        if (a <= 0) return;

        if (currentSide === 'buy') {
            if (p * a > balanceUSDT) return alert("No USDT");
            balanceUSDT -= p * a; balanceTON += a;
        } else {
            if (a > balanceTON) return alert("No TON");
            balanceUSDT += p * a; balanceTON -= a;
        }

        document.getElementById('balUSDT').innerText = balanceUSDT.toFixed(2);
        document.getElementById('balTON').innerText = balanceTON.toFixed(2);
        
        const log = document.createElement('div');
        log.innerHTML = `• ${currentSide.toUpperCase()} ${a} TON @ ${p.toFixed(3)}`;
        document.getElementById('orderHistory').prepend(log);
    }

    window.onload = initChart;
</script>
</body>
</html>
