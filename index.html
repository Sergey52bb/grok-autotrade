<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STRATEX Final Fix</title>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --text: #848e9c; --border: #2b2f36; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { height: 50px; padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .brand-name { color: var(--green); font-weight: 900; font-size: 18px; }
        
        .selector-zone { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; background: var(--panel); cursor: pointer; }
        .price-display { color: var(--green); font-weight: bold; font-family: monospace; font-size: 16px; min-width: 90px; text-align: right; }

        #coinList { position: absolute; top: 55px; left: 10px; right: 10px; background: var(--panel); z-index: 2000; display: none; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .coin-item { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .icon-svg { width: 22px; height: 22px; margin-right: 10px; display: flex; align-items: center; }
        
        #tv_wrapper { height: 260px; width: 100%; border-bottom: 1px solid var(--border); background: #000; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        .book { width: 40%; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 4px; font-family: monospace; font-size: 10px; }
        .row { display: flex; justify-content: space-between; height: 18px; position: relative; }
        .bar { position: absolute; right: 0; height: 80%; opacity: 0.15; }

        .trade { width: 60%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .side-toggle { display: flex; background: var(--input); border-radius: 4px; padding: 2px; }
        .s-btn { flex: 1; border: none; padding: 8px; border-radius: 4px; font-size: 11px; font-weight: bold; color: var(--text); background: none; }
        .s-btn.buy { background: var(--green); color: white; }
        .s-btn.sell { background: var(--red); color: white; }

        .inp { background: var(--input); border-radius: 4px; padding: 6px 10px; }
        .inp label { display: block; font-size: 8px; color: var(--text); }
        .inp input { background: none; border: none; color: white; width: 100%; font-size: 15px; outline: none; font-weight: bold; }

        .action-btn { background: var(--green); border: none; color: white; padding: 14px; border-radius: 6px; font-weight: bold; margin-top: auto; }
        nav { height: 55px; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
    </style>
</head>
<body>

<header>
    <div class="brand-name">STRATEX</div>
    <div class="selector-zone" onclick="toggleCoins()">
        <span id="activeIconWrap" style="display:flex; align-items:center; width:20px;"></span>
        <span id="activePair" style="font-weight: bold; font-size: 13px; margin: 0 5px;">STRAT/USDT</span>
        <span style="font-size: 10px; color: var(--text);">▼</span>
    </div>
    <div class="price-display" id="topPrice">17.3800</div>
</header>

<div id="coinList">
    <div class="coin-item" onclick="pick('STRAT')">
        <div style="display:flex; align-items:center;"><span id="svg_STRAT" class="icon-svg"></span><b>STRAT</b></div>
        <div style="color:var(--green)">17.3800</div>
    </div>
    <div class="coin-item" onclick="pick('TON')">
        <div style="display:flex; align-items:center;"><span id="svg_TON" class="icon-svg"></span><b>TON</b></div>
        <div id="p-TON" style="color:var(--green)">...</div>
    </div>
    <div class="coin-item" onclick="pick('ASTER')">
        <div style="display:flex; align-items:center;"><span id="svg_ASTER" class="icon-svg"></span><b>ASTER</b></div>
        <div id="p-ASTER" style="color:var(--green)">...</div>
    </div>
</div>

<div id="tv_wrapper"></div>

<div class="workspace">
    <div class="book">
        <div id="asks" style="display:flex; flex-direction:column-reverse; color:var(--red);"></div>
        <div id="midPrice" style="text-align:center; padding:8px 0; font-weight:bold; font-size:15px; color:var(--green);">0.0000</div>
        <div id="bids" style="color:var(--green);"></div>
    </div>
    <div class="trade">
        <div class="side-toggle">
            <button class="s-btn buy" id="bBuy" onclick="side('buy')">Buy</button>
            <button class="s-btn" id="bSell" onclick="side('sell')">Sell</button>
        </div>
        <div class="inp"><label>Price (USDT)</label><input type="number" id="iPrice" step="any"></div>
        <div class="inp"><label>Amount</label><input type="number" placeholder="0.0"></div>
        <button class="action-btn" id="mainBtn">Buy STRAT</button>
    </div>
</div>

<nav>
    <span style="color:white; font-size:11px;">📊 Trade</span>
    <span style="color:var(--text); font-size:11px;">💼 Wallet</span>
    <span style="color:var(--text); font-size:11px;">💎 STRAT</span>
</nav>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const svgs = {
        STRAT: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#0ecb81"/></svg>`,
        TON: `<svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="12" fill="#0088cc"/><path d="M5.5 8.5L12 18L18.5 8.5H5.5Z" fill="white"/></svg>`,
        ASTER: `<svg viewBox="0 0 24 24" width="20" height="20"><circle cx="12" cy="12" r="11" fill="#ff0080"/><path d="M7 7L17 17M17 7L7 17" stroke="white" stroke-width="2"/></svg>`
    };

    const coins = {
        // Чтобы графики не слипались, используем разных провайдеров (OKX и BINANCE)
        STRAT: { s: 'OKX:TONUSDT', p: 17.3800, live: false },
        TON: { s: 'BINANCE:TONUSDT', p: 0, live: true },
        ASTER: { s: 'BINANCE:ASTRUSDT', p: 0, live: true }
    };

    let current = 'STRAT';
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!ticker@arr');

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        data.forEach(t => {
            for (let key in coins) {
                // Мапим стрим бинанса на наши объекты
                let sym = coins[key].s.split(':')[1];
                if (sym === t.s && coins[key].live) {
                    coins[key].p = parseFloat(t.c);
                    let el = document.getElementById('p-' + key);
                    if (el) el.innerText = coins[key].p.toFixed(4);
                    if (current === key) updateUI();
                }
            }
        });
    };

    function pick(id) {
        current = id;
        document.getElementById('activeIconWrap').innerHTML = svgs[id];
        document.getElementById('activePair').innerText = id + '/USDT';
        document.getElementById('iPrice').value = coins[id].p > 0 ? coins[id].p.toFixed(4) : "17.3800";
        toggleCoins();
        updateBtn();
        loadChart(coins[id].s);
    }

    function loadChart(symbol) {
        const wrapper = document.getElementById('tv_wrapper');
        wrapper.innerHTML = `<div id="tv_container" style="height:100%;"></div>`;
        
        setTimeout(() => {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol, // Теперь тут будет либо OKX:TON..., либо BINANCE:TON...
                "interval": "15",
                "theme": "dark",
                "container_id": "tv_container",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "locale": "ru"
            });
        }, 100);
    }

    function updateUI() {
        const c = coins[current];
        const val = c.p > 0 ? c.p.toFixed(4) : "17.3800";
        document.getElementById('topPrice').innerText = val;
        document.getElementById('midPrice').innerText = val;
        
        const row = (clr) => `<div class="row"><div class="bar" style="width:${Math.random()*60}%; background:${clr}"></div><span>${(parseFloat(val) * (1 + (Math.random()-0.5)*0.002)).toFixed(4)}</span><span>${(Math.random()*10).toFixed(1)}</span></div>`;
        let ah = '', bh = '';
        for(let i=0; i<6; i++) { ah += row('var(--red)'); bh += row('var(--green)'); }
        document.getElementById('asks').innerHTML = ah;
        document.getElementById('bids').innerHTML = bh;
    }

    function toggleCoins() {
        const el = document.getElementById('coinList');
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function side(s) {
        document.getElementById('bBuy').className = s === 'buy' ? 's-btn buy' : 's-btn';
        document.getElementById('bSell').className = s === 'sell' ? 's-btn sell' : 's-btn';
        document.getElementById('mainBtn').style.background = s === 'buy' ? 'var(--green)' : 'var(--red)';
        updateBtn();
    }

    function updateBtn() {
        const isBuy = document.getElementById('bBuy').classList.contains('buy');
        document.getElementById('mainBtn').innerText = (isBuy ? 'Buy ' : 'Sell ') + current;
    }

    // Инициализация
    document.getElementById('svg_STRAT').innerHTML = svgs.STRAT;
    document.getElementById('svg_TON').innerHTML = svgs.TON;
    document.getElementById('svg_ASTER').innerHTML = svgs.ASTER;
    document.getElementById('activeIconWrap').innerHTML = svgs.STRAT;
    
    window.onload = () => loadChart('OKX:TONUSDT');
    setInterval(updateUI, 2000);
</script>
</body>
</html>
