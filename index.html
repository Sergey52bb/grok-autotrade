<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v15.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --border: rgba(255,255,255,0.08); }
        
        /* Запрещаем скролл всему телу, чтобы не прыгало в Telegram */
        body { 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            font-family: -apple-system, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            padding: 10px 0; 
            text-align: center; 
            flex-shrink: 0; 
            background: var(--bg);
            z-index: 10;
        }
        header .subtitle { font-size: 10px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.9; text-transform: uppercase; }

        /* Контейнер для монет с собственной прокруткой */
        #main_content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 10px 15px 100px; /* Отступ снизу, чтобы меню не перекрывало */
            -webkit-overflow-scrolling: touch; 
        } 

        .asset-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px 12px; 
            border: 1px solid rgba(77, 184, 255, 0.15); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            border-radius: 18px; 
            margin-bottom: 10px; 
            background: var(--panel);
        }

        .asset-icon-box { 
            width: 40px; 
            height: 40px; 
            min-width: 40px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #1a222c; 
            border-radius: 50%; 
            border: 1px solid var(--border); 
        }
        .asset-icon-img { width: 24px; height: 24px; border-radius: 50%; }

        .asset-details { flex: 1; margin-left: 12px; }
        .asset-name { font-weight: 700; font-size: 14px; }
        .asset-price { font-size: 11px; color: var(--green); opacity: 0.8; }
        
        .asset-right { text-align: right; }
        .bal-amount { font-weight: 700; font-size: 14px; }

        /* Фиксированное меню */
        nav { 
            position: fixed; 
            bottom: 10px; 
            left: 10px; 
            right: 10px; 
            height: 70px; 
            background: var(--panel); 
            display: flex; 
            border-radius: 20px; 
            border: 1px solid var(--border); 
            z-index: 100; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.8); 
        }
        .nav-item { 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            opacity: 0.4; 
            font-size: 24px; 
            transition: 0.2s; 
        }
        .nav-item.active { opacity: 1; color: var(--blue); transform: translateY(-2px); }

        /* Прячем полосу прокрутки для красоты */
        #main_content::-webkit-scrollbar { width: 0; display: none; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 20px; font-weight: 900; letter-spacing: 1px;">💎 SYN WALLET</div>
        <div class="subtitle">Terminal v15.0</div>
    </header>

    <div id="main_content">
        <div style="text-align: center; opacity: 0.5; font-size: 12px; margin-top: 50px;">Загрузка активов...</div>
    </div>

    <nav>
        <div class="nav-item active">🏠</div>
        <div class="nav-item">🔄</div>
        <div class="nav-item">💳</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <script>
        const assets = [
            { id: 'the-open-network', symbol: 'TON', name: 'Toncoin', icon: 'https://cryptologos.cc/logos/toncoin-ton-logo.png', price: 0, balance: 0 },
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png', price: 0, balance: 0 },
            { id: 'tether', symbol: 'USDT', name: 'USDT', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.png', price: 0, balance: 0 },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.png', price: 0, balance: 0 },
            { id: 'solana', symbol: 'SOL', name: 'Solana', icon: 'https://cryptologos.cc/logos/solana-sol-logo.png', price: 0, balance: 0 },
            { id: 'near', symbol: 'NEAR', name: 'NEAR', icon: 'https://cryptologos.cc/logos/near-protocol-near-logo.png', price: 0, balance: 0 },
            { id: 'usd-coin', symbol: 'USDC', name: 'USDC', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png', price: 0, balance: 0 },
            { id: 'dogecoin', symbol: 'DOGE', name: 'Dogecoin', icon: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png', price: 0, balance: 0 },
            { id: 'binancecoin', symbol: 'BNB', name: 'BNB', icon: 'https://cryptologos.cc/logos/binance-coin-bnb-logo.png', price: 0, balance: 0 },
            { id: 'litecoin', symbol: 'LTC', name: 'Litecoin', icon: 'https://cryptologos.cc/logos/litecoin-ltc-logo.png', price: 0, balance: 0 },
            { id: 'sui', symbol: 'SUI', name: 'SUI', icon: 'https://cryptologos.cc/logos/sui-sui-logo.png', price: 0, balance: 0 },
            { id: 'polygon', symbol: 'MATIC', name: 'Polygon', icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png', price: 0, balance: 0 }
        ];

        async function fetchPrices() {
            try {
                const ids = assets.map(a => a.id).join(',');
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const data = await res.json();
                assets.forEach(a => { if(data[a.id]) a.price = data[a.id].usd; });
                render();
            } catch (e) { console.error(e); }
        }

        function render() {
            const container = document.getElementById('main_content');
            container.innerHTML = '';
            assets.forEach(a => {
                const p = a.price < 1 ? a.price.toFixed(4) : a.price.toLocaleString();
                container.innerHTML += `
                    <div class="asset-item">
                        <div class="asset-left" style="display:flex; align-items:center;">
                            <div class="asset-icon-box"><img src="${a.icon}" class="asset-icon-img"></div>
                            <div class="asset-details">
                                <div class="asset-name">${a.name}</div>
                                <div class="asset-price">$${p}</div>
                            </div>
                        </div>
                        <div class="asset-right"><div class="bal-amount">0 ${a.symbol}</div></div>
                    </div>`;
            });
        }

        fetchPrices();
        setInterval(fetchPrices, 60000);
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
