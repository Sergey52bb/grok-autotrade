<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>SYN TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
      background: #081221;
      color: white;
    }

    header {
      text-align: center;
      padding: 10px;
      background: #0d1b2a;
    }

    #chart {
      height: 220px;
    }

    .orderbook {
      height: calc(100vh - 360px);
      margin: 8px;
      background: #0d1b2a;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }

    .orders {
      flex: 1;
      overflow-y: auto;
      padding: 5px;
    }

    .order {
      position: relative;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 2px 6px;
      margin: 1px 0;
      border-radius: 4px;
    }

    .order::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: var(--depth);
      opacity: 0.25;
    }

    .sell::before { background: red; }
    .buy::before { background: lime; }

    .sell { color: #ff4d4d; }
    .buy { color: #00c853; }

    .price {
      text-align: center;
      font-weight: bold;
      padding: 5px;
      background: #081221;
    }

    .buttons {
      display: flex;
      justify-content: space-around;
      margin: 10px;
    }

    .btn {
      width: 45%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      color: white;
    }

    .buy-btn { background: green; }
    .sell-btn { background: red; }

    .menu {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #0d1b2a;
      padding: 8px 0;
    }
  </style>
</head>

<body>

<header>
  <h3>💎 SYN TERMINAL</h3>
  <small>AI Trading System</small>
</header>

<div id="chart"></div>

<div class="orderbook">
  <div class="orders" id="sellOrders"></div>
  <div class="price" id="price">--</div>
  <div class="orders" id="buyOrders"></div>
</div>

<div class="buttons">
  <button class="btn buy-btn">BUY</button>
  <button class="btn sell-btn">SELL</button>
</div>

<div class="menu">
  <div>Home</div>
  <div>Trade</div>
  <div>Wallet</div>
  <div>Settings</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
document.body.style.height = window.innerHeight + "px";

new TradingView.widget({
  width: "100%",
  height: 220,
  symbol: "BINANCE:TONUSDT",
  interval: "5",
  theme: "dark",
  container_id: "chart"
});

async function loadOrderBook() {
  const res = await fetch('https://api.binance.com/api/v3/depth?symbol=TONUSDT&limit=30');
  const data = await res.json();

  const asks = data.asks.slice(0, 15);
  const bids = data.bids.slice(0, 15);

  const sellBox = document.getElementById('sellOrders');
  const buyBox = document.getElementById('buyOrders');

  sellBox.innerHTML = '';
  buyBox.innerHTML = '';

  let maxVolume = 0;
  [...asks, ...bids].forEach(o => {
    const v = parseFloat(o[1]);
    if (v > maxVolume) maxVolume = v;
  });

  // SELL (верх)
  for (let i = asks.length - 1; i >= 0; i--) {
    const price = parseFloat(asks[i][0]).toFixed(3);
    const vol = parseFloat(asks[i][1]);
    const depth = (vol / maxVolume) * 100;

    sellBox.innerHTML += `
      <div class="order sell" style="--depth:${depth}%">
        <span>${price}</span>
        <span>${vol.toFixed(0)}</span>
      </div>
    `;
  }

  // цена
  document.getElementById('price').innerText =
    parseFloat(bids[0][0]).toFixed(3);

  // BUY (низ)
  bids.forEach(o => {
    const price = parseFloat(o[0]).toFixed(3);
    const vol = parseFloat(o[1]);
    const depth = (vol / maxVolume) * 100;

    buyBox.innerHTML += `
      <div class="order buy" style="--depth:${depth}%">
        <span>${price}</span>
        <span>${vol.toFixed(0)}</span>
      </div>
    `;
  });
}

loadOrderBook();
setInterval(loadOrderBook, 3000);
</script>

</body>
</html>
