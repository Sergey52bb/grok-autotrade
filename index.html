<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b121e;
    --card: #1a2230;
    --text: #fff;
    --dim: #8e96a3;
    --green: #00ff9c;
    --red: #ff4d4d;
}

/* ОСНОВА */
body {
    margin: 0;
    background: var(--bg);
    font-family: Arial;
    color: var(--text);
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
}

.sub {
    font-size: 12px;
    color: var(--dim);
}

/* MAIN */
.main {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 140px);
}

/* CHART BAR */
.chart-bar {
    height: 40px;
    background: #121926;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

/* ORDERBOOK */
.orderbook {
    flex: 1;
    overflow-y: auto;
}

/* ROW */
.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    padding: 2px 10px;
    font-size: 12px;
}

.row span {
    z-index: 2;
}

/* DEPTH */
.fill {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    opacity: 0.2;
    z-index: 1;
}

/* COLORS */
.sell span:first-child { color: var(--red); }
.buy span:first-child { color: var(--green); }

/* PRICE CENTER */
.price {
    text-align: center;
    padding: 6px;
    background: #121926;
    font-weight: bold;
}

/* TRADE */
.trade {
    padding: 10px;
    background: var(--card);
}

.input {
    background: #121926;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
}

.btn {
    width: 100%;
    padding: 12px;
    background: var(--green);
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

/* BOTTOM */
.bottom {
    height: 60px;
    background: #121926;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span class="sub">AI Trading System</span>
</div>

<div class="main">

<div class="chart-bar">📉 Chart (скоро TradingView)</div>

<div class="orderbook" id="orderbook"></div>

</div>

<div class="trade">
<div class="input">Amount: 25 TON</div>
<div class="input">Receive: 133 USDT</div>
<div class="input">Fee: 0.25%</div>
<button class="btn">BUY TON</button>
</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
const orderbook = document.getElementById('orderbook');

function generate() {
    orderbook.innerHTML = '';

    let base = 5.30;

    // SELL
    for (let i = 0; i < 20; i++) {
        let price = base + i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row sell';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = 'red';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        orderbook.appendChild(row);
    }

    // PRICE
    let priceRow = document.createElement('div');
    priceRow.className = 'price';
    priceRow.innerText = base.toFixed(2);
    orderbook.appendChild(priceRow);

    // BUY
    for (let i = 0; i < 20; i++) {
        let price = base - i * 0.01;
        let amount = Math.random() * 500;
        let depth = Math.random() * 100;

        let row = document.createElement('div');
        row.className = 'row buy';

        let fill = document.createElement('div');
        fill.className = 'fill';
        fill.style.width = depth + '%';
        fill.style.background = '#00ff9c';

        row.innerHTML = `<span>${price.toFixed(2)}</span><span>${amount.toFixed(0)}</span>`;
        row.appendChild(fill);

        orderbook.appendChild(row);
    }
}

generate();
setInterval(generate, 2000);
</script>

</body>
                                 </html>
