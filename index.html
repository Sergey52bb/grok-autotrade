<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SYN TERMINAL</title>

<style>
:root {
    --bg:#0d1424;
    --card:#151d30;
    --text:#fff;
    --dim:#848e9c;
    --green:#2ebd85;
    --red:#f6465d;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui;
    padding:10px;
}

/* HEADER */
.header{
    text-align:center;
    margin-bottom:10px;
}
.header h1{margin:0;font-size:18px;}
.header p{margin:0;color:var(--dim);font-size:12px;}

/* GRID */
.layout{
    display:grid;
    grid-template-columns:55% 45%;
    gap:8px;
}

/* LEFT */
.controls{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.box{
    background:var(--card);
    padding:12px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
}

.btn{
    background:var(--green);
    border:none;
    padding:14px;
    border-radius:10px;
    font-weight:bold;
}

/* ORDERBOOK */
.orderbook{
    background:var(--card);
    border-radius:10px;
    padding:6px;
    height:380px;
    display:flex;
    flex-direction:column;
}

.book{
    flex:1;
    overflow:hidden;
}

.row{
    position:relative;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    height:18px;
    align-items:center;
    padding:0 4px;
}

.fill{
    position:absolute;
    right:0;
    height:100%;
    opacity:0.2;
}

/* CENTER PRICE */
.mid{
    text-align:center;
    padding:4px;
    font-weight:bold;
    border-top:1px solid #222;
    border-bottom:1px solid #222;
}

/* CHART */
.chart{
    margin-top:10px;
    height:100px;
    background:#111;
    border-radius:10px;
}

/* FIX MOBILE */
@media(max-width:480px){
    .layout{
        grid-template-columns:1fr;
    }
    .orderbook{
        height:300px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>💎 SYN TERMINAL</h1>
    <p>AI Trading System</p>
</div>

<div class="layout">

<!-- LEFT -->
<div class="controls">
    <div class="box"><span>Amount</span><span>25 TON</span></div>
    <div class="box"><span>Receive</span><span>133 USDT</span></div>
    <div class="box"><span>Fee</span><span>0.25%</span></div>
    <button class="btn">BUY TON</button>
</div>

<!-- RIGHT ORDERBOOK -->
<div class="orderbook">

<div class="book" id="asks"></div>

<div class="mid">1.288</div>

<div class="book" id="bids"></div>

</div>

</div>

<div class="chart"></div>

<script>
function generate(){
    const asks = document.getElementById('asks');
    const bids = document.getElementById('bids');

    asks.innerHTML='';
    bids.innerHTML='';

    for(let i=0;i<12;i++){
        let price=(1.30 + i*0.001).toFixed(3);
        let vol=Math.floor(Math.random()*60000);

        asks.innerHTML+=`
        <div class="row">
            <div class="fill" style="width:${Math.random()*100}%;background:#f6465d"></div>
            <span style="color:#f6465d">${price}</span>
            <span>${vol}</span>
        </div>`;
    }

    for(let i=0;i<12;i++){
        let price=(1.288 - i*0.001).toFixed(3);
        let vol=Math.floor(Math.random()*60000);

        bids.innerHTML+=`
        <div class="row">
            <div class="fill" style="width:${Math.random()*100}%;background:#2ebd85"></div>
            <span style="color:#2ebd85">${price}</span>
            <span>${vol}</span>
        </div>`;
    }
}

generate();
setInterval(generate,2000);
</script>

</body>
    </html>
