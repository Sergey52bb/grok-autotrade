<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade V4.6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; font-size: 18px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .balance-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btns { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 18px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }
        
        /* Стили для модального окна Депозита */
        #deposit_modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 400px; border: 1px solid var(--border); }
        #qrcode { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin-bottom: 20px; }
        #qrcode img { width: 180px; height: 180px; }
        .addr-text { font-size: 10px; word-break: break-all; background: #000; padding: 15px; border-radius: 10px; margin-bottom: 20px; color: var(--green); border: 1px solid var(--border); }

        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--panel); border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: var(--text); opacity: 0.6; }
        .nav-item.active { color: var(--green); opacity: 1; }
        
        #ton-connect-btn { display: flex; justify-content: center; margin-top: 15px; }
        .admin-box { background: rgba(0,255,149,0.05); padding: 15px; border-radius: 15px; border: 1px dashed var(--green); margin-top: 20px; font-size: 11px; }
    </style>
</head>
<body>

<header>💎 GROK AVTO TRADE <span style="font-size: 10px; color: var(--green);">V4.6</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 8px;">USER WALLET</div>
            <h1 id="main_status" style="font-size: 32px; margin: 0; font-weight: 900;">OFFLINE</h1>
            <div id="addr_display" style="font-size: 11px; margin-top: 10px; color: var(--green); opacity: 0.8;">Авторизуйтесь в Settings</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="openDeposit()">📥 DEPOSIT</button>
            <button class="btn btn-green" onclick="showTab('profile')">⚙️ MANAGE</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 15px; opacity: 0.7; font-size: 12px;">ЦЕНЫ В РЕАЛЬНОМ ВРЕМЕНИ</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">УПРАВЛЕНИЕ ДОСТУПОМ</h4>
        <div style="background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid var(--border); text-align: center;">
            <div id="ton-connect-btn"></div>
        </div>
        <div class="admin-box">
            <b style="color: var(--green);">SERVICE FEE ADRESS:</b><br>
            <span style="word-break: break-all; opacity: 0.7;">UQC-SznwEOfPpQkOKtW7Ryr9jPJGTopwJDcuWlBEnpaS1bBJ</span>
        </div>
    </div>
</div>

<div id="deposit_modal" onclick="closeDeposit()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top: 0;">Пополнение баланса</h3>
        <p style="font-size: 12px; opacity: 0.6;">Отсканируйте QR или скопируйте адрес</p>
        <div id="qrcode"></div>
        <div id="full_address" class="addr-text">Адрес не найден</div>
        <button class="btn btn-green" style="width: 100%;" onclick="copyUserAddr()">📋 КОПИРОВАТЬ АДРЕС</button>
        <p style="font-size: 10px; margin-top: 15px; opacity: 0.4;" onclick="closeDeposit()">ЗАКРЫТЬ</p>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>📊</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>⚙️</span>Settings</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let tonConnectUI;
    let userFullAddr = "";

    async function init() {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                document.getElementById('main_status').innerText = "ONLINE";
                userFullAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = userFullAddr.substring(0,8) + "..." + userFullAddr.substring(userFullAddr.length-8);
                // Обновляем QR и адрес в модалке сразу
                updateQR(userFullAddr);
            } else {
                document.getElementById('main_status').innerText = "OFFLINE";
                document.getElementById('addr_display').innerText = "Авторизуйтесь в Settings";
                userFullAddr = "";
            }
        });
    }

    function updateQR(text) {
        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        if (text) {
            new QRCode(qrContainer, { text: text, width: 180, height: 180 });
            document.getElementById('full_address').innerText = text;
        }
    }

    function openDeposit() {
        if (!userFullAddr) {
            tg.showAlert("Сначала подключите кошелек!");
            return;
        }
        document.getElementById('deposit_modal').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function closeDeposit() {
        document.getElementById('deposit_modal').style.display = 'none';
    }

    function copyUserAddr() {
        if (!userFullAddr) return;
        navigator.clipboard.writeText(userFullAddr).then(() => {
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Адрес успешно скопирован!");
        }).catch(() => {
            tg.showAlert("Ошибка копирования. Попробуйте еще раз.");
        });
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
    }

    window.addEventListener('load', () => setTimeout(init, 500));
</script>
</body>
</html>
