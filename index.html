<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grok AutoTrade</title>

  <!-- TON CONNECT SDK -->
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
    }

    .card {
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(180deg, #020617, #020617cc);
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    .price {
      font-size: 42px;
      font-weight: 700;
    }

    .change {
      color: #22c55e;
      margin-top: 6px;
    }

    .pair {
      float: right;
      opacity: 0.7;
    }

    .buttons {
      display: flex;
      gap: 14px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: 600;
    }

    .buy { background: #22c55e; }
    .sell { background: #ef4444; }

    canvas {
      width: 100%;
      height: 200px;
    }

    .wallet {
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="price">
      1.248 USDT
      <span class="pair">USDT / TON</span>
    </div>
    <div class="change">+2.39%</div>
  </div>

  <div class="card">
    <div class="buttons">
      <button class="buy">BUY</button>
      <button class="sell">SELL</button>
    </div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card wallet" id="ton-connect"></div>

  <!-- SCRIPT -->
  <script>
    // === TON CONNECT INIT ===
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: "https://rgey52bb.github.io/tonconnect-manifest.json",
      buttonRootId: "ton-connect"
    });

    // === DEBUG INFO ===
    tonConnectUI.onStatusChange(wallet => {
      if (wallet) {
        console.log("Кошелёк подключён:", wallet.account.address);
      } else {
        console.log("Кошелёк отключён");
      }
    });

    // === SIMPLE CHART ===
    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.offsetWidth;
    canvas.height = 200;

    const data = [1.22,1.225,1.23,1.24,1.25,1.238,1.245,1.24,1.25,1.248];

    ctx.strokeStyle = "#38bdf8";
    ctx.lineWidth = 3;
    ctx.beginPath();

    data.forEach((v,i) => {
      const x = (i/(data.length-1)) * canvas.width;
      const y = canvas.height - (v-1.21)*800;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    });

    ctx.stroke();
  </script>

</body>
</html>
