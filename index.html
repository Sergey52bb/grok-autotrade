<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<style>
body {
    margin: 0;
    background: #0b121e;
    color: white;
    font-family: Arial;
}

/* HEADER */
.header {
    text-align: center;
    padding: 20px;
    font-size: 18px;
    font-weight: bold;
}

.sub {
    font-size: 12px;
    opacity: 0.7;
}

/* WALLET CARD */
.wallet {
    background: #1a2230;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
}

.balance {
    font-size: 24px;
    font-weight: bold;
}

.address {
    font-size: 12px;
    opacity: 0.6;
    word-break: break-all;
}

/* BUTTONS */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.btn {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
}

.send { background: #ff4d4d; }
.receive { background: #00ff9c; }

/* CONNECT */
.connect {
    margin: 15px;
    text-align: center;
}

/* BOTTOM */
.bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #121926;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span class="sub">AI Trading System</span>
</div>

<div class="connect">
<div id="ton-connect"></div>
</div>

<div class="wallet">
<div>Balance</div>
<div class="balance" id="balance">0 TON</div>

<div class="address" id="address">Not connected</div>

<div class="actions">
<button class="btn send">Send</button>
<button class="btn receive">Receive</button>
</div>
</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
    buttonRootId: 'ton-connect'
});

tonConnectUI.onStatusChange(wallet => {
    if (wallet) {
        document.getElementById('address').innerText = wallet.account.address;
        document.getElementById('balance').innerText = 'Loading...';

        // позже подключим реальный баланс
        setTimeout(() => {
            document.getElementById('balance').innerText = '2.45 TON';
        }, 1000);
    }
});
</script>

</body>
</html>
