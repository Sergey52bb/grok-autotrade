<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 SYN TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #171a1e; --input: #2b3139; --green: #0ecb81; --text: #848e9c; --border: #2b2f36; --accent: #0088cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: white; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            height: 60px; 
            padding: 0 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: var(--panel);
        }

        .logo { font-weight: bold; font-size: 18px; letter-spacing: 1px; color: #fff; }
        .ton-price { color: var(--green); font-family: monospace; font-size: 14px; }

        #main_content { 
            flex: 1; 
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 80px;
        }

        /* Карточка баланса */
        .balance-card {
            background: linear-gradient(135deg, #171a1e 0%, #1c2127 100%);
            padding: 30px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .balance-label { color: var(--text); font-size: 13px; text-transform: uppercase; margin-bottom: 8px; }
        .balance-amount { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .balance-usd { color: var(--text); font-size: 16px; }

        /* Поля ввода */
        .action-box {
            background: var(--panel);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }
        .fld { background: var(--input); border-radius: 10px; padding: 12px; margin-bottom: 15px; border: 1px solid transparent; }
        .fld:focus-within { border-color: var(--accent); }
        .fld label { display: block; font-size: 10px; color: var(--text); margin-bottom: 5px; text-transform: uppercase; }
        .fld input { background: none; border: none; color: white; width: 100%; font-size: 16px; outline: none; }

        .send-btn { 
            background: var(--green); 
            border: none; 
            color: black; 
            padding: 16px; 
            border-radius: 12px; 
            font-weight: bold; 
            width: 100%; 
            font-size: 16px; 
            cursor: pointer;
            transition: transform 0.1s;
        }
        .send-btn:active { transform: scale(0.98); }

        #ton-connect-btn { display: flex; justify-content: center; margin-bottom: 10px; }

        .fee-info { text-align: center; font-size: 11px; color: var(--text); margin-top: 10px; }

        nav { 
            height: 65px; 
            background: var(--panel); 
            border-top: 1px solid var(--border); 
            display: flex; 
            position: fixed; 
            bottom: 0; left: 0; right: 0; 
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 11px; }
        .nav-item.active { color: var(--green); }
        .nav-item span { font-size: 22px; }
    </style>
</head>
<body>

<header>
    <div class="logo">💎 SYN TERMINAL</div>
    <div class="ton-price" id="priceDisplay">TON: $0.00</div>
</header>

<div id="main_content">
    
    <div id="ton-connect-btn"></div>

    <div class="balance-card">
        <div class="balance-label">Доступный баланс</div>
        <div class="balance-amount"><span id="ton_balance">0.00</span> TON</div>
        <div class="balance-usd">≈ $<span id="usd_balance">0.00</span></div>
    </div>

    <div class="action-box">
        <h3 style="margin-bottom: 15px; font-size: 16px;">Отправить перевод</h3>
        
        <div class="fld">
            <label>Адрес получателя (TON)</label>
            <input type="text" id="dest_addr" placeholder="UQ... или адрес">
        </div>

        <div class="fld">
            <label>Количество TON</label>
            <input type="number" id="send_amt" placeholder="0.0" step="any">
        </div>

        <button class="send-btn" onclick="processTransfer()">ОТПРАВИТЬ</button>
        <div class="fee-info">Комиссия системы SYN: 1% (AI Optimization)</div>
    </div>

</div>

<nav>
    <div class="nav-item active"><span>💼</span>Кошелек</div>
    <div class="nav-item"><span>📈</span>Рынок</div>
    <div class="nav-item"><span>👤</span>Профиль</div>
</nav>

<script>
    // --- ТВОИ НАСТРОЙКИ ---
    const MY_WALLET = "UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb; // Сюда придет комиссия
    const FEE = 0.01; // 1%

    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/Grok-Avto-Trade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    let currentPrice = 0;

    // Получаем цену TON в реальном времени
    async function getPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=TONUSDT');
            const data = await res.json();
            currentPrice = parseFloat(data.price);
            document.getElementById('priceDisplay').innerText = `TON: $${currentPrice.toFixed(2)}`;
        } catch(e) { console.log("Price error"); }
    }
    setInterval(getPrice, 5000);
    getPrice();

    // Логика транзакции
    async function processTransfer() {
        if (!tonConnectUI.connected) return alert("Сначала подключи кошелек!");
        
        const address = document.getElementById('dest_addr').value;
        const amount = document.getElementById('send_amt').value;

        if (!address || !amount || amount <= 0) return alert("Введите верные данные");

        const nanoTotal = Math.floor(parseFloat(amount) * 1000000000);
        const commission = Math.floor(nanoTotal * FEE);
        const userNet = nanoTotal - commission;

        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [
                {
                    address: address, // Получателю (сумма минус твоя доля)
                    amount: userNet.toString(),
                },
                {
                    address: MY_WALLET, // Твой доход
                    amount: commission.toString(),
                    payload: "te6ccgEBAQEADgAAGEZlZSBieSBTWTi0974=" // Коммент: Fee by SYN
                }
            ]
        };

        try {
            await tonConnectUI.sendTransaction(tx);
            alert("Транзакция отправлена в SYN Network!");
        } catch (e) {
            alert("Ошибка транзакции");
        }
    }
</script>

</body>
</html>
