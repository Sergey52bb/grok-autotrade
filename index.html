<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade V4.2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 20px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; font-size: 18px; }
        #main_content { flex: 1; overflow-y: auto; padding: 20px 15px 100px 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .balance-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); padding: 30px; border-radius: 25px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border); }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 18px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-white { background: #fff; color: #000; }
        .btn-green { background: var(--green); color: #000; }
        .coin-row { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: var(--panel); border-radius: 15px; margin-bottom: 8px; border: 1px solid var(--border); }
        nav { position: fixed; bottom: 0; width: 100%; height: 80px; background: var(--panel); display: flex; border-top: 1px solid var(--border); }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--text); }
        .nav-item.active { color: var(--green); }
        #ton-connect-btn { display: flex; justify-content: center; margin-top: 20px; min-height: 44px; }
        #addr_display { font-size: 10px; opacity: 0.5; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>

<header>💎 GROK AVTO TRADE <span style="font-size: 10px; color: var(--green);">V4.2</span></header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6; margin-bottom: 5px;">ACTIVE WALLET</div>
            <h1 id="main_bal" style="font-size: 32px; margin: 0; font-weight: 900;">CONNECTED</h1>
            <div id="addr_display">Загрузка адреса...</div>
        </div>
        <div class="btns">
            <button class="btn btn-white" onclick="doDeposit()">⬇ Deposit</button>
            <button class="btn btn-green" onclick="showTab('profile')">⚙ Manage</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h4 style="margin-bottom: 15px; opacity: 0.8; font-size: 12px;">AI MARKET PULSE</h4>
        <div id="market_list"></div>
    </div>

    <div id="scr_profile" class="screen">
        <h4 style="text-align: center;">SYSTEM ACCESS</h4>
        <div style="background: var(--panel); padding: 30px; border-radius: 25px; margin-top: 20px; border: 1px solid var(--border); text-align: center;">
            <p style="font-size: 13px; color: var(--text); margin-bottom: 20px;">Статус авторизации</p>
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span>Wallet</div>
    <div class="nav-item" onclick="showTab('market', this)"><span>🔄</span>Market</div>
    <div class="nav-item" onclick="showTab('profile', this)"><span>👤</span>Profile</div>
</nav>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Твой основной адрес для проверок
    const TARGET_ADDR = "UQC-SznwEOfPpQkOKtW7Ryr9jPJGTopwJDcuWlBEnpaS1bBJ";
    const manifestUrl = 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json?v=3';

    let tonConnectUI;

    async function initApp() {
        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: manifestUrl,
            buttonRootId: 'ton-connect-btn'
        });

        // Слушаем изменения в кошельке
        tonConnectUI.onStatusChange(wallet => {
            if (wallet) {
                const rawAddr = wallet.account.address;
                document.getElementById('addr_display').innerText = rawAddr;
                document.getElementById('main_bal').innerText = "ONLINE";
            } else {
                document.getElementById('addr_display').innerText = "Кошелек не подключен";
                document.getElementById('main_bal').innerText = "OFFLINE";
            }
        });
    }

    window.addEventListener('load', () => setTimeout(initApp, 500));

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'market') updatePrices();
    }

    function doDeposit() {
        const current = (tonConnectUI && tonConnectUI.account) ? tonConnectUI.account.address : TARGET_ADDR;
        tg.showAlert("Ваш адрес: " + current);
    }

    async function updatePrices() {
        const list = document.getElementById('market_list');
        const pairs = [{ n: 'TON/USDT', s: 'TONUSDT' }, { n: 'BTC/USDT', s: 'BTCUSDT' }];
        let html = '';
        for (let p of pairs) {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${p.s}`);
                const data = await res.json();
                html += `<div class="coin-row"><b>${p.n}</b><b style="color:var(--green)">$${parseFloat(data.price).toFixed(2)}</b></div>`;
            } catch (e) { html += `<div class="coin-row"><span>${p.n}</span><span>Error</span></div>`; }
        }
        list.innerHTML = html;
    }
    updatePrices();
</script>
</body>
</html>
