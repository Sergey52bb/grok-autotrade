<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b121e;
    --card: #161d2a;
    --text: #fff;
    --dim: #8e96a3;
    --green: #00ff9c;
    --red: #ff4d4d;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: Arial;
    color: var(--text);
}

/* HEADER */
.header {
    padding: 10px;
    font-size: 16px;
    font-weight: bold;
}

/* MAIN GRID */
.main {
    display: grid;
    grid-template-columns: 55% 45%;
    height: calc(100vh - 120px);
}

/* ORDERBOOK */
.order-book {
    background: #0f1722;
    border-radius: 10px;
    overflow: hidden;
    font-size: 12px;
    .order-book {
    max-height: 400px;
    overflow: hidden;
    }
}

/* строка ордера */
.ob-row {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 18px; /* 👈 плотность */
    padding: 0 6px;
}

/* заливка глубины */
.ob-fill {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    opacity: 0.25;
    z-index: 1;
}

/* текст поверх */
.ob-row span {
    z-index: 2;
}

.red { color: #ff4d4f; }
.green { color: #00c087; }

/* текущая цена */
.mid-price {
    text-align: center;
    font-weight: bold;
    padding: 6px 0;
    background: #111a27;
    }

/* COLORS */
.sell span:first-child { color: var(--red); }
.buy span:first-child { color: var(--green); }

/* PRICE */
.price {
    text-align: center;
    padding: 6px;
    background: #121926;
    font-weight: bold;
    position: sticky;
    top: 0;
}

/* TRADE PANEL */
.trade {
    background: var(--card);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.tabs {
    display: flex;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
}

.buy-tab { background: var(--green); }
.sell-tab { background: #333; }

.input {
    background: #0f1622;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
}

.btn-buy {
    background: var(--green);
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn-sell {
    background: var(--red);
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

/* BOTTOM */
.bottom {
    height: 60px;
    background: #121926;
    display: flex;
    justify-content: space-around;
    align-items: center;
}
</style>
</head>

<body>

<div class="header">
💎 SYN TERMINAL<br>
<span style="font-size:12px;color:#8e96a3;">TON / USDT</span>
</div>

<div class="main">

<!-- ORDERBOOK -->
<div class="orderbook" id="orderbook"></div>

<!-- TRADE -->
<div class="order-book">

    <!-- SELL (верх) -->
    <div id="sellOrders"></div>

    <!-- Текущая цена -->
    <div class="mid-price">1.288</div>

    <!-- BUY (низ) -->
    <div id="buyOrders"></div>

    </div>

<div class="input">Amount: 25 TON</div>
<div class="input">Receive: 133 USDT</div>
<div class="input">Fee: 0.25%</div>

<button class="btn-buy">BUY</button>
<button class="btn-sell">SELL</button>

</div>

</div>

<div class="bottom">
<div>Home</div>
<div>Trade</div>
<div>Wallet</div>
</div>

<script>
function generateOrders(type) {
    const container = document.getElementById(type === 'buy' ? 'buyOrders' : 'sellOrders');
    container.innerHTML = '';

    let basePrice = 1.288;

    for (let i = 0; i < 20; i++) {
        let price = type === 'buy'
            ? (basePrice - i * 0.001).toFixed(3)
            : (basePrice + i * 0.001).toFixed(3);

        let volume = Math.floor(Math.random() * 1000) + 50;

        let maxVolume = 1000;
        let width = (volume / maxVolume) * 100;

        const row = document.createElement('div');
        row.className = 'ob-row';

        row.innerHTML = `
            <div class="ob-fill" style="
                width: ${width}%;
                background: ${type === 'buy' ? '#00c087' : '#ff4d4f'};
            "></div>

            <span class="${type === 'buy' ? 'green' : 'red'}">${price}</span>
            <span>${volume}</span>
        `;

        container.appendChild(row);
    }
}

// обновление
setInterval(() => {
    generateOrders('buy');
    generateOrders('sell');
}, 1000);

// первый запуск
generateOrders('buy');
generateOrders('sell');
</script>

</body>
</html>
