<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root {
            --bg: #0b0e11; --card: #181a20; --border: #2b3139;
            --primary: #02c076; --secondary: #f84960;
            --gold: #f0b90b; --text-dim: #848e9c;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: white;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Верхняя панель с ценой */
        .ticker-header {
            padding: 15px; background: var(--bg); display: flex; 
            justify-content: space-between; align-items: center;
        }
        .price-main { font-size: 24px; font-weight: 700; color: var(--primary); }
        .ticker-info { text-align: right; font-size: 12px; color: var(--text-dim); }
        .change-up { color: var(--primary); font-weight: 600; }

        /* Контейнер для графика (основная часть) */
        .chart-box { flex-grow: 1; background: #000; position: relative; }
        #tv_container { width: 100%; height: 100%; }

        /* Панель управления внизу */
        .bottom-controls {
            background: var(--card); padding: 15px 15px 30px 15px;
            border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }

        .btn-action {
            padding: 14px; border-radius: 8px; border: none;
            color: white; font-weight: 700; font-size: 16px; cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.96); }
        
        .buy-btn { background: var(--primary); }
        .sell-btn { background: var(--secondary); }

        /* Кошелек в углу */
        .wallet-float { position: absolute; top: 15px; right: 15px; z-index: 100; }

        /* Мини-стат под графиком */
        .mini-stats {
            display: flex; justify-content: space-around; padding: 10px;
            background: var(--card); font-size: 11px; color: var(--text-dim);
            border-top: 1px solid var(--border);
        }
        .mini-stats b { color: white; }
    </style>
</head>
<body>

<div class="wallet-float" id="ton-connect-button"></div>

<div class="ticker-header">
    <div>
        <div style="font-size: 14px; font-weight: 600; margin-bottom: 4px;">TON / USDT</div>
        <div class="price-main">5.3502</div>
    </div>
    <div class="ticker-info">
        <div>24h High: <b>5.4210</b></div>
        <div>24h Low: <b>5.2105</b></div>
        <div class="change-up">+3.42%</div>
    </div>
</div>

<div class="chart-box">
    <div id="tv_container"></div>
</div>

<div class="mini-stats">
    <div>Vol(TON): <b>1.2M</b></div>
    <div>Vol(USDT): <b>6.4M</b></div>
    <div>Fee: <b style="color:var(--gold)">0.35%</b></div>
</div>

<div class="bottom-controls">
    <button class="btn-action buy-btn" onclick="openTrade('buy')">BUY</button>
    <button class="btn-action sell-btn" onclick="openTrade('sell')">SELL</button>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://rgey52bb.github.io/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function initChart() {
        new TradingView.widget({
            "autosize": true,
            "symbol": "OKX:TONUSDT",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "ru",
            "container_id": "tv_container",
            "hide_top_toolbar": true,
            "backgroundColor": "#0b0e11",
            "gridColor": "rgba(43, 49, 57, 0.5)"
        });
    }

    function openTrade(side) {
        // Здесь будет открываться модальное окно или шторка для ввода суммы
        alert('Открываем панель ' + (side === 'buy' ? 'покупки' : 'продажи'));
    }

    window.onload = initChart;
</script>
</body>
</html>
