<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Grok Avto Trade v15.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050b14; --panel: #0d141d; --blue: #4DB8FF; --green: #00ff95; --red: #ff4a4a; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px 15px 5px; text-align: center; flex-shrink: 0; }
        .logo-svg { width: 140px; height: auto; margin-bottom: 2px; }
        header .subtitle { font-size: 11px; color: var(--blue); letter-spacing: 2px; font-weight: 800; opacity: 0.9; text-transform: uppercase; }
        
        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 150px; } 
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 25px; margin-bottom: 15px; }
        
        .asset-icon-box { width: 48px; height: 48px; min-width: 48px; display: flex; align-items: center; justify-content: center; background: #1a222c; border-radius: 50%; overflow: hidden; border: 1px solid var(--border); }
        .asset-icon-img { width: 100%; height: 100%; object-fit: cover; }
        
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 12px; border: 1px solid rgba(77, 184, 255, 0.25); box-shadow: 0 0 10px rgba(77, 184, 255, 0.15); cursor: pointer; position: relative; border-radius: 20px; margin-bottom: 12px; background: rgba(77, 184, 255, 0.02); transition: 0.2s; }
        .asset-item:active { transform: scale(0.97); }

        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
        .asset-price { font-size: 12px; opacity: 0.6; color: var(--green); font-family: monospace; }
        .bal-amount { font-weight: 700; font-size: 15px; text-align: right; }

        nav { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 85px; background: var(--panel); display: flex; border-radius: 28px; border: 1px solid var(--border); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; transition: 0.2s; font-size: 30px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); font-size: 36px; color: var(--blue); }
        
        input { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; color: white; margin-bottom: 12px; outline: none; font-size: 18px; box-sizing: border-box; }
        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        .loading-text { text-align: center; opacity: 0.5; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 24px; font-weight: 900; margin-bottom: 5px;">💎 SYN WALLET</div>
        <div class="subtitle">Terminal v15.0</div></header>

    <div id="main_content">
        <!-- Сюда будут грузиться монеты -->
        <div class="loading-text">Загрузка цен с рынка...</div>
    </div>

    <nav id="navbar">
        <div class="nav-item active" onclick="showScreen('home')">🏠</div>
        <div class="nav-item" onclick="showScreen('swap')">🔄</div>
        <div class="nav-item" onclick="showScreen('wallet')">💳</div>
        <div class="nav-item" onclick="showScreen('settings')">⚙️</div>
    </nav>

    <script>
        // 1. Список 12 монет с ID для реальных цен (блокчейн TON аналоги)
        let assets = [
            { id: 'the-open-network', symbol: 'TON', name: 'Toncoin', icon: 'https://cryptologos.cc/logos/toncoin-ton-logo.png', price: 0, balance: 0 },
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin (TON)', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png', price: 0, balance: 0 },
            { id: 'tether', symbol: 'USDT', name: 'USDT (TON)', icon: 'https://cryptologos.cc/logos/tether-usdt-logo.png', price: 0, balance: 0 },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum (TON)', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.png', price: 0, balance: 0 },
            { id: 'solana', symbol: 'SOL', name: 'Solana (TON)', icon: 'https://cryptologos.cc/logos/solana-sol-logo.png', price: 0, balance: 0 },
            { id: 'near', symbol: 'NEAR', name: 'NEAR (TON)', icon: 'https://cryptologos.cc/logos/near-protocol-near-logo.png', price: 0, balance: 0 },
            { id: 'usd-coin', symbol: 'USDC', name: 'USDC (TON)', icon: 'https://cryptologos.cc/logos/usd-coin-usdc-logo.png', price: 0, balance: 0 },
            { id: 'dogecoin', symbol: 'DOGE', name: 'Dogecoin (TON)', icon: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png', price: 0, balance: 0 },
            { id: 'binancecoin', symbol: 'BNB', name: 'BNB (TON)', icon: 'https://cryptologos.cc/logos/binance-coin-bnb-logo.png', price: 0, balance: 0 },
            { id: 'litecoin', symbol: 'LTC', name: 'Litecoin (TON)', icon: 'https://cryptologos.cc/logos/litecoin-ltc-logo.png', price: 0, balance: 0 },
            { id: 'sui', symbol: 'SUI', name: 'SUI (TON)', icon: 'https://cryptologos.cc/logos/sui-sui-logo.png', price: 0, balance: 0 },
            { id: 'polygon', symbol: 'MATIC', name: 'Polygon (TON)', icon: 'https://cryptologos.cc/logos/polygon-matic-logo.png', price: 0, balance: 0 }
        ];

        // 2. Функция получения реальных цен
        async function updatePrices() {
            try {
                const ids = assets.map(a => a.id).join(',');
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                const data = await response.json();

                assets.forEach(asset => {
                    if (data[asset.id]) {
                        asset.price = data[asset.id].usd;
                    }
                });

                renderAssets();
            } catch (error) {
                console.error("Ошибка API:", error);
            }
        }

        // 3. Отрисовка списка монет (твои стили)
        function renderAssets() {
            const container = document.getElementById('main_content');
            container.innerHTML = ''; 

            assets.forEach(asset => {
                const priceFormatted = asset.price < 1 ? asset.price.toFixed(4) : asset.price.toLocaleString();
                
                container.innerHTML += `
                    <div class="asset-item" onclick="openAsset('${asset.symbol}')">
                        <div class="asset-icon-box">
                            <img src="${asset.icon}" class="asset-icon-img">
                        </div>
                        <div class="asset-details">
                            <div class="asset-name">${asset.name}</div>
                            <div class="asset-price">$${priceFormatted}</div>
                        </div>
                        <div class="bal-amount">
                            ${asset.balance} ${asset.symbol}</div>
                    </div>
                `;
            });
        }

        // Навигация по экранам
        function showScreen(screenId) {
            // Управление активной иконкой в меню
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Здесь можно добавить логику переключения экранов .screen
            console.log("Переход на экран:", screenId);
        }

        function openAsset(symbol) {
            console.log("Выбран актив:", symbol);
        }

        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Запуск
        updatePrices();
        setInterval(updatePrices, 60000); // Обновлять каждую минуту

    </script>
</body>
</html>
