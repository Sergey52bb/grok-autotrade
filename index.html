<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYN TERMINAL</title>

<style>
:root {
    --bg: #0b1220;
    --card: #141c2b;
    --text: #fff;
    --dim: #8e96a3;
    --green: #16c784;
    --red: #ea3943;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    background: #0f1a2e;
}

.header h1 {
    margin: 0;
    font-size: 20px;
}

.sub {
    color: var(--dim);
    font-size: 12px;
}

/* PAIR */
.pair {
    padding: 10px 15px;
    font-size: 16px;
}

/* MAIN */
.container {
    padding: 10px;
}

/* BUY SELL */
.tabs {
    display: flex;
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 10px;
}

.buy { background: #2f6df6; }
.sell { color: orange; }

/* INPUTS */
.box {
    background: var(--card);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
}

/* BUTTON */
.btn {
    background: var(--green);
    padding: 14px;
    text-align: center;
    border-radius: 12px;
    font-weight: bold;
    margin-top: 10px;
}

/* ORDER BOOK */
.orderbook {
    margin-top: 15px;
    background: #101826;
    border-radius: 10px;
    padding: 8px;
}

.row {
    position: relative;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 5px;
}

.fill {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    opacity: 0.2;
}

.red { color: var(--red); }
.green { color: var(--green); }

.mid {
    text-align: center;
    padding: 5px;
    color: #aaa;
}

/* BOTTOM NAV */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #0f1a2e;
    display: flex;
    justify-content: space-around;
    padding: 10px 0;
    font-size: 12px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>💎 SYN TERMINAL</h1>
    <div class="sub">AI Trading System</div>
</div>

<!-- PAIR -->
<div class="pair">
    TON / USDT <span style="color: var(--green)">+0.62%</span>
</div>

<div class="container">

    <!-- BUY / SELL -->
    <div class="tabs">
        <div class="tab buy">Buy</div>
        <div class="tab sell">Sell</div>
    </div>

    <div class="box">
        <span>Amount</span>
        <span>25 TON</span>
    </div>

    <div class="box">
        <span>You Receive</span>
        <span>133.25 USDT</span>
    </div>

    <div class="box">
        <span>DEX Fee</span>
        <span>0.25%</span>
    </div>

    <div class="btn">Buy TON</div>

    <!-- ORDER BOOK -->
    <div class="orderbook">

        <!-- RED (SELL) -->
        <div class="row red">
            <div class="fill" style="width:80%;background:red"></div>
            <span>1.308</span><span>603</span>
        </div>
        <div class="row red">
            <div class="fill" style="width:60%;background:red"></div>
            <span>1.307</span><span>406</span>
        </div>
        <div class="row red">
            <div class="fill" style="width:90%;background:red"></div>
            <span>1.306</span><span>1756</span>
        </div>

        <div class="mid">1.288</div>

        <!-- GREEN (BUY) -->
        <div class="row green">
            <div class="fill" style="width:70%;background:green"></div>
            <span>1.287</span><span>17889</span>
        </div>
        <div class="row green">
            <div class="fill" style="width:50%;background:green"></div>
            <span>1.286</span><span>68963</span>
        </div>
        <div class="row green">
            <div class="fill" style="width:30%;background:green"></div>
            <span>1.285</span><span>5783</span>
        </div>

    </div>

</div>

<!-- NAV -->
<div class="nav">
    <div>Home</div>
    <div>Trade</div>
    <div>Wallet</div>
    <div>Settings</div>
</div>

</body>
</html>
