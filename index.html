<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SYN TERMINAL v11.3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --bg: #050b14; 
            --panel: #0d141d; 
            --blue: #3897ff; 
            --green: #00ff95; 
            --red: #ff4a4a;
            --border: rgba(255,255,255,0.08); 
        }
        
        body { 
            background: var(--bg);
            color: white; margin: 0; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }

        header { padding: 20px 15px 5px; text-align: center; flex-shrink: 0; }
        header .title { font-weight: 900; font-size: 22px; letter-spacing: 1px; }
        header .subtitle { font-size: 10px; color: var(--blue); letter-spacing: 2px; font-weight: 700; opacity: 0.7; }

        #main_content { flex: 1; overflow-y: auto; padding: 10px 15px 120px; }
        .screen { display: none; }
        .screen.active { display: block; }

        .total-balance-card { text-align: center; padding: 20px 0 30px; }
        .total-balance-card h1 { font-size: 44px; margin: 5px 0; font-weight: 900; letter-spacing: -1px; }
        .address-badge { font-size: 11px; color: var(--blue); background: rgba(56, 151, 255, 0.1); padding: 6px 14px; border-radius: 20px; display: inline-block; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 30px; margin-bottom: 20px; }
        
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .asset-item:last-child { border: none; }
        .asset-icon { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; background: rgba(255,255,255,0.03); }
        .asset-details { flex: 1; margin-left: 15px; }
        .asset-name { font-weight: 800; font-size: 16px; }
        .asset-price { font-size: 12px; opacity: 0.5; }
        .asset-balance { text-align: right; }
        .bal-amount { font-weight: 700; font-size: 16px; }

        input, select { width: 100%; padding: 18px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; color: white; margin-bottom: 12px; outline: none; font-size: 16px; box-sizing: border-box; }

        nav { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: var(--panel); display: flex; border-radius: 25px; border: 1px solid var(--border); z-index: 100; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.3; }
        .nav-item.active { opacity: 1; }
        .nav-item span { font-size: 28px; }

        /* УНИВЕРСАЛЬНАЯ МОДАЛКА */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; 
        }
        .modal-body { 
            background: #111a27; width: 100%; border-radius: 35px 35px 0 0; 
            padding: 30px 20px 40px; box-sizing: border-box; border-top: 1px solid var(--border); 
        }
        .btn-confirm { background: var(--green); color: black; padding: 18px; border-radius: 20px; width: 100%; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* Стили для вложенных окон внутри модалки */
        .modal-view { display: none; }
        .modal-view.active { display: block; }
    </style>
</head>
<body>

<header>
    <div class="title">💎 SYN TERMINAL</div>
    <div class="subtitle">AI TRADING SYSTEM</div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div class="total-balance-card">
            <div style="font-size: 11px; opacity: 0.5; letter-spacing: 1px;">TOTAL BALANCE</div>
            <h1 id="main_balance">0.00 TON</h1>
            <div id="addr_display" class="address-badge">Disconnected</div>
        </div>
        <div class="card">
            <div class="asset-item" onclick="showAssetMenu('TON')">
                <div class="asset-icon" style="color:#0088cc;">💎</div>
                <div class="asset-details"><div class="asset-name">TON</div><div class="asset-price">$7.42</div></div>
                <div class="asset-balance"><div class="bal-amount" id="bal_ton">0.00</div></div>
            </div>
            <div class="asset-item" onclick="showAssetMenu('BTC')">
                <div class="asset-icon" style="color:#f7931a;">🟠</div>
                <div class="asset-details"><div class="asset-name">Bitcoin</div><div class="asset-price">$69,420</div></div>
                <div class="asset-balance"><div class="bal-amount">0.00</div></div>
            </div>
        </div>
    </div>

    <div id="scr_swap" class="screen">
        <div class="card" style="margin-top: 20px;">
            <input type="number" id="sw_val" placeholder="0.0" oninput="calculateSwap()">
            <select id="sw_from" onchange="validateSwap()"></select>
            <div id="sw_err_msg" style="display:none; color:var(--red); text-align:center; font-size:12px; margin: 10px 0;">Invalid pair</div>
            <input type="text" id="sw_res" placeholder="0.0" readonly style="color:var(--green);">
            <select id="sw_to" onchange="validateSwap()"></select>
            <button class="btn-confirm" onclick="tg.showAlert('Swap processing...')">Confirm Swap</button>
        </div>
    </div>

    <div id="scr_connect" class="screen">
        <div class="card" style="text-align:center; margin-top: 20px; padding: 40px 20px;">
            <div id="ton-connect-btn"></div>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" onclick="showTab('wallet', this)"><span>💼</span></div>
    <div class="nav-item" onclick="showTab('swap', this)"><span>🌀</span></div>
    <div class="nav-item" onclick="showTab('connect', this)"><span>🔗</span></div>
</nav>

<div id="universal_modal" class="modal-overlay" onclick="closeUniversalModal()">
    <div class="modal-body" onclick="event.stopPropagation()">
        
        <div id="view_menu" class="modal-view">
            <h3 id="menu_title" style="text-align:center; margin-top:0;">Asset</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <button class="btn-confirm" style="background:#fff;" onclick="switchModalView('deposit')">RECEIVE</button>
                <button class="btn-confirm" style="background:var(--blue); color:white;" onclick="switchModalView('send')">SEND</button>
            </div>
        </div>

        <div id="view_deposit" class="modal-view">
            <h3 style="text-align:center; margin-top:0;">Receive <span class="cur_asset">TON</span></h3>
            <div id="qrcode" style="display:flex; justify-content:center; margin:20px 0; background:#fff; padding:15px; border-radius:15px; min-height:150px;"></div>
            <p id="full_addr" style="font-size:11px; word-break:break-all; opacity:0.5; font-family:monospace; text-align:center;"></p>
            <button class="btn-confirm" onclick="copyAddr()">Copy Address</button>
        </div>

        <div id="view_send" class="modal-view">
            <h3 style="text-align:center; margin-top:0;">Send <span class="cur_asset">TON</span></h3>
            <input type="text" placeholder="Wallet Address">
            <input type="text" placeholder="Memo (Optional)">
            <input type="number" placeholder="Amount">
            <button class="btn-confirm" onclick="tg.showAlert('Sending...')">Confirm Send</button>
        </div>

        <button class="btn-confirm" style="background:transparent; color:white; opacity:0.5; margin-top:15px;" onclick="closeUniversalModal()">CANCEL</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready(); tg.expand();

    let prices = { 'TON': 7.42, 'BTC': 69420, 'USDT': 1.00 };
    let currentAddr = "";
    let selectedAsset = 'TON';

    function init() {
        const f = document.getElementById('sw_from'), t = document.getElementById('sw_to');
        Object.keys(prices).forEach(c => {
            f.innerHTML += `<option value="${c}">${c}</option>`;
            t.innerHTML += `<option value="${c}">${c}</option>`;
        });
        t.value = "USDT";

        const tc = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        tc.onStatusChange(w => {
            if (w) {
                currentAddr = w.account.address;
                document.getElementById('addr_display').innerText = currentAddr.substring(0,8)+"..."+currentAddr.substring(currentAddr.length-4);
                document.getElementById('full_addr').innerText = currentAddr;
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: currentAddr, width: 150, height: 150 });
            }
        });
    }

    function showTab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_'+id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.selectionChanged();
    }

    function showAssetMenu(asset) {
        selectedAsset = asset;
        document.getElementById('menu_title').innerText = asset + " Options";
        document.querySelectorAll('.cur_asset').forEach(e => e.innerText = asset);
        switchModalView('menu');
        document.getElementById('universal_modal').style.display = 'flex';
        tg.HapticFeedback.impactOccurred('medium');
    }

    function switchModalView(viewId) {
        document.querySelectorAll('.modal-view').forEach(v => v.classList.remove('active'));
        document.getElementById('view_' + viewId).classList.add('active');
    }

    function closeUniversalModal() {
        document.getElementById('universal_modal').style.display = 'none';
    }

    function copyAddr() { if(currentAddr) { navigator.clipboard.writeText(currentAddr); tg.showAlert("Copied!"); } }

    window.onload = init;
</script>
</body>
</html>
