<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 SYN TERMINAL</title>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #05070a; --panel: #12151c; --input: #1e232d; --green: #00ff95; --text: #94a3b8; --border: #2b2f36; --accent: #0088cc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 15px; background: var(--panel); border-bottom: 1px solid var(--border); text-align: left; }
        .brand .main-title { font-size: 18px; font-weight: bold; display: block; }
        .brand .sub-title { font-size: 10px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; }

        #main_content { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .screen { display: none; padding: 15px; }
        .screen.active { display: block; }

        /* WALLET */
        #ton-connect-btn { display: flex; justify-content: center; margin-bottom: 15px; }
        .balance-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .balance-amount { font-size: 32px; font-weight: 800; margin: 5px 0; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-deposit { background: #fff; color: #000; }
        .btn-send { background: var(--green); color: #000; }

        /* MARKET LIST */
        .coin-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--panel); border-radius: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
        .coin-info { display: flex; align-items: center; gap: 10px; }
        .coin-icon { width: 32px; height: 32px; border-radius: 50%; background: #2b3139; }
        .coin-name { font-weight: bold; font-size: 14px; }
        .coin-price { text-align: right; }
        .soon-badge { font-size: 9px; color: var(--text); border: 1px solid var(--text); padding: 1px 4px; border-radius: 4px; margin-left: 5px; }

        /* NAV */
        nav { height: 70px; background: var(--panel); border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text); font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--green); }
        .nav-item i { font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <span class="main-title">💎 SYN TERMINAL</span>
        <span class="sub-title">AI Trading System</span>
    </div>
</header>

<div id="main_content">
    <div id="scr_wallet" class="screen active">
        <div id="ton-connect-btn"></div>
        
        <div class="balance-card">
            <div style="font-size: 11px; opacity: 0.6;">TOTAL BALANCE</div>
            <div class="balance-amount"><span id="bal_ton">0.00</span> TON</div>
            <div style="color: var(--green); font-weight: bold;">≈ $<span id="bal_usd">0.00</span></div>
        </div>

        <div class="btn-group">
            <button class="sub-btn btn-deposit" onclick="depositAction()">⬇ DEPOSIT</button>
            <button class="sub-btn btn-send" onclick="showTab('send_form')">⬆ SEND</button>
        </div>
    </div>

    <div id="scr_send_form" class="screen">
        <button onclick="showTab('wallet')" style="background:none; border:none; color:var(--text); margin-bottom:15px;">← Back</button>
        <div style="background:var(--panel); padding:20px; border-radius:20px;">
            <div style="margin-bottom:15px;">
                <label style="font-size:10px; color:var(--text);">RECIPIENT ADDRESS</label>
                <input type="text" id="dest" placeholder="UQ..." style="width:100%; background:var(--input); border:none; padding:12px; border-radius:10px; color:white; margin-top:5px;">
            </div>
            <div style="margin-bottom:15px;">
                <label style="font-size:10px; color:var(--text);">AMOUNT TON</label>
                <input type="number" id="amt" placeholder="0.0" style="width:100%; background:var(--input); border:none; padding:12px; border-radius:10px; color:white; margin-top:5px;">
            </div>
            <button class="btn-send sub-btn" style="width:100%;" onclick="sendTx()">CONFIRM SEND</button>
        </div>
    </div>

    <div id="scr_market" class="screen">
        <h3 style="margin-bottom:15px;">AI Market Sync</h3>
        <div id="coin_list">
            </div>
    </div>

    <div id="scr_profile" class="screen">
        <h3>Profile</h3>
        <div style="background:var(--panel); padding:20px; border-radius:20px; margin-top:15px;">
            <p style="font-size:14px;">Network: <span style="color:var(--green)">TON Mainnet</span></p>
            <p style="font-size:14px; margin-top:10px;">AI Node: <span style="color:var(--green)">Active</span></p>
            <p style="font-size:12px; color:var(--text); margin-top:15px; line-height:1.4;">Ваши транзакции защищены протоколом SYN AI. Комиссия 1% используется для поддержания ликвидности узлов.</p>
        </div>
    </div>
</div>

<nav>
    <div class="nav-item active" id="nav_wallet" onclick="showTab('wallet')"><i>💼</i>Wallet</div>
    <div class="nav-item" id="nav_market" onclick="showTab('market')"><i>🔄</i>Market</div>
    <div class="nav-item" id="nav_profile" onclick="showTab('profile')"><i>👤</i>Profile</div>
</nav>

<script>
    const MY_WALLET = "UQCn_CdyczBzPjhjBfQgEJzoNWlVTLx4rbftix2Oyq3-Okyb"; 
    
    const tonConnectUI = new TONConnectUI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/Grok-Avto-Trade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    const COINS = [
        { id: 'ton', name: 'TON', symbol: 'ton', binance: 'TONUSDT', active: true },
        { id: 'usdt', name: 'USDT', symbol: 'usdt', binance: 'USDTUSDT', active: true },
        { id: 'bnb', name: 'BNB', symbol: 'bnb', binance: 'BNBUSDT', active: true },
        { id: 'btc', name: 'BTC', symbol: 'btc', binance: 'BTCUSDT', active: true },
        { id: 'eth', name: 'ETH', symbol: 'eth', binance: 'ETHUSDT', active: true },
        { id: 'sol', name: 'SOL', symbol: 'sol', binance: 'SOLUSDT', active: true },
        { id: 'aster', name: 'ASTER', symbol: 'aster', price: '0.72', active: true },
        { id: 'pepe', name: 'PEPE', symbol: 'pepe', binance: 'PEPEUSDT', active: false },
        { id: 'shiba', name: 'SHIB', symbol: 'shib', binance: 'SHIBUSDT', active: false }
    ];

    function showTab(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr_' + name).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(document.getElementById('nav_' + name)) document.getElementById('nav_' + name).classList.add('active');
    }

    function depositAction() {
        if(!tonConnectUI.account) return alert("Please connect wallet!");
        const addr = tonConnectUI.account.address;
        prompt("Ваш адрес для депозита (скопируйте):", addr);
    }

    async function updateMarket() {
        const list = document.getElementById('coin_list');
        list.innerHTML = '';
        
        for (let coin of COINS) {
            let price = coin.price || "0.00";
            if(coin.binance && coin.id !== 'usdt') {
                try {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${coin.binance}`);
                    const data = await res.json();
                    price = parseFloat(data.price).toFixed(2);
                    if (coin.id === 'ton') document.getElementById('bal_usd').innerText = (parseFloat(document.getElementById('bal_ton').innerText) * price).toFixed(2);
                } catch(e) {}
            } else if (coin.id === 'usdt') price = "1.00";

            const row = document.createElement('div');
            row.className = 'coin-row';
            row.innerHTML = `
                <div class="coin-info">
                    <img src="https://raw.githubusercontent.com/t1m9m/cryptocurrency-icons/master/32/color/${coin.symbol}.png" class="coin-icon" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2272/2272825.png'">
                    <div>
                        <span class="coin-name">${coin.name}</span>
                        ${!coin.active ? '<span class="soon-badge">SOON</span>' : ''}
                    </div>
                </div>
                <div class="coin-price">
                    <b style="color:${coin.active ? 'var(--green)' : 'white'}">$${price}</b>
                </div>
            `;
            list.appendChild(row);
        }
    }

    async function sendTx() {
        if (!tonConnectUI.connected) return alert("Connect Wallet!");
        const dest = document.getElementById('dest').value;
        const amount = document.getElementById('amt').value;
        if(!dest || !amount) return alert("Fill fields!");

        const nano = Math.floor(amount * 1000000000);
        const fee = Math.floor(nano * 0.01);
        const userAmt = nano - fee;

        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 300,
            messages: [
                { address: dest, amount: userAmt.toString() },
                { address: MY_WALLET, amount: fee.toString(), payload: "te6ccgEBAQEADgAAGEZlZSBieSBTWTi0974=" }
            ]
        };
        try { await tonConnectUI.sendTransaction(tx); alert("Success!"); showTab('wallet'); } catch(e) { alert("Error"); }
    }

    setInterval(updateMarket, 10000);
    updateMarket();
</script>
</body>
</html>
