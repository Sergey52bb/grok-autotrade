<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V2.5 PRO</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #1c2127; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .header { background: var(--panel); padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .brand { color: var(--gold); font-size: 18px; font-weight: bold; }

        /* График и Стакан */
        .trading-grid { display: grid; grid-template-columns: 1.6fr 1fr; height: 280px; border-bottom: 2px solid #000; }
        .order-book-side { background: var(--panel); font-size: 10px; padding: 5px; display: flex; flex-direction: column; border-left: 1px solid #333; overflow: hidden; }
        .ob-header { color: var(--text); font-size: 9px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .ob-row { position: relative; display: flex; justify-content: space-between; padding: 2px 0; z-index: 1; }
        .ob-bg { position: absolute; right: 0; top: 0; bottom: 0; z-index: -1; opacity: 0.15; transition: width 0.5s; }
        .price-center { font-size: 15px; font-weight: bold; text-align: center; color: var(--green); padding: 6px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin: 4px 0; }

        /* Контент */
        .page-content { display: none; padding: 12px; padding-bottom: 80px; height: calc(100vh - 370px); overflow-y: auto; }
        .page-content.active { display: block; }
        .input-group { background: var(--input); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 5px; cursor: pointer; }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 10px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text); cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }

        /* Уведомления (Toast) */
        #toast-container { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 80%; pointer-events: none; }
        .toast { background: var(--panel); border-left: 4px solid var(--gold); color: white; padding: 12px; border-radius: 4px; margin-bottom: 10px; font-size: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); opacity: 0; transition: 0.4s; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="header">
    <div class="brand">STRATEX <span style="font-size: 10px; background: var(--gold); color: black; padding: 2px 4px; border-radius: 3px; margin-left: 5px;">V2.5</span></div>
    <div id="ton-connect-button"></div>
</div>

<div id="market-top" class="trading-grid">
    <div id="tv_widget" style="height:100%;"></div>
    <div class="order-book-side" id="order-book">
        <div class="ob-header"><span>Цена</span><span>Кол-во</span></div>
    </div>
</div>

<div id="page-market" class="page-content active">
    <div class="input-group">
        <span style="color:var(--text); font-size: 12px;">Цена TON</span>
        <span id="market-price-val" style="font-weight:bold; font-size: 16px;">... <small>USDT</small></span>
    </div>
    <div class="input-group">
        <span style="color:var(--text); font-size: 12px;">Сумма</span>
        <span style="font-weight:bold; font-size: 16px;">25 <small>TON</small></span>
    </div>
    <button class="btn-main" id="main-action-btn">ПОДКЛЮЧИТЕ КОШЕЛЕК</button>
</div>

<div id="page-bot" class="page-content">
    <h3 style="color:var(--gold)">🤖 GROK Auto-Trade</h3>
    <div class="input-group"><span>Стратегия</span><span style="color:var(--green)">Консервативная</span></div>
    <p id="bot-status" style="font-size: 12px; color:var(--text);">Система готова.</p>
    <button class="btn-main" id="start-bot-btn" style="background: var(--gold); color: black;" onclick="toggleBot()">Запустить Грока</button>
</div>

<div id="page-assets" class="page-content">
    <h3>🏦 Ваши активы</h3>
    <div class="input-group"><span>Toncoin</span><span id="asset-ton" style="color:var(--gold)">0.00 TON</span></div>
    <div class="input-group"><span>Статус</span><span id="wallet-status">Не подключен</span></div>
</div>

<div id="page-settings" class="page-content">
    <h3>⚙️ Настройки</h3>
    <div class="input-group"><span>Сеть</span><span>TON Mainnet</span></div>
    <div class="input-group" onclick="showToast('Обновление скоро!')"><span>Версия</span><span>2.5.0</span></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('market', this)"><div class="nav-icon">📊</div>Рынок</div>
    <div class="nav-item" onclick="showPage('bot', this)"><div class="nav-icon">🤖</div>Автобот</div>
    <div class="nav-item" onclick="showPage('assets', this)"><div class="nav-icon">🏦</div>Активы</div>
    <div class="nav-item" onclick="showPage('settings', this)"><div class="nav-icon">⚙️</div>Настройки</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    // Инициализация графики
    new TradingView.widget({
        "autosize": true, "symbol": "OKX:TONUSDT", "interval": "15", "theme": "dark",
        "style": "1", "locale": "ru", "hide_top_toolbar": true, "container_id": "tv_widget"
    });

    // Уведомления
    function showToast(text) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = text;
        container.appendChild(t);
        setTimeout(() => t.style.opacity = '1', 10);
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
    }

    let currentPrice = 7.235;

    async function fetchPrice() {
        try {
            const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=usd');
            const data = await res.json();
            currentPrice = data['the-open-network'].usd;
            document.getElementById('market-price-val').innerHTML = `${currentPrice.toFixed(3)} <small>USDT</small>`;
        } catch(e) {}
    }

    function updateOrderBook() {
        const ob = document.getElementById('order-book');
        let html = '<div class="ob-header"><span>Цена</span><span>Кол-во</span></div>';
        for(let i=4; i>0; i--) {
            let p = (currentPrice + (i*0.002)).toFixed(3);
            html += `<div class="ob-row" style="color:var(--red)"><div class="ob-bg" style="width:${Math.random()*80}%; background:var(--red)"></div><span>${p}</span><span>${(Math.random()*200).toFixed(1)}</span></div>`;
        }
        html += `<div class="price-center">${currentPrice.toFixed(3)}</div>`;
        for(let i=1; i<=4; i++) {
            let p = (currentPrice - (i*0.002)).toFixed(3);
            html += `<div class="ob-row" style="color:var(--green)"><div class="ob-bg" style="width:${Math.random()*80}%; background:var(--green)"></div><span>${p}</span><span>${(Math.random()*200).toFixed(1)}</span></div>`;
        }
        ob.innerHTML = html;
    }

    setInterval(fetchPrice, 10000); setInterval(updateOrderBook, 3000);
    fetchPrice(); updateOrderBook();

    function showPage(pageId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        el.classList.add('active');
        document.getElementById('market-top').style.display = (pageId === 'market' ? 'grid' : 'none');
    }

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    tonConnectUI.onStatusChange(wallet => {
        const btn = document.getElementById('main-action-btn');
        if (wallet) {
            btn.innerText = "КУПИТЬ TON"; btn.style.background = "var(--green)";
            showToast("Кошелек успешно подключен!");
            document.getElementById('wallet-status').innerText = "Подключен";
        } else {
            btn.innerText = "ПОДКЛЮЧИТЕ КОШЕЛЕК";
            document.getElementById('wallet-status').innerText = "Не подключен";
        }
    });

    function toggleBot() {
        const btn = document.getElementById('start-bot-btn');
        const status = document.getElementById('bot-status');
        if(btn.innerText === "Запустить Грока") {
            btn.innerText = "Остановить"; btn.style.background = "var(--red)";
            status.innerHTML = "🚀 <span style='color:var(--green)'>Грок ищет профит...</span>";
            showToast("Грок запущен!");
        } else {
            btn.innerText = "Запустить Грока"; btn.style.background = "var(--gold)";
            status.innerText = "Бот спит.";
            showToast("Грок остановлен.");
        }
    }
</script>
</body>
</html>
