<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATEX V3.1 SMART</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --panel: #1c2127; --input: #2b3139; --green: #0ecb81; --red: #f6465d; --gold: #f0b90b; --text: #848e9c; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; }
        
        .header { background: var(--panel); padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; gap: 10px; }
        .pair-selector { flex-grow: 1; background: var(--input); color: var(--gold); border: 1px solid #444; border-radius: 6px; padding: 6px; font-size: 13px; font-weight: bold; outline: none; }

        .trading-grid { display: grid; grid-template-columns: 1.5fr 1fr; height: 260px; border-bottom: 2px solid #000; }
        .order-book-side { background: var(--panel); font-size: 10px; padding: 5px; display: flex; flex-direction: column; border-left: 1px solid #333; overflow: hidden; }
        .ob-header { color: var(--text); font-size: 9px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .ob-row { position: relative; display: flex; justify-content: space-between; padding: 2px 0; z-index: 1; }
        .ob-bg { position: absolute; right: 0; top: 0; bottom: 0; z-index: -1; opacity: 0.15; transition: width 0.5s; }
        .price-center { font-size: 14px; font-weight: bold; text-align: center; color: var(--green); padding: 4px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin: 2px 0; }

        .page-content { display: none; padding: 12px; padding-bottom: 80px; height: calc(100vh - 350px); overflow-y: auto; }
        .page-content.active { display: block; }
        
        .input-group { background: var(--input); border-radius: 8px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { width: 100%; background: var(--green); color: white; border: none; padding: 16px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Стиль для монет "Скоро" */
        .soon-badge { background: rgba(240,185,11,0.1); color: var(--gold); padding: 20px; border-radius: 12px; text-align: center; border: 1px dashed var(--gold); margin-top: 10px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; background: var(--panel); padding: 10px 0; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: var(--text); cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-icon { font-size: 20px; margin-bottom: 3px; }

        #toast-container { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 85%; pointer-events: none; }
        .toast { background: var(--panel); border-left: 4px solid var(--gold); color: white; padding: 12px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; opacity: 0; transition: 0.4s; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="header">
    <select class="pair-selector" id="pair-select" onchange="changePair()">
        <optgroup label="Активные пары">
            <option value="TONUSDT">TON / USDT</option>
            <option value="BTCUSDT">BTC / USDT</option>
            <option value="ETHUSDT">ETH / USDT</option>
            <option value="PAXGUSDT">GOLD / USDT</option>
            <option value="SOLUSDT">SOL / USDT</option>
            <option value="SUIUSDT">SUI / USDT</option>
            <option value="PEPEUSDT">PEPE / USDT</option>
        </optgroup>
        <optgroup label="Ожидают листинга">
            <option value="CELIA_SOON">CELIA / SOON</option>
            <option value="HOT_SOON">HOT / SOON</option>
        </optgroup>
    </select>
    <div id="ton-connect-button"></div>
</div>

<div id="market-top" class="trading-grid">
    <div id="tv_widget" style="height:100%;"></div>
    <div class="order-book-side" id="order-book"></div>
</div>

<div id="page-market" class="page-content active">
    <div id="active-trading-ui">
        <div class="input-group">
            <span>Цена USDT</span>
            <span id="market-price-val" style="font-weight:bold; font-size: 18px; color:var(--gold)">...</span>
        </div>
        <button class="btn-main" id="main-action-btn">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
    </div>
    
    <div id="soon-trading-ui" style="display:none;">
        <div class="soon-badge">
            <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
            <div style="font-weight: bold; margin-bottom: 5px;">ЛИСТИНГ ОЖИДАЕТСЯ</div>
            <div style="font-size: 12px; opacity: 0.8;">Торговля данной монетой будет доступна после официального запуска на биржах.</div>
        </div>
    </div>
</div>

<div id="page-bot" class="page-content">
    <h3 style="color:var(--gold)">🤖 GROK MULTI-BOT</h3>
    <button class="btn-main" id="start-bot-btn" style="background: var(--gold); color: black;" onclick="toggleBot()">Запустить Грока</button>
    <div id="bot-logs" style="margin-top:15px; font-size:11px; font-family:monospace; background:#000; padding:10px; height:150px; overflow-y:auto; border:1px solid #333;"></div>
</div>

<div id="page-assets" class="page-content">
    <h3>🏦 Кошелек</h3>
    <div class="input-group"><span>Общий баланс</span><span style="color:var(--gold)">0.00 USDT</span></div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showPage('market', this)"><div class="nav-icon">📊</div>Рынок</div>
    <div class="nav-item" onclick="showPage('bot', this)"><div class="nav-icon">🤖</div>Бот</div>
    <div class="nav-item" onclick="showPage('assets', this)"><div class="nav-icon">🏦</div>Активы</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPair = "TONUSDT";
    let currentPrice = null;

    const coinMap = {
        "TONUSDT": "the-open-network", "BTCUSDT": "bitcoin", "ETHUSDT": "ethereum",
        "PAXGUSDT": "pax-gold", "SOLUSDT": "solana", "SUIUSDT": "sui", "PEPEUSDT": "pepe"
    };

    function initTV(symbol) {
        if (symbol.includes('_SOON')) {
            document.getElementById('tv_widget').innerHTML = "<div style='display:flex; height:100%; align-items:center; justify-content:center; color:#555; text-align:center; padding:20px;'>График будет доступен после листинга</div>";
            return;
        }
        new TradingView.widget({
            "autosize": true, "symbol": "OKX:" + symbol, "interval": "15",
            "theme": "dark", "style": "1", "locale": "ru", "container_id": "tv_widget", "hide_top_toolbar": true
        });
    }

    initTV(currentPair);

    async function fetchPrice() {
        if (currentPair.includes('_SOON')) return;
        const id = coinMap[currentPair];
        try {
            const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
            const data = await res.json();
            currentPrice = data[id].usd;
            document.getElementById('market-price-val').innerHTML = `${currentPrice.toFixed(currentPrice < 1 ? 5 : 2)} <small>USDT</small>`;
            updateOrderBook();
        } catch(e) {}
    }

    function changePair() {
        currentPair = document.getElementById('pair-select').value;
        const isSoon = currentPair.includes('_SOON');
        
        document.getElementById('active-trading-ui').style.display = isSoon ? 'none' : 'block';
        document.getElementById('soon-trading-ui').style.display = isSoon ? 'block' : 'none';
        
        if (!isSoon) {
            initTV(currentPair);
            fetchPrice();
        } else {
            initTV(currentPair);
            document.getElementById('order-book').innerHTML = "<div style='text-align:center; padding-top:50px; color:#555;'>Data Offline</div>";
        }
    }

    function updateOrderBook() {
        if (!currentPrice || currentPair.includes('_SOON')) return;
        const ob = document.getElementById('order-book');
        let html = '<div class="ob-header"><span>Цена</span><span>Объем</span></div>';
        const spread = currentPrice * 0.0005;
        for(let i=3; i>0; i--) {
            let p = (currentPrice + (i*spread)).toFixed(currentPrice < 1 ? 5 : 2);
            html += `<div class="ob-row" style="color:var(--red)"><div class="ob-bg" style="width:${Math.random()*70}%; background:var(--red)"></div><span>${p}</span><span>${(Math.random()*500).toFixed(0)}</span></div>`;
        }
        html += `<div class="price-center">${currentPrice.toFixed(currentPrice < 1 ? 5 : 2)}</div>`;
        for(let i=1; i<=3; i++) {
            let p = (currentPrice - (i*spread)).toFixed(currentPrice < 1 ? 5 : 2);
            html += `<div class="ob-row" style="color:var(--green)"><div class="ob-bg" style="width:${Math.random()*70}%; background:var(--green)"></div><span>${p}</span><span>${(Math.random()*500).toFixed(0)}</span></div>`;
        }
        ob.innerHTML = html;
    }

    function showPage(pId, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-' + pId).classList.add('active');
        el.classList.add('active');
        document.getElementById('market-top').style.display = (pId === 'market' ? 'grid' : 'none');
    }

    setInterval(fetchPrice, 10000);
    fetchPrice();

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://sergey52bb.github.io/grok-autotrade/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });
</script>
</body>
</html>
